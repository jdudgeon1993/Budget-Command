{# HTMX fragment: panel block + flash messages (shown inside #panel on swaps). #}
{% with msgs = get_flashed_messages(with_categories=true) %}
{% if msgs %}<div class="flash-region">{% for cat, msg in msgs %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}</div>{% endif %}
{% endwith %}
{% block panel %}{% endblock %}
