<div class="modal-title">Add Transaction</div>
<form class="tx-form" method="post" action="{{ url_for('panels.run_action', name='tx_create') }}"
      hx-post="{{ url_for('panels.run_action', name='tx_create') }}"
      hx-target="#panel" hx-swap="innerHTML">
  <input type="hidden" name="back" value="{{ back }}">

  <div class="tx-type-row">
    {% for val, label in [('out','Expense'),('in','Income'),('xfr','Transfer')] %}
    <label class="tx-type {{ 'on' if tx_type == val }}" onclick="updateTxFields('{{ val }}')">
      <input type="radio" name="type" value="{{ val }}" {{ 'checked' if tx_type == val }} hidden>{{ label }}
    </label>
    {% endfor %}
  </div>

  <div class="tx-field">
    <label>Amount</label>
    <input type="text" name="amount" inputmode="decimal" placeholder="0.00" autofocus>
  </div>
  <div class="tx-field">
    <label>Date</label>
    <input type="date" name="date" value="{{ today }}">
  </div>
  <div class="tx-field">
    <label>Account</label>
    <select name="accountId">
      {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="tx-field" id="tf-toAcct" style="{{ '' if tx_type == 'xfr' else 'display:none' }}">
    <label>To account</label>
    <select name="toAccountId">
      <option value="">—</option>
      {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="tx-field" id="tf-bucket" style="{{ '' if tx_type == 'out' else 'display:none' }}">
    <label>Bucket</label>
    <select name="bucketId" id="tf-bucket-sel" onchange="updateDebtHint(this)">
      <option value="">—</option>
      {% for grp in buckets_by_cat %}
      <optgroup label="{{ grp.cat }}">
        {% for b in grp.buckets %}
        <option value="{{ b.id }}" data-debt-aid="{{ b.debtAccountId }}" data-debt-name="{{ b.debtAccountName }}">{{ b.name }}</option>
        {% endfor %}
      </optgroup>
      {% endfor %}
    </select>
    <div id="tf-debt-hint" style="display:none;font-size:11px;color:var(--green);margin-top:4px">↳ Pays: <span id="tf-debt-hint-name"></span></div>
    <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:var(--text3);cursor:pointer">
      <input type="checkbox" id="tf-split-toggle" onchange="toggleSplitMode(this)"> Split across multiple buckets
    </label>
  </div>

  <div class="tx-field" id="tf-splits" style="display:none">
    <label>Splits <span id="tf-split-remaining" style="font-weight:400;color:var(--text3)"></span></label>
    <div id="tf-split-rows"></div>
    <button class="toolbar-btn" type="button" style="margin-top:6px;font-size:11px" onclick="addSplitRow()">+ Add split</button>
  </div>

  <template id="tf-split-row-tpl">
    <div class="tf-split-row" style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
      <select name="split_bucket" style="flex:1.4">
        <option value="">—</option>
        {% for grp in buckets_by_cat %}
        <optgroup label="{{ grp.cat }}">
          {% for b in grp.buckets %}
          <option value="{{ b.id }}">{{ b.name }}</option>
          {% endfor %}
        </optgroup>
        {% endfor %}
      </select>
      <input type="text" name="split_amount" inputmode="decimal" placeholder="0.00" style="flex:1" oninput="updateSplitRemaining()">
      <button class="toolbar-btn" type="button" style="padding:4px 8px" onclick="this.closest('.tf-split-row').remove();updateSplitRemaining()">✕</button>
    </div>
  </template>
  <div class="tx-field" id="tf-incomeType" style="{{ '' if tx_type == 'in' else 'display:none' }}">
    <label>Income type</label>
    <select name="incomeType">
      <option value="paycheck">Paycheck</option>
      <option value="other">Other income</option>
    </select>
  </div>
  <div class="tx-field">
    <label>Payee / note</label>
    <input type="text" name="desc" placeholder="e.g. Whole Foods" list="payee-list" autocomplete="off">
    <datalist id="payee-list">
      {% for p in payees %}<option value="{{ p }}">{% endfor %}
    </datalist>
  </div>
  <div class="tx-field" id="tf-planned" style="{{ '' if tx_type == 'out' else 'display:none' }}">
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" name="planned" value="1" checked><input type="hidden" name="planned" value="0"> Planned spend
    </label>
  </div>

  <div class="tx-actions">
    <button class="toolbar-btn" type="button" onclick="closeModal()">Cancel</button>
    <button class="toolbar-btn" type="submit" name="again" value="1"
            hx-target="#modal-body" hx-swap="innerHTML">Save &amp; Add Another</button>
    <button class="toolbar-btn primary" type="submit">Add Transaction</button>
  </div>
</form>
<script>
function toggleSplitMode(cb){
  var splits=document.getElementById('tf-splits');
  var bktSel=document.getElementById('tf-bucket-sel');
  if(cb.checked){
    splits.style.display='';
    bktSel.disabled=true;
    if(!document.querySelector('.tf-split-row')){addSplitRow();addSplitRow();}
    updateSplitRemaining();
  } else {
    splits.style.display='none';
    bktSel.disabled=false;
  }
}
function addSplitRow(){
  var tpl=document.getElementById('tf-split-row-tpl');
  var row=tpl.content.cloneNode(true);
  document.getElementById('tf-split-rows').appendChild(row);
}
function updateSplitRemaining(){
  var total=parseFloat(document.querySelector('[name=amount]').value)||0;
  var sum=0;
  document.querySelectorAll('[name=split_amount]').forEach(function(el){sum+=parseFloat(el.value)||0;});
  var rem=Math.round((total-sum)*100)/100;
  var el=document.getElementById('tf-split-remaining');
  el.textContent=rem===0?'✓ fully allocated':('$'+rem.toFixed(2)+' remaining');
  el.style.color=rem===0?'var(--green)':(rem<0?'var(--red)':'var(--text3)');
}
document.querySelector('[name=amount]').addEventListener('input',updateSplitRemaining);
function updateDebtHint(sel){
  var opt=sel.options[sel.selectedIndex];
  var hint=document.getElementById('tf-debt-hint');
  var name=document.getElementById('tf-debt-hint-name');
  if(opt&&opt.dataset.debtAid&&hint&&name){
    name.textContent=opt.dataset.debtName||opt.dataset.debtAid;
    hint.style.display='';
  } else if(hint){
    hint.style.display='none';
  }
}
</script>
