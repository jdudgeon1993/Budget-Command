<form class="edit-form modal-form-bare" method="post"
      action="{{ url_for('.account_edit', aid=account.id) if account else url_for('.account_new') }}"
      hx-post="{{ url_for('.account_edit', aid=account.id) if account else url_for('.account_new') }}"
      hx-target="#panel" hx-swap="innerHTML">

  <div class="edit-field">
    <label>Account name</label>
    <input type="text" name="name" value="{{ account.name if account else '' }}"
           placeholder="e.g. Chase Checking" required>
  </div>
  <div class="modal-row-2">
    <div class="edit-field">
      <label>Type</label>
      <select name="type" onchange="updateAcctFields(this)">
        {% for val, label in [('budget','Checking / Cash'),('savings','Savings'),('debt','Credit / Debt')] %}
        <option value="{{ val }}" {{ 'selected' if account and account.type == val }}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="edit-field">
      <label>Color</label>
      <input type="color" name="color" value="{{ account.color if account else '#818cf8' }}"
             style="height:40px;padding:4px;background:var(--surface2)">
    </div>
  </div>
  <div class="edit-field">
    <label>Opening balance</label>
    <input type="text" name="opening_balance" inputmode="decimal"
           value="{{ account.openingBalance if account else '0' }}" placeholder="0.00">
  </div>

  {# Debt-specific fields #}
  {% set _is_debt = account and account.type == 'debt' %}
  <div class="acct-debt-fields" style="{{ '' if _is_debt else 'display:none' }}">
    <div class="modal-row-2">
      <div class="edit-field">
        <label>APR <span style="font-size:10px;color:var(--text3);text-transform:none;letter-spacing:0">(%)</span></label>
        <input type="text" name="debt_apr" inputmode="decimal"
               value="{{ '%.3f'|format(account.debtAPR) if account and account.debtAPR else '' }}"
               placeholder="e.g. 24.99">
      </div>
      <div class="edit-field">
        <label>Min payment</label>
        <input type="text" name="debt_min_payment" inputmode="decimal"
               value="{{ account.debtMinPayment or '' }}" placeholder="0.00">
      </div>
    </div>
    <div class="modal-row-2">
      <div class="edit-field">
        <label>Credit limit</label>
        <input type="text" name="credit_limit" inputmode="decimal"
               value="{{ account.creditLimit or '' }}" placeholder="0.00">
      </div>
      <div class="edit-field">
        <label>Promo rate?</label>
        <select name="is_promo">
          <option value="0" {{ 'selected' if not (account and account.isPromo) }}>No</option>
          <option value="1" {{ 'selected' if account and account.isPromo }}>Yes — promo APR</option>
        </select>
      </div>
    </div>
    <div class="edit-field">
      <label>Promo end date</label>
      <input type="date" name="promo_end_date"
             value="{{ account.promoEndDate if account and account.promoEndDate else '' }}">
    </div>
  </div>

  <div class="edit-actions">
    {% if account %}
    <button class="toolbar-btn" type="button" onclick="toggleAcctSettings('{{ account.id }}', '{{ url_for('.account_edit', aid=account.id) }}')">Cancel</button>
    {% else %}
    <button class="toolbar-btn" type="button" onclick="closeModal()">Cancel</button>
    {% endif %}
    <button class="toolbar-btn primary" type="submit">{{ 'Save Changes' if account else 'Add Account' }}</button>
  </div>
</form>

{% if account %}
<form method="post" action="{{ url_for('.account_archive', aid=account.id) }}"
      hx-post="{{ url_for('.account_archive', aid=account.id) }}"
      hx-target="#panel" hx-swap="innerHTML"
      style="margin-top:8px"
      onsubmit="return confirm('Archive this account?')">
  <button class="edit-delete-btn" style="width:100%" type="submit">Archive Account</button>
</form>
{% endif %}
