<div class="modal-title">Edit Transaction</div>
<form class="tx-form" method="post" action="{{ url_for('panels.transaction_edit', tid=tx.id) }}"
      hx-post="{{ url_for('panels.transaction_edit', tid=tx.id) }}"
      hx-target="#panel" hx-swap="innerHTML">
  <input type="hidden" name="back" value="{{ back }}">

  <div class="tx-type-row">
    {% for val, label in [('out','Expense'),('in','Income'),('xfr','Transfer')] %}
    <label class="tx-type {{ 'on' if tx.type == val }}" onclick="updateTxFields('{{ val }}')">
      <input type="radio" name="type" value="{{ val }}" {{ 'checked' if tx.type == val }} hidden>{{ label }}
    </label>
    {% endfor %}
  </div>

  <div class="tx-field">
    <label>Amount</label>
    <input type="text" name="amount" inputmode="decimal" value="{{ tx.amount }}" required>
  </div>
  <div class="tx-field">
    <label>Date</label>
    <input type="date" name="date" value="{{ tx.date[:10] if tx.date else today }}">
  </div>
  <div class="tx-field">
    <label>Account</label>
    <select name="accountId">
      {% for a in accounts %}<option value="{{ a.id }}" {{ 'selected' if a.id == tx.accountId }}>{{ a.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="tx-field" id="tf-toAcct" style="{{ '' if tx.type == 'xfr' else 'display:none' }}">
    <label>To account</label>
    <select name="toAccountId">
      <option value="">—</option>
      {% for a in accounts %}<option value="{{ a.id }}" {{ 'selected' if a.id == tx.toAccountId }}>{{ a.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="tx-field" id="tf-bucket" style="{{ '' if tx.type == 'out' else 'display:none' }}">
    <label>Bucket</label>
    <select name="bucketId" id="tf-bucket-sel" onchange="updateDebtHint(this)">
      <option value="">—</option>
      {% for grp in buckets_by_cat %}
      <optgroup label="{{ grp.cat }}">
        {% for b in grp.buckets %}
        <option value="{{ b.id }}" data-debt-aid="{{ b.debtAccountId }}" data-debt-name="{{ b.debtAccountName }}" {{ 'selected' if b.id == tx.bucketId }}>{{ b.name }}</option>
        {% endfor %}
      </optgroup>
      {% endfor %}
    </select>
    <div id="tf-debt-hint" style="display:none;font-size:11px;color:var(--green);margin-top:4px">↳ Pays: <span id="tf-debt-hint-name"></span></div>
  </div>
  <div class="tx-field" id="tf-incomeType" style="{{ '' if tx.type == 'in' else 'display:none' }}">
    <label>Income type</label>
    <select name="incomeType">
      <option value="paycheck" {{ 'selected' if tx.incomeType == 'paycheck' or not tx.incomeType }}>Paycheck</option>
      <option value="other" {{ 'selected' if tx.incomeType == 'other' }}>Other income</option>
    </select>
  </div>
  <div class="tx-field">
    <label>Payee / note</label>
    <input type="text" name="desc" value="{{ tx.desc or '' }}" list="payee-list-edit" autocomplete="off">
    <datalist id="payee-list-edit">
      {% for p in payees %}<option value="{{ p }}">{% endfor %}
    </datalist>
  </div>
  <div class="tx-field" style="display:flex;align-items:center;gap:12px">
    <label style="margin-bottom:0;flex:1">Reconciled</label>
    <select name="reconciled" style="width:auto;flex:0 0 auto">
      <option value="1" {{ 'selected' if tx.reconciled }}>✓ Yes — reconciled</option>
      <option value="0" {{ 'selected' if not tx.reconciled }}>Not reconciled</option>
    </select>
  </div>

  <div class="tx-actions">
    <button class="toolbar-btn" type="button" onclick="closeModal()">Cancel</button>
    <button class="toolbar-btn primary" type="submit">Save Changes</button>
  </div>
</form>
<script>
function updateDebtHint(sel){
  var opt=sel.options[sel.selectedIndex];
  var hint=document.getElementById('tf-debt-hint');
  var name=document.getElementById('tf-debt-hint-name');
  if(opt&&opt.dataset.debtAid&&hint&&name){
    name.textContent=opt.dataset.debtName||opt.dataset.debtAid;
    hint.style.display='';
  } else if(hint){
    hint.style.display='none';
  }
}
// Show hint on load if bucket already linked
(function(){
  var sel=document.getElementById('tf-bucket-sel');
  if(sel) updateDebtHint(sel);
})();
</script>

<form method="post" action="{{ url_for('panels.transaction_delete', tid=tx.id) }}"
      hx-post="{{ url_for('panels.transaction_delete', tid=tx.id) }}"
      hx-target="#panel" hx-swap="innerHTML"
      style="margin-top:8px"
      onsubmit="return confirm('Delete this transaction?')">
  <input type="hidden" name="back" value="{{ back }}">
  <button class="edit-delete-btn" style="width:100%" type="submit">Delete Transaction</button>
</form>
