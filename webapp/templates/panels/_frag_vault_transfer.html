<div class="modal-title">Transfer from {{ bucket.name }}</div>

<div style="margin-bottom:16px">
  <div style="display:flex;gap:16px;margin-bottom:4px">
    <div class="rts-kpi"><span class="rts-kpi-lbl">This month's alloc</span><span class="rts-kpi-val mono">{{ vault_alloc | money }}</span></div>
    <div class="rts-kpi"><span class="rts-kpi-lbl">Total accumulated</span><span class="rts-kpi-val mono">{{ vault_accum | money }}</span></div>
  </div>
  <p style="font-size:12px;color:var(--text3);margin:8px 0 0">Transfers move this month's allocation only — up to <strong style="color:var(--text2)">{{ vault_alloc | money }}</strong>. Net effect on RTS: zero. To move accumulated savings, use Release instead.</p>
</div>

<form method="post" action="{{ url_for('panels.run_action', name='vault_transfer') }}"
      hx-post="{{ url_for('panels.run_action', name='vault_transfer') }}"
      hx-target="#panel" hx-swap="innerHTML">
  <input type="hidden" name="id" value="{{ bucket.id }}">
  <div class="edit-field">
    <label>Amount to transfer</label>
    <input type="text" name="amount" inputmode="decimal" placeholder="0.00" required autofocus>
  </div>
  <div class="edit-field">
    <label>Destination</label>
    <select name="to_bid" required>
      <option value="">— Select destination —</option>
      {% if dest_vaults %}
      <optgroup label="── Other Vaults ──">
        {% for b in dest_vaults %}
        <option value="{{ b.id }}">{{ b.name }}</option>
        {% endfor %}
      </optgroup>
      {% endif %}
      {% for grp in dest_by_cat %}
      <optgroup label="{{ grp.cat }}">
        {% for b in grp.buckets %}
        <option value="{{ b.id }}">{{ b.name }}</option>
        {% endfor %}
      </optgroup>
      {% endfor %}
    </select>
  </div>
  <div class="edit-actions">
    <button class="toolbar-btn" type="button" onclick="closeModal()">Cancel</button>
    <button class="toolbar-btn primary" type="submit">Transfer</button>
  </div>
</form>
