<div class="modal-title">Transfer from {{ bucket.name }}</div>

<div style="margin-bottom:16px">
  <div style="display:flex;gap:16px;margin-bottom:4px">
    <div class="rts-kpi"><span class="rts-kpi-lbl">This month's alloc</span><span class="rts-kpi-val">{{ vault_alloc | money }}</span></div>
    <div class="rts-kpi"><span class="rts-kpi-lbl">Total accumulated</span><span class="rts-kpi-val">{{ vault_accum | money }}</span></div>
  </div>
  <p style="font-size:12px;color:var(--text3);margin:8px 0 0">Transfers move this month's vault allocation to another bucket. Net effect on RTS: zero.</p>
</div>

<form method="post" action="{{ url_for('panels.vault_transfer', bid=bucket.id) }}"
      hx-post="{{ url_for('panels.vault_transfer', bid=bucket.id) }}"
      hx-target="#panel" hx-swap="innerHTML">
  <div class="edit-field">
    <label>Amount to transfer</label>
    <input type="text" name="amount" inputmode="decimal" placeholder="0.00" required autofocus>
  </div>
  <div class="edit-field">
    <label>Destination bucket</label>
    <select name="to_bid" required>
      <option value="">— Select bucket —</option>
      {% for grp in dest_by_cat %}
      <optgroup label="{{ grp.cat }}">
        {% for b in grp.buckets %}
        <option value="{{ b.id }}">{{ b.name }}</option>
        {% endfor %}
      </optgroup>
      {% endfor %}
    </select>
  </div>
  <div class="edit-actions">
    <button class="toolbar-btn" type="button" onclick="closeModal()">Cancel</button>
    <button class="toolbar-btn primary" type="submit">Transfer</button>
  </div>
</form>
