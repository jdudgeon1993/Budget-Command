{% extends layout %}
{% block panel %}
<div class="tx-form-wrap">
  <form class="tx-form card" method="post" action="{{ url_for('panels.run_action', name='tx_update') }}">
    <input type="hidden" name="id" value="{{ tx.id }}">
    <input type="hidden" name="back" value="{{ back }}">
    <div class="tx-form-title">Edit Transaction</div>

    <div class="tx-type-row">
      {% for val, label in [('out','Expense'),('in','Income'),('xfr','Transfer')] %}
      <label class="tx-type {{ 'on' if tx.type == val }}">
        <input type="radio" name="type" value="{{ val }}" {{ 'checked' if tx.type == val }} hidden>{{ label }}
      </label>
      {% endfor %}
    </div>

    <div class="tx-field">
      <label>Amount</label>
      <input type="text" name="amount" inputmode="decimal" value="{{ tx.amount }}" required>
    </div>
    <div class="tx-field">
      <label>Date</label>
      <input type="date" name="date" value="{{ tx.date[:10] if tx.date else today }}">
    </div>
    <div class="tx-field">
      <label>Account</label>
      <select name="accountId">
        {% for a in accounts %}<option value="{{ a.id }}" {{ 'selected' if a.id == tx.accountId }}>{{ a.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="tx-field">
      <label>To account <span class="tx-hint">(transfers)</span></label>
      <select name="toAccountId">
        <option value="">—</option>
        {% for a in accounts %}<option value="{{ a.id }}" {{ 'selected' if a.id == tx.toAccountId }}>{{ a.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="tx-field">
      <label>Bucket <span class="tx-hint">(expenses)</span></label>
      <select name="bucketId">
        <option value="">—</option>
        {% for grp in buckets_by_cat %}
        <optgroup label="{{ grp.cat }}">
          {% for b in grp.buckets %}<option value="{{ b.id }}" {{ 'selected' if b.id == tx.bucketId }}>{{ b.name }}</option>{% endfor %}
        </optgroup>
        {% endfor %}
      </select>
    </div>
    <div class="tx-field">
      <label>Payee / note</label>
      <input type="text" name="desc" value="{{ tx.desc or '' }}">
    </div>

    <div class="tx-actions">
      <a class="toolbar-btn" href="{{ url_for('panels.' + back) }}">Cancel</a>
      <button class="toolbar-btn primary" type="submit">Save Changes</button>
    </div>
  </form>

  <form method="post" action="{{ url_for('panels.run_action', name='tx_delete') }}"
        style="margin-top:8px"
        onsubmit="return confirm('Delete this transaction?')">
    <input type="hidden" name="id" value="{{ tx.id }}">
    <input type="hidden" name="back" value="{{ back }}">
    <button class="edit-delete-btn" style="width:100%" type="submit">Delete Transaction</button>
  </form>
</div>
{% endblock %}
