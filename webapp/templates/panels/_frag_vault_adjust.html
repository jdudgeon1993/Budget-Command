<div class="modal-title">Correct balance for {{ bucket.name }}</div>

<div style="margin-bottom:16px">
  <div style="display:flex;gap:16px;margin-bottom:4px">
    <div class="rts-kpi"><span class="rts-kpi-lbl">Currently shows</span><span class="rts-kpi-val" style="{{ 'color:var(--red)' if current_accum < 0 }}">{{ current_accum | money }}</span></div>
  </div>
  <p style="font-size:12px;color:var(--text3);margin:8px 0 0">
    For fixing bad historical data, not a real deposit or release. This
    also corrects Ready to Spend by the same amount, since it reads the
    same underlying total.
  </p>
</div>

<form method="post" action="{{ url_for('.vault_adjust_balance', bid=bucket.id) }}"
      hx-post="{{ url_for('.vault_adjust_balance', bid=bucket.id) }}"
      hx-target="#panel" hx-swap="innerHTML">
  <div class="edit-field">
    <label>What this vault should actually total</label>
    <input type="text" name="target" inputmode="decimal"
           value="{{ ([current_accum, 0] | max) | money | replace('$','') | replace(',','') }}"
           placeholder="0.00" required autofocus>
  </div>
  <div class="edit-field">
    <label>Reason <span style="font-size:10px;color:var(--text3);text-transform:none;letter-spacing:0">(required)</span></label>
    <textarea name="reason" rows="2" placeholder="Why is this being corrected?" required style="resize:vertical"></textarea>
  </div>
  <div class="edit-actions">
    <button class="toolbar-btn" type="button" onclick="closeModal()">Cancel</button>
    <button class="toolbar-btn primary" type="submit"
            onclick="return confirm('Correct {{ bucket.name }} to $' + this.closest('form').querySelector('[name=target]').value + '?')">
      Correct Balance
    </button>
  </div>
</form>
