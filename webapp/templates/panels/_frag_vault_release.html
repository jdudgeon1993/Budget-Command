<div class="modal-title">Release from {{ bucket.name }}</div>

<div style="margin-bottom:16px">
  <div style="display:flex;gap:16px;margin-bottom:4px">
    <div class="rts-kpi"><span class="rts-kpi-lbl">This month's alloc</span><span class="rts-kpi-val">{{ vault_alloc | money }}</span></div>
    <div class="rts-kpi"><span class="rts-kpi-lbl">Total accumulated</span><span class="rts-kpi-val">{{ vault_accum | money }}</span></div>
  </div>
  <p style="font-size:12px;color:var(--text3);margin:8px 0 0">Releases vault savings back to the RTS pool. This month's allocation is drained first; the remainder is marked as a vault withdrawal.</p>
</div>

<form method="post" action="{{ url_for('panels.vault_release_to_pool', bid=bucket.id) }}"
      hx-post="{{ url_for('panels.vault_release_to_pool', bid=bucket.id) }}"
      hx-target="#panel" hx-swap="innerHTML">
  <div class="edit-field">
    <label>Amount to release</label>
    <input type="text" name="amount" inputmode="decimal"
           value="{{ vault_accum | money | replace('$','') | replace(',','') }}"
           placeholder="0.00" required autofocus>
  </div>
  <div class="edit-actions">
    <button class="toolbar-btn" type="button" onclick="closeModal()">Cancel</button>
    <button class="toolbar-btn primary" type="submit"
            onclick="return confirm('Release {{ vault_accum | money }} from {{ bucket.name }} to pool?')">
      Release to Pool
    </button>
  </div>
</form>
