<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cura · Forecast Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════ RESET ════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0E; --bg1:#111116; --bg2:#18181F; --bg3:#1F1F28;
  --s1:rgba(255,255,255,.04); --s2:rgba(255,255,255,.07);
  --b1:rgba(255,255,255,.07); --b2:rgba(255,255,255,.12); --b3:rgba(255,255,255,.18);
  --t1:#F2F2F7; --t2:#8E8EAD; --t3:#52526A; --t4:#35354A;
  --green:#34C759; --gd:rgba(52,199,89,.14);
  --red:#FF3B30;   --rd:rgba(255,59,48,.12);
  --amb:#FF9F0A;   --ad:rgba(255,159,10,.14);
  --acc:#BF5AF2;   --acd:rgba(191,90,242,.14); --acg:rgba(191,90,242,.28);
  --blue:#0A84FF;  --bld:rgba(10,132,255,.14);
  --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  --r4:4px; --r6:6px; --r8:8px; --r10:10px; --r12:12px;

  /* Panel open heights */
  --h-chart:210px;
  --h-grid:270px;
  /* periods takes flex:1 */
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ════════ ROOT SHELL ════════ */
#shell{display:flex;height:100vh;overflow:hidden}

/* ═══════════════════════════════════════════════
   SLIM SIDE NAV (app chrome placeholder)
   ═══════════════════════════════════════════════ */
.snav{
  width:56px;min-width:56px;
  background:var(--bg1);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  align-items:center;gap:2px;
  padding:10px 0 16px;
  z-index:10;
}
.snav-logo{
  width:32px;height:32px;border-radius:var(--r8);
  background:linear-gradient(135deg,#BF5AF2,#7B2FBE);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;margin-bottom:10px;
  box-shadow:0 2px 10px rgba(191,90,242,.4);flex-shrink:0;
}
.snav-item{
  width:38px;height:38px;border-radius:var(--r8);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;color:var(--t3);
  transition:all .15s;position:relative;
}
.snav-item:hover{background:var(--s2);color:var(--t2)}
.snav-item.on{background:var(--acd);color:var(--acc)}
.snav-item.on::after{
  content:'';position:absolute;right:-1px;top:8px;bottom:8px;
  width:2px;background:var(--acc);border-radius:2px 0 0 2px;
}
.snav-spacer{flex:1}
.snav-avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--t3),var(--t4));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;
}

/* ═══════════════════════════════════════════════
   LEFT PANEL — Scenarios / Baseline
   ═══════════════════════════════════════════════ */
.lp{
  width:230px;min-width:230px;
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,var(--bg1) 0%,var(--bg) 60%);
}
.lp-hd{
  padding:14px 14px 10px;
  border-bottom:1px solid var(--b1);
  flex-shrink:0;
}
.lp-hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.lp-hd-title{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--t1);letter-spacing:.04em}
.lp-hd-new{
  font-family:var(--mono);font-size:10px;color:var(--acc);
  padding:2px 7px;border-radius:10px;cursor:pointer;
  background:var(--acd);transition:all .12s;border:1px solid rgba(191,90,242,.25);
}
.lp-hd-new:hover{filter:brightness(1.15)}
.lp-hd-sub{font-size:11px;color:var(--t3);font-family:var(--mono)}
.lp-scroll{flex:1;overflow-y:auto;padding-bottom:20px}
.lp-scroll::-webkit-scrollbar{width:2px}
.lp-scroll::-webkit-scrollbar-thumb{background:var(--acd);border-radius:2px}

/* Section headers */
.sec{
  padding:12px 14px 5px;
  display:flex;align-items:center;justify-content:space-between;
}
.sec-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--t4)}
.sec-add{
  font-family:var(--mono);font-size:10px;color:var(--acc);
  cursor:pointer;padding:2px 6px;border-radius:var(--r4);
  opacity:.6;transition:all .12s;
}
.sec-add:hover{opacity:1;background:var(--acd)}

/* Scenario row */
.sc-row{
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;cursor:pointer;
  transition:background .12s;user-select:none;
  border-left:2px solid transparent;
}
.sc-row:hover{background:var(--s1)}
.sc-row.active{background:var(--acd);border-left-color:var(--acc)}
.sc-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--t4);flex-shrink:0;transition:all .15s}
.sc-row.active .sc-dot{background:var(--acc);border-color:var(--acc);box-shadow:0 0 7px var(--acg)}
.sc-name{flex:1;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s}
.sc-row.active .sc-name{color:var(--t1);font-weight:500}
.sc-delta{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:7px;white-space:nowrap;flex-shrink:0}
.sc-btns{display:none;gap:2px;flex-shrink:0}
.sc-row:hover .sc-btns{display:flex}
.sc-btn{font-size:10px;color:var(--t3);padding:2px 4px;border-radius:var(--r4);cursor:pointer;transition:all .12s;font-family:var(--mono);line-height:1}
.sc-btn:hover{color:var(--t1);background:var(--s2)}
.sc-btn.pin.pinned{color:var(--amb);background:var(--ad)}
.sc-btn.del:hover{color:var(--red);background:var(--rd)}

/* Income slider in LP */
.lp-income{
  padding:10px 14px;border-top:1px solid var(--b1);
  flex-shrink:0;
}
.lp-income-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.lp-income-label{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.lp-income-val{font-family:var(--mono);font-size:11px;color:var(--green);margin-left:auto}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--s2);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 0 6px var(--acg)}

/* Events / goals */
.sub-row{
  display:flex;align-items:center;gap:7px;
  padding:5px 14px;font-size:11px;color:var(--t2);
}
.sub-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.sub-dot.round{border-radius:50%}
.sub-meta{font-family:var(--mono);font-size:9px;color:var(--t3);margin-left:auto;flex-shrink:0}
.sub-del{display:none;font-size:11px;color:var(--t3);cursor:pointer;padding:1px 3px;border-radius:3px;transition:all .12s;flex-shrink:0}
.sub-row:hover .sub-del{display:block}
.sub-del:hover{color:var(--red);background:var(--rd)}
.lp-divider{height:1px;background:var(--b1);margin:4px 0}
.lp-empty{font-size:10px;color:var(--t4);padding:4px 14px;font-family:var(--mono)}

/* Inline add forms */
.add-form{
  margin:3px 14px 6px;padding:9px 10px;
  background:var(--bg3);border:1px solid var(--b2);
  border-radius:var(--r8);display:none;
  animation:fadeUp .15s ease;
}
.add-form.open{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.af-input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r6);padding:5px 8px;font-family:var(--mono);font-size:11px;color:var(--t1);outline:none;margin-bottom:5px;transition:border-color .12s}
.af-input:focus{border-color:var(--acc)}
.af-select{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r6);padding:5px 8px;font-family:var(--mono);font-size:11px;color:var(--t1);outline:none;margin-bottom:5px}
.af-row{display:flex;gap:4px}
.af-btn{flex:1;padding:5px;border-radius:var(--r6);font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:var(--mono);transition:all .15s}
.af-btn.p{background:var(--acc);color:#fff}.af-btn.p:hover{filter:brightness(1.1)}
.af-btn.g{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}.af-btn.g:hover{color:var(--t1)}

/* ═══════════════════════════════════════════════
   MAIN CONTENT — three collapsible panels
   ═══════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}

/* ──── Panel shell ──── */
.panel{display:flex;flex-direction:column;overflow:hidden;transition:flex .28s cubic-bezier(.4,0,.2,1)}
.panel.open-chart{flex:0 0 var(--h-chart)}
.panel.open-grid{flex:0 0 var(--h-grid)}
.panel.open-periods{flex:1;min-height:0}
.panel.closed{flex:0 0 44px!important}
.panel:not(:last-child){border-bottom:1px solid var(--b1)}

/* ──── Panel header bar (always visible, clickable to toggle) ──── */
.panel-hd{
  height:44px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:0 14px;cursor:pointer;
  background:var(--bg1);border-bottom:1px solid var(--b1);
  user-select:none;transition:background .12s;
  position:relative;z-index:5;
}
.panel-hd:hover{background:var(--bg2)}
.panel-hd-icon{font-size:14px;flex-shrink:0;opacity:.7}
.panel-hd-title{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);flex-shrink:0}
.panel-hd-kpi{display:flex;gap:12px;margin-left:4px}
.phk{display:flex;align-items:baseline;gap:4px}
.phk-label{font-family:var(--mono);font-size:8px;color:var(--t4);letter-spacing:.07em;text-transform:uppercase}
.phk-val{font-family:var(--mono);font-size:11px;font-weight:600}
.panel-hd-spacer{flex:1}
.panel-hd-tabs{display:flex;gap:2px}
.phtab{
  font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:var(--r4);
  color:var(--t3);cursor:pointer;transition:all .12s;border:1px solid transparent;
}
.phtab.on{background:var(--acd);color:var(--acc);border-color:rgba(191,90,242,.3)}
.phtab:hover:not(.on){color:var(--t2);background:var(--s2)}
.panel-hd-range{display:flex;gap:2px;background:var(--s2);border-radius:var(--r4);padding:2px;border:1px solid var(--b1)}
.rng{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;color:var(--t3);cursor:pointer;transition:all .12s;border:none;background:none}
.rng.on{background:var(--acd);color:var(--acc)}
.rng:hover:not(.on){color:var(--t2)}
.panel-toggle{
  width:22px;height:22px;border-radius:var(--r4);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--t3);
  background:var(--s1);border:1px solid var(--b1);
  flex-shrink:0;transition:all .12s;
}
.panel-hd:hover .panel-toggle{border-color:var(--b2);color:var(--t2)}
.panel.closed .panel-toggle{transform:rotate(-90deg)}

/* ──── Panel body (hidden when closed) ──── */
.panel-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel.closed .panel-body{display:none}

/* ════════════════════════════════════════════════
   CHART PANEL
   ════════════════════════════════════════════════ */
.chart-body{flex:1;padding:10px 16px 8px;overflow:hidden;display:flex;flex-direction:column;gap:8px}
.chart-inner{flex:1;min-height:0;overflow:hidden}
svg.chart{width:100%;height:100%;display:block;overflow:visible}

/* ════════════════════════════════════════════════
   TIMELINE GRID PANEL
   ════════════════════════════════════════════════ */
.grid-body{flex:1;overflow:auto}
.grid-body::-webkit-scrollbar{width:4px;height:4px}
.grid-body::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px}
.grid-body::-webkit-scrollbar-thumb:hover{background:var(--b2)}
table.tl{border-collapse:collapse;table-layout:fixed}
/* sticky col */
.col-n{width:148px;min-width:148px}
.col-m{width:88px;min-width:88px}
.th-n{
  position:sticky;top:0;left:0;z-index:20;
  background:var(--bg1);border-right:1px solid var(--b2);border-bottom:1px solid var(--b2);
  padding:6px 10px;font-family:var(--mono);font-size:9px;color:var(--t4);letter-spacing:.10em;text-transform:uppercase;
}
.th-m{
  position:sticky;top:0;z-index:15;
  background:var(--bg1);border-bottom:1px solid var(--b2);
  padding:5px 6px;font-family:var(--mono);font-size:10px;color:var(--t3);
  text-align:center;white-space:nowrap;
}
.th-m.ev{color:var(--acc)}
.ev-chip{display:block;font-size:8px;color:var(--amb);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:82px;margin-top:1px}
/* name cell */
.td-n{
  position:sticky;left:0;z-index:5;
  background:var(--bg);border-right:1px solid var(--b2);border-bottom:1px solid rgba(255,255,255,.03);
  padding:0 10px;height:38px;display:flex;align-items:center;gap:6px;
}
.td-bname{flex:1;font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .12s}
.td-bname:hover{color:var(--t1)}
.td-due{font-family:var(--mono);font-size:9px;color:var(--t4);flex-shrink:0}
.td-bdel{display:none;font-size:11px;color:var(--t3);cursor:pointer;padding:1px 3px;border-radius:3px;flex-shrink:0;transition:all .12s}
.td-n:hover .td-bdel{display:block}
.td-bdel:hover{color:var(--red);background:var(--rd)}
/* value cell */
.td-v{
  border-bottom:1px solid rgba(255,255,255,.03);
  border-right:1px solid rgba(255,255,255,.025);
  height:38px;cursor:pointer;position:relative;
  text-align:center;vertical-align:middle;
  transition:background .1s;
}
.td-v:hover{background:var(--s2)}
.td-v.off{background:rgba(255,59,48,.025)}
.td-v.off:hover{background:rgba(255,59,48,.07)}
.td-v.on{background:rgba(52,199,89,.02)}
.td-v.on:hover{background:rgba(52,199,89,.06)}
/* transition stripe */
.td-v.tx-on{box-shadow:inset 3px 0 0 var(--green)}
.td-v.tx-off{box-shadow:inset 3px 0 0 var(--red)}
.td-v.tx-chg{box-shadow:inset 3px 0 0 var(--amb)}
.tx-badge{position:absolute;top:2px;left:5px;font-size:7px;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;opacity:.9;pointer-events:none}
.td-off-lbl{font-family:var(--mono);font-size:9px;color:rgba(255,59,48,.4);letter-spacing:.05em}
.td-val-txt{font-family:var(--mono);font-size:11px;color:var(--t2)}
/* pencil hint on hover */
.td-v:hover::after{content:'✎';position:absolute;top:2px;right:4px;font-size:8px;color:var(--t4);pointer-events:none}

/* ════════════════════════════════════════════════
   PAY PERIODS / INTEL PANEL
   ════════════════════════════════════════════════ */
.periods-body{flex:1;overflow-y:auto}
.periods-body::-webkit-scrollbar{width:3px}
.periods-body::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px}
.pd-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;border-bottom:1px solid rgba(255,255,255,.025);
  cursor:pointer;transition:background .1s;
}
.pd-row:hover{background:var(--s1)}
.pd-row.sel{background:var(--acd);border-left:2px solid var(--acc)}
.pd-date{font-family:var(--mono);font-size:10px;color:var(--t3);width:56px;flex-shrink:0}
.pd-income{font-family:var(--mono);font-size:10px;color:var(--t4);width:40px;text-align:right;flex-shrink:0}
.pd-net{font-family:var(--mono);font-size:12px;font-weight:500;width:56px;text-align:right;flex-shrink:0}
.pd-bal{font-family:var(--mono);font-size:11px;color:var(--t2);width:60px;text-align:right;flex-shrink:0}
.pd-bar-wrap{width:80px;flex-shrink:0;height:3px;background:var(--s1);border-radius:2px;overflow:hidden}
.pd-bar{height:100%;border-radius:2px}
.pd-chips{flex:1;display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end}
.pd-chip{font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:4px;background:var(--s2);color:var(--t3)}
.pd-chip.tx{background:var(--ad);color:var(--amb)}
.pd-chip.diff-pos{background:var(--gd);color:var(--green)}
.pd-chip.diff-neg{background:var(--rd);color:var(--red)}
.pd-expand{display:none;padding:5px 16px 8px;flex-wrap:wrap;gap:4px}
.pd-expand.open{display:flex}
.pd-exp-chip{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:6px;background:var(--bg3);color:var(--t2);border:1px solid var(--b1)}

/* Intelligence */
.intel-body{flex:1;overflow-y:auto;padding:10px}
.intel-body::-webkit-scrollbar{width:3px}
.intel-body::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px}
.icard{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r10);padding:11px 13px;margin-bottom:7px;transition:border-color .15s}
.icard:hover{border-color:var(--b2)}
.icard-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.icard-ico{font-size:14px;flex-shrink:0}
.icard-title{font-size:12px;font-weight:600;color:var(--t1);flex:1}
.icard-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:6px}
.icard-body{font-size:11px;color:var(--t2);line-height:1.55}
.icard-bar{height:3px;border-radius:2px;background:var(--s2);margin-top:8px;overflow:hidden}
.icard-bar-fill{height:100%;border-radius:2px}

/* ════════════════════════════════════════════════
   OVERLAY / POPOVER
   ════════════════════════════════════════════════ */
.overlay{position:fixed;inset:0;z-index:100;display:none}
.overlay.show{display:block}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}
.popover{
  position:absolute;z-index:101;
  background:#18181F;border:1px solid var(--b2);
  border-radius:var(--r12);padding:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  width:288px;max-height:90vh;overflow-y:auto;
  animation:popIn .18s cubic-bezier(.34,1.4,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.93) translateY(-6px)}to{opacity:1;transform:none}}
.pop-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.pop-title{font-size:14px;font-weight:600;color:var(--t1)}
.pop-sub{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px}
.pop-x{width:24px;height:24px;border-radius:var(--r6);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t3);cursor:pointer;background:var(--s2);border:1px solid var(--b1);transition:all .12s;flex-shrink:0}
.pop-x:hover{color:var(--t1);border-color:var(--b2)}
/* rules list */
.rules-list{margin-bottom:12px;display:flex;flex-direction:column;gap:3px}
.rule-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:var(--r6);background:var(--bg3);border:1px solid var(--b1)}
.rule-from{font-family:var(--mono);font-size:9px;color:var(--t3);width:52px}
.rule-val{font-family:var(--mono);font-size:11px;font-weight:500;flex:1}
.rule-del{font-size:11px;color:var(--t4);cursor:pointer;padding:2px 4px;border-radius:3px;transition:all .12s}
.rule-del:hover{color:var(--red);background:var(--rd)}
/* add rule */
.pop-rule-hd{font-family:var(--mono);font-size:9px;color:var(--t4);letter-spacing:.10em;text-transform:uppercase;padding:8px 0 7px;border-top:1px solid var(--b1);margin-bottom:8px}
.pop-field{margin-bottom:10px}
.pop-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.pop-input{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r6);padding:7px 10px;font-family:var(--mono);font-size:12px;color:var(--t1);outline:none;transition:border-color .12s}
.pop-input:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--acd)}
.pop-select{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r6);padding:7px 10px;font-family:var(--mono);font-size:12px;color:var(--t1);outline:none}
.pop-hint{font-size:10px;color:var(--t3);line-height:1.5;background:rgba(191,90,242,.06);border-left:2px solid rgba(191,90,242,.3);border-radius:0 var(--r4) var(--r4) 0;padding:5px 8px;margin-bottom:10px}
/* toggle */
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tog-lbl{font-size:12px;color:var(--t2)}
.pill{width:38px;height:22px;border-radius:11px;background:var(--s2);border:1px solid var(--b2);position:relative;cursor:pointer;transition:all .2s}
.pill.on{background:rgba(52,199,89,.3);border-color:rgba(52,199,89,.5)}
.pill-thumb{width:16px;height:16px;border-radius:50%;background:var(--t3);position:absolute;top:2px;left:2px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.pill.on .pill-thumb{left:18px;background:var(--green);box-shadow:0 0 6px rgba(52,199,89,.5)}
/* month chips */
.mchips{display:flex;flex-wrap:wrap;gap:3px}
.mchip{font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:8px;border:1px solid var(--b2);color:var(--t3);cursor:pointer;background:none;transition:all .12s}
.mchip:hover{border-color:var(--b3);color:var(--t2)}
.mchip.on{background:var(--acd);border-color:rgba(191,90,242,.4);color:var(--acc)}
/* actions */
.pop-actions{display:flex;gap:6px;margin-top:14px}
.pop-btn{flex:1;padding:8px;border-radius:var(--r8);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--mono);transition:all .15s}
.pop-btn.prim{background:linear-gradient(135deg,var(--acc),#8B3DD3);color:#fff;box-shadow:0 2px 10px var(--acg)}
.pop-btn.prim:hover{filter:brightness(1.1)}
.pop-btn.ghost{background:var(--bg3);color:var(--t2);border:1px solid var(--b1)}
.pop-btn.ghost:hover{color:var(--t1);border-color:var(--b2)}

/* ════════════════════════════════════════════════
   TOOLTIP
   ════════════════════════════════════════════════ */
#tip{position:fixed;z-index:200;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r6);padding:5px 9px;font-family:var(--mono);font-size:10px;color:var(--t2);pointer-events:none;white-space:nowrap;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#tip.show{display:block}

/* ════════════════════════════════════════════════
   MOBILE — bottom nav
   ════════════════════════════════════════════════ */
#mob-nav{display:none}
@media(max-width:680px){
  .snav{display:none}
  .lp{
    position:fixed;left:0;top:0;bottom:56px;z-index:50;
    transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:0 0 40px rgba(0,0,0,.6);
    width:240px;min-width:240px;
  }
  .lp.open{transform:translateX(0)}
  .lp-overlay{display:none;position:fixed;inset:0 0 56px 0;z-index:49;background:rgba(0,0,0,.5)}
  .lp-overlay.show{display:block}
  .main{padding-bottom:56px}
  /* On mobile all panels fully flex */
  .panel.open-chart,.panel.open-grid{flex:none}
  .panel:not(.closed){flex:1}
  #mob-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;
    background:rgba(17,17,22,.93);backdrop-filter:blur(20px) saturate(180%);
    border-top:1px solid var(--b2);
    padding-bottom:env(safe-area-inset-bottom,0px);
    height:56px;align-items:stretch;
  }
  .mn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .12s;font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.04em;padding:0 4px}
  .mn-item.on{color:var(--acc)}
  .mn-item .mi{font-size:18px;line-height:1}
}
</style>
</head>
<body>

<div id="shell">
  <!-- slim chrome nav -->
  <nav class="snav" id="snav">
    <div class="snav-logo">C</div>
    <div class="snav-item" title="Dashboard">⊞</div>
    <div class="snav-item" title="Ledger">↕</div>
    <div class="snav-item on" title="Forecast">◈</div>
    <div class="snav-item" title="Accounts">◎</div>
    <div class="snav-item" title="Reports">⎍</div>
    <div class="snav-spacer"></div>
    <div class="snav-item" title="Settings">⚙</div>
    <div class="snav-avatar">JD</div>
  </nav>

  <!-- scenarios / baseline panel -->
  <div class="lp" id="lp"></div>
  <div class="lp-overlay" id="lp-overlay" onclick="closeLp()"></div>

  <!-- three-panel main area -->
  <div class="main" id="main"></div>
</div>

<!-- mobile bottom nav -->
<nav id="mob-nav">
  <div class="mn-item" id="mn-sc"  onclick="mobileTab('sc')"><span class="mi">⚙</span>Scenarios</div>
  <div class="mn-item on" id="mn-grid" onclick="mobileTab('grid')"><span class="mi">⊞</span>Timeline</div>
  <div class="mn-item" id="mn-chart" onclick="mobileTab('chart')"><span class="mi">◈</span>Chart</div>
  <div class="mn-item" id="mn-pd"  onclick="mobileTab('pd')"><span class="mi">↕</span>Periods</div>
</nav>

<div class="overlay" id="overlay">
  <div class="ov-bg" onclick="closeOverlay()"></div>
  <div class="popover" id="popover"></div>
</div>
<div id="tip"></div>

<script>
/* ════════════════════════════════════════════════
   CONSTANTS
   ════════════════════════════════════════════════ */
const _LIVE = window.CURA_LIVE || {};
const PAY_FREQ  = _LIVE.payFreq || 'biweekly';
const START_BAL = _LIVE.startBal != null ? _LIVE.startBal : 4200;
const START_INC = _LIVE.startInc != null ? _LIVE.startInc : 3200;
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const _FALLBACK_BKTS = [
  {id:'rent',     name:'Rent',             target:2200, due:1,   freq:'monthly'},
  {id:'mortgage', name:'Mortgage',         target:0,    due:1,   freq:'monthly'},
  {id:'electric', name:'Electric',         target:140,  due:15,  freq:'monthly'},
  {id:'groceries',name:'Groceries',        target:320,  due:null,freq:'biweekly'},
  {id:'gas',      name:'Gas',              target:90,   due:null,freq:'biweekly'},
  {id:'car_pay',  name:'Car Payment',      target:420,  due:18,  freq:'monthly'},
  {id:'car_ins',  name:'Car Insurance',    target:180,  due:5,   freq:'monthly'},
  {id:'phone',    name:'Phone',            target:85,   due:22,  freq:'monthly'},
  {id:'subscr',   name:'Subscriptions',    target:65,   due:null,freq:'monthly'},
  {id:'gym',      name:'Gym',              target:40,   due:10,  freq:'monthly'},
  {id:'dining',   name:'Dining Out',       target:200,  due:null,freq:'biweekly'},
  {id:'savings',  name:'Savings Transfer', target:500,  due:null,freq:'monthly'},
];
const BASE_BKTS = (_LIVE.buckets && _LIVE.buckets.length) ? _LIVE.buckets : _FALLBACK_BKTS;

const GOAL_COLORS  = ['#0A84FF','#BF5AF2','#34C759','#FF9F0A','#FF3B30','#5AC8FA'];
const EVENT_COLORS = ['#BF5AF2','#0A84FF','#34C759','#FF9F0A','#FF3B30'];

/* ════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════ */
let S = loadState() || defaultState();

function defaultState(){
  const tl = {};
  BASE_BKTS.forEach(b => { tl[b.id] = [{from:null,amount:b.target||0,enabled:(b.target||0)>0}]; });
  return {
    scenarios:[{
      id:'baseline', name:'Baseline', isBase:true, incScale:1,
      timeline:tl, extraBkts:[], events:[],
    }],
    goals:[],
    activeId:'baseline',
    pinnedId:null,
    range:6,
    rpTab:'periods',
    panelOpen:{chart:true, grid:true, periods:true},
    activePd:-1,
    mobileTab:'grid',
  };
}

/* ════════════════════════════════════════════════
   ENGINE
   ════════════════════════════════════════════════ */
function ymKey(y,m){ return `${y}-${m}`; }
function ymParse(k){ const [y,m]=k.split('-').map(Number); return{y,m}; }
function ymInt(k){ if(!k||k==='null'||k===null) return -Infinity; const{y,m}=ymParse(k); return y*12+m; }

function getRule(sc, id, date){
  const rules=((sc.timeline||{})[id]||[]);
  if(!rules.length) return null;
  const cur=date.getFullYear()*12+date.getMonth();
  const s=[...rules].sort((a,b)=>ymInt(a.from)-ymInt(b.from));
  let hit=null;
  for(const r of s){ if(ymInt(r.from)<=cur) hit=r; else break; }
  return hit;
}

function allBkts(sc){ return [...BASE_BKTS,...(sc.extraBkts||[])]; }

function effBktsAt(sc, date){
  const inc=sc.incScale||1;
  return allBkts(sc).map(b=>{
    const r=getRule(sc,b.id,date);
    if(!r||!r.enabled||r.amount<=0) return null;
    return{...b,eff:r.amount*inc};
  }).filter(Boolean);
}

function payDates(months){
  const today=new Date(), end=new Date(today);
  end.setMonth(end.getMonth()+months);
  const dates=[];
  let d=new Date(today);
  const dow=d.getDay();
  if(PAY_FREQ==='biweekly') d.setDate(d.getDate()+(5-dow+7)%7);
  else if(PAY_FREQ==='semimonthly'){
    d=new Date(d.getFullYear(),d.getMonth(),15);
    if(d<today) d=new Date(d.getFullYear(),d.getMonth()+1,1);
  } else {
    d=new Date(d.getFullYear(),d.getMonth(),1);
    if(d<today) d=new Date(d.getFullYear(),d.getMonth()+1,1);
  }
  while(d<=end){
    dates.push(new Date(d));
    if(PAY_FREQ==='biweekly') d.setDate(d.getDate()+14);
    else if(PAY_FREQ==='semimonthly'){
      if(d.getDate()===1) d.setDate(15);
      else{ d.setDate(1); d.setMonth(d.getMonth()+1); }
    } else d.setMonth(d.getMonth()+1);
  }
  return dates;
}

function bktsDue(bkts, start, end){
  return bkts.filter(b=>{
    if(b.freq==='biweekly'||b.freq==='weekly') return true;
    if(b.due){
      const dd=new Date(end.getFullYear(),end.getMonth(),b.due);
      return dd>=start&&dd<=end;
    }
    return false;
  });
}

function compute(sc, dates){
  const income=START_INC*(sc.incScale||1);
  let bal=START_BAL;
  return dates.map((pd,i)=>{
    const next=dates[i+1]||new Date(pd.getTime()+14*864e5);
    const bkts=effBktsAt(sc,pd);
    const due=bktsDue(bkts,pd,next);
    const spent=due.reduce((s,b)=>s+b.eff,0);
    const net=income-spent;
    bal+=net;
    return{date:pd,income,spent,net,bal,bkts:due};
  });
}

function gridMonths(){
  const today=new Date(), out=[];
  for(let i=0;i<S.range;i++){
    const d=new Date(today.getFullYear(),today.getMonth()+i,1);
    out.push({y:d.getFullYear(),m:d.getMonth(),date:d});
  }
  return out;
}

/* ════════════════════════════════════════════════
   FORMAT
   ════════════════════════════════════════════════ */
function fmtMo(y,m){ return `${MO[m]}'${String(y).slice(2)}`; }
function fmtDate(d){ return `${MO[d.getMonth()]} ${d.getDate()}`; }
function $$(n,compact){
  if(compact&&Math.abs(n)>=1000) return (n<0?'-$':'$')+(Math.abs(n)/1000).toFixed(1)+'k';
  return n<0?`-$${Math.abs(Math.round(n)).toLocaleString()}`:`$${Math.round(n).toLocaleString()}`;
}

function activeSc(){ return S.scenarios.find(s=>s.id===S.activeId)||S.scenarios[0]; }
function pinnedSc(){ return S.scenarios.find(s=>s.id===S.pinnedId)||null; }

/* ════════════════════════════════════════════════
   PERSISTENCE
   ════════════════════════════════════════════════ */
function saveState(){ try{ localStorage.setItem('cura_live_v1',JSON.stringify(S)); }catch(e){} }
function loadState(){ try{ const r=localStorage.getItem('cura_live_v1'); return r?JSON.parse(r):null; }catch(e){ return null; } }

/* ════════════════════════════════════════════════
   RENDER ROOT
   ════════════════════════════════════════════════ */
function render(){
  saveState();
  const sc=activeSc(), pinned=pinnedSc();
  const dates=payDates(S.range);
  const periods=compute(sc,dates);
  const pinnedPd=pinned?compute(pinned,dates):null;
  const months=gridMonths();

  document.getElementById('lp').innerHTML = renderLP(sc, periods, pinnedPd);
  document.getElementById('main').innerHTML = renderMain(sc, pinned, months, periods, pinnedPd);
}

/* ════════════════════════════════════════════════
   LEFT PANEL
   ════════════════════════════════════════════════ */
function renderLP(sc, periods){
  const incPct=Math.round((sc.incScale||1)*100);
  const scRows=S.scenarios.map(s=>{
    const pds=compute(s,payDates(S.range));
    const end=pds.length?pds[pds.length-1].bal:START_BAL;
    const d=end-START_BAL;
    const isPin=S.pinnedId===s.id;
    return `<div class="sc-row${S.activeId===s.id?' active':''}" onclick="selectSc('${s.id}')">
      <div class="sc-dot"></div>
      <span class="sc-name" ondblclick="renameSc(event,'${s.id}')">${s.name}</span>
      <span class="sc-delta" style="background:${d>=0?'var(--gd)':'var(--rd)'};color:${d>=0?'var(--green)':'var(--red)'}">${d>=0?'+':''}${$$(d,true)}</span>
      <div class="sc-btns">
        ${!s.isBase?`<span class="sc-btn pin ${isPin?'pinned':''}" onclick="pinSc(event,'${s.id}')" title="Pin for comparison">📌</span>`:''}
        <span class="sc-btn" onclick="forkSc(event,'${s.id}')" title="Fork">⑂</span>
        ${!s.isBase?`<span class="sc-btn del" onclick="delSc(event,'${s.id}')">✕</span>`:''}
      </div>
    </div>`;
  }).join('');

  const evs=(sc.events||[]);
  const evRows=evs.map(ev=>`
    <div class="sub-row">
      <div class="sub-dot" style="background:${ev.color}"></div>
      <span style="flex:1">${ev.name}</span>
      <span class="sub-meta">${fmtMo(...ev.month.split('-').map(Number))}</span>
      <span class="sub-del" onclick="delEvent('${ev.id}')">✕</span>
    </div>`).join('')||'<div class="lp-empty">None yet</div>';

  const goalRows=S.goals.map(g=>`
    <div class="sub-row">
      <div class="sub-dot round" style="background:${g.color}"></div>
      <span style="flex:1;font-size:11px">${g.name}</span>
      <span class="sub-meta">${$$(g.amount,true)}</span>
      <span class="sub-del" onclick="delGoal('${g.id}')">✕</span>
    </div>`).join('')||'<div class="lp-empty">None yet</div>';

  const moOpts=gridMonths().map(({y,m})=>`<option value="${ymKey(y,m)}">${fmtMo(y,m)}</option>`).join('');

  return `
    <div class="lp-hd">
      <div class="lp-hd-top">
        <span class="lp-hd-title">Scenarios</span>
        <span class="lp-hd-new" onclick="newSc()">+ New</span>
      </div>
      <span class="lp-hd-sub">Active: ${sc.name}</span>
    </div>
    <div class="lp-scroll">
      ${scRows}
      <div class="lp-divider"></div>
      <div class="sec"><span class="sec-label">Life Events</span><span class="sec-add" onclick="toggleForm('ev-form')">+ Add</span></div>
      <div class="add-form" id="ev-form">
        <input class="af-input" id="ev-name" placeholder="Event name…">
        <select class="af-select" id="ev-month">${moOpts}</select>
        <div class="af-row"><button class="af-btn p" onclick="addEvent()">Add</button><button class="af-btn g" onclick="closeForm('ev-form')">Cancel</button></div>
      </div>
      ${evRows}
      <div class="lp-divider"></div>
      <div class="sec"><span class="sec-label">Goals</span><span class="sec-add" onclick="toggleForm('goal-form')">+ Add</span></div>
      <div class="add-form" id="goal-form">
        <input class="af-input" id="gl-name" placeholder="Goal name…">
        <input class="af-input" id="gl-amt" type="number" placeholder="Target $">
        <div class="af-row"><button class="af-btn p" onclick="addGoal()">Add</button><button class="af-btn g" onclick="closeForm('goal-form')">Cancel</button></div>
      </div>
      ${goalRows}
    </div>
    <div class="lp-income">
      <div class="lp-income-row">
        <span class="lp-income-label">Income Scale</span>
        <span class="lp-income-val" id="inc-val">${incPct}%</span>
      </div>
      <input type="range" min="50" max="200" value="${incPct}" oninput="setIncome(this.value)">
    </div>`;
}

/* ════════════════════════════════════════════════
   MAIN — three collapsible panels
   ════════════════════════════════════════════════ */
function renderMain(sc, pinned, months, periods, pinnedPd){
  return renderChartPanel(sc, periods, pinnedPd) +
         renderGridPanel(sc, months) +
         renderPeriodsPanel(sc, periods, pinnedPd);
}

/* ─── Panel wrapper helper ─────────────────────────────────── */
function panelShell(key, icon, title, kpiHtml, extraControls, bodyHtml){
  const open=S.panelOpen[key]!==false;
  const openClass = key==='chart'?'open-chart':key==='grid'?'open-grid':'open-periods';
  return `<div class="panel ${open?openClass:'closed'}" id="panel-${key}">
    <div class="panel-hd" onclick="togglePanel('${key}')">
      <span class="panel-hd-icon">${icon}</span>
      <span class="panel-hd-title">${title}</span>
      <div class="panel-hd-kpi">${kpiHtml}</div>
      <div class="panel-hd-spacer"></div>
      ${extraControls}
      <div class="panel-toggle">▾</div>
    </div>
    <div class="panel-body">${bodyHtml}</div>
  </div>`;
}

/* ─── Chart Panel ──────────────────────────────────────────── */
function renderChartPanel(sc, periods, pinnedPd){
  if(!periods.length) return panelShell('chart','◈','Graph / Charts','','','<div style="padding:20px;color:var(--t3);font-family:var(--mono);font-size:11px">No data</div>');
  const endBal=periods[periods.length-1].bal;
  const shortfalls=periods.filter(p=>p.net<0).length;
  const pinBal=pinnedPd?.length?pinnedPd[pinnedPd.length-1].bal:null;
  const diff=pinBal!==null?endBal-pinBal:null;

  const kpi=`
    <div class="phk"><span class="phk-label">Balance</span><span class="phk-val" style="color:${endBal>=0?'var(--green)':'var(--red)'}">${$$(endBal,true)}</span></div>
    ${diff!==null?`<div class="phk"><span class="phk-label">vs Pinned</span><span class="phk-val" style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${$$(diff,true)}</span></div>`:''}
    <div class="phk"><span class="phk-label">Shortfalls</span><span class="phk-val" style="color:${shortfalls===0?'var(--green)':shortfalls>2?'var(--red)':'var(--amb)'}">${shortfalls}</span></div>`;

  const rangeBtns=`<div class="panel-hd-range" onclick="event.stopPropagation()">${[3,6,12].map(r=>`<button class="rng ${S.range===r?'on':''}" onclick="setRange(${r})">${r}mo</button>`).join('')}</div>`;

  const chartSvg=buildChartSvg(sc, periods, pinnedPd);

  return panelShell('chart','◈','Graph / Charts', kpi, rangeBtns,
    `<div class="chart-body"><div class="chart-inner">${chartSvg}</div></div>`);
}

function buildChartSvg(sc, periods, pinnedPd){
  const W=900, H=145;
  const PAD={l:42,r:12,t:14,b:10};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
  const n=periods.length;

  const vals=periods.map(p=>p.bal);
  if(pinnedPd) vals.push(...pinnedPd.map(p=>p.bal));
  S.goals.forEach(g=>vals.push(g.amount));
  vals.push(START_BAL,0);
  const maxV=Math.max(...vals), minV=Math.min(...vals);
  const rng=maxV-minV||1;

  const xPx=i=>PAD.l+(i/(n-1||1))*iW;
  const yPx=v=>PAD.t+(1-(v-minV)/rng)*iH;
  const zy=yPx(0);

  let s=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g-pos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34C759" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g-neg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF3B30" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#FF3B30" stop-opacity="0"/>
    </linearGradient>
  </defs>`;

  // Grid
  [minV, (minV+maxV)/2, maxV].forEach(v=>{
    s+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${yPx(v)}" y2="${yPx(v)}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
    s+=`<text x="${PAD.l-4}" y="${yPx(v)+3.5}" font-size="8" fill="rgba(144,144,184,.5)" text-anchor="end" font-family="JetBrains Mono">${$$(v,true)}</text>`;
  });
  s+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${zy}" y2="${zy}" stroke="rgba(255,255,255,.12)" stroke-width="1" stroke-dasharray="3,2"/>`;

  // Goal lines
  S.goals.forEach(g=>{
    const gy=yPx(g.amount);
    s+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${gy}" y2="${gy}" stroke="${g.color}" stroke-width="1" stroke-dasharray="4,2" opacity=".4"/>`;
    s+=`<text x="${PAD.l+4}" y="${gy-3}" font-size="7.5" fill="${g.color}" opacity=".65" font-family="JetBrains Mono">${g.name}</text>`;
  });

  // Pinned
  if(pinnedPd?.length){
    const pts=pinnedPd.map((p,i)=>`${xPx(i)},${yPx(p.bal)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="var(--amb)" stroke-width="1.5" stroke-dasharray="5,3" opacity=".55"/>`;
  }

  // Area fills
  const posPath=periods.map((p,i)=>`${i===0?'M':'L'}${xPx(i)},${yPx(Math.max(p.bal,0))}`).join(' ')+`L${xPx(n-1)},${zy}L${xPx(0)},${zy}Z`;
  const negPath=periods.map((p,i)=>`${i===0?'M':'L'}${xPx(i)},${yPx(Math.min(p.bal,0))}`).join(' ')+`L${xPx(n-1)},${zy}L${xPx(0)},${zy}Z`;
  s+=`<path d="${posPath}" fill="url(#g-pos)"/>`;
  s+=`<path d="${negPath}" fill="url(#g-neg)"/>`;

  // Main line
  s+=`<polyline points="${periods.map((p,i)=>`${xPx(i)},${yPx(p.bal)}`).join(' ')}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Dots + transition markers
  periods.forEach((p,i)=>{
    let isTx=false;
    if(i>0){
      allBkts(sc).forEach(b=>{
        const rp=getRule(sc,b.id,periods[i-1].date);
        const rc=getRule(sc,b.id,p.date);
        if(rp&&rc&&(rp.enabled!==rc.enabled||rp.amount!==rc.amount)) isTx=true;
      });
    }
    const cx=xPx(i), cy=yPx(p.bal);
    if(isTx){
      s+=`<circle cx="${cx}" cy="${cy}" r="7" fill="none" stroke="var(--amb)" stroke-width="1.5" opacity=".35"/>`;
      s+=`<circle cx="${cx}" cy="${cy}" r="4" fill="var(--amb)"/>`;
    } else {
      s+=`<circle cx="${cx}" cy="${cy}" r="2.5" fill="${p.net>=0?'var(--green)':'var(--red)'}" opacity=".8"/>`;
    }
  });

  // X-axis month labels
  const today=new Date();
  for(let i=0;i<S.range;i++){
    const d=new Date(today.getFullYear(),today.getMonth()+i,1);
    const pi=periods.findIndex(p=>p.date.getFullYear()===d.getFullYear()&&p.date.getMonth()===d.getMonth());
    if(pi>=0){
      s+=`<text x="${xPx(pi)}" y="${H-1}" font-size="8" fill="rgba(144,144,184,.5)" text-anchor="middle" font-family="JetBrains Mono">${MO[d.getMonth()]}</text>`;
    }
  }

  s+=`</svg>`;
  return s;
}

/* ─── Grid Panel ───────────────────────────────────────────── */
function renderGridPanel(sc, months){
  const bkts=allBkts(sc);
  const evByMonth={};
  (sc.events||[]).forEach(ev=>{ (evByMonth[ev.month]=evByMonth[ev.month]||[]).push(ev); });

  const totalTx=bkts.reduce((sum,b)=>{
    const rules=(sc.timeline||{})[b.id]||[];
    return sum+rules.filter(r=>r.from).length;
  },0);

  const kpi=`
    <div class="phk"><span class="phk-label">Buckets</span><span class="phk-val">${bkts.length}</span></div>
    <div class="phk"><span class="phk-label">Scheduled Changes</span><span class="phk-val" style="color:${totalTx>0?'var(--amb)':'var(--t3)'}">${totalTx}</span></div>`;

  const addBtn=`<button class="af-btn p" style="padding:4px 10px;font-size:10px;flex:none;border:none;border-radius:var(--r4);font-family:var(--mono);cursor:pointer;background:var(--acc);color:#fff;margin-right:4px" onclick="event.stopPropagation();showAddBkt()">＋ Bucket</button>`;

  // Build table
  const thMonths=months.map(({y,m})=>{
    const key=ymKey(y,m);
    const evs=evByMonth[key]||[];
    return `<th class="col-m th-m ${evs.length?'ev':''}" data-mkey="${key}">
      ${fmtMo(y,m)}
      ${evs.map(e=>`<span class="ev-chip" style="color:${e.color}">⚡ ${e.name}</span>`).join('')}
    </th>`;
  }).join('');

  const rows=bkts.map(b=>{
    const isExtra=!BASE_BKTS.find(bb=>bb.id===b.id);
    let prevRule=null;
    const cells=months.map(({y,m,date})=>{
      const r=getRule(sc,b.id,date);
      let txClass='';
      if(prevRule!==null){
        const wasOn=prevRule&&prevRule.enabled&&prevRule.amount>0;
        const isNow=r&&r.enabled&&r.amount>0;
        if(!wasOn&&isNow) txClass='tx-on';
        else if(wasOn&&!isNow) txClass='tx-off';
        else if(wasOn&&isNow&&prevRule.amount!==r.amount) txClass='tx-chg';
      }
      prevRule=r;
      const key=ymKey(y,m);
      const isOff=!r||!r.enabled||r.amount<=0;
      return `<td class="td-v ${isOff?'off':'on'} ${txClass}" data-bkt="${b.id}" data-mkey="${key}" onclick="openCellPop(event,'${b.id}','${key}')">
        ${txClass==='tx-on'?`<span class="tx-badge" style="color:var(--green)">start</span>`:
          txClass==='tx-off'?`<span class="tx-badge" style="color:var(--red)">end</span>`:
          txClass==='tx-chg'?`<span class="tx-badge" style="color:var(--amb)">chg</span>`:''}
        ${isOff?`<span class="td-off-lbl">OFF</span>`:
          `<span class="td-val-txt">${$$(r.amount*(sc.incScale||1),true)}</span>`}
      </td>`;
    }).join('');
    return `<tr>
      <td class="col-n td-n">
        <span class="td-bname" onclick="openBktDefault(event,'${b.id}')">${b.name}</span>
        <span class="td-due">${b.due||'—'}</span>
        ${isExtra?`<span class="td-bdel" onclick="delExtraBkt('${b.id}')">✕</span>`:''}
      </td>
      ${cells}
    </tr>`;
  }).join('');

  const table=`<div class="grid-body"><table class="tl">
    <thead><tr><th class="col-n th-n">Bucket / Due</th>${thMonths}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;

  return panelShell('grid','⊞','Budget Timeline', kpi, addBtn, table);
}

/* ─── Periods / Intel Panel ────────────────────────────────── */
function renderPeriodsPanel(sc, periods, pinnedPd){
  const shortfalls=periods.filter(p=>p.net<0).length;
  const avgNet=periods.length?periods.reduce((s,p)=>s+p.net,0)/periods.length:0;
  const kpi=`
    <div class="phk"><span class="phk-label">Avg Net</span><span class="phk-val" style="color:${avgNet>=0?'var(--green)':'var(--red)'}">${$$(avgNet,true)}</span></div>
    <div class="phk"><span class="phk-label">Shortfalls</span><span class="phk-val" style="color:${shortfalls===0?'var(--green)':shortfalls>2?'var(--red)':'var(--amb)'}">${shortfalls}</span></div>`;

  const tabs=`<div class="panel-hd-tabs" onclick="event.stopPropagation()">
    ${['periods','intel'].map(t=>`<span class="phtab ${S.rpTab===t?'on':''}" onclick="setTab('${t}')">${t==='periods'?'Pay Periods':'Intelligence'}</span>`).join('')}
  </div>`;

  const body=S.rpTab==='periods'?renderPeriods(sc,periods,pinnedPd):renderIntel(sc,periods);
  return panelShell('periods','↕','Pay Periods / Intelligence', kpi, tabs, body);
}

function renderPeriods(sc, periods, pinnedPd){
  const maxSpent=Math.max(...periods.map(p=>p.spent),1);
  const rows=periods.map((p,i)=>{
    const pp=pinnedPd?.[i];
    const diff=pp?p.bal-pp.bal:null;
    const isActive=S.activePd===i;
    let isTx=false;
    if(i>0){
      allBkts(sc).forEach(b=>{
        const rp=getRule(sc,b.id,periods[i-1].date);
        const rc=getRule(sc,b.id,p.date);
        if(rp&&rc&&(rp.enabled!==rc.enabled||rp.amount!==rc.amount)) isTx=true;
      });
    }
    const barW=Math.round((p.spent/maxSpent)*100);
    const chips=p.bkts.slice(0,3).map(b=>`<span class="pd-chip">${b.name}</span>`).join('');
    const more=p.bkts.length>3?`<span class="pd-chip">+${p.bkts.length-3}</span>`:'';

    return `<div class="pd-row${isActive?' sel':''}" onclick="clickPd(${i})">
        <span class="pd-date">${fmtDate(p.date)}</span>
        <span class="pd-income">${$$(p.income,true)}</span>
        <span class="pd-net" style="color:${p.net>=0?'var(--green)':'var(--red)'}">${$$(p.net,true)}</span>
        <span class="pd-bal" style="color:${p.bal>=0?'var(--t2)':'var(--red)'}">${$$(p.bal,true)}</span>
        <div class="pd-bar-wrap"><div class="pd-bar" style="width:${barW}%;background:${p.net>=0?'var(--acc)':'var(--red)'}"></div></div>
        <div class="pd-chips">
          ${isTx?`<span class="pd-chip tx">⚡ change</span>`:''}
          ${chips}${more}
          ${diff!==null?`<span class="pd-chip ${diff>=0?'diff-pos':'diff-neg'}">${diff>=0?'+':''}${$$(diff,true)}</span>`:''}
        </div>
      </div>
      ${isActive?`<div class="pd-expand open">${p.bkts.map(b=>`<span class="pd-exp-chip">${b.name} <strong>${$$(b.eff)}</strong></span>`).join('')}</div>`:''}`;
  }).join('');
  return `<div class="periods-body">${rows}</div>`;
}

function renderIntel(sc, periods){
  const bkts=allBkts(sc);
  const totalSpent=periods.reduce((s,p)=>s+p.spent,0)||1;
  const shortfalls=periods.filter(p=>p.net<0);
  const ranked=bkts.map(b=>{
    const rules=(sc.timeline||{})[b.id]||[];
    const def=rules.find(r=>!r.from);
    if(!def||!def.enabled||def.amount<=0) return null;
    const monthly=b.freq==='biweekly'?def.amount*2.17:def.amount;
    return{b,monthly,pct:Math.round((monthly/totalSpent)*100)};
  }).filter(Boolean).sort((a,b)=>b.monthly-a.monthly);

  const txSummary=bkts.flatMap(b=>{
    return ((sc.timeline||{})[b.id]||[]).filter(r=>r.from).map(r=>({b,r}));
  });

  const sfCard=shortfalls.length?
    `<div class="icard"><div class="icard-hd"><span class="icard-ico">⚠️</span><span class="icard-title">Shortfall Warning</span><span class="icard-badge" style="background:var(--rd);color:var(--red)">${shortfalls.length} periods</span></div>
    <div class="icard-body">First: ${fmtDate(shortfalls[0].date)} · Worst: ${$$(Math.min(...shortfalls.map(p=>p.net)),true)}/period</div></div>`:
    `<div class="icard"><div class="icard-hd"><span class="icard-ico">✅</span><span class="icard-title">No Shortfalls</span><span class="icard-badge" style="background:var(--gd);color:var(--green)">All clear</span></div>
    <div class="icard-body">All ${periods.length} pay periods end cash-positive.</div></div>`;

  const txCard=txSummary.length?`<div class="icard">
    <div class="icard-hd"><span class="icard-ico">⚡</span><span class="icard-title">Scheduled Changes</span><span class="icard-badge" style="background:var(--ad);color:var(--amb)">${txSummary.length}</span></div>
    <div class="icard-body">${txSummary.map(({b,r})=>`<strong>${b.name}</strong>: ${r.enabled?$$(r.amount):'OFF'} from ${fmtMo(...r.month.split('-').map(Number))}`).join(' · ')}</div>
  </div>`:'';

  const senCards=ranked.slice(0,4).map(({b,monthly,pct})=>
    `<div class="icard">
      <div class="icard-hd">
        <span class="icard-ico" style="font-size:9px;font-family:var(--mono);background:var(--bg3);padding:2px 5px;border-radius:var(--r4)">${pct}%</span>
        <span class="icard-title">${b.name}</span>
        <span class="icard-badge" style="background:var(--rd);color:var(--red)">−10% = +${$$(monthly*.1,true)}/mo</span>
      </div>
      <div class="icard-body">${$$(monthly,true)}/mo · ${b.freq}</div>
      <div class="icard-bar"><div class="icard-bar-fill" style="width:${pct}%;background:var(--acc)"></div></div>
    </div>`).join('');

  const goalCards=S.goals.map(g=>{
    const reach=periods.find(p=>p.bal>=g.amount);
    return `<div class="icard">
      <div class="icard-hd"><span class="icard-ico">🎯</span><span class="icard-title">${g.name}</span><span class="icard-badge" style="background:var(--bld);color:var(--blue)">${$$(g.amount,true)}</span></div>
      <div class="icard-body">${reach?`Reached by ${fmtDate(reach.date)}`:`Not reached in ${S.range}-month window`}</div>
    </div>`;
  }).join('');

  return `<div class="intel-body">${sfCard}${txCard}${senCards}${goalCards}</div>`;
}

/* ════════════════════════════════════════════════
   CELL POPOVER
   ════════════════════════════════════════════════ */
let _ctx=null;
function openCellPop(ev, bktId, mkey){
  ev.stopPropagation();
  const sc=activeSc();
  const{y,m}=ymParse(mkey);
  const date=new Date(y,m,1);
  const rule=getRule(sc,bktId,date);
  const bkt=allBkts(sc).find(b=>b.id===bktId)||{name:bktId};
  const rules=(sc.timeline||{})[bktId]||[];
  _ctx={bktId,mkey,y,m};

  const existRules=rules.map((r,ri)=>`
    <div class="rule-row">
      <span class="rule-from">${r.from?fmtMo(...r.from.split('-').map(Number)):'Default'}</span>
      <span class="rule-val" style="color:${r.enabled&&r.amount>0?'var(--green)':'var(--red)'}">${r.enabled&&r.amount>0?$$(r.amount):'OFF'}</span>
      <span class="rule-del" onclick="delRule('${bktId}',${ri})">✕</span>
    </div>`).join('');

  const mchips=gridMonths().map(({y:my,m:mm})=>{
    const k=ymKey(my,mm);
    return `<button class="mchip ${k===mkey?'on':''}" onclick="setPopMonth('${k}')" data-mkey="${k}">${fmtMo(my,mm)}</button>`;
  }).join('');

  const isOn=rule&&rule.enabled&&rule.amount>0;
  const pop=document.getElementById('popover');
  pop.innerHTML=`
    <div class="pop-hd">
      <div><div class="pop-title">${bkt.name}</div><div class="pop-sub">Schedule a change starting from a month</div></div>
      <div class="pop-x" onclick="closeOverlay()">✕</div>
    </div>
    ${existRules?`<div class="rules-list">${existRules}</div>`:''}
    <div class="pop-rule-hd">Add / Update Rule</div>
    <div class="pop-hint">Rules cascade forward until overridden. The amber dots on the chart mark when changes take effect.</div>
    <div class="pop-field">
      <div class="pop-lbl">Apply From Month</div>
      <div class="mchips">${mchips}</div>
    </div>
    <div class="tog-row">
      <span class="tog-lbl">Bucket Active</span>
      <div class="pill ${isOn?'on':''}" id="p-pill" onclick="this.classList.toggle('on')"><div class="pill-thumb"></div></div>
    </div>
    <div class="pop-field">
      <div class="pop-lbl">Amount</div>
      <input class="pop-input" id="p-amt" type="number" min="0" step="50" value="${rule?rule.amount:(bkt.target||0)}">
    </div>
    <div class="pop-actions">
      <button class="pop-btn prim" onclick="applyRule()">Apply Rule</button>
      <button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button>
    </div>`;

  // Position near click
  const ov=document.getElementById('overlay');
  const cx=Math.min(ev.clientX+8, window.innerWidth-296);
  const cy=Math.min(ev.clientY+8, window.innerHeight-460);
  pop.style.position='fixed'; pop.style.transform='none';
  pop.style.left=cx+'px'; pop.style.top=cy+'px';
  ov.classList.add('show');
}

function setPopMonth(k){
  if(!_ctx) return;
  const{y,m}=ymParse(k); _ctx.mkey=k; _ctx.y=y; _ctx.m=m;
  document.querySelectorAll('.mchip').forEach(c=>c.classList.toggle('on',c.dataset.mkey===k));
}

function applyRule(){
  if(!_ctx) return;
  const sc=activeSc(); const{bktId,mkey}=_ctx;
  const enabled=document.getElementById('p-pill').classList.contains('on');
  const amount=parseFloat(document.getElementById('p-amt').value)||0;
  const from=mkey==='null'||!mkey?null:mkey;
  if(!sc.timeline) sc.timeline={};
  if(!sc.timeline[bktId]) sc.timeline[bktId]=[];
  const idx=sc.timeline[bktId].findIndex(r=>(r.from||null)===(from||null));
  const rule={from,amount,enabled};
  if(idx>=0) sc.timeline[bktId][idx]=rule;
  else sc.timeline[bktId].push(rule);
  closeOverlay(); render();
}

function delRule(bktId, ri){
  const sc=activeSc();
  if(sc.timeline?.[bktId]) sc.timeline[bktId].splice(ri,1);
  closeOverlay(); render();
}

/* ─── Bucket default edit ─────────────────────────────────── */
function openBktDefault(ev, bktId){
  ev.stopPropagation();
  const sc=activeSc();
  const bkt=allBkts(sc).find(b=>b.id===bktId)||{};
  const rules=(sc.timeline||{})[bktId]||[];
  const def=rules.find(r=>!r.from);
  const pop=document.getElementById('popover');
  pop.style.position='fixed'; pop.style.left='50%'; pop.style.top='50%'; pop.style.transform='translate(-50%,-50%)';
  pop.innerHTML=`
    <div class="pop-hd"><div><div class="pop-title">${bkt.name}</div><div class="pop-sub">Default settings (no date)</div></div><div class="pop-x" onclick="closeOverlay()">✕</div></div>
    <div class="tog-row"><span class="tog-lbl">Enabled by Default</span>
      <div class="pill ${def?.enabled||((!def)&&(bkt.target||0)>0)?'on':''}" id="bd-pill" onclick="this.classList.toggle('on')"><div class="pill-thumb"></div></div>
    </div>
    <div class="pop-field"><div class="pop-lbl">Default Amount</div><input class="pop-input" id="bd-amt" type="number" min="0" step="10" value="${def?def.amount:(bkt.target||0)}"></div>
    <div class="pop-field"><div class="pop-lbl">Due Day</div><input class="pop-input" id="bd-due" type="number" min="1" max="31" value="${bkt.due||''}" placeholder="—"></div>
    <div class="pop-actions"><button class="pop-btn prim" onclick="saveBktDefault('${bktId}')">Save</button><button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button></div>`;
  document.getElementById('overlay').classList.add('show');
}

function saveBktDefault(bktId){
  const sc=activeSc();
  const amount=parseFloat(document.getElementById('bd-amt').value)||0;
  const due=parseInt(document.getElementById('bd-due').value)||null;
  const enabled=document.getElementById('bd-pill').classList.contains('on');
  if(!sc.timeline) sc.timeline={};
  if(!sc.timeline[bktId]) sc.timeline[bktId]=[];
  const di=sc.timeline[bktId].findIndex(r=>!r.from);
  const rule={from:null,amount,enabled};
  if(di>=0) sc.timeline[bktId][di]=rule;
  else sc.timeline[bktId].unshift(rule);
  const xi=(sc.extraBkts||[]).findIndex(b=>b.id===bktId);
  if(xi>=0&&due) sc.extraBkts[xi].due=due;
  else{ const b=BASE_BKTS.find(b=>b.id===bktId); if(b&&due) b.due=due; }
  closeOverlay(); render();
}

/* ─── Add bucket ─────────────────────────────────────────── */
function showAddBkt(){
  const pop=document.getElementById('popover');
  pop.style.position='fixed'; pop.style.left='50%'; pop.style.top='50%'; pop.style.transform='translate(-50%,-50%)';
  pop.innerHTML=`
    <div class="pop-hd"><div class="pop-title">Add Bucket</div><div class="pop-x" onclick="closeOverlay()">✕</div></div>
    <div class="pop-hint">Adds to this scenario. Then click any cell in the timeline to schedule changes.</div>
    <div class="pop-field"><div class="pop-lbl">Name</div><input class="pop-input" id="ab-name" placeholder="e.g. Student Loan" autofocus></div>
    <div class="pop-field"><div class="pop-lbl">Default Amount</div><input class="pop-input" id="ab-amt" type="number" min="0" step="10" placeholder="0"></div>
    <div class="pop-field"><div class="pop-lbl">Due Day</div><input class="pop-input" id="ab-due" type="number" min="1" max="31" placeholder="optional"></div>
    <div class="pop-field"><div class="pop-lbl">Frequency</div>
      <select class="pop-select" id="ab-freq"><option value="monthly">Monthly</option><option value="biweekly">Bi-weekly</option></select>
    </div>
    <div class="pop-actions"><button class="pop-btn prim" onclick="addBkt()">Add</button><button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button></div>`;
  document.getElementById('overlay').classList.add('show');
}

function addBkt(){
  const name=document.getElementById('ab-name').value.trim();
  const amount=parseFloat(document.getElementById('ab-amt').value)||0;
  const due=parseInt(document.getElementById('ab-due').value)||null;
  const freq=document.getElementById('ab-freq').value;
  if(!name) return;
  const sc=activeSc(); const id='x_'+Date.now();
  if(!sc.extraBkts) sc.extraBkts=[];
  sc.extraBkts.push({id,name,target:amount,due,freq});
  if(!sc.timeline) sc.timeline={};
  sc.timeline[id]=[{from:null,amount,enabled:true}];
  closeOverlay(); render();
}
function delExtraBkt(id){ const sc=activeSc(); sc.extraBkts=(sc.extraBkts||[]).filter(b=>b.id!==id); if(sc.timeline) delete sc.timeline[id]; render(); }

/* ════════════════════════════════════════════════
   LIFE EVENTS / GOALS
   ════════════════════════════════════════════════ */
function toggleForm(id){ document.getElementById(id)?.classList.toggle('open'); }
function closeForm(id){ document.getElementById(id)?.classList.remove('open'); }
function addEvent(){
  const name=document.getElementById('ev-name')?.value.trim();
  const month=document.getElementById('ev-month')?.value;
  if(!name) return;
  const sc=activeSc(); if(!sc.events) sc.events=[];
  sc.events.push({id:'ev_'+Date.now(),name,color:EVENT_COLORS[sc.events.length%EVENT_COLORS.length],month});
  closeForm('ev-form'); render();
}
function delEvent(id){ const sc=activeSc(); sc.events=(sc.events||[]).filter(e=>e.id!==id); render(); }
function addGoal(){
  const name=document.getElementById('gl-name')?.value.trim();
  const amount=parseFloat(document.getElementById('gl-amt')?.value)||0;
  if(!name||!amount) return;
  S.goals.push({id:'g_'+Date.now(),name,amount,color:GOAL_COLORS[S.goals.length%GOAL_COLORS.length]});
  closeForm('goal-form'); render();
}
function delGoal(id){ S.goals=S.goals.filter(g=>g.id!==id); render(); }

/* ════════════════════════════════════════════════
   SCENARIO OPS
   ════════════════════════════════════════════════ */
function selectSc(id){ S.activeId=id; S.activePd=-1; render(); }
function pinSc(ev,id){ ev.stopPropagation(); S.pinnedId=(S.pinnedId===id)?null:id; render(); }
function delSc(ev,id){ ev.stopPropagation(); S.scenarios=S.scenarios.filter(s=>s.id!==id); if(S.activeId===id) S.activeId=S.scenarios[0].id; if(S.pinnedId===id) S.pinnedId=null; render(); }
function renameSc(ev,id){ ev.stopPropagation(); const sc=S.scenarios.find(s=>s.id===id); if(!sc) return; const nm=prompt('Rename:',sc.name); if(nm?.trim()) sc.name=nm.trim(); render(); }
function forkSc(ev, fromId){
  ev.stopPropagation();
  const from=S.scenarios.find(s=>s.id===fromId); if(!from) return;
  const tl={}; Object.keys(from.timeline||{}).forEach(k=>{ tl[k]=(from.timeline[k]||[]).map(r=>({...r})); });
  const sc={id:'sc_'+Date.now(),name:from.name+' (copy)',isBase:false,incScale:from.incScale||1,timeline:tl,extraBkts:(from.extraBkts||[]).map(b=>({...b})),events:[]};
  S.scenarios.push(sc); S.activeId=sc.id;
  render();
  setTimeout(()=>{ const nm=prompt('Name this scenario:',sc.name); if(nm?.trim()){sc.name=nm.trim();render();} },100);
}
function newSc(){ forkSc({stopPropagation:()=>{}},S.activeId); }

/* ════════════════════════════════════════════════
   PANEL TOGGLE
   ════════════════════════════════════════════════ */
function togglePanel(key){
  S.panelOpen[key]=!S.panelOpen[key];
  const el=document.getElementById('panel-'+key);
  if(!el) return;
  const openClass=key==='chart'?'open-chart':key==='grid'?'open-grid':'open-periods';
  el.classList.toggle(openClass, S.panelOpen[key]);
  el.classList.toggle('closed', !S.panelOpen[key]);
  if(el.querySelector('.panel-body')) el.querySelector('.panel-body').style.display=S.panelOpen[key]?'':'none';
  saveState();
}

/* ════════════════════════════════════════════════
   UI CONTROLS
   ════════════════════════════════════════════════ */
function setRange(r){ S.range=r; render(); }
function setTab(t){ S.rpTab=t; render(); }
function setIncome(v){
  activeSc().incScale=parseInt(v)/100;
  const el=document.getElementById('inc-val'); if(el) el.textContent=v+'%';
}
function clickPd(i){ S.activePd=(S.activePd===i)?-1:i; render(); }
function closeOverlay(){ document.getElementById('overlay').classList.remove('show'); _ctx=null; }
function closeLp(){
  document.getElementById('lp')?.classList.remove('open');
  document.getElementById('lp-overlay')?.classList.remove('show');
}

/* ════════════════════════════════════════════════
   MOBILE
   ════════════════════════════════════════════════ */
function mobileTab(tab){
  S.mobileTab=tab;
  ['sc','grid','chart','pd'].forEach(t=>{
    document.getElementById('mn-'+t)?.classList.toggle('on',t===tab);
  });
  const lp=document.getElementById('lp');
  const lo=document.getElementById('lp-overlay');
  if(tab==='sc'){ lp?.classList.add('open'); lo?.classList.add('show'); }
  else{ lp?.classList.remove('open'); lo?.classList.remove('show'); }
  // Show/hide panels based on tab
  const panels={grid:'grid',chart:'chart',pd:'periods'};
  Object.entries(panels).forEach(([t,k])=>{
    const p=document.getElementById('panel-'+k);
    if(!p) return;
    if(tab===t){ p.style.display='flex'; }
    else if(tab!=='sc'){ p.style.display='none'; }
    else p.style.display=''; // sc tab: show all panels
  });
  saveState();
}

/* ════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════ */
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeOverlay(); });
window.addEventListener('resize', ()=>{ clearTimeout(window._rt); window._rt=setTimeout(render,160); });
render();
</script>
