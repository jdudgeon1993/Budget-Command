<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cura · Forecast Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C10;--bg2:rgba(255,255,255,.05);--bg3:rgba(255,255,255,.08);--bg4:rgba(255,255,255,.03);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#FFF;--text2:#9090B8;--text3:#606088;
  --green:#30D158;--red:#FF453A;--amber:#FF9F0A;--accent:#BF5AF2;--blue:#0A84FF;
  --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --lw:256px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;height:100vh;overflow:hidden}

/* ═══ LEFT PANE ═══ */
.lp{width:var(--lw);min-width:var(--lw);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lp-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.brand{width:22px;height:22px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lp-title{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--text)}
.lp-body{flex:1;overflow-y:auto;padding-bottom:24px}
.lp-body::-webkit-scrollbar{width:3px}
.lp-body::-webkit-scrollbar-thumb{background:rgba(191,90,242,.3);border-radius:2px}
.sec-hd{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;padding:14px 14px 6px;display:flex;align-items:center;justify-content:space-between}
.sec-act{font-family:var(--mono);font-size:10px;color:var(--accent);cursor:pointer;opacity:.7;letter-spacing:.03em;transition:opacity .12s}
.sec-act:hover{opacity:1}

/* Scenario rows */
.sc-row{display:flex;align-items:center;gap:6px;padding:7px 14px;cursor:pointer;transition:background .12s;user-select:none}
.sc-row:hover{background:var(--bg3)}
.sc-row.on{background:rgba(191,90,242,.10)}
.sc-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--text3);flex-shrink:0;transition:all .12s}
.sc-row.on .sc-dot{background:var(--accent);border-color:var(--accent)}
.sc-nm{flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.sc-row.on .sc-nm{color:var(--text);font-weight:500}
.sc-delta{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.sc-badge{font-size:10px;padding:1px 4px;border-radius:8px;cursor:pointer;flex-shrink:0;opacity:0;transition:all .12s;border:1px solid transparent;font-family:var(--mono)}
.sc-row:hover .sc-badge{opacity:.5}
.sc-pin.active{opacity:1;background:rgba(255,159,10,.15);border-color:rgba(255,159,10,.3);color:var(--amber)}
.sc-del{font-size:13px;color:var(--text3);padding:0 2px;opacity:0;cursor:pointer;transition:all .12s;line-height:1;flex-shrink:0}
.sc-row:hover .sc-del{opacity:.6}
.sc-del:hover{color:var(--red);opacity:1!important}
.new-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:var(--text3);font-size:12px;transition:color .12s}
.new-btn:hover{color:var(--accent)}

/* Events */
.ev-row{display:flex;align-items:center;gap:6px;padding:5px 14px;font-size:12px;color:var(--text2)}
.ev-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ev-month{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto}
.ev-del{opacity:0;cursor:pointer;font-size:12px;color:var(--text3);transition:all .12s}
.ev-row:hover .ev-del{opacity:.7}
.ev-del:hover{color:var(--red);opacity:1!important}

/* Goal rows */
.goal-row{display:flex;align-items:center;gap:6px;padding:5px 14px;font-size:12px;color:var(--text2)}
.goal-swatch{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.goal-del{opacity:0;cursor:pointer;font-size:12px;color:var(--text3);transition:all .12s;margin-left:auto}
.goal-row:hover .goal-del{opacity:.7}
.goal-del:hover{color:var(--red);opacity:1!important}

/* ═══ MAIN AREA ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Top bar */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.tb-label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.tb-sc-name{font-size:14px;font-weight:600;color:var(--accent)}
.tb-spacer{flex:1}
.tb-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .12s;white-space:nowrap}
.tb-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.tb-btn.on{background:rgba(191,90,242,.15);border-color:rgba(191,90,242,.4);color:var(--accent)}

/* Splitter — grid top, forecast bottom */
.split{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ═══ TIMELINE GRID ═══ */
.grid-wrap{flex:0 0 auto;height:42vh;border-bottom:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
.grid-header{display:flex;align-items:center;gap:8px;padding:8px 12px 6px;flex-shrink:0;border-bottom:1px solid var(--border)}
.grid-title{font-family:var(--mono);font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--text3)}
.grid-add-bkt{background:none;border:1px dashed rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;font-size:10px;color:var(--text3);cursor:pointer;font-family:var(--mono);transition:all .12s}
.grid-add-bkt:hover{border-color:var(--accent);color:var(--accent)}
.grid-income-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.grid-income-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
.grid-income-val{font-family:var(--mono);font-size:11px;color:var(--green);min-width:38px;text-align:right}
input[type=range]{-webkit-appearance:none;width:80px;height:2px;background:var(--bg3);border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
.grid-scroll{flex:1;overflow:auto;position:relative}
.grid-scroll::-webkit-scrollbar{height:4px;width:4px}
.grid-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
table.tl{border-collapse:collapse;min-width:100%;table-layout:fixed}
table.tl th,table.tl td{padding:0;white-space:nowrap}

/* Sticky bucket name column */
.tl-col-name{width:160px;min-width:160px;max-width:160px;position:sticky;left:0;z-index:10;background:var(--bg)}
.tl-month-col{width:90px;min-width:90px}

/* Header row */
.tl-head-name{background:var(--bg);border-right:1px solid var(--border2);padding:6px 10px;font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;position:sticky;top:0;left:0;z-index:20}
.tl-head-month{background:var(--bg);border-bottom:1px solid var(--border);padding:5px 8px;font-family:var(--mono);font-size:10px;color:var(--text2);text-align:center;position:sticky;top:0;z-index:15;white-space:nowrap}
.tl-head-month.has-event{color:var(--accent)}
.tl-event-badge{display:block;font-size:8px;color:var(--accent);margin-top:1px;letter-spacing:.03em;overflow:hidden;text-overflow:ellipsis;max-width:82px}

/* Data cells */
.tl-name-cell{background:var(--bg);border-right:1px solid var(--border2);border-bottom:1px solid var(--border);padding:6px 10px;position:sticky;left:0;z-index:5;display:flex;align-items:center;gap:6px;height:38px}
.tl-bkt-label{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .12s}
.tl-bkt-label:hover{color:var(--text)}
.tl-bkt-del{font-size:11px;color:var(--text3);cursor:pointer;opacity:0;transition:all .12s;padding:1px 3px;flex-shrink:0}
.tl-name-cell:hover .tl-bkt-del{opacity:.5}
.tl-bkt-del:hover{opacity:1!important;color:var(--red)}
.tl-due{font-family:var(--mono);font-size:9px;color:var(--text3);flex-shrink:0}

.tl-cell{border-bottom:1px solid var(--border);border-right:1px solid rgba(255,255,255,.03);height:38px;cursor:pointer;transition:background .12s;position:relative;text-align:center;vertical-align:middle}
.tl-cell:hover{background:var(--bg3)}
.tl-cell.off{background:rgba(255,69,58,.03)}
.tl-cell.on{background:rgba(48,209,88,.03)}
.tl-cell.transition{box-shadow:inset 3px 0 0 var(--accent)}
.tl-cell.transition-off{box-shadow:inset 3px 0 0 var(--red)}
.tl-cell-val{font-family:var(--mono);font-size:11px;color:var(--text2)}
.tl-cell.off .tl-cell-val{color:rgba(255,69,58,.5)}
.tl-cell.on .tl-cell-val{color:var(--green)}
.tl-cell-off-label{font-family:var(--mono);font-size:9px;color:rgba(255,69,58,.4);letter-spacing:.06em}

/* ═══ FORECAST AREA ═══ */
.fc-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.fc-tabs{display:flex;gap:2px;padding:8px 12px 0;flex-shrink:0}
.fc-tab{font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 10px;border-radius:5px 5px 0 0;cursor:pointer;letter-spacing:.05em;border:1px solid transparent;border-bottom:none;transition:all .12s}
.fc-tab.on{background:var(--bg2);border-color:var(--border);color:var(--text);border-bottom:1px solid var(--bg)}
.fc-body{flex:1;overflow:hidden;display:flex;flex-direction:column;border-top:1px solid var(--border)}

/* KPI strip */
.kpi-strip{display:flex;gap:0;flex-shrink:0;border-bottom:1px solid var(--border)}
.kpi{flex:1;padding:8px 12px;border-right:1px solid var(--border)}
.kpi:last-child{border-right:none}
.kpi-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.kpi-val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text)}
.kpi-val.pos{color:var(--green)}
.kpi-val.neg{color:var(--red)}
.kpi-val.warn{color:var(--amber)}
.kpi-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:1px}

/* Chart */
.chart-area{flex:0 0 auto;padding:8px 12px;overflow:hidden}
svg.fc-chart{width:100%;display:block}

/* Period list */
.pd-list{flex:1;overflow-y:auto;padding-bottom:8px}
.pd-list::-webkit-scrollbar{width:3px}
.pd-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.pd-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .12s}
.pd-row:hover{background:var(--bg2)}
.pd-row.active{background:rgba(191,90,242,.08);border-left:2px solid var(--accent)}
.pd-date{font-family:var(--mono);font-size:10px;color:var(--text3);width:70px;flex-shrink:0}
.pd-net{font-family:var(--mono);font-size:11px;font-weight:500;width:60px;text-align:right;flex-shrink:0}
.pd-bal{font-family:var(--mono);font-size:11px;color:var(--text2);width:70px;text-align:right;flex-shrink:0}
.pd-bar-wrap{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pd-bar{height:100%;border-radius:2px;transition:width .2s}
.pd-bkts{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.pd-bkt-chip{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:8px;background:var(--bg3);color:var(--text3)}

/* Intelligence panel */
.intel-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.intel-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.intel-card-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.intel-card-body{font-size:11px;color:var(--text2);line-height:1.5}
.intel-impact{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(255,69,58,.12);color:var(--red)}
.intel-good{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(48,209,88,.12);color:var(--green)}

/* Range selector */
.range-sel{display:flex;gap:3px}
.rng-btn{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;transition:all .12s}
.rng-btn.on{background:rgba(191,90,242,.15);border-color:rgba(191,90,242,.4);color:var(--accent)}
.rng-btn:hover:not(.on){border-color:var(--border2);color:var(--text2)}

/* ═══ POPOVER / DIALOG ═══ */
.overlay{position:fixed;inset:0;z-index:100;display:none}
.overlay.show{display:block}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.popover{position:absolute;z-index:101;background:#18181E;border:1px solid var(--border2);border-radius:10px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);width:280px;animation:popIn .15s ease}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(-4px)}to{opacity:1;transform:none}}
.pop-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.pop-close{font-size:16px;color:var(--text3);cursor:pointer;line-height:1;padding:2px 4px;transition:color .12s}
.pop-close:hover{color:var(--text)}
.pop-field{margin-bottom:10px}
.pop-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.pop-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:border-color .12s}
.pop-input:focus{border-color:var(--accent)}
.pop-select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
.pop-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pop-toggle-label{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:.05em}
.toggle-pill{width:36px;height:20px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);position:relative;cursor:pointer;transition:background .2s}
.toggle-pill.on{background:rgba(191,90,242,.4);border-color:rgba(191,90,242,.6)}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:var(--text3);position:absolute;top:2px;left:2px;transition:all .2s}
.toggle-pill.on .toggle-thumb{left:18px;background:var(--accent)}
.pop-hint{font-size:10px;color:var(--text3);margin-bottom:10px;line-height:1.4;background:rgba(191,90,242,.06);border-radius:4px;padding:5px 7px;border-left:2px solid rgba(191,90,242,.3)}
.pop-actions{display:flex;gap:6px;margin-top:12px}
.pop-btn{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--mono)}
.pop-btn.primary{background:var(--accent);color:#fff}
.pop-btn.primary:hover{background:#cf7af8}
.pop-btn.danger{background:rgba(255,69,58,.15);color:var(--red);border:1px solid rgba(255,69,58,.3)}
.pop-btn.danger:hover{background:rgba(255,69,58,.25)}
.pop-btn.ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.pop-btn.ghost:hover{color:var(--text);border-color:var(--border2)}

/* Chips for apply-from options */
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px}
.chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:8px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;background:none;transition:all .12s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:rgba(191,90,242,.2);border-color:rgba(191,90,242,.5);color:var(--accent)}

/* Input form for adding buckets / events */
.add-form{background:#18181E;border:1px solid var(--border2);border-radius:10px;padding:14px;margin:6px 14px;animation:popIn .15s ease;display:none}
.add-form.show{display:block}

/* Divider */
.divider{height:1px;background:var(--border);margin:4px 0}

/* Mobile */
@media(max-width:640px){
  :root{--lw:100vw}
  #app{flex-direction:column}
  .lp{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--border);height:auto;max-height:45vh}
  .main{height:55vh}
  .grid-wrap{height:180px}
  .tb-btn span{display:none}
}

/* Tooltip */
.tip{position:fixed;z-index:200;background:#1E1E28;border:1px solid var(--border2);border-radius:6px;padding:6px 9px;font-family:var(--mono);font-size:10px;color:var(--text2);pointer-events:none;white-space:nowrap;display:none}
.tip.show{display:block}
</style>
</head>
<body>
<div id="app"></div>
<div class="overlay" id="overlay"><div class="overlay-bg" onclick="closeOverlay()"></div><div class="popover" id="popover"></div></div>
<div class="tip" id="tip"></div>

<script>
// ════════════════════════════════════════════════════════════
// CONSTANTS — pay frequency, starting balance, base buckets
// ════════════════════════════════════════════════════════════
const PAY_FREQ   = 'biweekly'; // weekly | biweekly | semimonthly | monthly
const START_BAL  = 4200;
const START_INC  = 3200; // per-paycheck gross (after tax)

const BASE_BKTS = [
  {id:'rent',     name:'Rent',         target:2200, due:1,  freq:'monthly'},
  {id:'mortgage', name:'Mortgage',     target:0,    due:1,  freq:'monthly'},
  {id:'electric', name:'Electric',     target:140,  due:15, freq:'monthly'},
  {id:'groceries',name:'Groceries',    target:320,  due:null,freq:'biweekly'},
  {id:'gas',      name:'Gas',          target:90,   due:null,freq:'biweekly'},
  {id:'car_pay',  name:'Car Payment',  target:420,  due:18, freq:'monthly'},
  {id:'car_ins',  name:'Car Insurance',target:180,  due:5,  freq:'monthly'},
  {id:'phone',    name:'Phone',        target:85,   due:22, freq:'monthly'},
  {id:'subscr',   name:'Subscriptions',target:65,   due:null,freq:'monthly'},
  {id:'gym',      name:'Gym',          target:40,   due:10, freq:'monthly'},
  {id:'dining',   name:'Dining Out',   target:200,  due:null,freq:'biweekly'},
  {id:'savings',  name:'Savings',      target:500,  due:null,freq:'monthly'},
];

const GOAL_COLORS = ['#BF5AF2','#0A84FF','#30D158','#FF9F0A','#FF453A','#64D2FF'];

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let S = loadState() || {
  scenarios:[
    {
      id:'baseline', name:'Baseline', isBase:true, incScale:1,
      // Timeline rules: bktId → [{from:'YYYY-M'|null, amount, enabled}]
      // from:null = default (always applies unless overridden)
      // from:'2026-8' = applies from September 2026 (0-indexed month)
      timeline:{
        'rent':     [{from:null, amount:2200, enabled:true},
                     {from:'2026-8', amount:0, enabled:false}],
        'mortgage': [{from:null, amount:0, enabled:false},
                     {from:'2026-8', amount:1800, enabled:true}],
        'groceries':[{from:null, amount:320, enabled:true}],
        'gas':      [{from:null, amount:90,  enabled:true}],
        'electric': [{from:null, amount:140, enabled:true}],
        'car_pay':  [{from:null, amount:420, enabled:true}],
        'car_ins':  [{from:null, amount:180, enabled:true}],
        'phone':    [{from:null, amount:85,  enabled:true}],
        'subscr':   [{from:null, amount:65,  enabled:true}],
        'gym':      [{from:null, amount:40,  enabled:true}],
        'dining':   [{from:null, amount:200, enabled:true}],
        'savings':  [{from:null, amount:500, enabled:true}],
      },
      extraBkts:[], // [{id,name,target,due,freq}]
      events:[], // [{id,name,color,month:'YYYY-M'}] life events
    },
    {
      id:'sc1', name:'No Rent (Moved)', isBase:false, incScale:1,
      timeline:{
        'rent':     [{from:null, amount:2200, enabled:true},
                     {from:'2026-8', amount:0, enabled:false}],
        'mortgage': [{from:null, amount:0, enabled:false},

// ════════════════════════════════════════════════════════════
// HELPERS — date / timeline engine
// ════════════════════════════════════════════════════════════
function ymKey(y,m){ return `${y}-${m}`; }  // m = 0-indexed JS month
function ymParse(key){ const [y,m]=key.split('-').map(Number); return {y,m}; }
function ymInt(key){ if(!key||key==='null'||key===null) return -Infinity; const {y,m}=ymParse(key); return y*12+m; }

// Get the applicable rule for a bucket at a given date
function getRule(sc, bktId, date){
  const key = ymKey(date.getFullYear(), date.getMonth());
  const curInt = ymInt(key);
  const rules = (sc.timeline||{})[bktId] || [];
  if(!rules.length) return null;
  const sorted = [...rules].sort((a,b)=>ymInt(a.from)-ymInt(b.from));
  let applicable = null;
  for(const r of sorted){
    if(ymInt(r.from) <= curInt) applicable = r;
    else break;
  }
  return applicable;
}

// All buckets visible in a scenario (base + extra)
function allBkts(sc){
  const base = BASE_BKTS.map(b=>({...b}));
  const extra = (sc.extraBkts||[]).map(b=>({...b}));
  return [...base, ...extra];
}

// Effective buckets at a specific date for a scenario
function effBktsAt(sc, date){
  const inc = sc.incScale||1;
  return allBkts(sc).map(b=>{
    const rule = getRule(sc, b.id, date);
    if(!rule) return null; // no rule → use default from BASE_BKTS
    if(!rule.enabled) return null; // off
    const amount = rule.amount * inc;
    if(amount <= 0) return null;
    return {...b, eff: amount};
  }).filter(Boolean);
}

// Default effective buckets (no date context — first rule with from:null)
function effBktsDefault(sc){
  const inc = sc.incScale||1;
  return allBkts(sc).map(b=>{
    const rules = (sc.timeline||{})[b.id]||[];
    const def = rules.find(r=>!r.from) || null;
    if(!def || !def.enabled || def.amount<=0) return null;
    return {...b, eff: def.amount * inc};
  }).filter(Boolean);
}

// Generate paycheck dates from today, for N months
function payDates(months){
  const today = new Date();
  const end = new Date(today); end.setMonth(end.getMonth()+months);
  const dates = [];
  let d = new Date(today);
  // Align to next payday
  const DOW = d.getDay();
  if(PAY_FREQ==='biweekly'){
    // next Friday
    const toFri = (5-DOW+7)%7;
    d.setDate(d.getDate()+toFri);
  } else if(PAY_FREQ==='weekly'){
    const toFri = (5-DOW+7)%7;
    d.setDate(d.getDate()+toFri);
  } else if(PAY_FREQ==='semimonthly'){
    d = new Date(d.getFullYear(),d.getMonth(),15);
    if(d<today) d = new Date(d.getFullYear(),d.getMonth()+1,1);
  } else {
    d = new Date(d.getFullYear(),d.getMonth(),1);
    if(d<today) d = new Date(d.getFullYear(),d.getMonth()+1,1);
  }
  while(d<=end){
    dates.push(new Date(d));
    if(PAY_FREQ==='biweekly') d.setDate(d.getDate()+14);
    else if(PAY_FREQ==='weekly') d.setDate(d.getDate()+7);
    else if(PAY_FREQ==='semimonthly'){
      if(d.getDate()===1) d.setDate(15);
      else { d.setDate(1); d.setMonth(d.getMonth()+1); }
    } else {
      d.setMonth(d.getMonth()+1);
    }
  }
  return dates;
}

// Which buckets are due in a pay period?
function bktsDueInPeriod(bkts, periodStart, periodEnd){
  return bkts.filter(b=>{
    if(b.freq==='biweekly') return true; // always appear
    if(b.freq==='weekly') return true;
    if(b.due){
      const dueDate = new Date(periodEnd.getFullYear(), periodEnd.getMonth(), b.due);
      return dueDate >= periodStart && dueDate <= periodEnd;
    }
    return false;
  });
}

// Compute forecast for a scenario
function compute(sc, dates){
  const inc = (START_INC * (sc.incScale||1));
  let bal = START_BAL;
  const periods = [];
  let prevEnd = dates[0] ? new Date(dates[0]) : new Date();
  prevEnd.setDate(prevEnd.getDate()-1);

  for(let i=0;i<dates.length;i++){
    const pd = dates[i];
    const nextPd = dates[i+1] || new Date(pd.getTime()+14*86400000);
    const bkts = effBktsAt(sc, pd);
    const due = bktsDueInPeriod(bkts, pd, nextPd);
    const spent = due.reduce((s,b)=>s+(b.eff||0),0);
    const net = inc - spent;
    bal += net;
    periods.push({date:pd, income:inc, spent, net, bal, bkts:due});
    prevEnd = new Date(pd);
  }
  return periods;
}

// ════════════════════════════════════════════════════════════
// GRID MONTHS — what columns to show
// ════════════════════════════════════════════════════════════
function gridMonths(){
  const today = new Date();
  const months = [];
  for(let i=0;i<S.range;i++){
    const d = new Date(today.getFullYear(), today.getMonth()+i, 1);
    months.push({y:d.getFullYear(), m:d.getMonth(), date:d});
  }
  return months;
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtMonth(y,m){ return `${MONTH_NAMES[m]} '${String(y).slice(2)}`; }
function fmtDate(d){ return `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`; }
function fmtMoney(n){ return n<0?`-$${Math.abs(n).toLocaleString()}`:`$${Math.round(n).toLocaleString()}`; }

function activeSc(){ return S.scenarios.find(s=>s.id===S.activeId)||S.scenarios[0]; }
function pinnedSc(){ return S.scenarios.find(s=>s.id===S.pinnedId)||null; }

function saveState(){
  try{

    localStorage.setItem('cura_fc_v3', JSON.stringify(clean));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem('cura_fc_v3');
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}

// ─── Timeline Grid ────────────────────────────────────────────
function renderGrid(sc, months){
  const bkts = allBkts(sc);
  // Map events by month key
  const evByMonth = {};
  (sc.events||[]).forEach(ev=>{ evByMonth[ev.month]=(evByMonth[ev.month]||[]); evByMonth[ev.month].push(ev); });

  // Header
  const thMonths = months.map(({y,m,date})=>{
    const key=ymKey(y,m);
    const evs=evByMonth[key]||[];
    const hasEv=evs.length>0;
    return `<th class="tl-month-col tl-head-month ${hasEv?'has-event':''}" data-mkey="${key}">
      ${fmtMonth(y,m)}
      ${evs.map(ev=>`<span class="tl-event-badge">⚡ ${ev.name}</span>`).join('')}
    </th>`;
  }).join('');

  // Rows
  const rows = bkts.map(b=>{
    const isExtra = !BASE_BKTS.find(bb=>bb.id===b.id);
    // Compute cell values
    let prevRule = null;
    const cells = months.map(({y,m,date})=>{
      const rule = getRule(sc, b.id, date);
      const isTransition = rule && prevRule && (
        rule.enabled !== prevRule.enabled || rule.amount !== prevRule.amount
      );
      const prevWasOff = prevRule ? !prevRule.enabled : false;
      prevRule = rule;

      if(!rule || !rule.enabled || rule.amount<=0){
        return `<td class="tl-cell off" data-bkt="${b.id}" data-mkey="${ymKey(y,m)}" onclick="openCellPop(event,'${b.id}','${ymKey(y,m)}')">
          <span class="tl-cell-off-label">OFF</span>
        </td>`;
      }
      const cls = [
        'tl-cell',
        'on',
        isTransition ? (prevWasOff?'transition':'transition') : ''
      ].join(' ');
      return `<td class="${cls}" data-bkt="${b.id}" data-mkey="${ymKey(y,m)}" onclick="openCellPop(event,'${b.id}','${ymKey(y,m)}')">
        <span class="tl-cell-val">${fmtMoney(rule.amount)}</span>
      </td>`;
    }).join('');

    const dueStr = b.due ? `${b.due}` : '—';

    return `<tr>
      <td class="tl-name-cell tl-col-name">
        <span class="tl-bkt-label" onclick="openBktEdit(event,'${b.id}')" title="${b.name}">${b.name}</span>
        <span class="tl-due">${dueStr}</span>
        ${isExtra?`<span class="tl-bkt-del" onclick="delExtraBkt('${b.id}')">✕</span>`:''}
      </td>
      ${cells}
    </tr>`;
  }).join('');

  return `<div class="grid-wrap">
    <div class="grid-header">
      <span class="grid-title">Budget Timeline</span>
      <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">Click any cell to schedule changes</span>
    </div>
    <div class="grid-scroll">
      <table class="tl">
        <thead><tr>
          <th class="tl-col-name tl-head-name">Bucket</th>
          ${thMonths}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ─── KPI strip ────────────────────────────────────────────────
function renderKPI(periods, pinnedPeriods){
  if(!periods.length) return '<div class="kpi-strip"><div class="kpi"><div class="kpi-val">No data</div></div></div>';
  const lastBal = periods[periods.length-1].bal;
  const avgNet = periods.reduce((s,p)=>s+p.net,0)/periods.length;
  const shortfalls = periods.filter(p=>p.net<0).length;
  const pinBal = pinnedPeriods&&pinnedPeriods.length ? pinnedPeriods[pinnedPeriods.length-1].bal : null;
  const diff = pinBal!==null ? lastBal - pinBal : null;

  return `<div class="kpi-strip">
    <div class="kpi">
      <div class="kpi-label">End Balance</div>
      <div class="kpi-val ${lastBal>=0?'pos':'neg'}">${fmtMoney(lastBal)}</div>
      ${diff!==null?`<div class="kpi-sub" style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${fmtMoney(diff)} vs ${pinnedPeriods&&'pinned'}</div>`:'<div class="kpi-sub">over ${S.range}mo</div>'}
    </div>
    <div class="kpi">
      <div class="kpi-label">Avg Net/Period</div>
      <div class="kpi-val ${avgNet>=0?'pos':'neg'}">${fmtMoney(avgNet)}</div>
      <div class="kpi-sub">${PAY_FREQ}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Shortfalls</div>
      <div class="kpi-val ${shortfalls===0?'pos':shortfalls>2?'neg':'warn'}">${shortfalls}</div>
      <div class="kpi-sub">periods in red</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total Spent</div>
      <div class="kpi-val">${fmtMoney(periods.reduce((s,p)=>s+p.spent,0))}</div>
      <div class="kpi-sub">${periods.length} periods</div>
    </div>
  </div>`;
}

// ─── Chart ────────────────────────────────────────────────────
function renderChart(periods, pinnedPeriods, dates){
  if(!periods.length) return '';
  const W=700, H=80, PAD={l:50,r:10,t:6,b:6};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;

  const allBals = periods.map(p=>p.bal);
  if(pinnedPeriods) allBals.push(...pinnedPeriods.map(p=>p.bal));
  S.goals.forEach(g=>allBals.push(g.amount));
  allBals.push(START_BAL);

  const maxB=Math.max(...allBals), minB=Math.min(...allBals,0);
  const range=maxB-minB||1;
  const yPx=v=>PAD.t+(1-(v-minB)/range)*iH;
  const xPx=i=>PAD.l+(i/(periods.length-1||1))*iW;

  // Zero line
  const zy=yPx(0);
  let svg=`<svg class="fc-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
  svg+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${zy}" y2="${zy}" stroke="rgba(255,255,255,.08)" stroke-dasharray="3,3"/>`;

  // Goal lines
  S.goals.forEach(g=>{
    const gy=yPx(g.amount);
    svg+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${gy}" y2="${gy}" stroke="${g.color}" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>`;
    svg+=`<text x="${PAD.l+3}" y="${gy-2}" font-size="7" fill="${g.color}" opacity=".7" font-family="JetBrains Mono">${g.name}</text>`;
  });

  // Pinned line (amber dashed)
  if(pinnedPeriods&&pinnedPeriods.length){
    const pts=pinnedPeriods.map((p,i)=>`${xPx(i)},${yPx(p.bal)}`).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="5,3" opacity=".6"/>`;
  }

  // Area fill (shortfall red)
  const posPath = periods.map((p,i)=>`${i===0?'M':'L'}${xPx(i)},${yPx(Math.max(p.bal,0))}`).join(' ');
  const negPath = periods.map((p,i)=>`${i===0?'M':'L'}${xPx(i)},${yPx(Math.min(p.bal,0))}`).join(' ');
  svg+=`<path d="${posPath} L${xPx(periods.length-1)},${zy} L${xPx(0)},${zy} Z" fill="rgba(48,209,88,.06)"/>`;
  svg+=`<path d="${negPath} L${xPx(periods.length-1)},${zy} L${xPx(0)},${zy} Z" fill="rgba(255,69,58,.1)"/>`;

  // Main line
  const linePts=periods.map((p,i)=>`${xPx(i)},${yPx(p.bal)}`).join(' ');
  svg+=`<polyline points="${linePts}" fill="none" stroke="var(--accent)" stroke-width="2"/>`;

  // Dots on transition months (where timeline changes)
  const sc = activeSc();
  periods.forEach((p,i)=>{
    const bkts = allBkts(sc);
    let hasTransition = false;
    if(i>0){
      const prev = periods[i-1].date;
      bkts.forEach(b=>{
        const rPrev = getRule(sc,b.id,prev);
        const rCur  = getRule(sc,b.id,p.date);
        if(rPrev&&rCur&&(rPrev.enabled!==rCur.enabled||rPrev.amount!==rCur.amount)) hasTransition=true;
      });
    }
    const col = p.net>=0?'var(--green)':'var(--red)';
    svg+=`<circle cx="${xPx(i)}" cy="${yPx(p.bal)}" r="${hasTransition?4:2}" fill="${hasTransition?'var(--amber)':col}" opacity="${hasTransition?1:.7}"/>`;
  });

  // Y labels
  [minB,0,(minB+maxB)/2,maxB].forEach(v=>{
    svg+=`<text x="${PAD.l-3}" y="${yPx(v)+3}" font-size="7" fill="rgba(144,144,184,.5)" text-anchor="end" font-family="JetBrains Mono">${fmtMoney(v)}</text>`;
  });
  svg+=`</svg>`;
  return `<div class="chart-area">${svg}</div>`;
}

  const rows = periods.map((p,i)=>{

    const more = p.bkts.length>3?`<span class="pd-bkt-chip">+${p.bkts.length-3}</span>`:'';
    const pinDiff = pinP ? p.bal-pinP.bal : null;
    return `<div class="pd-row" onclick="clickPeriod(${i})">

      <span class="pd-bal" style="color:${balCol}">${fmtMoney(p.bal)}</span>
      <div class="pd-bar-wrap"><div class="pd-bar" style="width:${barW}%;background:${p.net>=0?'var(--accent)':'var(--red)'}"></div></div>
      <div class="pd-bkts">${bktChips}${more}${pinDiff!==null?`<span class="pd-bkt-chip" style="color:${pinDiff>=0?'var(--green)':'var(--red)'}">${pinDiff>=0?'+':''}${fmtMoney(pinDiff)}</span>`:''}</div>
    </div>`;
  }).join('');
  return `<div class="pd-list">${rows}</div>`;
}

// ─── Intelligence panel ───────────────────────────────────────
function renderIntel(sc, periods){
  const bkts = allBkts(sc);
  const totalSpent = periods.reduce((s,p)=>s+p.spent,0)||1;
  const avgInc = periods.length ? periods[0].income : START_INC;

  // Sensitivity: impact of 10% cut
  const ranked = bkts.map(b=>{
    const rules=(sc.timeline||{})[b.id]||[];
    const def=rules.find(r=>!r.from)||null;
    if(!def||!def.enabled) return null;
    const monthlyEst = b.freq==='biweekly' ? def.amount*2.17 : def.amount;
    return {b, monthlyEst};
  }).filter(Boolean).sort((a,b)=>b.monthlyEst-a.monthlyEst);

  const senCards = ranked.slice(0,5).map(({b,monthlyEst})=>{
    const pct = Math.round((monthlyEst/totalSpent)*100);
    const savePer = monthlyEst*0.1;
    return `<div class="intel-card">
      <div class="intel-card-title">${b.name} <span class="intel-impact">−10% saves ${fmtMoney(savePer)}/mo</span></div>
      <div class="intel-card-body">${pct}% of total spend · Currently ${fmtMoney(monthlyEst)}/mo</div>
    </div>`;
  }).join('');

  // Shortfall diagnosis
  const shortfalls = periods.filter(p=>p.net<0);
  const sfCard = shortfalls.length ? `<div class="intel-card">
    <div class="intel-card-title" style="color:var(--red)">⚠ ${shortfalls.length} Shortfall Period${shortfalls.length>1?'s':''}</div>
    <div class="intel-card-body">Starting ${fmtDate(shortfalls[0].date)} · Worst: ${fmtMoney(Math.min(...shortfalls.map(p=>p.net)))}/period</div>
  </div>` : `<div class="intel-card"><div class="intel-card-title"><span class="intel-good">✓ No Shortfalls</span></div><div class="intel-card-body">All ${periods.length} periods are cash-positive.</div></div>`;

  // Goal reach estimates
  const goalCards = S.goals.map(g=>{
    const reach = periods.find(p=>p.bal>=g.amount);
    return `<div class="intel-card">
      <div class="intel-card-title" style="color:${g.color}">${g.name} — ${fmtMoney(g.amount)}</div>
      <div class="intel-card-body">${reach?`Reached ${fmtDate(reach.date)}`:`Not reached in ${S.range}mo window`}</div>
    </div>`;
  }).join('');

  return `<div class="intel-list">${sfCard}${senCards}${goalCards}</div>`;
}

// ════════════════════════════════════════════════════════════
// CELL POPOVER — the core scheduling UX
// ════════════════════════════════════════════════════════════
let _popCtx = null; // {bktId, mkey}
function openCellPop(ev, bktId, mkey){
  ev.stopPropagation();
  const sc = activeSc();
  const {y,m} = ymParse(mkey);
  const date = new Date(y,m,1);
  const rule = getRule(sc, bktId, date);
  const bkt = allBkts(sc).find(b=>b.id===bktId)||{name:bktId};
  const rules = (sc.timeline||{})[bktId]||[];
  _popCtx = {bktId, mkey, y, m};

  // Month options for "apply from"
  const months = gridMonths();
  const chips = months.map(({y:my,m:mm})=>{
    const key=ymKey(my,mm);
    const on=key===mkey?'on':'';
    return `<span class="chip ${on}" onclick="setPopMonth('${key}')" data-mkey="${key}">${fmtMonth(my,mm)}</span>`;
  }).join('');

  // Existing rules list
  const existingRules = rules.map((r,ri)=>`
    <div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)">
      <span style="font-family:var(--mono);font-size:9px;color:var(--text3);width:48px">${r.from?fmtMonth(...r.from.split('-').map(Number)):'Default'}</span>
      <span style="font-family:var(--mono);font-size:10px;color:${r.enabled?'var(--green)':'var(--red)'};">${r.enabled?fmtMoney(r.amount):'OFF'}</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text3);cursor:pointer" onclick="delRule('${bktId}',${ri})">✕</span>
    </div>`).join('');

  const popoverEl = document.getElementById('popover');
  popoverEl.innerHTML = `
    <div class="pop-title">
      ${bkt.name} · ${fmtMonth(y,m)}
      <span class="pop-close" onclick="closeOverlay()">✕</span>
    </div>
    ${existingRules ? `<div style="margin-bottom:10px">${existingRules}</div>` : ''}
    <div class="pop-hint">Set a new rule starting from a specific month. Changes cascade forward until the next rule.</div>
    <div class="pop-field">
      <div class="pop-label">Apply From</div>
      <div class="chips">${chips}</div>
    </div>
    <div class="pop-toggle-row">
      <span class="pop-toggle-label">Enabled</span>
      <div class="toggle-pill ${rule&&rule.enabled?'on':''}" id="pop-toggle" onclick="togglePop()">
        <div class="toggle-thumb"></div>
      </div>
    </div>
    <div class="pop-field" id="pop-amt-field">
      <div class="pop-label">Amount</div>
      <input class="pop-input" id="pop-amt" type="number" min="0" step="50" value="${rule?rule.amount:(bkt.target||0)}" placeholder="0">
    </div>
    <div class="pop-field">
      <div class="pop-label">Due Day (optional)</div>
      <input class="pop-input" id="pop-due" type="number" min="1" max="31" value="${bkt.due||''}" placeholder="e.g. 1">
    </div>
    <div class="pop-actions">
      <button class="pop-btn primary" onclick="applyRule()">Apply Rule</button>
      <button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button>
    </div>`;

  const overlay = document.getElementById('overlay');
  // Position near cell
  const rect = ev.target.closest('td')?.getBoundingClientRect();
  if(rect){
    const top = Math.min(rect.bottom+4, window.innerHeight-360);
    const left = Math.min(rect.left, window.innerWidth-290);
    popoverEl.style.top = top+'px';
    popoverEl.style.left = left+'px';
  } else {
    popoverEl.style.top='50%';
    popoverEl.style.left='50%';
    popoverEl.style.transform='translate(-50%,-50%)';
  }
  overlay.classList.add('show');
}

function setPopMonth(mkey){
  if(!_popCtx) return;
  _popCtx.mkey = mkey;
  const {y,m} = ymParse(mkey);
  _popCtx.y=y; _popCtx.m=m;
  document.querySelectorAll('.chips .chip').forEach(c=>c.classList.toggle('on', c.dataset.mkey===mkey));
}

function togglePop(){
  const pill = document.getElementById('pop-toggle');
  pill.classList.toggle('on');
  const amtField = document.getElementById('pop-amt-field');
  if(amtField) amtField.style.opacity = pill.classList.contains('on')?'1':'0.4';
}

function applyRule(){
  if(!_popCtx) return;
  const sc = activeSc();
  const {bktId, mkey} = _popCtx;
  const enabled = document.getElementById('pop-toggle').classList.contains('on');
  const amount = parseFloat(document.getElementById('pop-amt').value)||0;
  const due = parseInt(document.getElementById('pop-due').value)||null;

  if(!sc.timeline) sc.timeline={};
  if(!sc.timeline[bktId]) sc.timeline[bktId]=[];

  // Update or insert rule for this month
  const existing = sc.timeline[bktId].findIndex(r=>r.from===mkey);
  const rule = {from: mkey==='null'||!mkey?null:mkey, amount, enabled};
  if(existing>=0) sc.timeline[bktId][existing]=rule;
  else sc.timeline[bktId].push(rule);

  // Update due day if changed
  const bktIdx = (sc.extraBkts||[]).findIndex(b=>b.id===bktId);
  if(bktIdx>=0 && due) sc.extraBkts[bktIdx].due=due;
  else {
    const base = BASE_BKTS.find(b=>b.id===bktId);
    if(base && due) base.due=due;
  }

  closeOverlay();
  render();
}

function delRule(bktId, ruleIdx){
  const sc = activeSc();
  if(sc.timeline&&sc.timeline[bktId]){
    sc.timeline[bktId].splice(ruleIdx,1);
  }
  closeOverlay();
  render();
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  _popCtx=null;
}

// ════════════════════════════════════════════════════════════
// BUCKET EDIT POPOVER (name/default amount)
// ════════════════════════════════════════════════════════════
function openBktEdit(ev, bktId){
  ev.stopPropagation();
  const sc = activeSc();
  const bkt = allBkts(sc).find(b=>b.id===bktId)||{name:bktId,target:0,due:null};
  const rules = (sc.timeline||{})[bktId]||[];
  const defRule = rules.find(r=>!r.from);

  const popoverEl = document.getElementById('popover');
  popoverEl.style.top='50%'; popoverEl.style.left='50%'; popoverEl.style.transform='translate(-50%,-50%)';
  popoverEl.innerHTML=`
    <div class="pop-title">${bkt.name} — Default Settings<span class="pop-close" onclick="closeOverlay()">✕</span></div>
    <div class="pop-field">
      <div class="pop-label">Default Amount</div>
      <input class="pop-input" id="be-amt" type="number" min="0" step="10" value="${defRule?defRule.amount:bkt.target||0}">
    </div>
    <div class="pop-field">
      <div class="pop-label">Due Day</div>
      <input class="pop-input" id="be-due" type="number" min="1" max="31" value="${bkt.due||''}" placeholder="—">
    </div>
    <div class="pop-toggle-row">
      <span class="pop-toggle-label">Enabled by Default</span>
      <div class="toggle-pill ${defRule&&defRule.enabled?'on':(!defRule&&bkt.target>0)?'on':''}" id="be-toggle" onclick="this.classList.toggle('on')">
        <div class="toggle-thumb"></div>
      </div>
    </div>
    <div class="pop-actions">
      <button class="pop-btn primary" onclick="saveBktEdit('${bktId}')">Save</button>
      <button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

function saveBktEdit(bktId){
  const sc = activeSc();
  const amount = parseFloat(document.getElementById('be-amt').value)||0;
  const due = parseInt(document.getElementById('be-due').value)||null;
  const enabled = document.getElementById('be-toggle').classList.contains('on');

  if(!sc.timeline) sc.timeline={};
  if(!sc.timeline[bktId]) sc.timeline[bktId]=[];
  const defIdx = sc.timeline[bktId].findIndex(r=>!r.from);
  if(defIdx>=0) sc.timeline[bktId][defIdx]={from:null,amount,enabled};
  else sc.timeline[bktId].unshift({from:null,amount,enabled});

  // Update due in extraBkts or base
  const bktIdx=(sc.extraBkts||[]).findIndex(b=>b.id===bktId);
  if(bktIdx>=0){sc.extraBkts[bktIdx].due=due;}
  else{const b=BASE_BKTS.find(b=>b.id===bktId);if(b&&due)b.due=due;}

  closeOverlay(); render();
}

// ADD BUCKET
// ════════════════════════════════════════════════════════════
function showAddBkt(){
  const popoverEl = document.getElementById('popover');
  popoverEl.style.top='50%'; popoverEl.style.left='50%'; popoverEl.style.transform='translate(-50%,-50%)';
  popoverEl.innerHTML=`
    <div class="pop-title">Add Bucket<span class="pop-close" onclick="closeOverlay()">✕</span></div>
    <div class="pop-field">
      <div class="pop-label">Name</div>
      <input class="pop-input" id="ab-name" placeholder="e.g. Student Loan" autofocus>
    </div>
    <div class="pop-field">
      <div class="pop-label">Default Amount</div>
      <input class="pop-input" id="ab-amt" type="number" min="0" step="10" placeholder="0">
    </div>
    <div class="pop-field">
      <div class="pop-label">Due Day</div>
      <input class="pop-input" id="ab-due" type="number" min="1" max="31" placeholder="optional">
    </div>
    <div class="pop-field">
      <div class="pop-label">Frequency</div>
      <select class="pop-select" id="ab-freq">
        <option value="monthly">Monthly</option>
        <option value="biweekly">Bi-weekly</option>
        <option value="weekly">Weekly</option>
      </select>
    </div>
    <div class="pop-actions">
      <button class="pop-btn primary" onclick="addBkt()">Add Bucket</button>
      <button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

function addBkt(){
  const name = document.getElementById('ab-name').value.trim();
  const amount = parseFloat(document.getElementById('ab-amt').value)||0;
  const due = parseInt(document.getElementById('ab-due').value)||null;
  const freq = document.getElementById('ab-freq').value;
  if(!name) return;
  const sc = activeSc();
  const id = 'x_'+Date.now();
  if(!sc.extraBkts) sc.extraBkts=[];
  sc.extraBkts.push({id,name,target:amount,due,freq});
  if(!sc.timeline) sc.timeline={};
  sc.timeline[id]=[{from:null,amount,enabled:true}];
  closeOverlay(); render();
}

function delExtraBkt(id){
  const sc = activeSc();
  sc.extraBkts=(sc.extraBkts||[]).filter(b=>b.id!==id);
  if(sc.timeline) delete sc.timeline[id];
  render();
}

// ════════════════════════════════════════════════════════════
// LIFE EVENTS
// ════════════════════════════════════════════════════════════
const EV_COLORS=['#BF5AF2','#0A84FF','#30D158','#FF9F0A','#FF453A'];
function showAddEvent(){
  const form = document.getElementById('add-event-form');
  const months = gridMonths();
  const opts = months.map(({y,m})=>`<option value="${ymKey(y,m)}">${fmtMonth(y,m)}</option>`).join('');
  form.innerHTML=`
    <input class="pop-input" id="ev-name" placeholder="Event name (e.g. Moving)" style="margin-bottom:6px">
    <select class="pop-select" id="ev-month" style="margin-bottom:6px">${opts}</select>
    <div style="display:flex;gap:5px;margin-top:4px">
      <button class="pop-btn primary" style="flex:1" onclick="addEvent()">Add</button>
      <button class="pop-btn ghost" style="flex:1" onclick="hideEventForm()">Cancel</button>
    </div>`;
  form.classList.add('show');
}
function hideEventForm(){ document.getElementById('add-event-form').classList.remove('show'); }
function addEvent(){
  const name=document.getElementById('ev-name').value.trim();
  const month=document.getElementById('ev-month').value;
  if(!name) return;
  const sc=activeSc();
  if(!sc.events)sc.events=[];
  const color=EV_COLORS[sc.events.length%EV_COLORS.length];
  sc.events.push({id:'ev_'+Date.now(),name,color,month});
  hideEventForm(); render();
}
function delEvent(id){ const sc=activeSc(); sc.events=(sc.events||[]).filter(e=>e.id!==id); render(); }

// ════════════════════════════════════════════════════════════
// GOALS
// ════════════════════════════════════════════════════════════
function showAddGoal(){
  const form=document.getElementById('add-goal-form');
  form.innerHTML=`
    <input class="pop-input" id="gl-name" placeholder="Goal name" style="margin-bottom:6px">
    <input class="pop-input" id="gl-amt" type="number" placeholder="Target amount" style="margin-bottom:6px">
    <div style="display:flex;gap:5px;margin-top:4px">
      <button class="pop-btn primary" style="flex:1" onclick="addGoal()">Add</button>
      <button class="pop-btn ghost" style="flex:1" onclick="hideGoalForm()">Cancel</button>
    </div>`;
  form.classList.add('show');
}
function hideGoalForm(){document.getElementById('add-goal-form').classList.remove('show');}
function addGoal(){
  const name=document.getElementById('gl-name').value.trim();
  const amount=parseFloat(document.getElementById('gl-amt').value)||0;
  if(!name||!amount) return;
  const color=GOAL_COLORS[S.goals.length%GOAL_COLORS.length];
  S.goals.push({id:'g_'+Date.now(),name,amount,color});
  hideGoalForm(); render();
}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id); render();}

// ════════════════════════════════════════════════════════════
// SCENARIO MANAGEMENT
// ════════════════════════════════════════════════════════════
function selectSc(id){ S.activeId=id; render(); }
function pinSc(ev,id){ ev.stopPropagation(); S.pinnedId=(S.pinnedId===id)?null:id; render(); }
function delSc(ev,id){ ev.stopPropagation(); S.scenarios=S.scenarios.filter(s=>s.id!==id); if(S.activeId===id) S.activeId=S.scenarios[0].id; if(S.pinnedId===id) S.pinnedId=null; render(); }
function renameSc(ev,id){ ev.stopPropagation(); const sc=S.scenarios.find(s=>s.id===id); if(!sc) return; const nm=prompt('Rename scenario:',sc.name); if(nm&&nm.trim()) sc.name=nm.trim(); render(); }

function newSc(){
  const base = activeSc();
  // Deep copy timeline
  const tl = {};
  Object.keys(base.timeline||{}).forEach(k=>{ tl[k]=[...(base.timeline[k]||[]).map(r=>({...r}))]; });
  const sc={
    id:'sc_'+Date.now(),
    name:'New Scenario',
    isBase:false,
    incScale:base.incScale||1,
    timeline:tl,
    extraBkts:[...(base.extraBkts||[]).map(b=>({...b}))],
    events:[],
  };
  S.scenarios.push(sc);
  S.activeId=sc.id;
  render();
  // Prompt rename
  setTimeout(()=>{ const nm=prompt('Name this scenario:',sc.name); if(nm&&nm.trim()){sc.name=nm.trim(); render();} },100);
}

function attachEvents(sc, months, periods, pinnedPeriods){
  // Keyboard ESC closes overlay
  document.onkeydown=e=>{ if(e.key==='Escape') closeOverlay(); };
}
