<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cura · Forecast Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   RESET & TOKENS
   ════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0E;
  --bg1:#111116;
  --bg2:#18181F;
  --bg3:#1F1F28;
  --bg4:rgba(255,255,255,.04);
  --bg5:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --border3:rgba(255,255,255,.18);
  --text:#F2F2F7;
  --text2:#8E8EAD;
  --text3:#52526A;
  --text4:#35354A;
  --green:#34C759;--green-dim:rgba(52,199,89,.15);
  --red:#FF3B30;--red-dim:rgba(255,59,48,.12);
  --amber:#FF9F0A;--amber-dim:rgba(255,159,10,.14);
  --accent:#BF5AF2;--accent-dim:rgba(191,90,242,.14);--accent-glow:rgba(191,90,242,.25);
  --blue:#0A84FF;--blue-dim:rgba(10,132,255,.14);
  --teal:#5AC8FA;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --sh:0 4px 24px rgba(0,0,0,.4);
  --sh2:0 8px 40px rgba(0,0,0,.6);
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ════════════════════════════════════════════════
   HEADER BAR
   ════════════════════════════════════════════════ */
.hdr{
  display:flex;align-items:center;gap:12px;
  padding:0 16px;height:52px;
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);
  border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:30;
}
.brand{
  width:28px;height:28px;border-radius:var(--r8);
  background:linear-gradient(135deg,#BF5AF2,#8B3DD3);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;flex-shrink:0;
  box-shadow:0 2px 8px rgba(191,90,242,.4);
}
.hdr-sc-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:4px 10px 4px 6px;cursor:pointer;
  transition:all .15s;max-width:200px;
}
.hdr-sc-pill:hover{border-color:var(--accent);background:var(--accent-dim)}
.hdr-sc-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.hdr-sc-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-vs{font-family:var(--mono);font-size:10px;color:var(--amber);padding:3px 7px;background:var(--amber-dim);border-radius:20px;border:1px solid rgba(255,159,10,.25)}
.hdr-spacer{flex:1}
.hdr-kpi{display:flex;gap:1px;background:var(--border);border-radius:var(--r8);overflow:hidden;border:1px solid var(--border)}
.hdr-kpi-item{padding:4px 12px;background:var(--bg2);display:flex;flex-direction:column;align-items:center;gap:1px;cursor:default}
.hdr-kpi-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.hdr-kpi-val{font-family:var(--mono);font-size:12px;font-weight:600}
.hdr-controls{display:flex;align-items:center;gap:6px}
.hdr-range{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r6);padding:2px;border:1px solid var(--border)}
.rng{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:var(--r4);color:var(--text3);cursor:pointer;transition:all .12s;border:none;background:none}
.rng.on{background:var(--accent-dim);color:var(--accent)}
.rng:hover:not(.on){color:var(--text2)}
.hdr-inc{display:flex;align-items:center;gap:6px}
.hdr-inc-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
.hdr-inc-val{font-family:var(--mono);font-size:11px;color:var(--green);min-width:32px}
input[type=range]{-webkit-appearance:none;width:72px;height:2px;background:var(--bg5);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px var(--accent-glow)}
.icon-btn{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r6);border:1px solid var(--border);background:var(--bg3);
  cursor:pointer;color:var(--text2);font-size:14px;transition:all .12s;flex-shrink:0;
}
.icon-btn:hover{border-color:var(--border3);color:var(--text);background:var(--bg5)}
.icon-btn.on{background:var(--accent-dim);border-color:rgba(191,90,242,.3);color:var(--accent)}

/* ════════════════════════════════════════════════
   THREE-COLUMN BODY
   ════════════════════════════════════════════════ */
.body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ════════════════════════════════════════════════
   LEFT PANEL — Scenarios
   ════════════════════════════════════════════════ */
.lp{
  width:224px;min-width:224px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,var(--bg1) 0%,var(--bg) 100%);
}
.lp-body{flex:1;overflow-y:auto}
.lp-body::-webkit-scrollbar{width:2px}
.lp-body::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:2px}
.sec-hd{
  font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--text4);
  text-transform:uppercase;padding:16px 14px 5px;
  display:flex;align-items:center;justify-content:space-between;
}
.sec-add{
  font-family:var(--mono);font-size:10px;color:var(--accent);
  opacity:.6;cursor:pointer;letter-spacing:.02em;transition:opacity .12s;
  padding:2px 5px;border-radius:var(--r4);
}
.sec-add:hover{opacity:1;background:var(--accent-dim)}

/* Scenario row */
.sc-row{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;cursor:pointer;
  transition:background .12s;user-select:none;
  border-left:2px solid transparent;
}
.sc-row:hover{background:var(--bg4)}
.sc-row.on{background:var(--accent-dim);border-left-color:var(--accent)}
.sc-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--text4);flex-shrink:0;transition:all .15s}
.sc-row.on .sc-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px var(--accent-glow)}
.sc-nm{flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;transition:color .12s}
.sc-row.on .sc-nm{color:var(--text);font-weight:500}
.sc-delta{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.sc-actions{display:none;gap:2px}
.sc-row:hover .sc-actions{display:flex}
.sc-act-btn{font-size:10px;color:var(--text3);padding:2px 4px;border-radius:var(--r4);cursor:pointer;transition:all .12s;font-family:var(--mono)}
.sc-act-btn:hover{color:var(--text);background:var(--bg5)}
.sc-act-btn.del:hover{color:var(--red);background:var(--red-dim)}
.sc-act-btn.pin.on{color:var(--amber);background:var(--amber-dim)}

/* Event + goal rows */
.ev-row,.goal-row{
  display:flex;align-items:center;gap:7px;
  padding:5px 14px;font-size:11px;color:var(--text2);
}
.ev-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.goal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ev-meta,.goal-meta{font-family:var(--mono);font-size:9px;color:var(--text3);margin-left:auto}
.ev-del,.goal-del{display:none;font-size:11px;color:var(--text3);cursor:pointer;padding:1px 3px;border-radius:var(--r4);transition:all .12s}
.ev-row:hover .ev-del,.goal-row:hover .goal-del{display:block}
.ev-del:hover,.goal-del:hover{color:var(--red);background:var(--red-dim)}

.lp-divider{height:1px;background:var(--border);margin:6px 0}

/* Add forms */
.inline-form{
  margin:4px 14px 8px;padding:10px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r8);display:none;animation:fadeIn .15s ease;
}
.inline-form.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.if-input{
  width:100%;background:var(--bg5);border:1px solid var(--border2);
  border-radius:var(--r6);padding:5px 8px;font-family:var(--mono);font-size:11px;
  color:var(--text);outline:none;margin-bottom:5px;transition:border-color .12s;
}
.if-input:focus{border-color:var(--accent)}
.if-select{width:100%;background:var(--bg5);border:1px solid var(--border2);border-radius:var(--r6);padding:5px 8px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;margin-bottom:5px}
.if-row{display:flex;gap:4px}
.if-btn{flex:1;padding:5px;border-radius:var(--r6);font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:var(--mono);transition:all .15s}
.if-btn.primary{background:var(--accent);color:#fff}
.if-btn.primary:hover{filter:brightness(1.1)}
.if-btn.ghost{background:var(--bg5);color:var(--text2);border:1px solid var(--border)}
.if-btn.ghost:hover{color:var(--text)}

/* ════════════════════════════════════════════════
   CENTER PANEL — Timeline Grid
   ════════════════════════════════════════════════ */
.cp{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;border-right:1px solid var(--border)}
.cp-head{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--bg1);
}
.cp-title{font-family:var(--mono);font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--text3)}
.cp-hint{font-size:10px;color:var(--text4);font-family:var(--mono)}
.cp-add-btn{
  margin-left:auto;font-family:var(--mono);font-size:10px;
  padding:3px 8px;border-radius:var(--r4);
  background:none;border:1px dashed rgba(255,255,255,.12);
  color:var(--text3);cursor:pointer;transition:all .12s;
}
.cp-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.grid-scroll{flex:1;overflow:auto}
.grid-scroll::-webkit-scrollbar{height:5px;width:5px}
.grid-scroll::-webkit-scrollbar-track{background:var(--bg)}
.grid-scroll::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
.grid-scroll::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* Table */
table.tl{border-collapse:collapse;table-layout:fixed;min-width:100%}
table.tl th,table.tl td{padding:0}

/* Sticky name column */
.col-name{width:152px;min-width:152px}
.col-month{width:86px;min-width:86px}

/* Header */
.th-name{
  position:sticky;top:0;left:0;z-index:20;
  background:var(--bg1);
  border-right:1px solid var(--border2);
  border-bottom:1px solid var(--border2);
  padding:7px 10px;
  font-family:var(--mono);font-size:9px;color:var(--text4);
  letter-spacing:.10em;text-transform:uppercase;
}
.th-month{
  position:sticky;top:0;z-index:15;
  background:var(--bg1);
  border-bottom:1px solid var(--border2);
  padding:5px 6px;
  font-family:var(--mono);font-size:10px;color:var(--text3);
  text-align:center;white-space:nowrap;
}
.th-month.has-ev{color:var(--accent)}
.th-ev-chip{
  display:block;margin-top:2px;
  font-size:8px;color:var(--amber);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:80px;
}

/* Name cell */
.td-name{
  position:sticky;left:0;z-index:5;
  background:var(--bg);
  border-right:1px solid var(--border2);
  border-bottom:1px solid rgba(255,255,255,.04);
  padding:0 10px;height:40px;
  display:flex;align-items:center;gap:6px;
}
.td-bkt-name{
  flex:1;font-size:12px;color:var(--text2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:pointer;transition:color .12s;
}
.td-bkt-name:hover{color:var(--text)}
.td-due{font-family:var(--mono);font-size:9px;color:var(--text4);flex-shrink:0}
.td-bkt-del{
  display:none;font-size:11px;color:var(--text3);cursor:pointer;
  padding:1px 3px;border-radius:3px;flex-shrink:0;transition:all .12s;
}
.td-name:hover .td-bkt-del{display:block}
.td-bkt-del:hover{color:var(--red);background:var(--red-dim)}

/* Value cells */
.td-val{
  border-bottom:1px solid rgba(255,255,255,.03);
  border-right:1px solid rgba(255,255,255,.03);
  height:40px;cursor:pointer;
  transition:background .12s;
  text-align:center;vertical-align:middle;
  position:relative;
}
.td-val:hover{background:var(--bg5)}
.td-val:hover::after{
  content:'✎';position:absolute;top:2px;right:3px;
  font-size:8px;color:var(--text3);opacity:.5;
}

/* OFF state */
.td-val.is-off{background:rgba(255,59,48,.025)}
.td-val.is-off:hover{background:rgba(255,59,48,.06)}
.td-off-lbl{font-family:var(--mono);font-size:9px;color:rgba(255,59,48,.4);letter-spacing:.06em}

/* ON state */
.td-val.is-on{background:rgba(52,199,89,.02)}
.td-val.is-on:hover{background:rgba(52,199,89,.06)}
.td-on-val{font-family:var(--mono);font-size:11px;color:var(--text2)}

/* Transition marker — inset left stripe */
.td-val.tx-on{box-shadow:inset 3px 0 0 var(--green);background:rgba(52,199,89,.05)}
.td-val.tx-off{box-shadow:inset 3px 0 0 var(--red);background:rgba(255,59,48,.05)}
.td-val.tx-change{box-shadow:inset 3px 0 0 var(--amber);background:rgba(255,159,10,.04)}
.td-tx-badge{
  position:absolute;top:2px;left:4px;
  font-size:7px;font-family:var(--mono);letter-spacing:.04em;
  text-transform:uppercase;opacity:.8;
}

/* ════════════════════════════════════════════════
   RIGHT PANEL — Forecast
   ════════════════════════════════════════════════ */
.rp{
  width:300px;min-width:300px;
  display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,var(--bg1) 0%,var(--bg) 100%);
}
.rp-tabs{
  display:flex;gap:0;border-bottom:1px solid var(--border);
  flex-shrink:0;padding:0 2px;background:var(--bg1);
}
.rp-tab{
  flex:1;font-family:var(--mono);font-size:10px;
  padding:10px 6px 9px;text-align:center;
  color:var(--text3);cursor:pointer;letter-spacing:.04em;
  border-bottom:2px solid transparent;transition:all .12s;
}
.rp-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.rp-tab:hover:not(.on){color:var(--text2)}

/* KPI cards */
.kpi-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--border);flex-shrink:0;
}
.kpi{background:var(--bg1);padding:10px 12px}
.kpi-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:3px}
.kpi-val{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:-.02em;line-height:1}
.kpi-val.pos{color:var(--green)}
.kpi-val.neg{color:var(--red)}
.kpi-val.warn{color:var(--amber)}
.kpi-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px}
.kpi-sub.pos{color:rgba(52,199,89,.7)}
.kpi-sub.neg{color:rgba(255,59,48,.7)}

/* Chart */
.chart-wrap{flex-shrink:0;padding:10px 12px 4px;border-bottom:1px solid var(--border)}
.chart-title{font-family:var(--mono);font-size:9px;color:var(--text4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
svg.sparkline{width:100%;display:block;overflow:visible}

/* Period list */
.pd-list{flex:1;overflow-y:auto}
.pd-list::-webkit-scrollbar{width:2px}
.pd-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.pd-row{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.025);
  cursor:pointer;transition:background .1s;
}
.pd-row:hover{background:var(--bg4)}
.pd-row.active{background:var(--accent-dim);border-left:2px solid var(--accent)}
.pd-date{font-family:var(--mono);font-size:9px;color:var(--text3);width:54px;flex-shrink:0}
.pd-income{font-family:var(--mono);font-size:10px;color:var(--text3);width:38px;flex-shrink:0;text-align:right}
.pd-net{font-family:var(--mono);font-size:11px;font-weight:500;width:52px;text-align:right;flex-shrink:0}
.pd-bal{font-family:var(--mono);font-size:10px;color:var(--text2);width:52px;text-align:right;flex-shrink:0}
.pd-bkts{flex:1;display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end}
.pd-chip{font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:5px;background:var(--bg5);color:var(--text3);white-space:nowrap}
.pd-chip.tx{background:var(--amber-dim);color:var(--amber)}
.pd-expand{display:none;padding:4px 12px 8px;flex-wrap:wrap;gap:4px}
.pd-expand.show{display:flex}
.pd-exp-chip{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:6px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* Intelligence */
.intel-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.intel-list::-webkit-scrollbar{width:2px}
.intel-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r10);padding:10px 12px;cursor:default;transition:border-color .15s}
.icard:hover{border-color:var(--border2)}
.icard-hd{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.icard-icon{font-size:14px;flex-shrink:0}
.icard-title{font-size:12px;font-weight:600;color:var(--text);flex:1}
.icard-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:6px}
.icard-body{font-size:11px;color:var(--text2);line-height:1.55}
.icard-bar{height:3px;border-radius:2px;background:var(--bg5);margin-top:7px;overflow:hidden}
.icard-bar-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ════════════════════════════════════════════════
   POPOVER / OVERLAY
   ════════════════════════════════════════════════ */
.overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px)}
.popover{
  position:absolute;z-index:101;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--r12);
  padding:18px;
  box-shadow:var(--sh2);
  width:288px;
  animation:popIn .18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(-6px)}to{opacity:1;transform:none}}
.pop-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pop-title{font-size:14px;font-weight:600;color:var(--text)}
.pop-subtitle{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:1px}
.pop-close{
  width:24px;height:24px;border-radius:var(--r6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text3);cursor:pointer;
  background:var(--bg5);border:1px solid var(--border);transition:all .12s;
}
.pop-close:hover{color:var(--text);border-color:var(--border2)}

/* Existing rules list */
.rules-list{margin-bottom:12px}
.rule-row{
  display:flex;align-items:center;gap:7px;
  padding:5px 8px;border-radius:var(--r6);
  background:var(--bg3);margin-bottom:3px;
  border:1px solid transparent;transition:border-color .12s;
}
.rule-row:hover{border-color:var(--border)}
.rule-from{font-family:var(--mono);font-size:9px;color:var(--text3);width:52px;flex-shrink:0}
.rule-val{font-family:var(--mono);font-size:11px;font-weight:500}
.rule-del{margin-left:auto;font-size:11px;color:var(--text4);cursor:pointer;padding:2px 4px;border-radius:3px;transition:all .12s}
.rule-del:hover{color:var(--red);background:var(--red-dim)}

/* Add new rule section */
.pop-rule-hd{
  font-family:var(--mono);font-size:9px;color:var(--text4);
  letter-spacing:.10em;text-transform:uppercase;
  padding:8px 0 6px;border-top:1px solid var(--border);margin-bottom:8px;
}
.pop-field{margin-bottom:10px}
.pop-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.pop-input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r6);padding:7px 10px;
  font-family:var(--mono);font-size:12px;color:var(--text);
  outline:none;transition:border-color .12s;
}
.pop-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
.pop-select{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r6);padding:7px 10px;
  font-family:var(--mono);font-size:12px;color:var(--text);outline:none;
}
.pop-hint{
  font-size:10px;color:var(--text3);line-height:1.5;
  background:rgba(191,90,242,.06);
  border-left:2px solid rgba(191,90,242,.35);
  border-radius:0 var(--r4) var(--r4) 0;
  padding:5px 8px;margin-bottom:10px;
}
/* Toggle */
.pop-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pop-toggle-label{font-size:12px;color:var(--text2)}
.pill{width:38px;height:22px;border-radius:11px;background:var(--bg5);border:1px solid var(--border2);position:relative;cursor:pointer;transition:all .2s}
.pill.on{background:rgba(52,199,89,.3);border-color:rgba(52,199,89,.5)}
.pill-thumb{width:16px;height:16px;border-radius:50%;background:var(--text3);position:absolute;top:2px;left:2px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.pill.on .pill-thumb{left:18px;background:var(--green);box-shadow:0 0 6px rgba(52,199,89,.5)}
/* Month chips */
.month-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:2px}
.mchip{
  font-family:var(--mono);font-size:9px;
  padding:3px 7px;border-radius:8px;
  border:1px solid var(--border2);color:var(--text3);
  cursor:pointer;background:none;transition:all .12s;
}
.mchip:hover{border-color:var(--border3);color:var(--text2)}
.mchip.on{background:var(--accent-dim);border-color:rgba(191,90,242,.4);color:var(--accent)}
/* Actions */
.pop-actions{display:flex;gap:6px;margin-top:14px}
.pop-btn{
  flex:1;padding:8px;border-radius:var(--r8);
  font-size:12px;font-weight:500;cursor:pointer;
  border:none;font-family:var(--mono);transition:all .15s;
}
.pop-btn.primary{background:linear-gradient(135deg,var(--accent),#8B3DD3);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.pop-btn.primary:hover{filter:brightness(1.1);box-shadow:0 3px 12px var(--accent-glow)}
.pop-btn.ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.pop-btn.ghost:hover{color:var(--text);border-color:var(--border2)}
.pop-btn.danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,59,48,.25)}
.pop-btn.danger:hover{background:rgba(255,59,48,.2)}

/* ════════════════════════════════════════════════
   TOOLTIP
   ════════════════════════════════════════════════ */
.tip{
  position:fixed;z-index:200;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r6);padding:5px 9px;
  font-family:var(--mono);font-size:10px;color:var(--text2);
  pointer-events:none;white-space:nowrap;display:none;
  box-shadow:var(--sh);
}
.tip.show{display:block}

/* ════════════════════════════════════════════════
   EMPTY STATES
   ════════════════════════════════════════════════ */
.empty{font-size:11px;color:var(--text4);padding:6px 14px;font-family:var(--mono)}

/* ════════════════════════════════════════════════
   MOBILE — bottom-tab navigation
   ════════════════════════════════════════════════ */
@media(max-width:700px){
  :root{font-size:13px}
  .hdr{padding:0 12px;height:48px}
  .hdr-kpi,.hdr-inc,.hdr-range{display:none}
  .hdr-mobile-range{display:flex!important;gap:2px;background:var(--bg3);border-radius:var(--r6);padding:2px;border:1px solid var(--border)}
  .body{flex-direction:row;position:relative}
  .lp{
    position:absolute;left:0;top:0;bottom:0;
    transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    z-index:50;border-right:1px solid var(--border2);
    box-shadow:var(--sh2);width:220px;min-width:220px;
  }
  .lp.open{transform:translateX(0)}
  .cp{display:none}
  .cp.mobile-show{display:flex}
  .rp{display:none;width:100%;min-width:0}
  .rp.mobile-show{display:flex}
  .mobile-nav{
    display:flex!important;
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:rgba(17,17,22,.92);backdrop-filter:blur(16px) saturate(180%);
    border-top:1px solid var(--border2);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .mn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 4px;cursor:pointer;transition:all .12s;
    font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.04em;
  }
  .mn-item.on{color:var(--accent)}
  .mn-icon{font-size:18px;line-height:1}
  .root-body-pad{padding-bottom:56px}
}
.mobile-nav{display:none}
.hdr-mobile-range{display:none}

/* ════════════════════════════════════════════════
   SCROLLBAR global
   ════════════════════════════════════════════════ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}
</style>

<body>
<div id="root"></div>
<div class="overlay" id="overlay"><div class="ov-bg" onclick="closeOverlay()"></div><div class="popover" id="popover"></div></div>
<div class="tip" id="tip"></div>

<!-- Mobile nav -->
<nav class="mobile-nav" id="mobile-nav">
  <div class="mn-item on" id="mn-grid" onclick="mobileNav('grid')"><span class="mn-icon">⊞</span>Timeline</div>
  <div class="mn-item" id="mn-fc"   onclick="mobileNav('fc')"><span class="mn-icon">📊</span>Forecast</div>
  <div class="mn-item" id="mn-sc"   onclick="mobileNav('sc')"><span class="mn-icon">⚙</span>Scenarios</div>
</nav>

<script>
/* ════════════════════════════════════════════════
   CONSTANTS
   ════════════════════════════════════════════════ */
const PAY_FREQ  = 'biweekly';
const START_BAL = 4200;
const START_INC = 3200;

const BASE_BKTS = [
  {id:'rent',     name:'Rent',          target:2200, due:1,  freq:'monthly'},
  {id:'mortgage', name:'Mortgage',      target:0,    due:1,  freq:'monthly'},
  {id:'electric', name:'Electric',      target:140,  due:15, freq:'monthly'},
  {id:'groceries',name:'Groceries',     target:320,  due:null,freq:'biweekly'},
  {id:'gas',      name:'Gas',           target:90,   due:null,freq:'biweekly'},
  {id:'car_pay',  name:'Car Payment',   target:420,  due:18, freq:'monthly'},
  {id:'car_ins',  name:'Car Insurance', target:180,  due:5,  freq:'monthly'},
  {id:'phone',    name:'Phone',         target:85,   due:22, freq:'monthly'},
  {id:'subscr',   name:'Subscriptions', target:65,   due:null,freq:'monthly'},
  {id:'gym',      name:'Gym',           target:40,   due:10, freq:'monthly'},
  {id:'dining',   name:'Dining Out',    target:200,  due:null,freq:'biweekly'},
  {id:'savings',  name:'Savings Transfer',target:500,due:null,freq:'monthly'},
];

const GOAL_COLORS  = ['#0A84FF','#BF5AF2','#34C759','#FF9F0A','#FF3B30','#5AC8FA'];
const EVENT_COLORS = ['#BF5AF2','#0A84FF','#34C759','#FF9F0A','#FF3B30'];
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* ════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════ */
let S = loadState() || {
  scenarios:[
    {
      id:'baseline', name:'Baseline', isBase:true, incScale:1,
      timeline:{
        rent:     [{from:null,  amount:2200, enabled:true},
                   {from:'2026-8', amount:0, enabled:false}],
        mortgage: [{from:null,  amount:0,    enabled:false},
                   {from:'2026-8', amount:1800, enabled:true}],
        electric: [{from:null,  amount:140,  enabled:true}],
        groceries:[{from:null,  amount:320,  enabled:true}],
        gas:      [{from:null,  amount:90,   enabled:true}],
        car_pay:  [{from:null,  amount:420,  enabled:true}],
        car_ins:  [{from:null,  amount:180,  enabled:true}],
        phone:    [{from:null,  amount:85,   enabled:true}],
        subscr:   [{from:null,  amount:65,   enabled:true}],
        gym:      [{from:null,  amount:40,   enabled:true}],
        dining:   [{from:null,  amount:200,  enabled:true}],
        savings:  [{from:null,  amount:500,  enabled:true}],
      },
      extraBkts:[],
      events:[
        {id:'ev1', name:'Move Out / In', color:'#BF5AF2', month:'2026-8'},
      ],
    },
    {
      id:'sc1', name:'Pay Raise Scenario', isBase:false, incScale:1.15,
      timeline:{
        rent:     [{from:null,  amount:2200, enabled:true},
                   {from:'2026-8', amount:0, enabled:false}],
        mortgage: [{from:null,  amount:0,    enabled:false},
                   {from:'2026-8', amount:1800, enabled:true}],
        electric: [{from:null,  amount:140,  enabled:true}],
        groceries:[{from:null,  amount:320,  enabled:true}],
        gas:      [{from:null,  amount:90,   enabled:true}],
        car_pay:  [{from:null,  amount:420,  enabled:true}],
        car_ins:  [{from:null,  amount:180,  enabled:true}],
        phone:    [{from:null,  amount:85,   enabled:true}],
        subscr:   [{from:null,  amount:65,   enabled:true}],
        gym:      [{from:null,  amount:40,   enabled:true}],
        dining:   [{from:null,  amount:200,  enabled:true}],
        savings:  [{from:null,  amount:800,  enabled:true}],
      },
      extraBkts:[], events:[],
    },
  ],
  goals:[
    {id:'g1', name:'Emergency Fund', amount:10000, color:'#0A84FF'},
    {id:'g2', name:'Vacation Fund',  amount:3500,  color:'#FF9F0A'},
  ],
  activeId:'baseline',
  range:6,
  rpTab:'periods',  // 'periods' | 'intel'
  pinnedId:null,
  showChart:true,
  mobileView:'grid', // 'grid' | 'fc' | 'sc'
  activePd:-1,
};

/* ════════════════════════════════════════════════
   ENGINE HELPERS
   ════════════════════════════════════════════════ */
function ymKey(y,m){ return `${y}-${m}`; }
function ymParse(key){ const[y,m]=key.split('-').map(Number); return{y,m}; }
function ymInt(key){ if(!key||key==='null'||key===null) return -Infinity; const{y,m}=ymParse(key); return y*12+m; }

function getRule(sc, bktId, date){
  const rules=((sc.timeline||{})[bktId]||[]);
  if(!rules.length) return null;
  const cur=date.getFullYear()*12+date.getMonth();
  const sorted=[...rules].sort((a,b)=>ymInt(a.from)-ymInt(b.from));
  let hit=null;
  for(const r of sorted){ if(ymInt(r.from)<=cur) hit=r; else break; }
  return hit;
}

function allBkts(sc){
  return [...BASE_BKTS, ...(sc.extraBkts||[])];
}

function effBktsAt(sc, date){
  const inc=sc.incScale||1;
  return allBkts(sc).map(b=>{
    const r=getRule(sc,b.id,date);
    if(!r||!r.enabled||r.amount<=0) return null;
    return{...b, eff:r.amount*inc};
  }).filter(Boolean);
}

function payDates(months){
  const today=new Date(), end=new Date(today);
  end.setMonth(end.getMonth()+months);
  const dates=[];
  let d=new Date(today);
  const dow=d.getDay();
  if(PAY_FREQ==='biweekly'){d.setDate(d.getDate()+(5-dow+7)%7);}
  else if(PAY_FREQ==='semimonthly'){d=new Date(d.getFullYear(),d.getMonth(),15);if(d<today)d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  else{d=new Date(d.getFullYear(),d.getMonth(),1);if(d<today)d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  while(d<=end){
    dates.push(new Date(d));
    if(PAY_FREQ==='biweekly') d.setDate(d.getDate()+14);
    else if(PAY_FREQ==='semimonthly'){if(d.getDate()===1)d.setDate(15);else{d.setDate(1);d.setMonth(d.getMonth()+1);}}
    else d.setMonth(d.getMonth()+1);
  }
  return dates;
}

function bktsDueInPeriod(bkts, pStart, pEnd){
  return bkts.filter(b=>{
    if(b.freq==='biweekly'||b.freq==='weekly') return true;
    if(b.due){
      const dd=new Date(pEnd.getFullYear(),pEnd.getMonth(),b.due);
      return dd>=pStart&&dd<=pEnd;
    }
    return false;
  });
}

function compute(sc, dates){
  const income=START_INC*(sc.incScale||1);
  let bal=START_BAL;
  const periods=[];
  for(let i=0;i<dates.length;i++){
    const pd=dates[i];
    const next=dates[i+1]||new Date(pd.getTime()+14*864e5);
    const bkts=effBktsAt(sc,pd);
    const due=bktsDueInPeriod(bkts,pd,next);
    const spent=due.reduce((s,b)=>s+b.eff,0);
    const net=income-spent;
    bal+=net;
    periods.push({date:pd,income,spent,net,bal,bkts:due,allBkts:bkts});
  }
  return periods;
}

function gridMonths(){
  const today=new Date(), out=[];
  for(let i=0;i<S.range;i++){
    const d=new Date(today.getFullYear(),today.getMonth()+i,1);
    out.push({y:d.getFullYear(),m:d.getMonth(),date:d});
  }
  return out;
}

/* ════════════════════════════════════════════════
   FORMATTERS
   ════════════════════════════════════════════════ */
function fmtMo(y,m){ return `${MO[m]}'${String(y).slice(2)}`; }
function fmtDate(d){ return `${MO[d.getMonth()]} ${d.getDate()}`; }
function fmtMoney(n,compact=false){
  if(compact&&Math.abs(n)>=1000) return (n<0?'-$':'$')+(Math.abs(n)/1000).toFixed(1)+'k';
  return n<0?`-$${Math.abs(Math.round(n)).toLocaleString()}`:`$${Math.round(n).toLocaleString()}`;
}

/* ════════════════════════════════════════════════
   STATE GETTERS
   ════════════════════════════════════════════════ */
function activeSc(){ return S.scenarios.find(s=>s.id===S.activeId)||S.scenarios[0]; }
function pinnedSc(){ return S.scenarios.find(s=>s.id===S.pinnedId)||null; }

/* ════════════════════════════════════════════════
   PERSISTENCE
   ════════════════════════════════════════════════ */
function saveState(){
  try{ localStorage.setItem('cura_fcv4',JSON.stringify(S)); }catch(e){}
}
function loadState(){
  try{ const r=localStorage.getItem('cura_fcv4'); return r?JSON.parse(r):null; }catch(e){ return null; }
}

/* ════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════ */
function render(){
  saveState();
  const sc=activeSc(), pinned=pinnedSc();
  const dates=payDates(S.range);
  const periods=compute(sc,dates);
  const pinnedPeriods=pinned?compute(pinned,dates):null;
  const months=gridMonths();
  const isMobile=window.innerWidth<=700;

  const html=`
    <div class="hdr" id="hdr">${renderHdr(sc,pinned,periods,pinnedPeriods)}</div>
    <div class="body root-body-pad" id="body-wrap">
      ${renderLP(sc)}
      <div class="cp ${isMobile&&S.mobileView!=='grid'?'':'mobile-show'}" id="cp">${renderGrid(sc,months)}</div>
      <div class="rp ${isMobile&&S.mobileView!=='fc'?'':'mobile-show'}" id="rp">${renderRP(sc,pinned,periods,pinnedPeriods,dates)}</div>
    </div>
  `;
  document.getElementById('root').innerHTML=html;
  // mobile LP open state
  if(isMobile&&S.mobileView==='sc') document.getElementById('lp').classList.add('open');
  attachMisc();
}

/* ─── Header ────────────────────────────────────────────────── */
function renderHdr(sc, pinned, periods, pinnedPeriods){
  const endBal=periods.length?periods[periods.length-1].bal:START_BAL;
  const avgNet=periods.length?periods.reduce((s,p)=>s+p.net,0)/periods.length:0;
  const incPct=Math.round((sc.incScale||1)*100);
  const pinBal=pinnedPeriods&&pinnedPeriods.length?pinnedPeriods[pinnedPeriods.length-1].bal:null;
  const diff=pinBal!==null?endBal-pinBal:null;

  const rangeBtns=[3,6,12].map(r=>`<button class="rng ${S.range===r?'on':''}" onclick="setRange(${r})">${r}mo</button>`).join('');
  const mrangeBtns=[3,6,12].map(r=>`<button class="rng ${S.range===r?'on':''}" onclick="setRange(${r})">${r}mo</button>`).join('');

  return `
    <div class="brand">C</div>
    <div class="hdr-sc-pill" onclick="cycleSc()" title="Click to switch scenario">
      <div class="hdr-sc-dot"></div>
      <span class="hdr-sc-name">${sc.name}</span>
    </div>
    ${pinned?`<span class="hdr-vs">vs ${pinned.name}</span>`:''}
    <div class="hdr-spacer"></div>
    <div class="hdr-kpi">
      <div class="hdr-kpi-item">
        <span class="hdr-kpi-label">End Balance</span>
        <span class="hdr-kpi-val" style="color:${endBal>=0?'var(--green)':'var(--red)'}">${fmtMoney(endBal,true)}</span>
      </div>
      <div class="hdr-kpi-item">
        <span class="hdr-kpi-label">Avg Net</span>
        <span class="hdr-kpi-val" style="color:${avgNet>=0?'var(--green)':'var(--red)'}">${fmtMoney(avgNet,true)}</span>
      </div>
      ${diff!==null?`<div class="hdr-kpi-item">
        <span class="hdr-kpi-label">vs Pinned</span>
        <span class="hdr-kpi-val" style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${fmtMoney(diff,true)}</span>
      </div>`:''}
    </div>
    <div class="hdr-range">${rangeBtns}</div>
    <div class="hdr-mobile-range">${mrangeBtns}</div>
    <div class="hdr-inc">
      <span class="hdr-inc-label">Pay</span>
      <input type="range" min="50" max="200" value="${incPct}" oninput="setIncome(this.value)" title="Income scale">
      <span class="hdr-inc-val" id="inc-val">${incPct}%</span>
    </div>
    <div class="icon-btn ${S.showChart?'on':''}" onclick="toggleChart()" title="Toggle chart">◈</div>
    <div class="icon-btn" onclick="showAddBkt()" title="Add bucket">＋</div>
  `;
}

/* ─── Left Panel ────────────────────────────────────────────── */
function renderLP(sc){
  const scRows=S.scenarios.map(s=>{
    const pds=compute(s,payDates(S.range));
    const endBal=pds.length?pds[pds.length-1].bal:START_BAL;
    const delta=endBal-START_BAL;
    const isPin=S.pinnedId===s.id;
    return `
      <div class="sc-row ${S.activeId===s.id?'on':''}" onclick="selectSc('${s.id}')">
        <div class="sc-dot"></div>
        <span class="sc-nm" ondblclick="renameSc(event,'${s.id}')">${s.name}</span>
        <span class="sc-delta" style="background:${delta>=0?'var(--green-dim)':'var(--red-dim)'};color:${delta>=0?'var(--green)':'var(--red)'}">${delta>=0?'+':''}${fmtMoney(delta,true)}</span>
        <div class="sc-actions">
          ${!s.isBase?`<span class="sc-act-btn pin ${isPin?'on':''}" onclick="pinSc(event,'${s.id}')" title="Pin for comparison">📌</span>`:''}
          <span class="sc-act-btn" onclick="forkSc(event,'${s.id}')" title="Fork">⑂</span>
          ${!s.isBase?`<span class="sc-act-btn del" onclick="delSc(event,'${s.id}')">✕</span>`:''}
        </div>
      </div>`;
  }).join('');

  const evs=(sc.events||[]);
  const evRows=evs.length?evs.map(ev=>`
    <div class="ev-row">
      <div class="ev-dot" style="background:${ev.color}"></div>
      <span>${ev.name}</span>
      <span class="ev-meta">${fmtMo(...ev.month.split('-').map(Number))}</span>
      <span class="ev-del" onclick="delEvent('${ev.id}')">✕</span>
    </div>`).join(''):`<span class="empty">None yet</span>`;

  const goalRows=S.goals.map(g=>`
    <div class="goal-row">
      <div class="goal-dot" style="background:${g.color}"></div>
      <span style="flex:1;font-size:11px">${g.name}</span>
      <span class="goal-meta">${fmtMoney(g.amount,true)}</span>
      <span class="goal-del" onclick="delGoal('${g.id}')">✕</span>
    </div>`).join('');

  return `<div class="lp" id="lp">
    <div class="lp-body">
      <div class="sec-hd">Scenarios<span class="sec-add" onclick="newSc()">+ New</span></div>
      ${scRows}
      <div class="lp-divider"></div>
      <div class="sec-hd">Life Events<span class="sec-add" onclick="showAddEventForm()">+ Add</span></div>
      <div class="inline-form" id="ev-form">
        <input class="if-input" id="ev-name" placeholder="Event name…">

      </div>

/* ─── Center: Timeline Grid ─────────────────────────────────── */
function renderGrid(sc, months){
  const bkts=allBkts(sc);
  const evByMonth={};
  (sc.events||[]).forEach(ev=>{(evByMonth[ev.month]=evByMonth[ev.month]||[]).push(ev);});

  const thMonths=months.map(({y,m})=>{
    const key=ymKey(y,m);
    const evs=evByMonth[key]||[];
    return `<th class="col-month th-month ${evs.length?'has-ev':''}" data-mkey="${key}">
      <span>${fmtMo(y,m)}</span>
      ${evs.map(e=>`<span class="th-ev-chip" style="color:${e.color}">⚡ ${e.name}</span>`).join('')}
    </th>`;
  }).join('');

  const rows=bkts.map(b=>{
    const isExtra=!BASE_BKTS.find(bb=>bb.id===b.id);
    let prevRule=null;
    const cells=months.map(({y,m,date})=>{
      const r=getRule(sc,b.id,date);
      let txClass='';
      if(prevRule!==null){
        const wasOn=prevRule&&prevRule.enabled&&prevRule.amount>0;
        const isOn=r&&r.enabled&&r.amount>0;
        if(!wasOn&&isOn) txClass='tx-on';
        else if(wasOn&&!isOn) txClass='tx-off';
        else if(wasOn&&isOn&&prevRule.amount!==r.amount) txClass='tx-change';
      }
      prevRule=r;
      const key=ymKey(y,m);
      if(!r||!r.enabled||r.amount<=0){
        return `<td class="td-val is-off ${txClass}" data-bkt="${b.id}" data-mkey="${key}" onclick="openCellPop(event,'${b.id}','${key}')">
          ${txClass==='tx-on'?`<span class="td-tx-badge" style="color:var(--green)">new</span>`:''}
          <span class="td-off-lbl">OFF</span>
        </td>`;
      }
      const inc=sc.incScale||1;
      const disp=fmtMoney(r.amount*inc,true);
      return `<td class="td-val is-on ${txClass}" data-bkt="${b.id}" data-mkey="${key}" onclick="openCellPop(event,'${b.id}','${key}')">
        ${txClass==='tx-on'?`<span class="td-tx-badge" style="color:var(--green)">start</span>`:''}
        ${txClass==='tx-off'?`<span class="td-tx-badge" style="color:var(--red)">end</span>`:''}
        ${txClass==='tx-change'?`<span class="td-tx-badge" style="color:var(--amber)">chg</span>`:''}
        <span class="td-on-val">${disp}</span>
      </td>`;
    }).join('');

    return `<tr>
      <td class="col-name td-name">
        <span class="td-bkt-name" onclick="openBktDefault(event,'${b.id}')" title="Edit default">${b.name}</span>
        <span class="td-due">${b.due||'—'}</span>
        ${isExtra?`<span class="td-bkt-del" onclick="delExtraBkt('${b.id}')">✕</span>`:''}
      </td>
      ${cells}
    </tr>`;
  }).join('');

  return `
    <div class="cp-head">
      <span class="cp-title">Budget Timeline</span>
      <span class="cp-hint">Click any cell to schedule a change</span>
      <button class="cp-add-btn" onclick="showAddBkt()">＋ Add Bucket</button>
    </div>
    <div class="grid-scroll">
      <table class="tl">
        <thead><tr>
          <th class="col-name th-name">Bucket / Due</th>
          ${thMonths}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ─── Right Panel: KPI + Chart + Periods/Intel ──────────────── */
function renderRP(sc, pinned, periods, pinnedPeriods, dates){
  const tabs=['periods','intel'].map(t=>`
    <div class="rp-tab ${S.rpTab===t?'on':''}" onclick="setRpTab('${t}')">

/* ─── KPI ────────────────────────────────────────────────────── */
function renderKPI(periods, pinnedPeriods){
  if(!periods.length) return '';
  const endBal=periods[periods.length-1].bal;
  const avgNet=periods.reduce((s,p)=>s+p.net,0)/periods.length;
  const shortfalls=periods.filter(p=>p.net<0).length;
  const totalSpent=periods.reduce((s,p)=>s+p.spent,0);
  const pinBal=pinnedPeriods?.length?pinnedPeriods[pinnedPeriods.length-1].bal:null;
  const diff=pinBal!==null?endBal-pinBal:null;

  return `<div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-label">End Balance</div>
      <div class="kpi-val ${endBal>=0?'pos':'neg'}">${fmtMoney(endBal,true)}</div>
      ${diff!==null?`<div class="kpi-sub ${diff>=0?'pos':'neg'}">${diff>=0?'+':''}${fmtMoney(diff,true)} vs pinned</div>`:`<div class="kpi-sub">${S.range}mo window</div>`}
    </div>
    <div class="kpi">
      <div class="kpi-label">Avg Net/Period</div>
      <div class="kpi-val ${avgNet>=0?'pos':'neg'}">${fmtMoney(avgNet,true)}</div>
      <div class="kpi-sub">${PAY_FREQ}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Shortfalls</div>
      <div class="kpi-val ${shortfalls===0?'pos':shortfalls>2?'neg':'warn'}">${shortfalls}</div>
      <div class="kpi-sub">${shortfalls===0?'All clear':'periods negative'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total Spend</div>
      <div class="kpi-val">${fmtMoney(totalSpent,true)}</div>
      <div class="kpi-sub">${periods.length} periods</div>
    </div>
  </div>`;
}

/* ─── Chart ─────────────────────────────────────────────────── */
function renderChart(periods, pinnedPeriods, sc){
  if(!periods.length) return '';
  const W=276, H=90;
  const PAD={l:34,r:8,t:12,b:8};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;

  const allVals=periods.map(p=>p.bal);
  if(pinnedPeriods) allVals.push(...pinnedPeriods.map(p=>p.bal));
  S.goals.forEach(g=>allVals.push(g.amount));
  allVals.push(START_BAL,0);
  const maxV=Math.max(...allVals), minV=Math.min(...allVals);
  const rng=maxV-minV||1;
  const n=periods.length;
  const xPx=i=>PAD.l+(i/(n-1||1))*iW;
  const yPx=v=>PAD.t+(1-(v-minV)/rng)*iH;

  let svg=`<svg class="sparkline" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="grdPos" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#34C759" stop-opacity=".3"/>
        <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="grdNeg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF3B30" stop-opacity="0"/>
        <stop offset="100%" stop-color="#FF3B30" stop-opacity=".2"/>
      </linearGradient>
    </defs>`;

  // Grid lines
  const zy=yPx(0);
  [minV,(minV+maxV)/2,maxV].forEach(v=>{
    svg+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${yPx(v)}" y2="${yPx(v)}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
    svg+=`<text x="${PAD.l-3}" y="${yPx(v)+3}" font-size="7" fill="rgba(144,144,184,.4)" text-anchor="end" font-family="JetBrains Mono">${fmtMoney(v,true)}</text>`;
  });
  // Zero
  svg+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${zy}" y2="${zy}" stroke="rgba(255,255,255,.1)" stroke-width="1" stroke-dasharray="3,2"/>`;

  // Goal lines
  S.goals.forEach(g=>{
    const gy=yPx(g.amount);
    svg+=`<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${gy}" y2="${gy}" stroke="${g.color}" stroke-width="1" stroke-dasharray="3,2" opacity=".4"/>`;
    svg+=`<text x="${PAD.l+3}" y="${gy-2}" font-size="7" fill="${g.color}" opacity=".6" font-family="JetBrains Mono">${g.name}</text>`;
  });

  // Pinned line
  if(pinnedPeriods?.length){
    const pts=pinnedPeriods.map((p,i)=>`${xPx(i)},${yPx(p.bal)}`).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="4,2" opacity=".5"/>`;
  }

  // Filled area
  const botY=PAD.t+iH;
  const areaPos=periods.map((p,i)=>`${i===0?'M':'L'}${xPx(i)},${yPx(Math.max(p.bal,0))}`).join(' ')+
    `L${xPx(n-1)},${zy}L${xPx(0)},${zy}Z`;
  const areaNeg=periods.map((p,i)=>`${i===0?'M':'L'}${xPx(i)},${yPx(Math.min(p.bal,0))}`).join(' ')+
    `L${xPx(n-1)},${zy}L${xPx(0)},${zy}Z`;
  svg+=`<path d="${areaPos}" fill="url(#grdPos)"/>`;
  svg+=`<path d="${areaNeg}" fill="url(#grdNeg)"/>`;

  // Main line
  const pts=periods.map((p,i)=>`${xPx(i)},${yPx(p.bal)}`).join(' ');
  svg+=`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Transition dots (amber) + normal dots
  periods.forEach((p,i)=>{
    let isTx=false;
    if(i>0){
      allBkts(sc).forEach(b=>{
        const rp=getRule(sc,b.id,periods[i-1].date);
        const rc=getRule(sc,b.id,p.date);
        if(rp&&rc&&(rp.enabled!==rc.enabled||rp.amount!==rc.amount)) isTx=true;
      });
    }
    const col=isTx?'var(--amber)':p.net>=0?'var(--green)':'var(--red)';
    const r=isTx?4:2;
    svg+=`<circle cx="${xPx(i)}" cy="${yPx(p.bal)}" r="${r}" fill="${col}" stroke="${col==='var(--amber)'?'rgba(255,159,10,.3)':'none'}" stroke-width="2"/>`;
    if(isTx){
      svg+=`<circle cx="${xPx(i)}" cy="${yPx(p.bal)}" r="7" fill="none" stroke="var(--amber)" stroke-width="1" opacity=".3"/>`;
    }
  });

  svg+=`</svg>`;

  return `<div class="chart-wrap">
    <div class="chart-title">Balance trajectory · amber = scheduled change</div>
    ${svg}
  </div>`;
}

/* ─── Pay Periods list ───────────────────────────────────────── */
function renderPeriods(periods, pinnedPeriods){
  const maxSpent=Math.max(...periods.map(p=>p.spent),1);
  const rows=periods.map((p,i)=>{
    const pinP=pinnedPeriods?.[i];
    const netCol=p.net>=0?'var(--green)':'var(--red)';
    const balCol=p.bal>=0?'var(--text2)':'var(--red)';
    const pinDiff=pinP?p.bal-pinP.bal:null;
    const chips=p.bkts.slice(0,2).map(b=>`<span class="pd-chip">${b.name}</span>`).join('');
    const more=p.bkts.length>2?`<span class="pd-chip">${p.bkts.length-2}+</span>`:'';
    const isActive=S.activePd===i;

    // Check for transitions in this period
    let hasTx=false;
    if(i>0){
      const prev=periods[i-1];
      allBkts(activeSc()).forEach(b=>{
        const rp=getRule(activeSc(),b.id,prev.date);
        const rc=getRule(activeSc(),b.id,p.date);
        if(rp&&rc&&(rp.enabled!==rc.enabled||rp.amount!==rc.amount)) hasTx=true;
      });
    }

    return `<div class="pd-row ${isActive?'active':''}" onclick="clickPd(${i})">
      <span class="pd-date">${fmtDate(p.date)}</span>
      <span class="pd-income" style="color:var(--text3)">${fmtMoney(p.income,true)}</span>
      <span class="pd-net" style="color:${netCol}">${fmtMoney(p.net,true)}</span>
      <span class="pd-bal" style="color:${balCol}">${fmtMoney(p.bal,true)}</span>
      <div class="pd-bkts">
        ${hasTx?`<span class="pd-chip tx">⚡ change</span>`:''}
        ${chips}${more}
        ${pinDiff!==null?`<span class="pd-chip" style="color:${pinDiff>=0?'var(--green)':'var(--red)'}">${pinDiff>=0?'+':''}${fmtMoney(pinDiff,true)}</span>`:''}
      </div>
    </div>
    ${isActive?`<div class="pd-expand show">
      ${p.bkts.map(b=>`<span class="pd-exp-chip">${b.name} ${fmtMoney(b.eff)}</span>`).join('')}
    </div>`:''}`;
  }).join('');

  return `<div class="pd-list">${rows}</div>`;
}

/* ─── Intelligence ───────────────────────────────────────────── */
function renderIntel(sc, periods){
  const bkts=allBkts(sc);
  const totalSpent=periods.reduce((s,p)=>s+p.spent,0)||1;
  const shortfalls=periods.filter(p=>p.net<0);

  // Sensitivity ranked
  const ranked=bkts.map(b=>{
    const rules=(sc.timeline||{})[b.id]||[];
    const def=rules.find(r=>!r.from);
    if(!def||!def.enabled||def.amount<=0) return null;
    const monthly=b.freq==='biweekly'?def.amount*2.17:def.amount;
    return{b,monthly,pct:Math.round((monthly/totalSpent)*100)};
  }).filter(Boolean).sort((a,b)=>b.monthly-a.monthly);

  const sfCard=shortfalls.length?
    `<div class="icard">
      <div class="icard-hd"><span class="icard-icon">⚠️</span><span class="icard-title">Shortfall Warning</span><span class="icard-badge" style="background:var(--red-dim);color:var(--red)">${shortfalls.length} periods</span></div>
      <div class="icard-body">First: ${fmtDate(shortfalls[0].date)} · Worst deficit: ${fmtMoney(Math.min(...shortfalls.map(p=>p.net)),true)}/period</div>
    </div>`:
    `<div class="icard">
      <div class="icard-hd"><span class="icard-icon">✅</span><span class="icard-title">No Shortfalls</span><span class="icard-badge" style="background:var(--green-dim);color:var(--green)">All clear</span></div>
      <div class="icard-body">All ${periods.length} pay periods end cash-positive.</div>
    </div>`;

  const senCards=ranked.slice(0,4).map(({b,monthly,pct})=>`
    <div class="icard">
      <div class="icard-hd">
        <span class="icard-icon" style="font-size:10px;font-family:var(--mono);background:var(--bg3);padding:2px 5px;border-radius:4px">${pct}%</span>
        <span class="icard-title">${b.name}</span>
        <span class="icard-badge" style="background:var(--red-dim);color:var(--red)">−10%: +${fmtMoney(monthly*.1,true)}/mo</span>
      </div>
      <div class="icard-body">${fmtMoney(monthly,true)}/mo · ${b.freq}</div>
      <div class="icard-bar"><div class="icard-bar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
    </div>`).join('');

  const goalCards=S.goals.map(g=>{
    const reach=periods.find(p=>p.bal>=g.amount);
    return `<div class="icard">
      <div class="icard-hd"><span class="icard-icon">🎯</span><span class="icard-title">${g.name}</span><span class="icard-badge" style="background:var(--blue-dim);color:var(--blue)">${fmtMoney(g.amount,true)}</span></div>
      <div class="icard-body">${reach?`Reached by ${fmtDate(reach.date)}`:`Not reached in ${S.range}-month window`}</div>
    </div>`;
  }).join('');

  // Transition summary
  const transitions=[];
  const months=gridMonths();
  bkts.forEach(b=>{
    const rules=(sc.timeline||{})[b.id]||[];
    rules.filter(r=>r.from).forEach(r=>{
      transitions.push({bkt:b,rule:r,month:r.from});
    });
  });
  const txCard=transitions.length?`<div class="icard">
    <div class="icard-hd"><span class="icard-icon">⚡</span><span class="icard-title">Scheduled Changes</span><span class="icard-badge" style="background:var(--amber-dim);color:var(--amber)">${transitions.length}</span></div>
    <div class="icard-body">${transitions.map(t=>`${t.bkt.name}: ${t.rule.enabled?fmtMoney(t.rule.amount):'OFF'} from ${fmtMo(...t.month.split('-').map(Number))}`).join(' · ')}</div>
  </div>`:'';

  return `<div class="intel-list">${sfCard}${txCard}${senCards}${goalCards}</div>`;
}

/* ════════════════════════════════════════════════
   CELL POPOVER
   ════════════════════════════════════════════════ */
let _ctx=null;
function openCellPop(ev, bktId, mkey){
  ev.stopPropagation();
  const sc=activeSc();
  const{y,m}=ymParse(mkey);
  const date=new Date(y,m,1);
  const rule=getRule(sc,bktId,date);
  const bkt=allBkts(sc).find(b=>b.id===bktId)||{name:bktId};
  const rules=(sc.timeline||{})[bktId]||[];
  _ctx={bktId,mkey,y,m};

  const existingRules=rules.length?rules.map((r,ri)=>`
    <div class="rule-row">
      <span class="rule-from">${r.from?fmtMo(...r.from.split('-').map(Number)):'Default'}</span>
      <span class="rule-val" style="color:${r.enabled&&r.amount>0?'var(--green)':'var(--red)'}">${r.enabled&&r.amount>0?fmtMoney(r.amount):'OFF'}</span>
      <span class="rule-del" onclick="delRule('${bktId}',${ri})">✕</span>
    </div>`).join(''):'';

  const mchips=gridMonths().map(({y:my,m:mm})=>{
    const k=ymKey(my,mm);
    return `<button class="mchip ${k===mkey?'on':''}" onclick="setPopMonth('${k}')" data-mkey="${k}">${fmtMo(my,mm)}</button>`;
  }).join('');

  const isOn=rule&&rule.enabled&&rule.amount>0;

  const pop=document.getElementById('popover');
  pop.innerHTML=`
    <div class="pop-hd">
      <div>
        <div class="pop-title">${bkt.name}</div>
        <div class="pop-subtitle">${fmtMo(y,m)} · Click a month to apply from</div>
      </div>
      <div class="pop-close" onclick="closeOverlay()">✕</div>
    </div>
    ${existingRules?`<div class="rules-list">${existingRules}</div>`:''}
    <div class="pop-rule-hd">Add / Update Rule</div>
    <div class="pop-field">
      <div class="pop-label">Apply From Month</div>
      <div class="month-chips">${mchips}</div>
    </div>
    <div class="pop-toggle-row">
      <span class="pop-toggle-label">Bucket Enabled</span>
      <div class="pill ${isOn?'on':''}" id="pop-pill" onclick="this.classList.toggle('on')"><div class="pill-thumb"></div></div>
    </div>
    <div class="pop-field">
      <div class="pop-label">Amount</div>
      <input class="pop-input" id="pop-amt" type="number" min="0" step="50" value="${rule?rule.amount:(bkt.target||0)}">
    </div>
    <div class="pop-actions">
      <button class="pop-btn primary" onclick="applyRule()">Apply Rule</button>
      <button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button>
    </div>`;

  // Position near click
  const ov=document.getElementById('overlay');
  const pr=pop.getBoundingClientRect();
  const cx=ev.clientX, cy=ev.clientY;
  const left=Math.min(cx+8, window.innerWidth-296);
  const top=Math.min(cy+8, window.innerHeight-400);
  pop.style.position='fixed';
  pop.style.top=top+'px';
  pop.style.left=left+'px';
  ov.classList.add('show');
}

function setPopMonth(k){
  if(!_ctx) return;
  const{y,m}=ymParse(k);
  _ctx.mkey=k; _ctx.y=y; _ctx.m=m;
  document.querySelectorAll('.month-chips .mchip').forEach(c=>c.classList.toggle('on',c.dataset.mkey===k));
}

function applyRule(){
  if(!_ctx) return;
  const sc=activeSc();
  const{bktId,mkey}=_ctx;
  const enabled=document.getElementById('pop-pill').classList.contains('on');
  const amount=parseFloat(document.getElementById('pop-amt').value)||0;
  const from=mkey==='null'||!mkey?null:mkey;
  if(!sc.timeline) sc.timeline={};
  if(!sc.timeline[bktId]) sc.timeline[bktId]=[];
  const idx=sc.timeline[bktId].findIndex(r=>(r.from||null)===(from||null));
  const rule={from,amount,enabled};
  if(idx>=0) sc.timeline[bktId][idx]=rule;
  else sc.timeline[bktId].push(rule);
  closeOverlay(); render();
}

function delRule(bktId, ri){
  const sc=activeSc();
  if(sc.timeline?.[bktId]) sc.timeline[bktId].splice(ri,1);
  closeOverlay(); render();
}

/* ─── Bucket Default Edit ────────────────────────────────────── */

  const sc=activeSc();

  const pop=document.getElementById('popover');
  pop.style.position='fixed';

  pop.style.transform='translate(-50%,-50%)';
  pop.innerHTML=`
    <div class="pop-hd">
      <div><div class="pop-title">${bkt.name||bktId}</div><div class="pop-subtitle">Default settings (no date)</div></div>
      <div class="pop-close" onclick="closeOverlay()">✕</div>
    </div>
    <div class="pop-toggle-row">
      <span class="pop-toggle-label">Enabled by Default</span>
      <div class="pill ${def&&def.enabled||((!def)&&(bkt.target||0)>0)?'on':''}" id="bd-pill" onclick="this.classList.toggle('on')"><div class="pill-thumb"></div></div>
    </div>
    <div class="pop-field">
      <div class="pop-label">Default Amount</div>
      <input class="pop-input" id="bd-amt" type="number" min="0" step="10" value="${def?def.amount:(bkt.target||0)}">
    </div>
    <div class="pop-field">
      <div class="pop-label">Due Day</div>
      <input class="pop-input" id="bd-due" type="number" min="1" max="31" value="${bkt.due||''}" placeholder="—">
    </div>
    <div class="pop-actions">
      <button class="pop-btn primary" onclick="saveBktDefault('${bktId}')">Save</button>
      <button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

function saveBktDefault(bktId){
  const sc=activeSc();
  const amount=parseFloat(document.getElementById('bd-amt').value)||0;
  const due=parseInt(document.getElementById('bd-due').value)||null;
  const enabled=document.getElementById('bd-pill').classList.contains('on');
  if(!sc.timeline) sc.timeline={};
  if(!sc.timeline[bktId]) sc.timeline[bktId]=[];
  const di=sc.timeline[bktId].findIndex(r=>!r.from);
  if(di>=0) sc.timeline[bktId][di]={from:null,amount,enabled};
  else sc.timeline[bktId].unshift({from:null,amount,enabled});
  const xi=(sc.extraBkts||[]).findIndex(b=>b.id===bktId);
  if(xi>=0&&due) sc.extraBkts[xi].due=due;
  else{ const b=BASE_BKTS.find(b=>b.id===bktId); if(b&&due) b.due=due; }
  closeOverlay(); render();
}

/* ─── Add Bucket ─────────────────────────────────────────────── */
function showAddBkt(){
  const pop=document.getElementById('popover');
  pop.style.position='fixed'; pop.style.top='50%'; pop.style.left='50%';
  pop.style.transform='translate(-50%,-50%)';
  pop.innerHTML=`
    <div class="pop-hd"><div class="pop-title">Add Bucket</div><div class="pop-close" onclick="closeOverlay()">✕</div></div>
    <div class="pop-hint">Adds to the active scenario. Set the default amount then schedule changes via cell click.</div>
    <div class="pop-field"><div class="pop-label">Name</div><input class="pop-input" id="ab-name" placeholder="e.g. Student Loan" autofocus></div>
    <div class="pop-field"><div class="pop-label">Default Amount</div><input class="pop-input" id="ab-amt" type="number" min="0" step="10" placeholder="0"></div>
    <div class="pop-field"><div class="pop-label">Due Day</div><input class="pop-input" id="ab-due" type="number" min="1" max="31" placeholder="optional"></div>
    <div class="pop-field"><div class="pop-label">Frequency</div>
      <select class="pop-select" id="ab-freq">
        <option value="monthly">Monthly</option>
        <option value="biweekly">Bi-weekly</option>
        <option value="weekly">Weekly</option>
      </select>
    </div>
    <div class="pop-actions">
      <button class="pop-btn primary" onclick="addBkt()">Add</button>
      <button class="pop-btn ghost" onclick="closeOverlay()">Cancel</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

function addBkt(){
  const name=document.getElementById('ab-name').value.trim();
  const amount=parseFloat(document.getElementById('ab-amt').value)||0;
  const due=parseInt(document.getElementById('ab-due').value)||null;
  const freq=document.getElementById('ab-freq').value;
  if(!name) return;
  const sc=activeSc(), id='x_'+Date.now();
  if(!sc.extraBkts) sc.extraBkts=[];
  sc.extraBkts.push({id,name,target:amount,due,freq});
  if(!sc.timeline) sc.timeline={};
  sc.timeline[id]=[{from:null,amount,enabled:true}];
  closeOverlay(); render();
}

function delExtraBkt(id){
  const sc=activeSc();
  sc.extraBkts=(sc.extraBkts||[]).filter(b=>b.id!==id);
  if(sc.timeline) delete sc.timeline[id];
  render();
}

/* ════════════════════════════════════════════════
   LIFE EVENTS
   ════════════════════════════════════════════════ */
function showAddEventForm(){ showForm('ev-form'); }
function showAddGoalForm(){  showForm('goal-form'); }
function showForm(id){ document.getElementById(id)?.classList.add('show'); }
function hideForm(id){ document.getElementById(id)?.classList.remove('show'); }

function addEvent(){
  const name=document.getElementById('ev-name').value.trim();
  const month=document.getElementById('ev-month').value;
  if(!name) return;
  const sc=activeSc();
  if(!sc.events) sc.events=[];
  sc.events.push({id:'ev_'+Date.now(),name,color:EVENT_COLORS[sc.events.length%EVENT_COLORS.length],month});
  hideForm('ev-form'); render();
}
function delEvent(id){ const sc=activeSc(); sc.events=(sc.events||[]).filter(e=>e.id!==id); render(); }

function addGoal(){
  const name=document.getElementById('gl-name').value.trim();
  const amount=parseFloat(document.getElementById('gl-amt').value)||0;
  if(!name||!amount) return;
  S.goals.push({id:'g_'+Date.now(),name,amount,color:GOAL_COLORS[S.goals.length%GOAL_COLORS.length]});
  hideForm('goal-form'); render();
}
function delGoal(id){ S.goals=S.goals.filter(g=>g.id!==id); render(); }

/* ════════════════════════════════════════════════
   SCENARIO OPS
   ════════════════════════════════════════════════ */
function selectSc(id){ S.activeId=id; S.activePd=-1; render(); }
function pinSc(ev,id){ ev.stopPropagation(); S.pinnedId=(S.pinnedId===id)?null:id; render(); }
function delSc(ev,id){ ev.stopPropagation(); S.scenarios=S.scenarios.filter(s=>s.id!==id); if(S.activeId===id) S.activeId=S.scenarios[0].id; if(S.pinnedId===id) S.pinnedId=null; render(); }

function renameSc(ev,id){
  ev.stopPropagation();
  const sc=S.scenarios.find(s=>s.id===id); if(!sc) return;
  const nm=prompt('Rename:',sc.name); if(nm?.trim()) sc.name=nm.trim(); render();
}

function cycleSc(){
  const idx=S.scenarios.findIndex(s=>s.id===S.activeId);
  S.activeId=S.scenarios[(idx+1)%S.scenarios.length].id;
  render();
}

function forkSc(ev,fromId){
  ev.stopPropagation();
  const from=S.scenarios.find(s=>s.id===fromId); if(!from) return;
  const tl={};
  Object.keys(from.timeline||{}).forEach(k=>{ tl[k]=(from.timeline[k]||[]).map(r=>({...r})); });
  const sc={id:'sc_'+Date.now(),name:from.name+' (copy)',isBase:false,incScale:from.incScale||1,timeline:tl,extraBkts:(from.extraBkts||[]).map(b=>({...b})),events:[]};
  S.scenarios.push(sc); S.activeId=sc.id;
  render();
  setTimeout(()=>{ const nm=prompt('Name this scenario:',sc.name); if(nm?.trim()){sc.name=nm.trim();render();} },100);
}

function newSc(){ forkSc({stopPropagation:()=>{}}, S.activeId); }

/* ════════════════════════════════════════════════
   UI CONTROLS
   ════════════════════════════════════════════════ */
function setRange(r){ S.range=r; render(); }
function setRpTab(t){ S.rpTab=t; render(); }
function setIncome(v){ activeSc().incScale=parseInt(v)/100; document.getElementById('inc-val').textContent=v+'%'; }
function toggleChart(){ S.showChart=!S.showChart; render(); }
function clickPd(i){ S.activePd=(S.activePd===i)?-1:i; render(); }
function closeOverlay(){ document.getElementById('overlay').classList.remove('show'); _ctx=null; }

/* ════════════════════════════════════════════════
   MOBILE NAV
   ════════════════════════════════════════════════ */
function mobileNav(view){
  S.mobileView=view;
  ['grid','fc','sc'].forEach(v=>{
    document.getElementById('mn-'+v)?.classList.toggle('on',v===view);
  });
  const lp=document.getElementById('lp');
  const cp=document.getElementById('cp');
  const rp=document.getElementById('rp');
  if(lp) lp.classList.toggle('open',view==='sc');
  if(cp){ cp.style.display=view==='grid'?'flex':'none'; }
  if(rp){ rp.style.display=view==='fc'?'flex':'none'; }
  // Close lp overlay on outside tap
  if(view!=='sc' && lp) lp.classList.remove('open');
}

/* ════════════════════════════════════════════════
   MISC EVENT WIRING
   ════════════════════════════════════════════════ */
function attachMisc(){
  document.onkeydown=e=>{ if(e.key==='Escape') closeOverlay(); };
  window.onresize=()=>{ clearTimeout(window._rt); window._rt=setTimeout(render,150); };
}

/* ════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════ */
render();
</script>
</body>
