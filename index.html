// Autocomplete UI — used by both desktop #txDesc and mobile #mLogDesc
function setupPayeeAutocomplete(inputId,onSelect){
  const inp=document.getElementById(inputId);if(!inp)return;
  if(inp._payeeWired)return;
  inp._payeeWired=true;
  let dropdown=null;
  function removeDropdown(){if(dropdown){dropdown.remove();dropdown=null;}}
  function showDropdown(items){
    removeDropdown();
    if(!items.length)return;
    const rect=inp.getBoundingClientRect();
    dropdown=document.createElement('div');
    dropdown.className='payee-dropdown';
    dropdown.style.cssText=`position:fixed;top:${rect.bottom+2}px;left:${rect.left}px;width:${rect.width}px;z-index:9100;`;
    items.forEach(p=>{
      const row=document.createElement('div');
      row.className='payee-drop-item';
      const bkt=getBucket(p.defaultBucketId);
      row.innerHTML=`<span class="pdi-name">${esc(p.name)}</span>${bkt?`<span class="pdi-bkt">${esc(bkt.name)}</span>`:''}`;
      row.onmousedown=e=>{e.preventDefault();removeDropdown();onSelect(p);};
      dropdown.appendChild(row);
    });
    document.body.appendChild(dropdown);
  }
  inp.addEventListener('input',()=>{
    const val=inp.value;
    const suggestions=payeeSuggestions(val);
    if(suggestions.length&&val)showDropdown(suggestions);else removeDropdown();
  });
  inp.addEventListener('blur',()=>setTimeout(removeDropdown,150));
  inp.addEventListener('keydown',e=>{
    if(!dropdown)return;
    const items=dropdown.querySelectorAll('.payee-drop-item');
    const active=dropdown.querySelector('.payee-drop-item.hi');
    if(e.key==='ArrowDown'){e.preventDefault();const next=active?active.nextSibling:items[0];if(next){active?.classList.remove('hi');next.classList.add('hi');}return;}
    if(e.key==='ArrowUp'){e.preventDefault();const prev=active?active.previousSibling:items[items.length-1];if(prev){active?.classList.remove('hi');prev.classList.add('hi');}return;}
    if(e.key==='Enter'&&active){e.preventDefault();active.onmousedown(e);return;}
    if(e.key==='Escape'){removeDropdown();return;}
  });
}

function addTx(){
  const desc=document.getElementById('txDesc').value.trim();
  const txAmtEl=document.getElementById('txAmt');
  const txAmtRaw=txAmtEl.value;
  const txAmtCurrent=parseFloat(txAmtRaw)||0;
  const txAmtRef=monthProjectedIncome(S.activeMonth);
  const amt=evalMoneyExpr(txAmtRaw,txAmtCurrent,txAmtRef);
  txAmtEl.value=amt||'';
  const date=document.getElementById('txDate').value;
  const rec=document.getElementById('txRec').checked;
  const acctId=document.getElementById('txAcct').value;
  const bkt=txType==='out'?document.getElementById('txBkt').value:null;
  const toAcct=txType==='xfr'?document.getElementById('txXfrTo').value:null;

  if(!desc){document.getElementById('txDesc').focus();return;}
  if(!amt||amt<=0){document.getElementById('txAmt').focus();return;}
  if(!date){document.getElementById('txDate').focus();return;}
  if(!acctId){alert('Please select an account.');return;}
  if(txType==='out'&&!bkt){alert('Please select a bucket.');return;}
  if(txType==='xfr'&&!toAcct){alert('Please select destination account.');return;}
  if(txType==='xfr'&&toAcct===acctId){alert('Cannot transfer to the same account.');return;}

  // Determine correct month from date
  const monthId=dateToMonthId(date);
  // Ensure that month exists
  const d=new Date(date+'T12:00:00');
  const my=d.getFullYear(),mm=d.getMonth();
  addMonth(my,mm);

  const tx={
    id:'_'+Math.random().toString(36).slice(2,9),
    accountId:acctId,
    toAccountId:toAcct||null,
    monthId,
    bucketId:bkt||null,
    desc,amount:amt,type:txType,date,recurring:rec
  };

  const isEdit=!!editingTxId;
  if(isEdit){
    const idx=S.txs.findIndex(t=>t.id===editingTxId);
    if(idx>-1)S.txs[idx]={...S.txs[idx],...tx,id:editingTxId};
    editingTxId=null;
    document.getElementById('txSubmitBtn').textContent='Add Transaction';
  } else {
    S.txs.push(tx);
  }
  upsertPayee(desc, bkt);
  save();
  const sched=tx.date>todayStr();
  const typeLabel=txType==='in'?'Income':txType==='xfr'?'Transfer':'Expense';
  showToast(`${isEdit?'Updated':'Added'} ${typeLabel}: ${desc}${sched?' (scheduled)':''}`, txType==='in'?'in':txType==='xfr'?'xfr':'out');
  document.getElementById('txDesc').value='';
  document.getElementById('txAmt').value='';
  document.getElementById('txRec').checked=false;
  render();
  // Prompt allocation rules on new income
  if(!isEdit&&txType==='in'&&!sched)setTimeout(()=>promptAllocationRules(amt,monthId),400);
}

function addMonth(y,m){
  const id=mId(y,m);if(S.months.find(mo=>mo.id===id))return;
  const budgets={},allocations={};
  S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
  S.months.push({id,label:mLabel(y,m),year:y,month:m,budgets,allocations});
  S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
}

function editTx(id){
  const tx=S.txs.find(t=>t.id===id);if(!tx)return;
  editingTxId=id;
  document.getElementById('txDesc').value=tx.desc;
  document.getElementById('txAmt').value=tx.amount;
  document.getElementById('txDate').value=tx.date;
  document.getElementById('txRec').checked=tx.recurring;

  if(tx.toAccountId)document.getElementById('txXfrTo').value=tx.toAccountId;

  document.getElementById('txDesc').focus();

        <span style="font-family:var(--mono);font-size:15px">${$f(scAlloc)}</span>
      </div>
      <div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Surplus/Deficit</div>
        <span style="font-family:var(--mono);font-size:15px;color:${surplusColor}">${scSurplus>=0?'+':''}${$f(scSurplus)}</span>
      </div>
    </div>
  </div>`;

  // Bucket adjustments (flat list for mobile)
  h+=`<div style="padding:8px 16px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px">Bucket Targets</div>`;
  sortedCats().forEach(cat=>{
    sortedBuckets(cat.id).forEach(b=>{
      const real=getMonth(mid)?.budgets[b.id]||0;
      const val=sc.budgets[b.id]!==undefined?sc.budgets[b.id]:real;
      const diff=val-real;
      const diffHtml=diff!==0?`<span class="wi-diff ${diff>0?'pos':'neg'}" style="margin-left:4px">${diff>0?'+':''}${$f(diff)}</span>`:'';
      const sched=sc.bucketSchedule?.[b.id]||{};
      const isActive=isWIBucketActive(b.id,mid);
      const mOpts=nextMonths.map(m=>`<option value="${m.id}">`+m.label+'</option>').join('');
      h+=`<div class="wi-bkt-row" style="padding:6px 16px;border-bottom:1px solid var(--border);${isActive?'':'opacity:.45'}">
        <span class="wi-bkt-label">${esc(b.name)}${diffHtml}</span>
        <input class="wi-s-inp" type="number" value="${val||''}" placeholder="0"
          onchange="S.wiScenario.budgets['${b.id}']=parseFloat(this.value)||0;openModal('__wi__');renderActivePane();" />
      </div>
      <div style="display:flex;gap:5px;align-items:center;padding:3px 16px 5px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap">
        <span style="font-size:10px;color:var(--text3)">On from:</span>
        <select style="font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text)" onchange="setWIBktSchedule('${b.id}','onFrom',this.value);openModal('__wi__')">
          <option value=""${!sched.onFrom?' selected':''}>Always</option>
          ${nextMonths.map(m=>`<option value="${m.id}"${sched.onFrom===m.id?' selected':''}>${m.label}</option>`).join('')}
        </select>
        <span style="font-size:10px;color:var(--text3)">Off from:</span>
        <select style="font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text)" onchange="setWIBktSchedule('${b.id}','offFrom',this.value);openModal('__wi__')">
          <option value=""${!sched.offFrom?' selected':''}>Never</option>
          ${nextMonths.map(m=>`<option value="${m.id}"${sched.offFrom===m.id?' selected':''}>${m.label}</option>`).join('')}
        </select>
      </div>`;
    });
  });

  // 6-month projection table
  h+=`<div style="padding:8px 16px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px">6-Month Projection</div>
  <div style="overflow-x:auto;padding:0 8px 8px">
  <table class="wi-proj-table">
    <thead><tr><th>Month</th><th>Income</th><th>Allocated</th><th>Surplus</th><th>Cumul.</th></tr></thead><tbody>`;
  const now3=new Date();let cy2=now3.getFullYear(),cm2=now3.getMonth();
  let cum2=0;
  for(let i=0;i<6;i++){
    const pMid=_ensureMonthForWI(cy2,cm2);
    const pM=getMonth(pMid);
    const pLabel=pM?.label||mLabel(cy2,cm2);
    const piR=sc.incomeOverrides[pMid]!==undefined?sc.incomeOverrides[pMid]:(monthProjectedIncome(pMid)||0);
    const ov=sc.incomeOverrides[pMid]!==undefined;
    const aR=S.buckets.filter(b=>!b.archived).reduce((s,b)=>{if(!isWIBucketActive(b.id,pMid))return s;return s+(sc.budgets[b.id]??bBudget(pMid,b.id));},0);
    const sR=piR-aR;cum2+=sR;
    const rCls=sR>=0?'surplus':'deficit';
    h+=`<tr class="${rCls}">
      <td>${pLabel}</td>
      <td><input class="wi-proj-inp" type="number" value="${piR||''}" placeholder="0"
        onchange="S.wiScenario.incomeOverrides['${pMid}']=parseFloat(this.value)||0;openModal('__wi__');" />
        ${ov?'<span style="color:var(--amber);font-size:10px">*</span>':''}
      </td>
      <td>${$f(aR)}</td>
      <td>${sR>=0?'+':''}${$f(sR)}</td>
      <td>${cum2>=0?'+':''}${$f(cum2)}</td>
    </tr>`;
    cm2++;if(cm2>11){cm2=0;cy2++;}
  }
  h+=`</tbody></table></div>
  <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">

    <button class="btn-cancel" onclick="exitWI()">Exit What If</button>
  </div>`;
  return h;
}

function saveScenario(){
  if(!S.wiScenario)return;
  if(!S.scenarios)S.scenarios=[];
  // Update name from input
  const inp=document.getElementById('wiNameInp');
  if(inp)S.wiScenario.name=inp.value||S.wiScenario.name;
  // Remove duplicate
  S.scenarios=S.scenarios.filter(s=>s.id!==S.wiScenario.id);
  S.scenarios.push({...S.wiScenario});
  // Max 6
  if(S.scenarios.length>6)S.scenarios=S.scenarios.slice(-6);
  save();
  if(isMobile())openModal('__wi__');else renderWI();
}

function loadScenario(id){
  const sc=S.scenarios?.find(s=>s.id===id);

  S.scenario=true;
  if(isMobile())openModal('__wi__');else{renderWI();renderMain();}
}

function deleteScenario(id){

function savePaycheckSettings(){
  const pcs=[];
  for(let n=1;n<=3;n++){
    const label=document.getElementById(`pcs${n}Label`)?.value?.trim()||'';
    const amount=parseFloat(document.getElementById(`pcs${n}Amt`)?.value||0);
    const anchorDate=document.getElementById(`pcs${n}Date`)?.value||'';
    const freq=parseInt(document.getElementById(`pcs${n}Freq`)?.value||14);
    if(amount>0&&anchorDate)pcs.push({id:uid(),label:label||(n===1?'My Paycheck':n===2?'Spouse / Partner':'Other Income'),amount,freq,anchorDate});
  }
  if(!pcs.length){
    showToast('No income sources saved — enter an amount and start date for at least one paycheck','out');
    return;
  }
  S.paychecks=pcs;
  _projectorFormState=null; // reset so projector re-reads from new paycheck data
  _projectorLastResult=null;
  save();
  const btn=document.querySelector('[onclick="savePaycheckSettings()"]');
  if(btn){const orig=btn.textContent;btn.textContent='✓ Saved!';btn.disabled=true;setTimeout(()=>{btn.textContent=orig;btn.disabled=false;},1500);}
  showToast(`Saved ${pcs.length} income source${pcs.length!==1?'s':''}`, 'save');
  render();
}

function wiRunProjector(){
  const monthsRaw=document.getElementById('projMonths')?.value||'2';
  const balInput=document.getElementById('projBal')?.value;
  const startBal=balInput!==''&&balInput!=null?parseFloat(balInput)||0:S.accounts.filter(a=>a.type!=='debt').reduce((s,a)=>s+acctBalance(a.id),0);
  const cushionFloor=parseFloat(document.getElementById('projCushion')?.value)||0;
  const extraWeekly=parseFloat(document.getElementById('projExtra')?.value)||0;

  // Resolve scenario for bucket amounts
  const scenarioId=document.getElementById('projScenario')?.value||'';
  const scenario=(S.scenarios||[]).find(s=>s.id===scenarioId)||null;
  const bktAmt=b=>scenario?(scenario.budgets[b.id]??(b.defaultBudget||0)):(b.defaultBudget||0);

  // Parse up to 3 paycheck sources
  const sources=[];
  for(let n=1;n<=3;n++){
    const dateVal=document.getElementById(`pc${n}Date`)?.value;
    const amtVal=parseFloat(document.getElementById(`pc${n}Amt`)?.value||'0');
    const freq=parseInt(document.getElementById(`pc${n}Freq`)?.value||'14');
    const label=document.getElementById(`pc${n}Label`)?.value||(n===1?'My Paycheck':n===2?'Spouse / Partner':'Other Income');
    if(dateVal&&amtVal>0)sources.push({date:dateVal,amt:amtVal,freq,label});
  }
  if(!sources.length){alert('Enter at least one paycheck (date + amount).');return;}

  // Capture form state so it can be restored after re-render
  const prev=_projectorFormState||{};
  _projectorFormState={startBal,projMonths:monthsRaw,scenarioId,cushion:document.getElementById('projCushion')?.value||'',extra:document.getElementById('projExtra')?.value||'0',showPc2:prev.showPc2,showPc3:prev.showPc3};
  for(let n=1;n<=3;n++){
    _projectorFormState['pc'+n+'Label']=document.getElementById('pc'+n+'Label')?.value||'';
    _projectorFormState['pc'+n+'Amt']=document.getElementById('pc'+n+'Amt')?.value||'';
    _projectorFormState['pc'+n+'Date']=document.getElementById('pc'+n+'Date')?.value||'';
    _projectorFormState['pc'+n+'Freq']=document.getElementById('pc'+n+'Freq')?.value||'14';
  }
  for(let n=1;n<=3;n++){
    _projectorFormState['ote'+n+'Date']=document.getElementById('ote'+n+'Date')?.value||'';
    _projectorFormState['ote'+n+'Desc']=document.getElementById('ote'+n+'Desc')?.value||'';
    _projectorFormState['ote'+n+'Amt']=document.getElementById('ote'+n+'Amt')?.value||'';
  }

  // Projection window: start from earliest paycheck date
  // Always start from today — bills before today are already in the current balance
  const startStr=todayStr();
  const startDate=new Date(startStr+'T12:00:00');
  const endDate=new Date(startDate);
  if(monthsRaw==='eoy'){
    endDate.setFullYear(endDate.getFullYear());
    endDate.setMonth(11);endDate.setDate(31);
  } else {
    endDate.setMonth(endDate.getMonth()+parseInt(monthsRaw)||2);
  }
  const months=Math.round((endDate-startDate)/(1000*60*60*24*30.5));
  const endStr=endDate.toISOString().split('T')[0];

  // ── Generate all paycheck events ──────────────────────────────────────────
  const payEvents=[];
  sources.forEach(src=>{
    const d0=new Date(src.date+'T12:00:00');
    if(src.freq===15){
      // Semi-monthly: alternate starting from given date
      let d=new Date(d0);
      while(d<=endDate){
        const ds=d.toISOString().split('T')[0];
        if(ds>=startStr&&ds<=endStr)payEvents.push({date:ds,desc:src.label,amount:src.amt,kind:'pay'});
        if(d.getDate()<15){d=new Date(d.getFullYear(),d.getMonth(),15);}
        else{d=new Date(d.getFullYear(),d.getMonth()+1,1);}
      }
    } else {
      let d=new Date(d0);
      while(d<=endDate){
        const ds=d.toISOString().split('T')[0];
        if(ds>=startStr&&ds<=endStr)payEvents.push({date:ds,desc:src.label,amount:src.amt,kind:'pay'});
        d.setDate(d.getDate()+src.freq);
      }
    }
  });
  payEvents.sort((a,b)=>a.date.localeCompare(b.date));

  // ── Build all outflows (budget only — no scheduled txs to avoid duplicates) ──
  const outflows=[];
  const activeBkts=S.buckets.filter(b=>!b.archived&&bktAmt(b)>0);
  let wY=startDate.getFullYear(),wM=startDate.getMonth();
  const endY=endDate.getFullYear(),endMM=endDate.getMonth();
  while(wY<endY||(wY===endY&&wM<=endMM)){
    const loopMid=mId(wY,wM);
    const monthMax=new Date(wY,wM+1,0).getDate();
    activeBkts.forEach(b=>{
      if(!isWIBucketActiveForMonth(b.id,loopMid,scenario))return;
      const bAmt=bktAmt(b);
      if(b.dueDay){
        if(b.dueDay2){
          // Split payment: derive each portion correctly
          const pay2=b.dueAmount2||bAmt/2;
          const pay1=b.dueAmount||(bAmt-pay2);
          const day1=Math.min(b.dueDay,monthMax);
          const ds1=`${wY}-${String(wM+1).padStart(2,'0')}-${String(day1).padStart(2,'0')}`;
          if(ds1>=startStr&&ds1<=endStr)
            outflows.push({date:ds1,desc:b.name+' (1/2)',amount:pay1,src:'bucket'});
          const day2=Math.min(b.dueDay2,monthMax);
          const ds2=`${wY}-${String(wM+1).padStart(2,'0')}-${String(day2).padStart(2,'0')}`;
          if(ds2>=startStr&&ds2<=endStr)
            outflows.push({date:ds2,desc:b.name+' (2/2)',amount:pay2,src:'bucket'});
        } else {
          // Single due-date bucket
          const day=Math.min(b.dueDay,monthMax);
          const ds=`${wY}-${String(wM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          if(ds>=startStr&&ds<=endStr)
            outflows.push({date:ds,desc:b.name,amount:bAmt,src:'bucket'});
        }
      } else {
        // No due date — discretionary, place on 1st of month
        const ds=`${wY}-${String(wM+1).padStart(2,'0')}-01`;
        if(ds>=startStr&&ds<=endStr)
          outflows.push({date:ds,desc:b.name,amount:bAmt,src:'discretionary'});
      }
    });
    wM++;if(wM>11){wM=0;wY++;}
  }
  // Recurring bills not already covered by a bucket name
  const bktNames=new Set(activeBkts.map(b=>b.name.toLowerCase()));
  (S.recurringBills||[]).filter(b=>b.active!==false).forEach(bill=>{
    if(bktNames.has((bill.desc||'').toLowerCase()))return;
    let d=new Date(startDate);d.setDate(1);
    while(d<=endDate){
      const maxDay=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
      const day=Math.min(bill.dayOfMonth||1,maxDay);
      const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if(ds>=startStr&&ds<=endStr)outflows.push({date:ds,desc:bill.desc,amount:bill.amount,src:'bill'});
      d.setMonth(d.getMonth()+1);
    }
  });
  // ── Inject weekly "what if" extra spending ────────────────────────────────
  if(extraWeekly>0){
    let eD=new Date(startDate);
    while(eD<=endDate){
      outflows.push({date:eD.toISOString().split('T')[0],desc:'Extra spending',amount:extraWeekly,src:'discretionary'});
      eD.setDate(eD.getDate()+7);
    }
  }
  // ── Inject one-time expenses ──────────────────────────────────────────────
  for(let n=1;n<=3;n++){
    const oteDate=document.getElementById('ote'+n+'Date')?.value;
    const oteAmt=parseFloat(document.getElementById('ote'+n+'Amt')?.value||'0');
    const oteDesc=document.getElementById('ote'+n+'Desc')?.value||'One-time expense';
    if(oteDate&&oteAmt>0&&oteDate>=startStr&&oteDate<=endStr)
      outflows.push({date:oteDate,desc:oteDesc,amount:oteAmt,src:'onetime'});
  }
  outflows.sort((a,b)=>a.date.localeCompare(b.date));

  // ── Collect no-due-date buckets for warning ───────────────────────────────
  const undatedBkts=S.buckets.filter(b=>!b.archived&&bktAmt(b)>0&&!b.dueDay);

  // ── Build 3-paycheck-month map (per source, per calendar month) ───────────
  // normalPayPerMonth: weekly→4, biweekly→2, semi-monthly→2, monthly→1
  const normalPerMonth={7:4,14:2,15:2,30:1};
  const bonusMonths=new Set(); // 'YYYY-MM' strings of months with a bonus paycheck
  sources.forEach(src=>{
    const expected=normalPerMonth[src.freq]??2;
    const countByMonth={};
    payEvents.filter(e=>e.desc===src.label).forEach(e=>{
      const ym=e.date.slice(0,7);
      countByMonth[ym]=(countByMonth[ym]||0)+1;
    });
    Object.entries(countByMonth).forEach(([ym,cnt])=>{
      if(cnt>expected)bonusMonths.add(ym+':'+src.label);
    });
  });

  // ── Group into 7-day calendar weeks ──────────────────────────────────────
  // Weeks always start on the same weekday as the first pay date
  const weeks=[];
  let wStart=new Date(startDate);
  while(wStart<=endDate){
    const wEnd=new Date(wStart);
    wEnd.setDate(wEnd.getDate()+6);
    weeks.push({
      start:wStart.toISOString().split('T')[0],
      end:wEnd.toISOString().split('T')[0]
    });
    wStart=new Date(wEnd);
    wStart.setDate(wStart.getDate()+1);
  }

  // ── Pre-compute end-of-week balances for safe-spend analysis ─────────────
  {let _pr=startBal;
  var weekEndBals=weeks.map(w=>{
    payEvents.filter(e=>e.date>=w.start&&e.date<=w.end).forEach(e=>_pr+=e.amount);
    outflows.filter(o=>o.date>=w.start&&o.date<=w.end).forEach(o=>_pr-=o.amount);
    return _pr;
  });}
  // minForwardBal[i] = lowest balance from week i through end of projection
  const minForwardBal=weekEndBals.map((_,i)=>Math.min(...weekEndBals.slice(i)));

  // ── Render ────────────────────────────────────────────────────────────────
  let running=startBal;
  const totalIncome=payEvents.reduce((s,p)=>s+p.amount,0);
  const totalSpend=outflows.reduce((s,o)=>s+o.amount,0);
  const incomeDesc=sources.map(s=>`${s.label}: ${$f(s.amt)} ${s.freq===7?'wkly':s.freq===14?'bi-wkly':s.freq===15?'semi-mo':'mo'}`).join(' · ');

  const scenarioBanner=scenario
    ?`<div style="background:var(--abg);border:1px solid var(--accent);border-radius:6px;padding:6px 12px;margin-bottom:8px;font-size:12px;display:flex;align-items:center;gap:8px">
        <span style="color:var(--accent);font-weight:700">⚡ What If:</span>
        <span style="color:var(--text)">${esc(scenario.name)}</span>
        <span style="color:var(--text3);font-size:11px">— bucket amounts from this scenario</span>
      </div>`

  const undatedWarning=undatedBkts.length
    ?`<div style="background:var(--abg2,var(--surface));border:1px solid var(--amber);border-radius:6px;padding:8px 12px;margin-bottom:8px;font-size:12px">
        <span style="color:var(--amber);font-weight:700">⚠ ${undatedBkts.length} bucket${undatedBkts.length!==1?'s':''} have no due date</span>
        <span style="color:var(--text3)"> — shown on the 1st of each month as an estimate: </span>
        <span style="color:var(--text)">${undatedBkts.map(b=>esc(b.name)).join(', ')}</span>
        <span style="color:var(--text3);display:block;margin-top:3px;font-size:11px">Set due dates in the Bucket Editor for accurate week placement.</span>
      </div>`
    :'';

  let html=`<div style="margin-top:18px;border-top:1px solid var(--border);padding-top:14px">
    ${scenarioBanner}${undatedWarning}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px">
      <div style="background:var(--surface);padding:9px 12px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:2px">Starting Cash</div>
        <div style="font-family:var(--mono);font-size:15px;font-weight:600;color:${startBal>=0?'var(--green)':'var(--red)'}">${$f(startBal)}</div>
      </div>
      <div style="background:var(--surface);padding:9px 12px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:2px">Total Income</div>
        <div style="font-family:var(--mono);font-size:15px;font-weight:600;color:var(--green)">+${$f(totalIncome)}</div>

        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:2px">Total Bills</div>
        <div style="font-family:var(--mono);font-size:15px;font-weight:600;color:var(--red)">-${$f(totalSpend)}</div>
      </div>
      <div style="background:var(--surface2);padding:9px 12px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:2px">Projected End</div>
        <div style="font-family:var(--mono);font-size:15px;font-weight:700;color:${(startBal+totalIncome-totalSpend)>=startBal?'var(--green)':'var(--red)'}">${$f(startBal+totalIncome-totalSpend)}</div>
        <div style="font-size:10px;color:var(--text3)">${weeks.length} wks · ${months} mo</div>
      </div>
    </div>`;

  // ── Group weeks by month, find tightest + first non-empty ────────────────
  const weeksByMonthMap={};
  const monthOrderArr=[];
  weeks.forEach((w,idx)=>{
    const ym=w.start.slice(0,7);
    if(!weeksByMonthMap[ym]){weeksByMonthMap[ym]=[];monthOrderArr.push(ym);}
    weeksByMonthMap[ym].push({...w,wIdx:idx});
  });

  let tightestWIdx=-1,tightestBal=Infinity;
  let firstNonEmptyWIdx=-1;
  weeks.forEach((w,i)=>{
    const hP=payEvents.some(e=>e.date>=w.start&&e.date<=w.end);
    const hO=outflows.some(o=>o.date>=w.start&&o.date<=w.end);
    if(hP||hO){
      if(firstNonEmptyWIdx===-1)firstNonEmptyWIdx=i;
      if(weekEndBals[i]<tightestBal){tightestBal=weekEndBals[i];tightestWIdx=i;}
    }
  });

  let shortfallCount=0;

  monthOrderArr.forEach(ym=>{
    const mWeeks=weeksByMonthMap[ym];
    const hasAnyEvents=mWeeks.some(w=>
      payEvents.some(e=>e.date>=w.start&&e.date<=w.end)||
      outflows.some(o=>o.date>=w.start&&o.date<=w.end)
    );
    if(!hasAnyEvents)return;

    let mIn=0,mOut=0;
    mWeeks.forEach(w=>{
      payEvents.filter(e=>e.date>=w.start&&e.date<=w.end).forEach(e=>mIn+=e.amount);
      outflows.filter(o=>o.date>=w.start&&o.date<=w.end).forEach(o=>mOut+=o.amount);
    });
    const mNet=mIn-mOut;

    // Month risk: tightest balance reached within this month's own weeks
    const mMinMonthBal=Math.min(...mWeeks.map(w=>weekEndBals[w.wIdx]));
    const mSafe=mMinMonthBal-cushionFloor;
    const mAmber=cushionFloor+Math.max(100,cushionFloor*0.5);
    let mRiskHtml;
    if(mMinMonthBal>=mAmber){
      mRiskHtml=`<span style="font-size:11px;color:var(--text2)">You have <strong style="font-family:var(--mono);color:var(--green)">${$f(mSafe)}</strong> to spend this month after all bills.</span>`;
    } else if(mSafe>0){
      mRiskHtml=`<span style="font-size:11px;color:var(--amber)">⚠️ Only <strong style="font-family:var(--mono)">${$f(mSafe)}</strong> left after this month's bills — spend carefully.</span>`;
    } else {
      mRiskHtml=`<span style="font-size:11px;color:var(--red)">⚠️ <strong>Bills exceed balance by ${$f(Math.abs(mSafe))}</strong> this month — do not spend anything extra.</span>`;
    }

    const [mYr,mMo]=ym.split('-');
    const mLabelStr=new Date(parseInt(mYr),parseInt(mMo)-1,1).toLocaleString('default',{month:'long',year:'numeric'});
    const mNetColor=mNet>=0?'var(--green)':'var(--red)';
    const ymSafe=ym.replace('-','_');

    html+=`<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px">
      <div onclick="wiToggleMonth('${ym}')" role="button" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);flex-wrap:wrap;cursor:pointer;user-select:none;-webkit-user-select:none">
        <span id="pwmbt_${ymSafe}" style="font-size:11px;color:var(--text3);width:12px">▼</span>
        <span style="font-size:13px;font-weight:700;color:var(--text)">${mLabelStr}</span>
        ${mIn?`<span style="font-size:11px;color:var(--green)">+${$f(mIn)}</span>`:''}
        ${mOut?`<span style="font-size:11px;color:var(--red)">-${$f(mOut)}</span>`:''}
        <span style="font-size:11px;font-weight:700;color:${mNetColor}">net ${mNet>=0?'+':''}${$f(mNet)}</span>
        <div style="width:100%;margin-top:2px;pointer-events:none">${mRiskHtml}</div>
      </div>
      <div id="pwmbw_${ymSafe}">`;

    mWeeks.forEach(w=>{
      const wPay=payEvents.filter(e=>e.date>=w.start&&e.date<=w.end);
      const wOut2=outflows.filter(o=>o.date>=w.start&&o.date<=w.end);
      if(!wPay.length&&!wOut2.length)return;

      const wId='w'+w.wIdx;
      const autoExpand=w.wIdx===firstNonEmptyWIdx||w.wIdx===tightestWIdx;

      const minFwd=minForwardBal[w.wIdx];
      const safeW=minFwd-cushionFloor;
      const amberW=cushionFloor+Math.max(100,cushionFloor*0.5);
      let dotChar;
      if(minFwd>=amberW)dotChar='🟢';
      else if(safeW>0)dotChar='🟡';
      else dotChar='🔴';

      const wEndBal=weekEndBals[w.wIdx];
      const wEndColor=wEndBal>=0?'var(--green)':'var(--red)';
      if(wEndBal<0)shortfallCount++;

      const bonusInWeek=sources.some(src=>
        wPay.some(e=>e.desc===src.label)&&bonusMonths.has(w.start.slice(0,7)+':'+src.label)
      );
      const weekInAmt=wPay.reduce((s,e)=>s+e.amount,0);
      const weekOutAmt=wOut2.reduce((s,e)=>s+e.amount,0);

      const allWk=[
        ...wPay.map(e=>({...e,kind:'pay'})),
        ...wOut2.map(e=>({...e,kind:'out'}))
      ].sort((a,b)=>a.date.localeCompare(b.date)||(a.kind==='pay'?-1:1));

      const byDay={},dayOrd=[];
      allWk.forEach(ev=>{
        if(!byDay[ev.date]){byDay[ev.date]=[];dayOrd.push(ev.date);}
        byDay[ev.date].push(ev);
      });

      let dayRowsHtml='';
      dayOrd.forEach(date=>{
        const evs=byDay[date];
        const d=new Date(date+'T12:00:00');
        const dayLabel=d.toLocaleDateString('default',{weekday:'short',month:'short',day:'numeric'});
        dayRowsHtml+=`<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:4px 0 1px;margin-top:2px">${dayLabel}</div>`;
        evs.forEach(ev=>{
          if(ev.kind==='pay'){
            running+=ev.amount;
            dayRowsHtml+=`<div style="display:flex;gap:6px;padding:1px 0;align-items:center">
              <span style="flex:1;font-size:12px;font-weight:600">💰 ${esc(ev.desc)}</span>

          } else {
            running-=ev.amount;

            dayRowsHtml+=`<div style="display:flex;gap:6px;padding:1px 0;align-items:center">
              <span style="flex:1;font-size:12px">${esc(ev.desc)}${badge}</span>
              <span style="font-family:var(--mono);font-size:12px;color:var(--red);min-width:68px;text-align:right">-${$f(ev.amount)}</span>
            </div>`;
          }
        });
        dayRowsHtml+=`<div style="display:flex;justify-content:flex-end;padding:1px 0 3px;border-bottom:1px solid var(--border2)">
          <span style="font-family:var(--mono);font-size:11px;color:${running>=0?'var(--text3)':'var(--red)'}">balance ${$f(running)}</span>
        </div>`;
      });

      html+=`<div style="border-top:1px solid var(--border)">
        <div onclick="wiToggleWeek('${wId}')" role="button" style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;background:var(--bg2);user-select:none;-webkit-user-select:none">
          <span style="font-size:14px;line-height:1">${dotChar}</span>
          <span style="font-size:11px;font-weight:600;color:var(--text);flex:1;white-space:nowrap">${w.start.slice(5)} – ${w.end.slice(5)}</span>
          ${bonusInWeek?`<span style="font-size:10px;font-weight:700;color:var(--green);background:rgba(0,200,100,.12);border:1px solid var(--green);border-radius:4px;padding:1px 5px">⭐ Bonus</span>`:''}
          ${weekInAmt?`<span style="font-size:11px;color:var(--green)">+${$f(weekInAmt)}</span>`:''}
          ${weekOutAmt?`<span style="font-size:11px;color:var(--red)">-${$f(weekOutAmt)}</span>`:''}
          ${wEndBal<0?`<span style="font-size:10px;font-weight:700;color:var(--red)">⚠ SHORTFALL</span>`:''}
          <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${wEndColor}">${$f(wEndBal)}</span>
          <span id="pwt_${wId}" style="font-size:11px;color:var(--text3);width:12px;text-align:center">${autoExpand?'▼':'▶'}</span>
        </div>
        <div id="pwb_${wId}" style="padding:4px 12px;display:${autoExpand?'block':'none'}">${dayRowsHtml}</div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  const endColor=running>=startBal?'var(--green)':'var(--red)';
  html+=`<div style="display:flex;align-items:center;gap:14px;padding:10px 0;font-size:13px;border-top:2px solid var(--border);margin-top:4px;flex-wrap:wrap">
    <span style="color:var(--text3)">Total in: <strong style="color:var(--green)">${$f(totalIncome)}</strong></span>
    <span style="color:var(--text3)">Total out: <strong style="color:var(--red)">${$f(totalSpend)}</strong></span>
    ${shortfallCount?`<span style="color:var(--red);font-weight:700">⚠ ${shortfallCount} shortfall week${shortfallCount!==1?'s':''}</span>`:'<span style="color:var(--green)">✓ No shortfalls</span>'}
    <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:${endColor};margin-left:auto">End balance: ${$f(running)}</span>
  </div></div>`;

  // ── Savings Growth Table (Paycheck 1.0 enhanced) ──────────────────────────
  // Include rollover buckets AND any bucket that has an allocation rule (even if not rollover)
  const rulesActive=(S.allocationRules||[]).filter(r=>r.active!==false&&getBucket(r.bucketId)&&!getBucket(r.bucketId).archived);
  const rulesBktIds=new Set(rulesActive.map(r=>r.bucketId));
  const savingsBkts=S.buckets.filter(b=>!b.archived&&(b.rollover||rulesBktIds.has(b.id)));
  if(savingsBkts.length){
    const projMths=[];
    let py=startDate.getFullYear(),pm2=startDate.getMonth();
    const eY=endDate.getFullYear(),eM=endDate.getMonth();
    while(py<eY||(py===eY&&pm2<=eM)){projMths.push({id:mId(py,pm2),label:mLabel(py,pm2)});pm2++;if(pm2>11){pm2=0;py++;}}

    const thCells=projMths.map(m=>`<th style="text-align:right;padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:2px solid var(--border);background:var(--bg);white-space:nowrap">${m.label}</th>`).join('');

    const rows=savingsBkts.map(b=>{
      const curBal=rolloverBal(b.id,S.activeMonth);
      let runBal=curBal;
      const bRules=rulesActive.filter(r=>r.bucketId===b.id);
      const tgt=b.targetAmount||0;
      const goalReached={month:null};

      const cells=projMths.map(pm=>{
        if(!isWIBucketActiveForMonth(b.id,pm.id,scenario)){
          return `<td style="text-align:right;padding:5px 8px;font-family:var(--mono);font-size:12px;color:var(--text3);border-bottom:1px solid var(--border)">—</td>`;
        }
        let contrib=0;
        if(bRules.length){
          // Apply each allocation rule against every paycheck event in this month
          const ymStr=`${pm.id.split('_')[1]}-${String(parseInt(pm.id.split('_')[2])+1).padStart(2,'0')}`;
          const eventsInMonth=payEvents.filter(e=>e.kind==='pay'&&e.date.slice(0,7)===ymStr);
          eventsInMonth.forEach(ev=>{
            bRules.forEach(r=>{
              contrib+=r.type==='pct'?ev.amount*(r.value/100):r.value;
            });
          });
          // If no paycheck events fell in this month, fall back to monthly bucket amount
          if(!eventsInMonth.length)contrib=bktAmt(b);
        } else {
          contrib=bktAmt(b);
        }
        runBal+=contrib;
        if(tgt>0&&!goalReached.month&&runBal>=tgt)goalReached.month=pm.label;
        const goalHit=tgt>0&&runBal>=tgt;
        const cellColor=goalHit?'var(--green)':runBal>curBal?'var(--blue)':'var(--text)';
        const goalIcon=goalHit&&goalReached.month===pm.label?' 🎯':'';
        return `<td style="text-align:right;padding:5px 8px;font-family:var(--mono);font-size:12px;color:${cellColor};border-bottom:1px solid var(--border);white-space:nowrap">${$f(runBal)}${goalIcon}</td>`;
      }).join('');

      // Goal progress label
      let goalLabel='';
      if(tgt>0){
        const pct=Math.min(100,Math.round((curBal/tgt)*100));
        const hitTxt=goalReached.month?`<span style="color:var(--green);font-weight:600"> · goal reached ${goalReached.month}</span>`:`<span style="color:var(--text3)"> · goal: ${$f(tgt)}</span>`;
        goalLabel=`<div style="font-size:10px;color:var(--text3);margin-top:1px">${pct}% of goal${hitTxt}</div>`;
      } else if(bRules.length){
        const ruleDesc=bRules.map(r=>r.type==='pct'?`${r.value}% of pay`:`${$f(r.value)}/pay`).join(', ');
        goalLabel=`<div style="font-size:10px;color:var(--text3);margin-top:1px">Rule: ${ruleDesc}</div>`;
      }
      const typeTag=b.rollover?`<span style="font-size:9px;background:var(--bbg);color:var(--blue);border:1px solid var(--bb);border-radius:3px;padding:1px 4px;margin-left:4px">rollover</span>`:`<span style="font-size:9px;background:var(--pbg);color:var(--purple);border:1px solid var(--pb);border-radius:3px;padding:1px 4px;margin-left:4px">rule</span>`;
      return `<tr><td style="padding:5px 8px;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap">${esc(b.name)}${typeTag}${goalLabel}</td><td style="text-align:right;padding:5px 8px;font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--border)">${$f(curBal)}</td>${cells}</tr>`;
    }).join('');

    html+=`<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px">
      <div style="display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-user-select:none" onclick="const tw=document.getElementById('savingsGrowthTable');const ti=document.getElementById('savingsGrowthToggle');if(tw){const o=tw.style.display!=='none';tw.style.display=o?'none':'block';if(ti)ti.textContent=o?'▶ Show Savings Growth':'▼ Hide Savings Growth';}">
        <div id="savingsGrowthToggle" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3)">▶ Show Savings Growth</div>
        <span style="font-size:11px;color:var(--text3)">(${savingsBkts.length} bucket${savingsBkts.length!==1?'s':''})</span>
      </div>
      <div id="savingsGrowthTable" style="display:none;margin-top:10px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:10px">Contributions calculated per paycheck event using allocation rules. 🎯 marks the month a goal is reached.</div>
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:300px">
          <thead><tr>
            <th style="text-align:left;padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:2px solid var(--border);background:var(--bg)">Bucket</th>
            <th style="text-align:right;padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:2px solid var(--border);background:var(--bg)">Current</th>
            ${thCells}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>
    </div>`;
  }

  // Store result for re-render (inline/reports case)
  _projectorLastResult=html;

  // Inject into the right container
  const inner=document.getElementById('wiModalInner');
  const modal=document.getElementById('modalBox');
  const isStandalone=modal&&modal.innerHTML&&modal.innerHTML.includes('pc1Date');
  if(isStandalone){
    modal.innerHTML=wiProjectorHtml(html,true);
  } else if(inner){
    inner.innerHTML=wiProjectorHtml(html,false);
  }
}

function promoteScenario(){
  if(!S.wiScenario)return;
  if(!confirm('Apply scenario targets to current and future months?'))return;
  const now=new Date();
  S.months.forEach(m=>{
    if(m.year>now.getFullYear()||(m.year===now.getFullYear()&&m.month>=now.getMonth())){
      Object.keys(S.wiScenario.budgets).forEach(bid=>{m.budgets[bid]=S.wiScenario.budgets[bid];});
      if(S.wiScenario.incomeOverrides[m.id]!==undefined)m.projectedIncome=S.wiScenario.incomeOverrides[m.id];
    }
  });
  S.buckets.forEach(b=>{if(S.wiScenario.budgets[b.id]!==undefined)b.defaultBudget=S.wiScenario.budgets[b.id];});
  exitWI();save();render();
}

function gsSetFilter(f,btn){
  _gsFilter=f;

function gsRender(){
  const q=(document.getElementById('gsInput')?.value||'').trim().toLowerCase();
  const el=document.getElementById('gsResults');if(!el)return;
  if(!q){el.innerHTML='<div class="gsearch-empty">Start typing to search across all months…</div>';return;}
  let txs=S.txs.filter(t=>t.type!=='opening');
  if(_gsFilter!=='all')txs=txs.filter(t=>t.type===_gsFilter);
  // Search: desc, bucket name, account name, amount
  txs=txs.filter(t=>{
    if(t.desc&&t.desc.toLowerCase().includes(q))return true;
    if((getBucket(t.bucketId)?.name||'').toLowerCase().includes(q))return true;
    if((getAcct(t.accountId)?.name||'').toLowerCase().includes(q))return true;
    if(String(t.amount).includes(q))return true;
    return false;
  });
  txs.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!txs.length){el.innerHTML=`<div class="gsearch-empty">No transactions matching "${esc(q)}"</div>`;return;}
  let h='';
  const shown=txs.slice(0,100);
  shown.forEach(tx=>{
    const b=getBucket(tx.bucketId);const cat=b?getCat(b.catId):null;
    const color=cat?.color||'var(--text3)';
    const acct=getAcct(tx.accountId);const toAcct=tx.toAccountId?getAcct(tx.toAccountId):null;
    const mo=S.months.find(m=>m.id===tx.monthId);
    const isXfrIn=tx.type==='xfr'&&tx.toAccountId;
    const amtCls=tx.type==='in'?'in':tx.type==='xfr'?'xfr':'out';
    const amtPfx=tx.type==='in'?'+':tx.type==='xfr'?'⇄':'-';
    const metaParts=[];
    if(acct)metaParts.push(esc(acct.name));
    if(b)metaParts.push(`<span style="color:${color}">${esc(b.name)}</span>`);
    if(toAcct)metaParts.push('→ '+esc(toAcct.name));
    h+=`<div class="gsr-row" onclick="gsNavigate('${tx.monthId}','${tx.id}')">
      <div class="gsr-dot" style="background:${color}"></div>
      <div class="gsr-main">
        <div class="gsr-desc">${esc(tx.desc)}</div>
        <div class="gsr-meta">${ld(tx.date)}${metaParts.length?' · '+metaParts.join(' · '):''}</div>
      </div>
      <div class="gsr-right">
        <div class="gsr-amt ${amtCls}">${amtPfx}${$f(tx.amount)}</div>
        <div class="gsr-month">${mo?.label||''}</div>
      </div>
    </div>`;
  });
  if(txs.length>100)h+=`<div class="gsearch-empty" style="padding:12px">Showing 100 of ${txs.length} results — refine your search</div>`;
  el.innerHTML=h;
}
function gsNavigate(monthId,txId){
  closeModal();
  setMonth(monthId);
  // Highlight the transaction after render
  setTimeout(()=>{
    const el=document.querySelector(`[data-txid="${txId}"]`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('tx-highlight');setTimeout(()=>el.classList.remove('tx-highlight'),2000);}
  },200);
}

let _reconChecked=new Set();
function openReconcile(acctId){
  _reconChecked=new Set();
  const a=getAcct(acctId);if(!a)return;
  const modal=document.getElementById('modalBox');
  modal.className='modal recon-modal';
  modal.innerHTML=reconHtml(acctId);
  document.getElementById('overlay').classList.remove('hidden');
}
function reconHtml(acctId){
  const a=getAcct(acctId);
  const clearedBal=acctBalance(acctId);
  const stmtBal=parseFloat(document.getElementById('reconStmtBal')?.value)||0;
  // Unreconciled posted txs for this account
  const txs=S.txs.filter(t=>
    (t.accountId===acctId||t.toAccountId===acctId)&&
    t.type!=='opening'&&!isScheduled(t)&&!t.reconciled
  ).sort((a,b)=>new Date(a.date)-new Date(b.date));
  // Reconciled cleared balance
  const reconBal=S.txs.filter(t=>
    (t.accountId===acctId||t.toAccountId===acctId)&&
    t.type!=='opening'&&t.reconciled
  ).reduce((sum,t)=>{
    if(t.accountId===acctId){return t.type==='in'?sum+t.amount:t.type==='out'||t.type==='xfr'?sum-t.amount:sum;}
    if(t.toAccountId===acctId&&t.type==='xfr')return sum+t.amount;
    return sum;
  },0);
  // Checked sum
  let checkedSum=0;
  _reconChecked.forEach(id=>{
    const tx=S.txs.find(t=>t.id===id);if(!tx)return;
    if(tx.accountId===acctId){if(tx.type==='in')checkedSum+=tx.amount;else if(tx.type==='out'||tx.type==='xfr')checkedSum-=tx.amount;}
    else if(tx.toAccountId===acctId&&tx.type==='xfr')checkedSum+=tx.amount;
  });
  const workingBal=reconBal+checkedSum;
  const stmtVal=parseFloat(document.getElementById('reconStmtBal')?.value)||0;
  const diff=stmtVal-workingBal;
  const diffCls=Math.abs(diff)<0.005?'recon-diff-ok':'recon-diff-bad';

  let txRows='';
  txs.forEach(tx=>{
    const isXfrIn=tx.type==='xfr'&&tx.toAccountId===acctId;
    const amtPfx=tx.type==='in'||isXfrIn?'+':'-';
    const amtCls=tx.type==='in'||isXfrIn?'green':'red';
    const b=getBucket(tx.bucketId);
    const toAcct=tx.toAccountId?getAcct(tx.toAccountId):null;
    const meta=b?esc(b.name):toAcct?'→ '+esc(toAcct.name):'';
    const chk=_reconChecked.has(tx.id);
    txRows+=`<div class="recon-tx-row${chk?' checked':''}" onclick="reconToggle('${tx.id}','${acctId}')">
      <div class="recon-check">${chk?'✓':''}</div>
      <div class="recon-tx-main">
        <div class="recon-tx-desc">${esc(tx.desc)}</div>
        <div class="recon-tx-meta">${ld(tx.date)}${meta?' · '+meta:''}</div>
      </div>
      <div class="recon-tx-amt" style="color:var(--${amtCls})">${amtPfx}${$f(tx.amount)}</div>
    </div>`;
  });

  return `
    <div class="modal-head">
      <div class="modal-title">Reconcile — ${esc(a.name)}</div>
      <button class="modal-x" onclick="closeModal()">&#x2715;</button>
    </div>
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <label style="font-size:12px;color:var(--text3);flex-shrink:0">Statement balance:</label>
      <input id="reconStmtBal" class="fi mono" type="number" step="0.01" placeholder="0.00"
        style="width:140px;margin:0" oninput="reconRefresh('${acctId}')" />
    </div>
    <div class="recon-stat-bar">
      <div class="recon-stat">
        <div class="recon-stat-label">Reconciled</div>
        <div class="recon-stat-val" style="color:var(--green)">${$f(reconBal)}</div>
      </div>
      <div class="recon-stat">
        <div class="recon-stat-label">+ Checked</div>
        <div class="recon-stat-val" style="color:var(--accent)">${$f(checkedSum)}</div>
      </div>
      <div class="recon-stat">
        <div class="recon-stat-label">Working Balance</div>
        <div class="recon-stat-val">${$f(workingBal)}</div>
      </div>
      <div class="recon-stat">
        <div class="recon-stat-label">Difference</div>
        <div class="recon-stat-val ${diffCls}" id="reconDiff">${stmtVal?$f(diff):'—'}</div>
      </div>
    </div>
    <div style="padding:8px 16px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border)">
      Check off each transaction that appears on your bank statement. When the difference reaches $0.00, you're balanced.
    </div>
    <div class="recon-tx-list">${txRows||'<div style="padding:24px 16px;text-align:center;color:var(--text3);font-size:13px">All transactions are already reconciled.</div>'}</div>
    <div class="modal-foot" style="gap:8px">
      <span id="reconStatus" style="flex:1;font-size:12px;color:var(--text3)">${_reconChecked.size} checked</span>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="reconFinish('${acctId}')" ${_reconChecked.size===0?'disabled':''}>Mark Reconciled (${_reconChecked.size})</button>
    </div>`;
}
function reconToggle(txId,acctId){
  if(_reconChecked.has(txId))_reconChecked.delete(txId);else _reconChecked.add(txId);
  reconRefresh(acctId);
}
function reconRefresh(acctId){
  const modal=document.getElementById('modalBox');if(!modal)return;
  const prevBal=document.getElementById('reconStmtBal')?.value||'';
  modal.innerHTML=reconHtml(acctId);
  const inp=document.getElementById('reconStmtBal');if(inp)inp.value=prevBal;
}
function reconFinish(acctId){
  if(!_reconChecked.size)return;
  const stmtBal=parseFloat(document.getElementById('reconStmtBal')?.value)||0;
  _reconChecked.forEach(id=>{
    const tx=S.txs.find(t=>t.id===id);if(tx)tx.reconciled=true;
  });
  _reconChecked.clear();
  save();
  closeModal();
  renderTxList();
  showToast('Transactions reconciled','save');
}

// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// DEBT PAYOFF TRACKER (Phase 8)
// ═══════════════════════════════════════════════════════
// Compute debt payoff projection given balance (positive), monthly rate, monthly net payment
function debtPayoffMonths(balance,monthlyRate,netPayment){
  if(netPayment<=0)return Infinity;
  if(monthlyRate<=0)return Math.ceil(balance/netPayment);
  // Standard amortization: n = -log(1 - r*B/P) / log(1+r)
  const r=monthlyRate;
  if(netPayment<=balance*r)return Infinity; // payment doesn't beat interest
  return Math.ceil(-Math.log(1-(r*balance)/netPayment)/Math.log(1+r));
}
function debtTotalInterest(balance,monthlyRate,netPayment){
  if(netPayment<=0||netPayment<=balance*monthlyRate)return Infinity;
  const months=debtPayoffMonths(balance,monthlyRate,netPayment);
  return Math.max(0,Math.round((netPayment*months-balance)*100)/100);
}
function avgMonthlyNetPayment(acctId){
  // Average net payment over the last 3 months — single pass through transactions
  const now=new Date();
  const monthIds=[];
  for(let i=1;i<=3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    monthIds.push(mId(d.getFullYear(),d.getMonth()));
  }
  const monthSet=new Set(monthIds);
  // Bucket amounts by month in one pass
  const inByMonth={},outByMonth={};
  S.txs.forEach(t=>{
    if(t.type==='opening'||isScheduled(t))return;
    if(!monthSet.has(t.monthId))return;
    // Payments IN (reduce debt) or XFR received (toAccountId = this debt acct)
    if(t.accountId===acctId&&(t.type==='in'||t.type==='xfr'))
      inByMonth[t.monthId]=(inByMonth[t.monthId]||0)+t.amount;
    if(t.toAccountId===acctId&&t.type==='xfr')
      inByMonth[t.monthId]=(inByMonth[t.monthId]||0)+t.amount;
    // Charges OUT (increase debt)
    if(t.accountId===acctId&&t.type==='out')
      outByMonth[t.monthId]=(outByMonth[t.monthId]||0)+t.amount;
  });
  const payments=monthIds.map(mid=>(inByMonth[mid]||0)-(outByMonth[mid]||0)).filter(p=>p!==0);
  if(!payments.length)return 0;
  return Math.round(payments.reduce((s,p)=>s+p,0)/payments.length*100)/100;
}

function renderDebtWI(acctId,balance,monthlyRate,currentPayment,monthlyInterest){
  const extra=parseFloat(document.getElementById('debtExtra_'+acctId)?.value)||0;

}

// DEBT PLANNER (Phase 6)
function _simPayoff(debtList,extraPerMonth){
  let debts=debtList.map(d=>({...d,bal:Math.max(d.balance,0),iPaid:0}));
  let extra=extraPerMonth;
  let month=0;
  const results=[];
  const MAX=600;
  while(debts.length>0&&month<MAX){
    month++;
    debts.forEach(d=>{
      const r=d.apr/100/12;
      const interest=d.bal*r;
      d.bal=Math.round((d.bal+interest)*100)/100;
      d.iPaid=Math.round((d.iPaid+interest)*100)/100;
    });
    debts.forEach(d=>{const pay=Math.min(d.minPayment||0,d.bal);d.bal=Math.round((d.bal-pay)*100)/100;});
    if(debts.length>0){const ep=Math.min(extra,debts[0].bal);debts[0].bal=Math.round((debts[0].bal-ep)*100)/100;}
    const next=[];
    debts.forEach(d=>{
      if(d.bal<=0.01){results.push({id:d.id,name:d.name,payoffMonth:month,interestPaid:d.iPaid});extra+=d.minPayment||0;}
      else next.push(d);
    });
    debts=next;
  }
  debts.forEach(d=>results.push({id:d.id,name:d.name,payoffMonth:Infinity,interestPaid:d.iPaid}));
  return results;
}

function debtPlannerHtml(){
  const debts=S.accounts.filter(a=>a.type==='debt').map(a=>({
    id:a.id,name:a.name,balance:acctBalance(a.id),apr:a.debtAPR||0,minPayment:a.debtMinPayment||0
  })).filter(d=>d.balance>0);
  if(!debts.length)return`<div style="color:var(--text3);padding:16px 0">No active debts to plan.</div>`;
  const extra=_debtExtra;
  const avalanche=[...debts].sort((a,b)=>b.apr-a.apr);
  const snowball=[...debts].sort((a,b)=>a.balance-b.balance);
  const avRes=_simPayoff(avalanche,extra);
  const swRes=_simPayoff(snowball,extra);
  const avTotalInt=avRes.reduce((s,d)=>s+(d.payoffMonth===Infinity?0:d.interestPaid),0);
  const swTotalInt=swRes.reduce((s,d)=>s+(d.payoffMonth===Infinity?0:d.interestPaid),0);
  const avMonths=avRes.filter(d=>d.payoffMonth!==Infinity).reduce((m,d)=>Math.max(m,d.payoffMonth),0);
  const swMonths=swRes.filter(d=>d.payoffMonth!==Infinity).reduce((m,d)=>Math.max(m,d.payoffMonth),0);
  const moToDate=m=>{const d=new Date();d.setMonth(d.getMonth()+m);return d.toLocaleString('default',{month:'short',year:'numeric'});};
  const interestSaved=Math.round((swTotalInt-avTotalInt)*100)/100;
  const avRow=r=>`<tr><td>${esc(r.name)}</td><td>${r.payoffMonth===Infinity?'Never':moToDate(r.payoffMonth)}</td><td style="color:var(--red)">${r.payoffMonth===Infinity?'∞':$f(r.interestPaid)}</td></tr>`;
  const cards=[
    {l:'Avalanche Debt-Free',v:avMonths?moToDate(avMonths):'Never',s:`Total interest: ${$f(avTotalInt)}`,c:'var(--green)'},
    {l:'Snowball Debt-Free',v:swMonths?moToDate(swMonths):'Never',s:`Total interest: ${$f(swTotalInt)}`,c:'var(--green)'},
    ...(interestSaved>0?[{l:'Avalanche Saves',v:$f(interestSaved),s:'in interest vs snowball',c:'var(--green)'}]:[]),
  ].map(({l,v,s,c})=>`<div class="nw-summary" style="flex:1;min-width:140px">
    <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">${l}</div>
    <div style="font-size:16px;font-weight:700;color:${c}">${v}</div>
    <div style="font-size:11px;color:var(--text3)">${s}</div>
  </div>`).join('');
  return`<div style="margin-bottom:16px">
    <label class="fl" style="margin-bottom:4px">Extra monthly payment (beyond minimums)</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input class="fi mono" id="debtExtraInp" type="number" step="10" min="0" value="${extra}" style="width:120px"
        oninput="_debtExtra=Math.max(0,parseFloat(this.value)||0);_refreshDebtPlanner()" />
      <span style="font-size:12px;color:var(--text3)">/ month</span>
    </div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">${cards}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px">⚡ Avalanche (Highest APR First)</div>
      <table class="report-table" style="font-size:12px">
        <thead><tr><th style="text-align:left">Debt</th><th>Payoff</th><th>Interest</th></tr></thead>
        <tbody>${avRes.map(avRow).join('')}</tbody>
      </table>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px">⛄ Snowball (Lowest Balance First)</div>
      <table class="report-table" style="font-size:12px">
        <thead><tr><th style="text-align:left">Debt</th><th>Payoff</th><th>Interest</th></tr></thead>
        <tbody>${swRes.map(avRow).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

  const monthOpts=S.months.map(m=>`<option value="${m.id}"${m.id===mid?' selected':''}>${esc(m.label)}</option>`).join('');
  let total=0;
  const data=sortedCats().map(cat=>{
    const bkts=sortedBuckets(cat.id).filter(b=>!b.archived);
    const spent=bkts.reduce((s,b)=>s+bSpent(mid,b.id),0);
    total+=spent;
    return{cat,spent,bkts};
  }).filter(d=>d.spent>0).sort((a,b)=>b.spent-a.spent);
  if(!data.length)return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">

  const maxSpent=data[0].spent;
  const bars=data.map(({cat,spent,bkts})=>{
    const pct=total?Math.round(spent/total*100):0;
    const barW=maxSpent?Math.round(spent/maxSpent*100):0;
    const bktBreakdown=bkts.filter(b=>bSpent(mid,b.id)>0).map(b=>{
      const bs=bSpent(mid,b.id);
      const bw=spent?Math.round(bs/spent*70):0;
      return`<div style="display:flex;align-items:center;gap:6px;margin-top:3px;padding-left:8px">
        <span style="font-size:11px;color:var(--text3);flex:1">${esc(b.name)}</span>
        <span style="font-size:11px;color:var(--text2)">${$f(bs)}</span>
        <span style="font-size:10px;color:var(--text3);min-width:30px;text-align:right">${spent?Math.round(bs/spent*100):'0'}%</span>
      </div>`;
    }).join('');
    return`<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="flex:1;font-size:13px;font-weight:600;color:${cat.color||'var(--text)'}">${esc(cat.name)}</span>
        <span style="font-size:13px;font-weight:700">${$f(spent)}</span>
        <span style="font-size:12px;color:var(--text3);min-width:36px;text-align:right">${pct}%</span>
      </div>
      <div style="height:8px;border-radius:4px;background:var(--surface2);overflow:hidden;margin-bottom:2px">
        <div style="height:100%;width:${barW}%;background:${cat.color||'var(--accent)'};border-radius:4px"></div>
      </div>${bktBreakdown}</div>`;
  }).join('');
  return`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    <label style="font-size:12px;color:var(--text3)">Month:</label>
    <select class="fi" style="width:auto" onchange="reportsMid=this.value;setReportsTab('catspend')">${monthOpts}</select>
    <span style="font-size:12px;color:var(--text3);margin-left:auto">Total: <strong>${$f(total)}</strong></span>
  </div>${bars}`;
}

function reportSavingsRateHtml(){
  const months=[...S.months].sort((a,b)=>a.id<b.id?-1:1);
  if(!months.length)return`<div style="color:var(--text3);padding:16px">No months available.</div>`;
  let runInc=0,runSpent=0;
  const rows=months.map(mo=>{
    const inc=monthIncome(mo.id);
    const spent=S.buckets.filter(b=>!b.archived).reduce((s,b)=>s+bSpent(mo.id,b.id),0);
    const net=inc-spent,rate=inc?Math.round(net/inc*100):null;
    runInc+=inc;runSpent+=spent;
    const runRate=runInc?Math.round((runInc-runSpent)/runInc*100):null;
    const rc=rate!==null?(rate>=20?'var(--green)':rate>=0?'var(--text)':'var(--red)'):'var(--text3)';
    return`<tr><td>${esc(mo.label)}</td>
      <td style="color:var(--green)">${inc?$f(inc):'—'}</td>
      <td style="color:var(--red)">${spent?$f(spent):'—'}</td>
      <td style="color:${rc};font-weight:600">${rate!==null?rate+'%':'—'}</td>
      <td style="color:var(--text3)">${runRate!==null?runRate+'%':'—'}</td></tr>`;
  }).join('');
  const last3=months.slice(-3);
  const l3inc=last3.reduce((s,mo)=>s+monthIncome(mo.id),0);
  const l3spent=last3.reduce((s,mo)=>s+S.buckets.filter(b=>!b.archived).reduce((ss,b)=>ss+bSpent(mo.id,b.id),0),0);
  const l3net=l3inc-l3spent,l3rate=l3inc?Math.round(l3net/l3inc*100):null;
  const cards=[
    {label:'3-Month Avg Rate',val:l3rate!==null?l3rate+'%':'—',c:l3rate!==null&&l3rate>=0?'var(--green)':'var(--red)'},
    {label:'3-Month Avg Saved',val:last3.length?$f(l3net/last3.length)+'/mo':'—',c:l3net>=0?'var(--green)':'var(--red)'},
  ].map(({label,val,c})=>`<div class="nw-summary" style="flex:1;min-width:140px">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">${label}</div>
    <div style="font-size:22px;font-weight:700;color:${c}">${val}</div></div>`).join('');
  return`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">${cards}</div>
  <div style="overflow-x:auto"><table class="report-table">
    <thead><tr><th style="text-align:left">Month</th><th>Income</th><th>Spent</th><th>Rate</th><th>Rolling Rate</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function reportPayeeBreakdownHtml(){
  const periodOpts=[{v:'month',l:'This Month'},{v:'3m',l:'Last 3 Months'},{v:'6m',l:'Last 6 Months'},{v:'all',l:'All Time'}];
  const now=new Date();
  let txs=S.txs.filter(t=>t.type==='out'&&!isScheduled(t));
  if(_payeePeriod==='month')txs=txs.filter(t=>t.monthId===S.activeMonth);
  else if(_payeePeriod==='3m'){
    const cutoff=new Date(now.getFullYear(),now.getMonth()-3,1).toISOString().slice(0,7).replace('-','-');
    txs=txs.filter(t=>t.monthId>=cutoff);
  }
  else if(_payeePeriod==='6m'){

function reportCatHistoryHtml(){
  const allMonths=[...S.months].sort((a,b)=>a.id<b.id?-1:1);
  const months=allMonths.slice(-_catHistMonths);
  if(!months.length)return`<div style="color:var(--text3);padding:16px">No months available.</div>`;
  const nOpts=[3,6,12,24].map(n=>`<option value="${n}"${n===_catHistMonths?' selected':''}>${n} months</option>`).join('');
  const sCats=sortedCats();
  const catRows=sCats.map(cat=>{
    const bkts=sortedBuckets(cat.id).filter(b=>!b.archived);
    const totals=months.map(mo=>bkts.reduce((s,b)=>s+bSpent(mo.id,b.id),0));
    if(totals.every(v=>v===0))return'';
    const max=Math.max(...totals,1);
    const cells=totals.map((v,i)=>{
      const h=v?Math.round(v/max*32):0;
      const prev=i>0?totals[i-1]:null;
      const trend=prev===null?'':(v>prev?'↑':v<prev?'↓':'');
      const tc=trend==='↑'?'var(--red)':trend==='↓'?'var(--green)':'var(--text3)';
      return`<td style="text-align:right;white-space:nowrap">
        ${v?`<span style="font-size:11px">${$f(v)}</span>`:'<span style="color:var(--text3);font-size:11px">—</span>'}
        ${trend?`<span style="font-size:9px;color:${tc}">${trend}</span>`:''}
      </td>`;
    }).join('');
    return`<tr><td style="color:${cat.color||'var(--text)'};font-weight:600;white-space:nowrap">${esc(cat.name)}</td>${cells}</tr>`;
  }).filter(Boolean).join('');
  const hdrs=months.map(mo=>`<th style="text-align:right;font-size:10px;white-space:nowrap">${esc(mo.label)}</th>`).join('');
  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <label style="font-size:12px;color:var(--text3)">Show:</label>
    <select class="fi" style="width:auto" onchange="_catHistMonths=parseInt(this.value);setReportsTab('cathistory')">${nOpts}</select>
  </div>
  <div style="overflow-x:auto"><table class="report-table">
    <thead><tr><th style="text-align:left">Category</th>${hdrs}</tr></thead>
    <tbody>${catRows||'<tr><td colspan="99" style="color:var(--text3)">No spending data.</td></tr>'}</tbody>
  </table></div>`;
}

      </div>
      <div style="display:flex;gap:8px">
        ${editing?`<button class="btn-cancel" onclick="_editingArId=null;renderSettingsTab(document.getElementById('paneSettings'))">Cancel</button>`:''}
        <button class="btn-primary" onclick="saveAllocationRule()">${editing?'Update Rule':'Add Rule'}</button>
      </div>
    </div>`;
}
function editAllocationRule(id){
  _editingArId=id;
  renderSettingsTab(document.getElementById('paneSettings'));
}
function saveAllocationRule(){
  const name=document.getElementById('newRuleName')?.value.trim();
  const bucketId=document.getElementById('newRuleBkt')?.value;
  const type=document.getElementById('newRuleType')?.value||'pct';
  const value=parseFloat(document.getElementById('newRuleVal')?.value);
  if(!bucketId){alert('Please select a bucket.');return;}
  if(!value||value<=0){alert('Please enter a valid value.');return;}
  if(!S.allocationRules)S.allocationRules=[];
  if(_editingArId){
    const r=(S.allocationRules||[]).find(x=>x.id===_editingArId);
    if(r){r.name=name||r.name;r.bucketId=bucketId;r.type=type;r.value=value;}
    _editingArId=null;
  } else {
    S.allocationRules.push({id:'_ar'+Math.random().toString(36).slice(2,9),name:name||'Rule',bucketId,type,value,active:true});
  }
  save();
  renderSettingsTab(document.getElementById('paneSettings'));
}
function addAllocationRule(){saveAllocationRule();}
function deleteAllocationRule(id){
  S.allocationRules=(S.allocationRules||[]).filter(r=>r.id!==id);
  save();
  renderSettingsTab(document.getElementById('paneSettings'));
}
function toggleAllocationRule(id,active){
  const r=(S.allocationRules||[]).find(x=>x.id===id);
  if(r)r.active=active;
  save();
}
// Called after income is saved — shows apply-rules modal if active rules exist
function promptAllocationRules(incomeAmt,monthId){
  const rules=(S.allocationRules||[]).filter(r=>r.active!==false&&getBucket(r.bucketId));
  if(!rules.length)return;
  const suggestions=rules.map(r=>{
    const amt=r.type==='pct'?Math.round(incomeAmt*(r.value/100)*100)/100:r.value;
    const b=getBucket(r.bucketId);
    return {...r,suggestedAmt:amt,bucketName:b?.name||'',on:true};
  });
  showRuleApplyModal(suggestions,monthId);
}
let _pendingRules=[];
function showRuleApplyModal(suggestions,monthId){
  _pendingRules=suggestions.map(s=>({...s}));
  // Dismiss mobile keyboard so the modal is fully visible
  document.activeElement?.blur();
  const modal=document.getElementById('modalBox');
  modal.className='modal';
  modal.innerHTML=ruleApplyHtml(monthId);
  document.getElementById('overlay').classList.remove('hidden');
}
function ruleApplyHtml(monthId){
  const total=_pendingRules.filter(r=>r.on).reduce((s,r)=>s+r.suggestedAmt,0);
  const rows=_pendingRules.map((r,i)=>`
    <div class="rule-apply-row${r.on?' on':''}" onclick="_pendingRules[${i}].on=!_pendingRules[${i}].on;document.getElementById('modalBox').innerHTML=ruleApplyHtml('${monthId}')">
      <div class="rule-apply-check">${r.on?'✓':''}</div>
      <div class="rule-apply-main">
        <div class="rule-apply-name">${esc(r.name)}</div>
        <div class="rule-apply-detail">${esc(r.bucketName)} · ${r.type==='pct'?r.value+'% of income':'fixed amount'}</div>
      </div>
      <div class="rule-apply-amt">+${$f(r.suggestedAmt)}</div>
    </div>`).join('');
  return `
    <div class="modal-head">
      <div class="modal-title">Apply Allocation Rules?</div>
      <button class="modal-x" onclick="closeModal()">&#x2715;</button>
    </div>
    <div id="ruleApplyModal">
      <div style="padding:10px 16px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border)">
        Income logged. These rules suggest the following allocations — click to toggle each.

function applyAllocationRules(monthId){
  const mo=S.months.find(m=>m.id===monthId);if(!mo)return;
  if(!mo.allocations)mo.allocations={};
  _pendingRules.filter(r=>r.on).forEach(r=>{
    const current=mo.allocations[r.bucketId]||0;
    mo.allocations[r.bucketId]=Math.round((current+r.suggestedAmt)*100)/100;
  });
  const count=_pendingRules.filter(r=>r.on).length;
  save();closeModal();
  render();
  showToast(`Applied ${count} allocation rule${count!==1?'s':''}`, 'save');
  mShowToast('alloc',`${count} allocation rule${count!==1?'s':''} applied`,'');
}

// Pending = auto-generated scheduled tx exists for this bucket in this month
const bucketPendingAmt=(bid,mid)=>
  S.txs.filter(t=>t.bucketId===bid&&t.monthId===mid&&t.autoGenerated&&isScheduled(t)&&t.type!=='opening')
    .reduce((s,t)=>s+t.amount,0);

// Remove auto-generated txs whose date has passed — user handles these manually
function cleanupRecurringTxs(){
  const today=todayStr();
  const before=S.txs.length;
  S.txs=S.txs.filter(t=>!(t.autoGenerated&&t.date<=today));
  return S.txs.length!==before; // returns true if anything was removed
}

// Project each active recurring bill into current+next month as future-dated txs
function generateRecurringTxs(){
  if(!(S.recurringBills||[]).length)return;
  const today=new Date();
  const monthsToCheck=[];
  for(let i=0;i<=1;i++){
    const d=new Date(today.getFullYear(),today.getMonth()+i,1);
    monthsToCheck.push({year:d.getFullYear(),month:d.getMonth()});
  }
  let added=false;
  S.recurringBills.filter(b=>b.active!==false).forEach(bill=>{
    if(!getAcct(bill.accountId))return; // skip if account deleted
    monthsToCheck.forEach(({year,month})=>{
      const maxDay=new Date(year,month+1,0).getDate();
      const day=Math.min(bill.dayOfMonth,maxDay);
      const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if(dateStr<=todayStr())return; // only future dates
      const mid=mId(year,month);
      // Skip if any tx (auto or manual) already links to this bill in this month
      if(S.txs.some(t=>t.recurringBillId===bill.id&&t.monthId===mid))return;
      addMonth(year,month);
      S.txs.push({
        id:'_rg'+Math.random().toString(36).slice(2,9),
        accountId:bill.accountId,toAccountId:null,
        monthId:mid,bucketId:bill.bucketId,
        desc:bill.desc,amount:bill.amount,type:bill.type,
        date:dateStr,recurring:true,
        recurringBillId:bill.id,autoGenerated:true,
      });
      added=true;
    });
  });
  if(added)save();
}

// Called when a bill is edited — regenerate its auto-txs
function refreshRecurringBill(id){
  S.txs=S.txs.filter(t=>!(t.recurringBillId===id&&t.autoGenerated));
  generateRecurringTxs();
}

function saveRecurringBill(){
  const desc=document.getElementById('rbDesc')?.value.trim();
  const amt=parseFloat(document.getElementById('rbAmt')?.value);
  const day=parseInt(document.getElementById('rbDay')?.value);
  const accountId=document.getElementById('rbAcct')?.value;
  const bucketId=document.getElementById('rbBkt')?.value;
  if(!desc){alert('Please enter a description.');return;}
  if(!amt||amt<=0){alert('Please enter a valid amount.');return;}
  if(!day||day<1||day>31){alert('Please enter a day of month (1–31).');return;}
  if(!accountId){alert('Please select an account.');return;}
  if(!bucketId){alert('Please select a bucket.');return;}
  if(!S.recurringBills)S.recurringBills=[];
  if(_editingRbId){
    const r=(S.recurringBills||[]).find(x=>x.id===_editingRbId);
    if(r){r.desc=desc;r.amount=amt;r.dayOfMonth=day;r.accountId=accountId;r.bucketId=bucketId;}
    refreshRecurringBill(_editingRbId);
    _editingRbId=null;
  } else {
    S.recurringBills.push({id:'_rb'+Math.random().toString(36).slice(2,9),desc,amount:amt,dayOfMonth:day,accountId,bucketId,type:'out',active:true});
    generateRecurringTxs();
  }
  save();
  showToast((_editingRbId?'Updated':'Added')+' recurring bill: '+desc,'save');
  renderSettingsTab(document.getElementById('paneSettings'));
  render();
}

function deleteRecurringBill(id){

  S.recurringBills=(S.recurringBills||[]).filter(r=>r.id!==id);
  S.txs=S.txs.filter(t=>!(t.recurringBillId===id&&t.autoGenerated));
  save();
  showToast('Deleted recurring bill'+(bill?' : '+bill.desc:''),'out');
  render();
  renderSettingsTab(document.getElementById('paneSettings'));
}

function toggleRecurringBill(id,active){
  const r=(S.recurringBills||[]).find(x=>x.id===id);

  else refreshRecurringBill(id);
  save();render();
}

  const a1=document.getElementById('mBktAmt1');if(a1)M.bktDueAmount=a1.value;
  const a2=document.getElementById('mBktAmt2');if(a2)M.bktDueAmount2=a2.value;
  const nt=document.getElementById('mBktNotes');if(nt)M.bktNotes=nt.value;
  const g=document.getElementById('mBktGoal');if(g)M.bktGoal=g.value;
  const gd=document.getElementById('mBktDate');if(gd)M.bktDate=gd.value;
  const c=document.getElementById('mBktContrib');if(c)M.bktContrib=c.value;
}
function MsyncSplitTotal(){
  const a1=parseFloat(document.getElementById('mBktAmt1')?.value)||0;
  const a2=parseFloat(document.getElementById('mBktAmt2')?.value)||0;
  const total=Math.round((a1+a2)*100)/100;
  const budgetEl=document.getElementById('mBktBudget');
  const msgEl=document.getElementById('splitTotalMsg');
  if(budgetEl&&total>0){budgetEl.value=total;M.bktBudget=String(total);}
  if(msgEl){msgEl.textContent=total>0?'Total: '+$f(total)+' → synced to budget target':'';}
}

function MpickColor(c){M.catColor=c;if(M.tab==='acct')M.acctColor=c;MsnapBuilder();renderModal();}

function MaddRow(){
  MsnapBuilder();
  M.buckets.push(mkBkt());
  renderModal();
  // Focus the new row's name field
  setTimeout(()=>{
    const idx=M.buckets.length-1;
    document.getElementById(`br_name_${idx}`)?.focus();
  },40);
}

function MremoveRow(i){
  MsnapBuilder();
  M.buckets.splice(i,1);
  if(!M.buckets.length)M.buckets.push(mkBkt());
  renderModal();
}

function MtoggleRecurring(i){
  MsnapBuilder();
  M.buckets[i].recurring=!M.buckets[i].recurring;
  renderModal();
}
function MtoggleRollover(i){
  MsnapBuilder();
  M.buckets[i].rollover=!M.buckets[i].rollover;
  renderModal();
}
function MrowTypeChange(i,v){
  MsnapBuilder();
  M.buckets[i].type=v;
  renderModal();
}

// Contrib tip for a sinking row
function contribTip(row){
  const m=parseFloat(row.budget)||0;
  if(!m)return'';
  const per=row.contrib==='weekly'?+(m/4.33).toFixed(2):row.contrib==='biweekly'?+(m/2).toFixed(2):m;
  return `<div class="contrib-tip">💡 Put aside <strong>${$f(per)}</strong> per ${row.contrib==='weekly'?'week':row.contrib==='biweekly'?'paycheck':'month'}</div>`;
}

function dueOptsHtml(selected){
  let h='<option value="">No due date</option>';
  for(let i=1;i<=31;i++){
    const lbl=i===1?'1st':i===2?'2nd':i===3?'3rd':`${i}th`;
    h+=`<option value="${i}"${String(selected)===String(i)?' selected':''}>${lbl}</option>`;
  }
  h+=`<option value="eom"${selected==='eom'?' selected':''}>End of month</option>`;
  return h;
}
