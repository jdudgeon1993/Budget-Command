.auth-btn:hover{background:var(--accent2);}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;}
.auth-msg{font-size:13px;text-align:center;padding:8px;border-radius:var(--r);margin-top:4px;}
.auth-msg.success{background:var(--gbg);color:var(--green);border:1px solid var(--gb);}
.auth-msg.error{background:var(--rbg);color:var(--red);border:1px solid var(--rb);}
.auth-skip{display:block;text-align:center;font-size:12px;color:var(--text3);margin-top:16px;cursor:pointer;text-decoration:underline;}
.auth-skip:hover{color:var(--text2);}
/* Update banner */
#updateBanner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border-radius:var(--rl);padding:10px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideUp .3s ease;}
#updateBanner.hidden{display:none;}
#updateBanner button{background:rgba(255,255,255,.25);border:none;color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);}
#updateBanner button:hover{background:rgba(255,255,255,.4);}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
/* Expression fx button & popover menu */
.expr-fx-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:var(--accent);opacity:0;transition:opacity .15s;letter-spacing:.3px;font-family:var(--mono);background:none;border:none;cursor:pointer;padding:2px 3px;border-radius:3px;line-height:1;}
.alloc-wrap:focus-within .expr-fx-btn,.expr-fx-btn:hover{opacity:1;}
.expr-fx-btn:hover{background:var(--surface3);}
.expr-menu{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:9000;box-shadow:0 6px 24px rgba(0,0,0,.45);min-width:176px;}
.expr-menu-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:5px;cursor:pointer;background:none;border:none;width:100%;text-align:left;color:var(--text1);font-family:var(--sans);}
.expr-menu-item:hover{background:var(--hover);}
.emi-sym{font-family:var(--mono);font-weight:700;color:var(--accent);font-size:14px;min-width:18px;text-align:center;}
.emi-label{font-size:12px;flex:1;}
.emi-hint{font-family:var(--mono);font-size:11px;color:var(--text3);}
/* Desktop toast */
#dToastWrap{position:fixed;top:60px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9990;pointer-events:none;}
@media(max-width:767px){#dToastWrap{display:none;}}
.d-toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.35);animation:dToastIn .2s ease;min-width:180px;max-width:280px;pointer-events:auto;}
.d-toast.out{animation:dToastOut .3s ease forwards;}
.d-toast-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.d-toast-dot.in{background:var(--green);}
.d-toast-dot.out{background:var(--red);}
.d-toast-dot.xfr{background:var(--purple);}
.d-toast-dot.save{background:var(--accent);}
.d-toast-dot.info{background:var(--amber);}
@keyframes dToastIn{from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:translateX(0);}}
@keyframes dToastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(12px);}}
/* Sync indicator in topbar */
#syncStatus{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:10px;transition:all .3s;}
#syncStatus.synced{background:var(--gbg);color:var(--green);}
#syncStatus.syncing{background:var(--abg);color:var(--amber);}
#syncStatus.offline{background:var(--bg3);color:var(--text3);}
#syncStatus.error{background:var(--rbg);color:var(--red);}
/* ── Payee autocomplete ── */
.payee-dropdown{background:var(--surface);border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.3);overflow:hidden;max-height:280px;overflow-y:auto;}
.payee-drop-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;transition:background .1s;}
.payee-drop-item:hover,.payee-drop-item.hi{background:var(--surface2);}
.pdi-name{flex:1;font-size:13px;color:var(--text);}
.pdi-bkt{font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:8px;}
/* Payee settings */
.payee-settings-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.payee-settings-row:last-child{border-bottom:none;}
.payee-settings-name{flex:1;font-size:13px;color:var(--text);}
.payee-settings-bkt{font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:8px;}
/* ── Global search ── */
.gsearch-modal{max-width:600px;width:95vw;}
.gsearch-input-wrap{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);}
.gsearch-inp{flex:1;background:none;border:none;font-size:16px;color:var(--text);outline:none;font-family:var(--sans);}
.gsearch-filters{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--border);}
.gsearch-fbtn{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:none;font-size:11px;color:var(--text3);cursor:pointer;transition:all .12s;}
.gsearch-fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.gsearch-results{padding:8px 0;max-height:400px;overflow-y:auto;}
.gsearch-empty{padding:32px 16px;text-align:center;color:var(--text3);font-size:13px;}
.gsr-row{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .1s;}
.gsr-row:hover{background:var(--surface2);}
.gsr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gsr-main{flex:1;min-width:0;}
.gsr-desc{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gsr-meta{font-size:11px;color:var(--text3);margin-top:1px;}
.gsr-right{text-align:right;flex-shrink:0;}
.gsr-amt{font-family:var(--mono);font-size:13px;font-weight:600;}
.gsr-amt.in{color:var(--green);}
.gsr-amt.out{color:var(--red);}
.gsr-amt.xfr{color:var(--purple);}
.gsr-month{font-size:10px;color:var(--text3);margin-top:1px;}
/* ── Reconciliation ── */
.recon-modal{max-width:560px;width:95vw;}
.recon-stat-bar{display:flex;gap:12px;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);}
.recon-stat{flex:1;text-align:center;}
.recon-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);}
.recon-stat-val{font-family:var(--mono);font-size:16px;font-weight:700;margin-top:2px;}
.recon-tx-list{max-height:340px;overflow-y:auto;padding:8px 0;}
.recon-tx-row{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .1s;}
.recon-tx-row:hover{background:var(--surface2);}
.recon-tx-row.checked{background:var(--gbg);}
.recon-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--green);background:transparent;transition:all .12s;}
.recon-tx-row.checked .recon-check{border-color:var(--green);background:var(--gbg);}
.recon-tx-main{flex:1;min-width:0;}
.recon-tx-desc{font-size:13px;color:var(--text);}
.recon-tx-meta{font-size:11px;color:var(--text3);}
.recon-tx-amt{font-family:var(--mono);font-size:13px;font-weight:600;}
.recon-diff-ok{color:var(--green);}
.recon-diff-bad{color:var(--red);}
/* ── Spending trend chart ── */
.trend-section{margin-top:18px;}
.trend-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px;}
.trend-chart{display:flex;align-items:flex-end;gap:6px;height:80px;}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.trend-bar-outer{width:100%;flex:1;display:flex;align-items:flex-end;position:relative;}
.trend-bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s;min-height:2px;}
.trend-bar.ok{background:var(--green);}
.trend-bar.warn{background:var(--amber);}
.trend-bar.over{background:var(--red);}
.trend-bar.empty{background:var(--border);}
.trend-budget-line{position:absolute;width:100%;height:2px;background:var(--accent);opacity:.5;bottom:0;}
.trend-label{font-size:9px;color:var(--text3);text-align:center;white-space:nowrap;}
.trend-val{font-size:9px;font-family:var(--mono);color:var(--text3);text-align:center;}
/* ── Net worth ── */
.nw-modal{max-width:640px;width:95vw;}
.nw-summary{display:flex;gap:12px;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);}
.nw-summary-cell{flex:1;text-align:center;}
.nw-summary-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);}
.nw-summary-val{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:4px;}
.nw-history{overflow-x:auto;padding:0 16px 16px;}
.nw-table{width:100%;border-collapse:collapse;font-size:12px;}
.nw-table th{text-align:right;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
.nw-table th:first-child{text-align:left;}
.nw-table td{text-align:right;padding:6px 8px;font-family:var(--mono);border-bottom:1px solid var(--border);white-space:nowrap;}
.nw-table td:first-child{text-align:left;font-family:var(--sans);color:var(--text2);}
.nw-table tr:last-child td{font-weight:700;border-top:2px solid var(--border2);}
/* ── Monthly report ── */
.report-modal{max-width:600px;width:95vw;}
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.report-table th{padding:6px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:2px solid var(--border2);}
.report-table th:first-child{text-align:left;}
.report-table td{padding:6px 10px;text-align:right;font-family:var(--mono);border-bottom:1px solid var(--border);}
.report-table td:first-child{text-align:left;font-family:var(--sans);font-size:12px;color:var(--text2);}
.report-table .report-cat-row td{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);background:var(--surface2);font-family:var(--sans);}
.report-table .report-total-row td{font-weight:700;border-top:2px solid var(--border2);background:var(--surface2);}
.report-copy-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;}
.report-copy-btn:hover{background:var(--surface);color:var(--text);}
/* ── Reports tab nav ── */
.rtab-bar{display:flex;gap:4px;padding:0 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;}
.rtab{background:none;border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:12px;font-family:var(--sans);color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;}
.rtab:hover{background:var(--surface2);color:var(--text);}
.rtab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.rtab-content{min-height:80px;}
/* ── Income allocation rules ── */
.alloc-rule-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.alloc-rule-row:last-child{border-bottom:none;}
.alloc-rule-name{flex:1;font-size:13px;color:var(--text);}
.alloc-rule-badge{font-size:11px;font-family:var(--mono);background:var(--gbg);color:var(--green);padding:2px 7px;border-radius:8px;}
.alloc-rule-bkt{font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:8px;}
/* Rule apply modal */
.rule-apply-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
.rule-apply-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .12s;}
.rule-apply-row.on .rule-apply-check{border-color:var(--green);background:var(--gbg);color:var(--green);}
.rule-apply-main{flex:1;}
.rule-apply-name{font-size:13px;color:var(--text);}
.rule-apply-detail{font-size:11px;color:var(--text3);margin-top:1px;}
.rule-apply-amt{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--green);}
/* ── Debt tracker ── */
.debt-tracker{margin-top:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.debt-tracker-hdr{padding:10px 16px;background:var(--rbg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.debt-tracker-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--red);}
.debt-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);}
.debt-stat{background:var(--surface);padding:10px 12px;text-align:center;}
.debt-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.debt-stat-val{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:3px;}
.debt-wi-section{padding:12px 16px;}
.debt-wi-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px;}
.debt-wi-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.debt-wi-label{font-size:12px;color:var(--text2);flex:1;}
.debt-wi-inp{width:100px;background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:13px;color:var(--text);text-align:right;}
.debt-wi-inp:focus{outline:none;border-color:var(--accent);}
.debt-result{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-top:8px;font-size:12px;}
.debt-result-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);}
.debt-result-row:last-child{border-bottom:none;font-weight:700;}
.debt-result-label{color:var(--text3);}
.debt-result-val{font-family:var(--mono);font-weight:600;}
.debt-payoff-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0;}
.debt-payoff-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s;}
/* WI debt section */
.wi-debt-section{border-top:2px solid var(--border2);margin-top:10px;padding-top:10px;}
.wi-debt-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.wi-debt-row:last-child{border-bottom:none;}
.wi-debt-name{flex:1;font-size:12px;color:var(--text2);}
.wi-debt-amt{font-family:var(--mono);font-size:12px;color:var(--red);}
.wi-debt-freed{font-size:11px;color:var(--green);}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar" id="topbar">
  <div class="tb-logo"><div class="tb-logo-dot"></div>Budget<span style="color:var(--text3);margin:0 3px"> </span>Command</div>
  <!-- Month navigation — visible in topbar on mobile -->
  <div class="tb-month-nav" id="tbMonthNav">
    <button class="tb-month-arrow" onclick="prevMonth()">&#8249;</button>
    <select class="tb-month-sel" id="tbMonthSel" onchange="setMonthFromSel(this.value)"></select>
    <button class="tb-month-arrow" onclick="nextMonth()">&#8250;</button>
    <button class="tb-month-arrow" style="font-size:13px;padding:6px 10px;border-color:var(--border2)" onclick="toggleWI()" id="tbWiMobile">⚡</button>
  </div>
  <!-- Desktop stats -->
  <div class="tb-total">
    <div class="tb-total-label">Total Cash</div>
    <div class="tb-total-val" id="tbTotal">—</div>
  </div>
  <div class="tb-rts">
    <div class="tb-rts-label" id="tbRtsLabel">Ready to Spend</div>
    <div class="tb-rts-val zero" id="tbRTS">—</div>
  </div>
  <div class="tb-wi">
    <button class="tb-wi-btn" id="wiBtnTop" onclick="toggleWI()">⚡ What If</button>
  </div>
  <div class="tb-right">
    <div class="tb-sync" id="tbSyncStatus"><div class="tb-sync-dot off" id="tbSyncDot"></div><span id="tbSyncLabel">Offline</span></div>
    <button class="tbtn" id="authBtn" onclick="authAction()" style="display:none"></button>
    <button class="tbtn tb-new-btn" onclick="openModal('new')" id="tbNewBtn">+ New</button>
  </div>
</header>

<!-- WI STRIP -->
<div class="strip wi hidden" id="wiStrip">
  ⚡ Scenario mode — adjustments won't affect real data
  <button class="tbtn" style="font-size:11px;padding:3px 9px;margin-left:auto;" onclick="promoteScenario()">Promote to template</button>
  <button class="tbtn" style="font-size:11px;padding:3px 9px;" onclick="exitWI()">Exit</button>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- UNIFIED NAV: sidebar on desktop, bottom bar on mobile -->
  <nav class="app-nav" id="appNav">
    <button class="nav-btn active" data-tab="overview" onclick="setTab('overview')">
      <svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="nav-icon-txt">◈</span>
      <span class="nav-label">Overview</span>
      <div class="nav-pip"></div>
    </button>
    <button class="nav-btn" data-tab="buckets" onclick="setTab('buckets')">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="nav-icon-txt">▣</span>
      <span class="nav-label">Buckets</span>
      <div class="nav-pip"></div>
    </button>
    <button class="nav-btn nav-mobile" data-tab="log" onclick="setTab('log')">
      <svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="nav-icon-txt">✚</span>
      <span class="nav-label">Log</span>
      <div class="nav-pip"></div>
    </button>
    <button class="nav-btn" data-tab="ledger" onclick="setTab('ledger')">
      <svg class="nav-svg" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span class="nav-icon-txt">≡</span>
      <span class="nav-label">Ledger</span>
      <div class="nav-pip"></div>
    </button>
    <!-- Desktop-only nav items -->
    <button class="nav-btn" data-tab="accounts" onclick="setTab('accounts')">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>

const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b2p1d2ZvcnJydGV3Y2NxamZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NjYwNzcsImV4cCI6MjA4MjU0MjA3N30.ZE-vLmDg9y4FxLby3AEOGYyJcYLk0Tvazwl94CdzjUI';  // from Settings → API → anon public

function setSyncStatus(state, label){
  // Legacy element (no longer in DOM — keep call harmless)
  const el=document.getElementById('syncStatus');
  if(el){
    if(!supaReady()){el.style.display='none';}
    else{el.style.display='';el.className='';el.classList.add(state);el.textContent=label;}
  }
  // New topbar sync elements
  const dot=document.getElementById('tbSyncDot');
  const lbl=document.getElementById('tbSyncLabel');
  if(!dot||!lbl)return;
  if(state==='synced'){
    dot.className='tb-sync-dot';
    dot.style.background=''; // clear any amber/red inline override
    lbl.textContent='Synced';
  } else if(state==='syncing'){
    dot.className='tb-sync-dot';
    dot.style.background='var(--amber)';
    lbl.textContent='Syncing…';
  } else if(state==='error'){
    dot.className='tb-sync-dot';
    dot.style.background='var(--red)';
    lbl.textContent=label;
  } else {
    // offline / not signed in
    dot.className='tb-sync-dot off';
    dot.style.background='';
    lbl.textContent='Not signed in';
  }
}

async function authInit(){
  if(!supaReady()){
    setSyncStatus('offline','Offline');
    return;
  }

  const client=supaClient();

  // Listen for auth state changes
  client.auth.onAuthStateChange(async(event, session)=>{
    if(event==='SIGNED_IN'||event==='INITIAL_SESSION'){
      if(!session){
        // INITIAL_SESSION with no session — user is not logged in
        document.getElementById('authScreen').classList.remove('hidden');
        setSyncStatus('offline','Not signed in');
        return;
      }
      _supaUser=session.user;
      document.getElementById('authScreen').classList.add('hidden');
      updateAuthBtn();
      if(!_appInitialized){
        _appInitialized=true;
        setSyncStatus('syncing','Syncing…');
        const loaded=await loadFromSupabase();
        if(loaded){
          ensureMonth();
          if(!S.activeMonth||!S.months.find(m=>m.id===S.activeMonth)){
            S.activeMonth=currentMonthId();
          }
          normalizeCatOrder();normalizeBktOrder();
        }
        // Always reset WI session — must not persist across page loads
        S.wiOpen=false;S.scenario=false;S.wiScenario=null;
        if(!S.scenarios)S.scenarios=[];
        setSyncStatus('synced','Synced');
        init();
        if(!S.accounts.length){startWizard();}
      }
    } else if(event==='TOKEN_REFRESHED'){
      // Session silently renewed — push any pending offline changes
      if(_supaUser&&_pendingSync){
        setSyncStatus('syncing','Syncing…');
        await supabase_push();
      }
    } else if(event==='SIGNED_OUT'){
      _supaUser=null;
      _appInitialized=false;
      updateAuthBtn();
      setSyncStatus('offline','Not signed in');
      showAuthSignIn();
      document.getElementById('authScreen').classList.remove('hidden');
    }
  });

  // Check for existing session immediately so we don't flash the auth screen
  const {data:{session}}=await client.auth.getSession();
  if(session){
    _supaUser=session.user;
    updateAuthBtn();
    if(!_appInitialized){
      _appInitialized=true;
      setSyncStatus('syncing','Syncing…');
      const loaded=await loadFromSupabase();
      if(loaded){
        ensureMonth();
        if(!S.activeMonth||!S.months.find(m=>m.id===S.activeMonth)){
          S.activeMonth=currentMonthId();
        }
        normalizeCatOrder();normalizeBktOrder();
      }
      // Always reset WI session — must not persist across page loads
      S.wiOpen=false;S.scenario=false;S.wiScenario=null;
      if(!S.scenarios)S.scenarios=[];
      setSyncStatus('synced','Synced');
      init();
      if(!S.accounts.length){startWizard();}
    }
  } else {
    // No session — auth screen is visible by default, nothing to do
    setSyncStatus('offline','Not signed in');
  }

  // Push pending offline changes when coming back online
  window.addEventListener('online',async()=>{
    if(_supaUser&&_pendingSync){
      setSyncStatus('syncing','Syncing…');
      await supabase_push();
      setSyncStatus('synced','Synced');
    }
  });
  window.addEventListener('offline',()=>{
    setSyncStatus('offline','Offline');
  });
}

  const btn=document.getElementById('authSignInBtn');
  btn.disabled=true;btn.textContent='Signing in…';

  const {error}=await supaClient().auth.signInWithPassword({email,password});
  if(error){

    btn.disabled=false;btn.textContent='Sign In';

  cats:[],       // {id,name,color}

};
// ── Save: localStorage immediately + Supabase async ────────────────────────
function save(){
  if(!_appInitialized)return; // Never save before app is ready (prevents writing during/after signout)
  localStorage.setItem(KEY, JSON.stringify(S));
  localStorage.setItem(KEY+'_local_ts', new Date().toISOString());
  if(supaReady()&&_supaUser){
    _pendingSync=true;
    setSyncStatus('syncing','Syncing…');
    supabase_push().catch(err=>console.warn('Sync failed:',err.message));
  }
}

async function supabase_push(){
  if(!supaReady()||!_supaUser)return;
  const client=supaClient();
  const now=new Date().toISOString();

  // Abort if takes longer than 20 seconds
  const abortTimer=setTimeout(()=>{
    _pendingSync=false;
    setSyncStatus('offline','Sync timed out');
  },20000);

  // Step 1: write
  const {error}=await client
    .from('bcc_budget_state')
    .upsert({user_id:_supaUser.id, data:S, updated_at:now},{onConflict:'user_id'});

  if(error){
    clearTimeout(abortTimer);
    console.warn('Supabase push error:',error.message,'(code:'+error.code+')');
    setSyncStatus('error','Sync error — see console');
    return;
  }

  // Step 2: verify the write landed (catches silent RLS blocks)
  const {data:verify,error:verErr}=await client
    .from('bcc_budget_state')
    .select('updated_at')
    .eq('user_id',_supaUser.id)
    .maybeSingle();

  clearTimeout(abortTimer);

  if(verErr){
    console.warn('Supabase verify error:',verErr.message);
    setSyncStatus('error','Sync unverified — see console');
  } else if(!verify){
    console.warn('Supabase write blocked — row not found after upsert. Check RLS policies.');
    setSyncStatus('error','Sync blocked — check RLS (see console)');
  } else {
    _pendingSync=false;
    localStorage.setItem(KEY+'_saved_at', String(new Date(now).getTime()));
    setSyncStatus('synced','Synced ✓');
    setTimeout(()=>setSyncStatus('synced','●'),4000);
  }
}

// ── Load: Supabase is the source of truth, localStorage is offline fallback ──
async function loadFromSupabase(){
  if(!supaReady())return false;
  const client=supaClient();

  const {data:sessionData}=await client.auth.getSession();
  if(!sessionData?.session?.user)return false;
  _supaUser=sessionData.session.user;

  const {data,error}=await client
    .from('bcc_budget_state')
    .select('data, updated_at')
    .eq('user_id',_supaUser.id)
    .maybeSingle();

  if(error){
    console.warn('Supabase load error:',error.message,'(code:'+error.code+')');
    if(error.code==='42P01'||error.message.includes('does not exist')){
      setSyncStatus('error','Table missing — run SQL setup');
      return false;
    }
    // Network/other error — fall back to localStorage
    console.warn('Falling back to localStorage');
    const raw=localStorage.getItem(KEY);
    if(raw){try{S=JSON.parse(raw);}catch(e){}}
    return true;
  }

  const remote=data?.data;
  const remoteHasData=remote&&typeof remote==='object'&&
    (remote.accounts?.length||remote.cats?.length||remote.months?.length);

  if(remoteHasData){
    // Compare timestamps to avoid overwriting newer local data with older Supabase data (P1-C)
    const remoteTs=new Date(data.updated_at||0).getTime();
    const localTs=new Date(localStorage.getItem(KEY+'_local_ts')||0).getTime();
    if(localTs>remoteTs+5000){
      // Local is meaningfully newer — upload it instead of pulling from Supabase
      const raw=localStorage.getItem(KEY);
      if(raw){try{S=JSON.parse(raw);}catch(e){}}
      console.log('Local data is newer than Supabase — uploading local copy');
      await supabase_push();
    } else {
      // Supabase data is current — use it as source of truth
      S=remote;
      localStorage.setItem(KEY,JSON.stringify(S));
      console.log('Loaded from Supabase');
    }
  } else {
    // Supabase row is empty or missing — check localStorage for existing data to upload
    const raw=localStorage.getItem(KEY);
    if(raw){try{S=JSON.parse(raw);}catch(e){}}
    if(S.accounts?.length||S.cats?.length){
      console.log('No Supabase data — uploading from localStorage');
      await supabase_push();
    }
  }

  // Ensure data integrity — never let these be undefined
  if(!S||typeof S!=='object')S={};
  if(!S.months)S.months=[];
  S.months.forEach(m=>{if(!m.allocations)m.allocations={};});
  if(!S.accounts)S.accounts=[];
  if(!S.cats)S.cats=[];
  if(!S.buckets)S.buckets=[];
  if(!S.txs)S.txs=[];
  if(!S.txFilter)S.txFilter='all';
  if(!S.payees)S.payees=[];
  if(!S.allocationRules)S.allocationRules=[];
  if(!S.recurringBills)S.recurringBills=[];
  cleanupRecurringTxs();
  generateRecurringTxs();

  return true;
}

function load(){
  // Synchronous localStorage load — fast, works offline
  const r6=localStorage.getItem(KEY);
  if(r6){
    try{
      S=JSON.parse(r6);
      S.months.forEach(m=>{if(!m.allocations)m.allocations={};});
    }catch(e){}
  } else {
    const r5=localStorage.getItem('buckets_v5');
    if(r5){migrateV5(r5);}
  }
  ensureMonth();
  if(!S.activeMonth&&S.months.length)S.activeMonth=currentMonthId();
  if(!S.txFilter)S.txFilter='all';
  if(!S.payees)S.payees=[];
  if(!S.allocationRules)S.allocationRules=[];
  if(!S.recurringBills)S.recurringBills=[];
  normalizeCatOrder();
  normalizeBktOrder();
  cleanupRecurringTxs();
  generateRecurringTxs();
}

function migrateV5(raw){
  try{
    const old=JSON.parse(raw);
    // Create default checking account
    const acct={id:'_acct_default',name:'Checking',color:COLORS[0],type:'budget',openingBalance:0};
    S.accounts=[acct];
    S.cats=old.cats||[];
    S.buckets=old.buckets||[];
    S.months=(old.months||[]).map(m=>({...m,allocations:m.allocations||{}}));
    // Assign all txs to default account; fix monthId based on date
    S.txs=(old.txs||[]).map(t=>({
      ...t,
      accountId:acct.id,
      monthId:dateToMonthId(t.date)||t.monthId,
    }));
    S.activeMonth=old.activeMonth;
    S.onboarded=true;
    save();
  }catch(e){console.warn('Migration failed',e);}
}

// ═══════════════════════════════════════════════════════
// MONTH HELPERS
// ═══════════════════════════════════════════════════════
const nowY=()=>new Date().getFullYear();
const nowM=()=>new Date().getMonth();
const mId=(y,m)=>`m_${y}_${m}`;
const currentMonthId=()=>mId(nowY(),nowM());
const mLabel=(y,m)=>new Date(y,m,1).toLocaleString('default',{month:'short',year:'numeric'});
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();

function dateToMonthId(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr+'T12:00:00');
  return mId(d.getFullYear(),d.getMonth());
}

function _inheritProjectedIncome(){
  // Find the most recent month that has projectedIncome set
  const sorted=[...S.months].sort((a,b)=>a.year!==b.year?b.year-a.year:b.month-a.month);
  for(const m of sorted){if(m.projectedIncome!=null)return m.projectedIncome;}
  return null;
}

function ensureMonth(){
  const id=currentMonthId();
  if(!S.months.find(m=>m.id===id)){
    const budgets={},allocations={};
    S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
    const pi=_inheritProjectedIncome();
    const nm={id,label:mLabel(nowY(),nowM()),year:nowY(),month:nowM(),budgets,allocations};
    if(pi!=null)nm.projectedIncome=pi;
    S.months.push(nm);
    S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  }
}

function addNextMonth(){
  const last=S.months[S.months.length-1];
  if(!last){ensureMonth();render();return;}
  let y=last.year,m=last.month+1;if(m>11){m=0;y++;}
  const id=mId(y,m);if(S.months.find(mo=>mo.id===id)){render();return;}
  const budgets={},allocations={};
  S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
  const pi=_inheritProjectedIncome();
  const nm={id,label:mLabel(y,m),year:y,month:m,budgets,allocations};
  if(pi!=null)nm.projectedIncome=pi;
  S.months.push(nm);
  S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  save();render();
}

function _ensureMonthForWI(y,m){
  const id=mId(y,m);
  if(!S.months.find(mo=>mo.id===id)){
    const budgets={},allocations={};
    S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
    const pi=_inheritProjectedIncome();
    const nm={id,label:mLabel(y,m),year:y,month:m,budgets,allocations};
    if(pi!=null)nm.projectedIncome=pi;
    S.months.push(nm);
    S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  }
  return id;
}

function monthStatus(id){
  const m=S.months.find(x=>x.id===id);if(!m)return'present';
  if(m.year===nowY()&&m.month===nowM())return'present';
  if(m.year<nowY()||(m.year===nowY()&&m.month<nowM()))return'past';
  return'future';
}

function resolveDue(b,y,m){if(!b.dueDay)return null;if(b.dueDay==='eom')return lastDay(y,m);return Math.min(parseInt(b.dueDay),lastDay(y,m));}
function daysUntilDue(b,y,m){const d=resolveDue(b,y,m);if(d===null)return null;const due=new Date(y,m,d),now=new Date();now.setHours(0,0,0,0);return Math.round((due-now)/864e5);}

// ═══════════════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════════════
const getMonth=id=>S.months.find(m=>m.id===id);
const getBucket=id=>S.buckets.find(b=>b.id===id);
const getCat=id=>S.cats.find(c=>c.id===id);
const getAcct=id=>S.accounts.find(a=>a.id===id);

function acctBalance(aid){
  const acct=getAcct(aid);if(!acct)return 0;
  // For debt accounts: balance = amount owed (positive). Payments reduce it, charges increase it.
  // mult=-1 flips the sign of each transaction relative to regular account logic.
  const mult=acct.type==='debt'?-1:1;
  const openingTotal=S.txs.filter(t=>t.accountId===aid&&t.type==='opening').reduce((s,t)=>s+t.amount,0);
  let bal=openingTotal>0?openingTotal:(acct.openingBalance||0);
  S.txs.forEach(t=>{
    if(t.type==='opening')return;
    if(isScheduled(t))return;
    if(t.accountId===aid&&t.type==='in')bal+=mult*t.amount;
    if(t.accountId===aid&&t.type==='out')bal-=mult*t.amount;
    if(t.accountId===aid&&t.type==='xfr')bal-=mult*t.amount;
    if(t.toAccountId===aid&&t.type==='xfr')bal+=mult*t.amount;
  });
  return bal;
}

// Total liquid cash = budget + savings accounts only (excludes debt balances)
function totalCash(){return S.accounts.filter(a=>a.type!=='debt').reduce((s,a)=>s+acctBalance(a.id),0);}
function calcNetWorth(){
  // All non-debt account balances + debt account balances (debt balances are negative)
  return S.accounts.reduce((s,a)=>s+acctBalance(a.id),0);
}
function ageOfMoney(){
  // Days = budget balance / avg daily spend over last 30 days
  // Concept: how many days does your current budget balance represent at your spending rate?
  // Green ≥30d (a full month ahead), amber 10–29d, red <10d (near paycheck-to-paycheck)
  const today=new Date();
  const thirtyDaysAgo=new Date(today-30*24*60*60*1000);
  const thirtyStr=thirtyDaysAgo.toISOString().split('T')[0];
  const todStr=todayStr();
  const recentOut=S.txs.filter(t=>
    t.type==='out'&&!isScheduled(t)&&
    t.date>=thirtyStr&&t.date<=todStr&&
    getAcct(t.accountId)?.type==='budget'
  ).reduce((s,t)=>s+t.amount,0);
  const dailyAvg=recentOut/30;
  if(dailyAvg<=0)return null;
  const budgetBal=S.accounts.filter(a=>a.type==='budget').reduce((s,a)=>s+acctBalance(a.id),0);
  if(budgetBal<=0)return 0;
  return Math.round(budgetBal/dailyAvg);
}

// SHARED COMPUTE FUNCTIONS
// Single source of truth for all business logic.
// Both mobile and desktop render paths call these.
// Never duplicate a calculation inside a render function —
// add it here so fixing it once fixes it everywhere.
// ═══════════════════════════════════════════════════════

// All key budget stats for the current month.
// Used by renderOverviewTab (unified overview — all breakpoints).
function computePoolStats(mid){
  const rts=readyToSpend(mid);
  const alloc=totalAllocated(mid);
  const income=monthIncome(mid);
  const activeBkts=S.buckets.filter(b=>!b.archived);
  const totalSpent=activeBkts.reduce((s,b)=>s+bSpent(mid,b.id),0);
  const budgetBal=S.accounts.filter(a=>a.type==='budget').reduce((s,a)=>s+acctBalance(a.id),0);
  const nw=calcNetWorth();
  const aom=ageOfMoney();
  const aomCls=aom===null?'dim':aom>=30?'green':aom>=10?'amber':'red';
  const aomSub=aom===null?'no recent spend':aom>=30?'well buffered':aom>=10?'getting tight':'near paycheck-to-paycheck';
  const fundedCnt=activeBkts.filter(b=>bBudget(mid,b.id)>0&&bAlloc(mid,b.id)>=bBudget(mid,b.id)).length;
  const partialCnt=activeBkts.filter(b=>bAlloc(mid,b.id)>0&&(bBudget(mid,b.id)<=0||bAlloc(mid,b.id)<bBudget(mid,b.id))).length;
  const unfundedCnt=activeBkts.filter(b=>bAlloc(mid,b.id)===0).length;
  const bktHealthCls=fundedCnt===activeBkts.length?'green':unfundedCnt>partialCnt+fundedCnt?'red':'amber';
  return {rts,alloc,income,activeBkts,totalSpent,budgetBal,nw,aom,aomCls,aomSub,fundedCnt,partialCnt,unfundedCnt,bktHealthCls};
}

// Projected income vs. allocation health for a month.
// Returns null when no projected income is set.
// Used by renderBudgetHealth.
function computeBudgetHealth(mid){
  const pi=monthProjectedIncome(mid);
  if(pi===null)return null;
  const alloc=totalAllocated(mid);
  const surplus=pi-alloc;
  const pct=pi>0?Math.min(alloc/pi,1):0;
  const ratio=pi>0?alloc/pi:0;
  const barColor=surplus<0?'var(--red)':ratio>=0.95?'var(--amber)':'var(--green)';
  const surplusColor=surplus>0?'var(--green)':surplus<0?'var(--red)':'var(--text3)';
  const note=Math.round(pct*100)+'% of income allocated'+(surplus<0?' — over budget':ratio>=0.95?' — nearly full':' — on track');
  return {pi,alloc,surplus,pct,ratio,barColor,surplusColor,note};
}

// All numbers for a bucket in a given month.
// Used by renderBucketDetail.
function computeBucketMetrics(bid,mid){
  const b=getBucket(bid);if(!b)return null;
  const cat=getCat(b.catId);
  const color=cat?.color||COLORS[0];
  const alloc=bAlloc(mid,bid);
  const target=bBudget(mid,bid);
  const roll=rolloverBal(bid,mid);
  const eff=alloc+roll;
  const spent=bSpent(mid,bid);
  const avail=eff-spent;
  const pctRaw=eff>0?spent/eff:0;
  const pct=Math.min(pctRaw,1);
  const fillCls=pctRaw>1?'bf-over':pctRaw>0.8?'bf-warn':'bf-ok';
  const fillColor=pctRaw>1?'var(--red)':pctRaw>0.8?'var(--amber)':'var(--green)';
  const isSink=b.type==='sinking';
  const isGoal=b.type==='goal';
  const m=getMonth(mid);
  const days=daysUntilDue(b,m?.year,m?.month);
  const days2=b.dueDay2?daysUntilDue({dueDay:b.dueDay2},m?.year,m?.month):null;
  // Paid detection: if dueAmount set, check spent covers it; otherwise past-due + any spend = assume paid
  const due1Paid=days!==null&&(b.dueAmount>0?spent>=b.dueAmount:(days<0&&spent>0));
  const due2Paid=days2!==null&&(b.dueAmount2>0?spent>=(b.dueAmount||0)+b.dueAmount2:(days2<0&&spent>0));
  const barNote=Math.round(pctRaw*100)+'% spent';
  const remainNote=pctRaw>1?'⚠ over by '+$f(spent-eff):$f(Math.max(eff-spent,0))+' remaining';
  let sinkData=null;
  if(isSink){
    const saved=sinkingSaved(bid,mid);
    const tgt=b.targetAmount||0;
    const td=b.targetDate?new Date(b.targetDate+'-01'):null;
    const now=new Date();
    const mLeft=td?Math.max((td.getFullYear()-now.getFullYear())*12+(td.getMonth()-now.getMonth()),0):0;
    const mNeed=mLeft>0?Math.ceil((tgt-saved)/mLeft):0;
    const contrib=contribAmt(b);
    sinkData={saved,tgt,mLeft,mNeed,contrib};
  }
  let goalData=null;
  if(isGoal){
    const saved=Math.max(sinkingSaved(bid,mid),0);
    const tgt=b.targetAmount||0;
    const td=b.targetDate?new Date(b.targetDate+'-01'):null;
    const now=new Date();
    const mLeft=td?Math.max((td.getFullYear()-now.getFullYear())*12+(td.getMonth()-now.getMonth()),0):null;
    const pctDone=tgt>0?Math.min(saved/tgt,1):0;
    const mNeed=mLeft>0?Math.ceil(Math.max(tgt-saved,0)/mLeft):0;
    goalData={saved,tgt,mLeft,pctDone,mNeed,td};
  }
  return {b,cat,color,alloc,target,roll,eff,spent,avail,pctRaw,pct,fillCls,fillColor,isSink,isGoal,m,days,days2,due1Paid,due2Paid,barNote,remainNote,sinkData,goalData};
}

// Data lookups and derived values for a single transaction row.
// Used by txRowHtml (desktop) and mTxRowHtml (mobile).
// activeAccountId: pass S.activeAccount so transfer direction is correct.
function computeTxMeta(tx,activeAccountId){
  const b=getBucket(tx.bucketId);
  const cat=b?getCat(b.catId):null;
  const acct=getAcct(tx.accountId);
  const toAcct=tx.toAccountId?getAcct(tx.toAccountId):null;
  const color=cat?.color||'var(--text3)';
  const isOpening=tx.type==='opening';
  const sched=isScheduled(tx);
  const isXfrIn=tx.type==='xfr'&&tx.toAccountId===activeAccountId;
  const amtCls=isOpening?'in':tx.type==='xfr'?'xfr':tx.type==='in'?'in':'out';
  const amtPfx=isOpening||tx.type==='in'||isXfrIn?'+':'-';
  // Base indicator color — each renderer applies its own scheduled override
  const indColor=tx.type==='in'||isOpening?'var(--green)':tx.type==='xfr'?'var(--purple)':'var(--red)';
  return {b,cat,acct,toAcct,color,isOpening,sched,isXfrIn,amtCls,amtPfx,indColor};
}

const mTxs=mid=>S.txs.filter(t=>t.monthId===mid);

// Income = only explicit type:'in' txs on budget accounts
// Opening balances, transfers, expenses are all excluded from Ready to Spend
function monthIncome(mid){
  const budgetAccts=new Set(S.accounts.filter(a=>a.type==='budget').map(a=>a.id));
  return mTxs(mid)
    .filter(t=>t.type==='in'&&budgetAccts.has(t.accountId))
    .reduce((s,t)=>s+t.amount,0);
}

function bAlloc(mid,bid){const m=getMonth(mid);return m?(m.allocations[bid]||0):0;}
function bBudget(mid,bid){
  if(S.scenario&&S.wiScenario?.budgets?.[bid]!==undefined)return S.wiScenario.budgets[bid];
  const m=getMonth(mid);return m?(m.budgets[bid]||0):0;
}
// ── Paycheck helpers ──────────────────────────────────────────────────────────
// Generate all pay events from anchorStr forward that fall in [startStr, endStr]
function paycheckEventsInRange(anchorStr,freq,amount,startStr,endStr){
  const events=[];
  const end=new Date(endStr+'T12:00:00');
  if(freq===15){
    let d=new Date(anchorStr+'T12:00:00');
    while(d<=end){
      const ds=d.toISOString().split('T')[0];
      if(ds>=startStr&&ds<=endStr)events.push({date:ds,amount});
      if(d.getDate()<15)d=new Date(d.getFullYear(),d.getMonth(),15);
      else d=new Date(d.getFullYear(),d.getMonth()+1,1);
    }
  } else {
    let d=new Date(anchorStr+'T12:00:00');
    while(d<=end){
      const ds=d.toISOString().split('T')[0];
      if(ds>=startStr&&ds<=endStr)events.push({date:ds,amount});
      d.setDate(d.getDate()+freq);
    }
  }
  return events;
}
// Compute the next pay date on or after today given an anchor date and frequency
function nextPayDateFrom(anchorDate,freq){
  if(!anchorDate)return'';
  const todayDate=new Date(todayStr()+'T12:00:00');
  const freqNum=parseInt(freq)||14;
  if(freqNum===15){
    // Semi-monthly: alternate 1st and 15th, starting from anchor pattern
    let d=new Date(anchorDate+'T12:00:00');
    while(d<todayDate){
      if(d.getDate()<15)d=new Date(d.getFullYear(),d.getMonth(),15);
      else d=new Date(d.getFullYear(),d.getMonth()+1,1);
    }
    return d.toISOString().split('T')[0];
  } else {
    let d=new Date(anchorDate+'T12:00:00');
    while(d<todayDate)d.setDate(d.getDate()+freqNum);
    return d.toISOString().split('T')[0];
  }
}
// Sum all saved paycheck income that falls in the given month
function calcMonthlyPaychecks(mid){
  const pcs=S.paychecks||[];if(!pcs.length)return null;
  const m=getMonth(mid);if(!m)return null;
  const startStr=`${m.year}-${String(m.month+1).padStart(2,'0')}-01`;
  const endStr=`${m.year}-${String(m.month+1).padStart(2,'0')}-${String(lastDay(m.year,m.month)).padStart(2,'0')}`;
  let total=0;
  pcs.forEach(pc=>{
    if(!pc.anchorDate||!pc.amount)return;
    paycheckEventsInRange(pc.anchorDate,pc.freq||14,pc.amount,startStr,endStr).forEach(e=>total+=e.amount);
  });
  return total>0?total:null;
}
// Compare two month IDs ('m_YYYY_M') — returns negative/zero/positive
function compareMid(a,b){
  const pa=a.split('_'),pb=b.split('_');
  const ay=+pa[1],am=+pa[2],by=+pb[1],bm=+pb[2];
  return ay!==by?ay-by:am-bm;
}
// Is a bucket scheduled active in the current WI scenario for a given month?
function isWIBucketActive(bucketId,monthId){
  if(!S.scenario||!S.wiScenario?.bucketSchedule?.[bucketId])return true;
  const s=S.wiScenario.bucketSchedule[bucketId];
  return(!s.onFrom||compareMid(monthId,s.onFrom)>=0)&&(!s.offFrom||compareMid(monthId,s.offFrom)<0);
}
// Same check but against an explicit scenario object (used in projector)
function isWIBucketActiveForMonth(bucketId,monthId,scenario){
  if(!scenario?.bucketSchedule?.[bucketId])return true;
  const s=scenario.bucketSchedule[bucketId];
  return(!s.onFrom||compareMid(monthId,s.onFrom)>=0)&&(!s.offFrom||compareMid(monthId,s.offFrom)<0);
}
// Projected income: manual override wins; otherwise auto-calc from saved paychecks
function monthProjectedIncome(mid){
  const m=getMonth(mid);
  if(m?.projectedIncome!=null)return m.projectedIncome;
  return calcMonthlyPaychecks(mid);
}
function setProjectedIncome(mid,val){
  const m=getMonth(mid);if(!m)return;
  m.projectedIncome=val>0?val:null;
  save();render();
}
// Future-dated transactions are "scheduled" — shown in ledger but excluded from all balance/spend math
const todayStr=()=>new Date().toISOString().split('T')[0];
const isScheduled=tx=>tx.date>todayStr();
const bSpent=(mid,bid)=>mTxs(mid).filter(t=>t.bucketId===bid&&t.type==='out'&&!isScheduled(t)).reduce((s,t)=>s+t.amount,0);
const totalAllocated=mid=>S.buckets.filter(b=>!b.archived).reduce((s,b)=>s+bAlloc(mid,b.id),0);
// Ready to Spend = budget cash minus UNFULFILLED obligations only.
// Paying a budgeted bill reduces budgetBal AND the unfulfilled amount equally,
// so RTS stays stable when spending is on-plan.
// Over-spent buckets are capped at 0 (overage already left via budgetBal).
function readyToSpend(mid){
  const budgetBal=S.accounts
    .filter(a=>a.type==='budget')
    .reduce((s,a)=>s+acctBalance(a.id),0);
  const unfulfilled=S.buckets.filter(b=>!b.archived).reduce((s,b)=>{
    return s+Math.max(0,bAlloc(mid,b.id)-bSpent(mid,b.id));
  },0);
  return budgetBal-unfulfilled;
}

function rolloverBal(bid,mid){
  const m=getMonth(mid);if(!m)return 0;
  const b=getBucket(bid);if(!b||!b.rollover)return 0;
  const prior=S.months.filter(mo=>mo.year<m.year||(mo.year===m.year&&mo.month<m.month));
  return prior.reduce((s,mo)=>{const a=mo.allocations?mo.allocations[bid]||0:0;return s+(a-bSpent(mo.id,bid));},0);
}
// "Saved" for a sinking fund = current available balance (rollover + this month's alloc − spent)
function sinkingSaved(bid,mid){return rolloverBal(bid,mid)+bAlloc(mid,bid)-bSpent(mid,bid);}
// Contribution per pay-period given a monthly target amount
function contribAmt(b){const m=b.defaultBudget||0;if(b.contribFreq==='weekly')return+(m/4.33).toFixed(2);if(b.contribFreq==='biweekly')return+(m*12/26).toFixed(2);return m;}

// FORMAT
// ═══════════════════════════════════════════════════════
const $f=n=>'$'+(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const ld=d=>{if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

// ═══════════════════════════════════════════════════════
// EXPRESSION EVALUATOR
// ═══════════════════════════════════════════════════════
function evalMoneyExpr(expr,currentVal,refVal){
  if(typeof expr!=='string')return currentVal;
  expr=expr.trim();
  if(!expr)return currentVal;
  if(/^[+\-]/.test(expr)){const delta=parseFloat(expr);return isNaN(delta)?currentVal:Math.round((currentVal+delta)*100)/100;}
  if(/^\*/.test(expr)){const factor=parseFloat(expr.slice(1));return isNaN(factor)?currentVal:Math.round(currentVal*factor*100)/100;}
  if(/^\//.test(expr)){const divisor=parseFloat(expr.slice(1));return(!divisor||isNaN(divisor))?currentVal:Math.round(currentVal/divisor*100)/100;}
  if(expr.endsWith('%')){const pct=parseFloat(expr)/100;if(isNaN(pct))return currentVal;const base=(refVal!=null&&refVal>0)?refVal:currentVal;return Math.round(base*pct*100)/100;}
  if(expr.startsWith('=')){const formula=expr.slice(1);if(!/^[\d\s\+\-\*\/\.\(\)]+$/.test(formula))return currentVal;try{const result=Function('"use strict";return('+formula+')')();return(typeof result==='number'&&!isNaN(result))?Math.round(result*100)/100:currentVal;}catch(e){return currentVal;}}
  // Inline math: 50+50, 100-20, 300*1.1, etc. (starts with digit/paren, has an operator)
  if(/^[\d\(]/.test(expr)&&/[\+\-\*\/]/.test(expr)&&/^[\d\s\.\(\)\+\-\*\/]+$/.test(expr)){try{const r=Function('"use strict";return('+expr+')')();if(typeof r==='number'&&!isNaN(r))return Math.round(r*100)/100;}catch(e){}}
  const val=parseFloat(expr);return isNaN(val)?currentVal:val;
}

function getPrevMonthId(mid){
  const idx=S.months.findIndex(m=>m.id===mid);
  return idx>0?S.months[idx-1].id:null;
}

// ── Unified nav + tab routing ─────────────────────────────────────────────────
let activeTab='overview';
let reportsTab='month';
let reportsMid=null;

function renderNav(){
  document.querySelectorAll('.app-nav .nav-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.tab===activeTab);
  });
}

function setTab(tab){
  // Log is mobile-only; redirect desktop to ledger
  if(tab==='log'&&!isMobile())tab='ledger';
  // Animate out current pane
  const curPane=document.getElementById('pane'+capitalize(activeTab));
  curPane?.classList.add('slide-left');
  setTimeout(()=>curPane?.classList.remove('slide-left'),300);
  // Close any open detail
  closeDetail(true);
  activeTab=tab;
  // Clear state on tab change
  if(tab==='ledger'||tab==='log'){S.activeAccount=null;S.activeBucket=null;}
  // Update nav
  renderNav();
  // Swap panes
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  const newPane=document.getElementById('pane'+capitalize(tab));
  if(newPane){newPane.classList.add('active');newPane.scrollTop=0;}
  // Render content
  renderActivePane();
  save();
}

function setReportsTab(t){
  reportsTab=t;
  const p=document.getElementById('paneReports');
  if(p)renderReportsTab(p);
}

function renderActivePane(){
  const mid=S.activeMonth;
  // Save scroll position before re-render (P10-B)
  const paneIdMap={overview:'paneOverview',buckets:'paneBuckets',ledger:'paneLedger',accounts:'paneAccounts',reports:'paneReports',settings:'paneSettings'};
  const activePaneEl=document.getElementById(paneIdMap[activeTab]);
  const savedScroll=activePaneEl?activePaneEl.scrollTop:0;
  if(activeTab==='overview'){
    const p=document.getElementById('paneOverview');if(p)renderOverviewTab(p,mid);
  } else if(activeTab==='buckets'){
    const p=document.getElementById('paneBuckets');if(p)renderBucketsTab(p,mid);
  } else if(activeTab==='log'){
    renderLogPane();
  } else if(activeTab==='ledger'){
    const p=document.getElementById('paneLedger');if(p)renderLedgerTab(p,mid);
  } else if(activeTab==='accounts'){
    const p=document.getElementById('paneAccounts');if(p)renderAccountsTab(p,mid);
  } else if(activeTab==='reports'){
    const p=document.getElementById('paneReports');if(p)renderReportsTab(p);
  } else if(activeTab==='settings'){
    const p=document.getElementById('paneSettings');if(p)renderSettingsTab(p);
  }
  // Restore scroll position (P10-B)
  if(activePaneEl&&savedScroll>0)activePaneEl.scrollTop=savedScroll;
}

function renderMain(){renderActivePane();}
function setDesktopTab(tab){setTab(tab);}
function renderSidebar(){renderNav();}

// ── Detail panel ─────────────────────────��─────────────────────��──────────────
function openDetail(type,id){
  const panel=document.getElementById('detailPanel');
  const scroll=document.getElementById('detailScroll');
  const title=document.getElementById('detailTitle');
  const act=document.getElementById('detailAct');
  scroll.scrollTop=0; // reset scroll when navigating to a new item (P10-C)
  if(type==='bucket'){
    const b=getBucket(id);if(!b)return;
    S.activeBucket=id;S.activeAccount=null;
    title.textContent=b.name;
    act.textContent='Edit';act.onclick=()=>editBucket(id);
    const mid=S.activeMonth;const past=monthStatus(mid)==='past';
    scroll.style.cssText='flex:1;overflow-y:auto;padding:16px 20px;';
    scroll.innerHTML=renderBucketDetail(mid,past,getMonth(mid));
  } else if(type==='account'){
    const a=getAcct(id);if(!a)return;
    S.activeAccount=id;S.activeBucket=null;
    title.textContent=a.name;
    act.textContent='Edit';act.onclick=()=>editAcct(id);
    scroll.style.cssText='flex:1;overflow-y:auto;padding:0;';
    renderAccountView(scroll,S.activeMonth);
  }
  panel.classList.add('active');
  history.pushState({},'','');
}

function closeDetail(noRefresh){
  const panel=document.getElementById('detailPanel');
  if(!panel||!panel.classList.contains('active'))return;
  panel.classList.remove('active');
  if(!noRefresh){
    S.activeBucket=null;S.activeAccount=null;
    save();
    renderActivePane();
  }
}

function populateMonthSel(){
  const sel=document.getElementById('tbMonthSel');
  if(!sel)return;
  sel.innerHTML='';
  S.months.forEach(m=>{
    const opt=document.createElement('option');
    opt.value=m.id;
    opt.textContent=m.label+(monthStatus(m.id)==='present'?' ●':'');
    opt.selected=m.id===S.activeMonth;
    sel.appendChild(opt);
  });
}

function setMonthFromSel(id){
  S.activeMonth=id;S.activeBucket=null;save();

}

function prevMonth(){

  if(idx>0){S.activeMonth=S.months[idx-1].id;S.activeBucket=null;save();renderTopbar();renderActivePane();}

function nextMonth(){

  if(idx<S.months.length-1){S.activeMonth=S.months[idx+1].id;S.activeBucket=null;save();renderTopbar();renderActivePane();}

  h+=`<div class="ov-widget" style="margin-top:12px">

function bucketPillHtml(alloc,spent,eff,target,pend,past,avail){
  if(past&&spent===0&&alloc>0)return`<span class="pill pill-missed">Missed</span>`;
  if(alloc===0&&pend>0)return`<span class="pill pill-pending" title="${$f(pend)} scheduled">⏱ ${$f(pend)}</span>`;
  if(alloc===0)return`<span class="pill pill-empty">Unfunded</span>`;
  if(avail<0)return`<span class="pill pill-over">Over</span>`;
  if(spent>=eff&&eff>0)return`<span class="pill pill-done">Done</span>`;
  if(alloc>=target&&target>0)return`<span class="pill pill-funded">Funded</span>`;
  return`<span class="pill pill-partial">Partial</span>`;
}

function renderBucketsTab(el,mid){
  if(!S.cats.length&&!S.accounts.length){
    el.innerHTML=`<div class="empty-wrap">
      <div class="empty-icon">▣</div>
      <div class="empty-title">No budget yet</div>
      <div class="empty-sub">Add accounts and categories to start budgeting.</div>
      <button class="empty-btn" onclick="openModal('cat')">Add Category</button>
    </div>`;return;
  }
  if(!S.cats.length){
    el.innerHTML=`<div class="empty-wrap">
      <div class="empty-icon">◈</div>
      <div class="empty-title">Add your first category</div>
      <div class="empty-sub">Create categories like Housing, Food, or Savings, then add buckets inside each one.</div>
      <button class="empty-btn" onclick="openModal('cat')">Create category</button>
    </div>`;return;
  }
  if(!mid){el.innerHTML='';return;}
  const m=getMonth(mid);
  const st=monthStatus(mid);
  const past=st==='past';
  const rts=readyToSpend(mid);
  const alloc=totalAllocated(mid);
  const unalloc=S.buckets.filter(b=>!b.archived&&bAlloc(mid,b.id)===0).length;
  const chipTxt=past?'Closed':st==='present'?'Current':'Upcoming';
  const bMidIdx=S.months.findIndex(mn=>mn.id===mid);
  const bPrevM=bMidIdx>0?S.months[bMidIdx-1]:null;
  const bNextM=bMidIdx>=0&&bMidIdx<S.months.length-1?S.months[bMidIdx+1]:null;
  let h=`<div class="month-hdr ov-desktop-only" style="margin-bottom:20px">
    <button class="ov-mnav-btn" onclick="sidebarNavMonth(-1)" ${!bPrevM?'disabled':''} title="${bPrevM?bPrevM.label:'No previous month'}">‹</button>
    <span class="month-title" style="margin:0 10px">${m.label}</span>
    <button class="ov-mnav-btn" onclick="sidebarNavMonth(1)" title="${bNextM?bNextM.label:'Add next month'}">›</button>
    ${!bNextM?`<button class="ov-mnav-add" onclick="addNextMonth()" title="Add next month" style="margin-left:4px">+</button>`:''}
    <span class="chip chip-${st}" style="margin-left:8px">${chipTxt}</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <button class="tbtn" style="font-size:11px;padding:4px 9px" onclick="openRecurringBills()" title="Recurring Bills">⏱ Bills</button>
      <button class="tbtn" style="font-size:11px;padding:4px 9px" onclick="openModal('cat')">+ Category</button>
    </div>
  </div>`;
  if(past)h+=`<div class="notice">🔒 Closed month — read only.</div>`;
  if(!past&&unalloc>0&&rts>0)
    h+=`<div class="hint-bar info">💡 ${$f(rts)} ready to allocate — ${unalloc} bucket${unalloc!==1?'s':''} waiting. Click the Allocated field to assign money.</div>`;
  else if(!past&&rts<0)
    h+=`<div class="hint-bar warn">⚠ Budget short by ${$f(Math.abs(rts))} — remaining obligations exceed your budget balance. Deposit income or reduce allocations.</div>`;
  else if(!past&&rts===0&&alloc>0)
    h+=`<div class="hint-bar success">✓ Every dollar has a job. Budget balanced.</div>`;
  if(!S.buckets.filter(b=>!b.archived).length){
    h+=`<div class="empty-wrap" style="min-height:160px;padding:30px 0;">
      <div class="empty-title" style="font-size:15px">No buckets yet</div>
      <div class="empty-sub" style="font-size:13px;margin-bottom:14px">Add buckets to categories to start tracking.</div>
      <button class="empty-btn" onclick="openModal('bkt')">Add a bucket</button>
    </div>`;el.innerHTML=h;return;
  }
  // Category sections — div-based, works on all breakpoints
  sortedCats().forEach(cat=>{
    const catBuckets=sortedBuckets(cat.id);
    if(!catBuckets.length)return;
    const color=cat.color||COLORS[0];
    const catAlloc=catBuckets.reduce((s,b)=>s+bAlloc(mid,b.id),0);
    const catTarget=catBuckets.reduce((s,b)=>s+bBudget(mid,b.id),0);
    const sorted=[...catBuckets].sort((a,b)=>{
      const da=daysUntilDue(a,m.year,m.month);
      const db=daysUntilDue(b,m.year,m.month);
      if(da!==null&&da<=0&&(db===null||db>0))return -1;
      if(db!==null&&db<=0&&(da===null||da>0))return 1;
      return (a.order??0)-(b.order??0);
    });

    const catAnomaly=catAnomalyCheck(cat.id,mid);
    const catFundAmt=catBuckets.reduce((s,b)=>{const a=bAlloc(mid,b.id),t=bBudget(mid,b.id);return s+(a===0&&t>0?t:0);},0);
    const catAllocPct=catTarget>0?Math.min(catAlloc/catTarget,1):0;
    const catBarColor=catAllocPct>=1?'var(--green)':catAllocPct>=0.5?'var(--accent)':'var(--amber)';
    const catAllocColor=catTarget>0?(catAlloc>=catTarget?'var(--green)':catAlloc>0?'var(--amber)':'var(--text3)'):'var(--text3)';
    h+=`<div class="bkt-cat">
      <div class="bkt-cat-hdr">
        <div class="bkt-cat-dot" style="background:${color}"></div>
        <span class="bkt-cat-name">${esc(cat.name)}</span>
        ${catAnomaly?`<span title="${catAnomaly.z}σ above 12-month average — ${$f(catAnomaly.excess)} more than usual" style="font-size:10px;font-weight:700;color:var(--amber);background:rgba(220,160,0,.12);border:1px solid rgba(220,160,0,.3);border-radius:4px;padding:1px 5px;cursor:default;flex-shrink:0">⚠ Spike</span>`:''}
        <span class="bkt-cat-totals" style="color:${catAllocColor}">${$f(catAlloc)}<span style="color:var(--text3);font-weight:400"> / ${$f(catTarget)}</span></span>
        ${!past&&catFundAmt>0?`<button class="fund-btn" onclick="event.stopPropagation();fundCategory('${cat.id}','${mid}')">Fund ${$f(catFundAmt)}</button>`:''}
      </div>
      ${catTarget>0?`<div style="height:2px;background:var(--border2);margin:0 16px 0;overflow:hidden"><div style="height:100%;width:${Math.round(catAllocPct*100)}%;background:${catBarColor};transition:width .3s"></div></div>`:''}
      <div class="bkt-col-hdr">
        <div style="width:3px;flex-shrink:0"></div>
        <span style="flex:1">Bucket</span>
        <span style="width:108px">Allocated</span>
        <span style="width:58px">Progress</span>
        <span style="width:72px;text-align:right">Spent</span>
        <span style="width:72px;text-align:right">Available</span>
        <span style="width:58px;text-align:right"></span>
      </div>`;

    sorted.forEach(b=>{
      const alloc=bAlloc(mid,b.id);
      const target=bBudget(mid,b.id);
      const roll=rolloverBal(b.id,mid);
      const eff=alloc+roll;
      const spent=bSpent(mid,b.id);
      const avail=eff-spent;
      const pctRaw=eff>0?spent/eff:0;
      const pct=Math.min(pctRaw,1);
      const fillCls=pctRaw>1?'bf-over':pctRaw>0.8?'bf-warn':'bf-ok';
      const fillColor=pctRaw>1?'var(--red)':pctRaw>0.8?'var(--amber)':'var(--green)';
      const days=daysUntilDue(b,m.year,m.month);
      let dueHtml='';
      if(days!==null){const cls=days<0?'urgent':days<=7?'soon':'ok';const txt=days<0?`${Math.abs(days)}d overdue`:days===0?'due today':`due ${days}d`;dueHtml=`<span class="bndue ${cls}">${txt}</span>`;}
      const tags=[];
      if(b.type==='sinking')tags.push('saving');
      if(b.type==='goal')tags.push('goal');
      if(b.recurring)tags.push('↻');
      if(roll>0)tags.push(`+${$f(roll)} rolled`);
      const trend=bucketMoMTrend(b.id,mid);
      if(trend&&Math.abs(trend.pct)>=10){const tc=trend.pct>0?'var(--red)':'var(--green)';tags.push(`<span style="color:${tc};font-size:10px">${trend.pct>0?'↑':'↓'}${Math.abs(trend.pct)}%</span>`);}

      const pend=bucketPendingAmt(b.id,mid);
      const pillHtml=bucketPillHtml(alloc,spent,eff,target,pend,past,avail);

      const allocCls=alloc===0?'':alloc>=target?'funded':'';
      const availCls=avail>0?'green':avail<0?'red':'muted';

      h+=`<div class="bkt-row${S.activeBucket===b.id?' act':''}" onclick="setBucket('${b.id}')" tabindex="0" onkeydown="if(event.key==='Enter'&&event.target===this)setBucket('${b.id}')">
        <div class="bkt-accent" style="background:${color}"></div>
        <div class="bkt-name-col">
          <div class="bkt-row-label">${esc(b.name)}</div>
          <div class="bkt-row-sub">${tags.map(t=>`<span class="bntag">${t}</span>`).join('')}${dueHtml}</div>
        </div>
        <div class="bkt-alloc-col" onclick="event.stopPropagation()">
          ${past?`<span class="tv dim">${$f(alloc)}</span>`:`
          <div class="alloc-wrap">
            <span class="alloc-pfx">$</span>
            <input class="alloc-inp ${allocCls}" type="text" inputmode="decimal"
              value="${alloc||''}" placeholder="0"
              onchange="(function(inp){var cur=bAlloc('${mid}','${b.id}');var ref=monthProjectedIncome('${mid}');var v=evalMoneyExpr(inp.value,cur,ref);inp.value=v;setAlloc('${mid}','${b.id}',v);})(this)"
              onkeydown="if(event.key==='Enter'){event.stopPropagation();event.preventDefault();this.dispatchEvent(new Event('change'));var _a=[...document.querySelectorAll('.alloc-inp')];var _i=_a.indexOf(this);if(_i>-1&&_i<_a.length-1)_a[_i+1].focus();else this.blur();}"
              onfocus="this.select()" />
            <button type="button" class="expr-fx-btn" title="Expression options" onmousedown="event.preventDefault()" onclick="event.stopPropagation();toggleExprMenu(this)">𝑓x</button>
          </div>`}
        </div>
        <div class="bkt-bar-col">
          <div class="bbar"><div class="bbar-fill ${eff>0?fillCls:'bf-ok'}" style="width:${eff>0?Math.round(pct*100):0}%"></div></div>
        </div>
        <div class="bkt-spent-col">${spent>0?$f(spent):'—'}${target>0?`<div class="tv-sub" style="font-size:10px">of ${$f(target)}</div>`:''}</div>
        <div class="bkt-avail-col"><span class="tv ${availCls}">${eff>0||spent>0?$f(avail):'—'}</span></div>
        <div class="bkt-pill-col">${pillHtml}</div>
        <div class="bkt-compact">
          <div class="bkt-compact-alloc" style="color:${availCls==='green'?'var(--green)':availCls==='red'?'var(--red)':'var(--text)'}">${eff>0||spent>0?$f(avail):'—'}</div>
          <div>${pillHtml}</div>
          <div class="bkt-mini-bar" style="width:56px"><div class="bkt-mini-fill" style="width:${eff>0?Math.round(pct*100):0}%;background:${fillColor}"></div></div>
        </div>
        <div class="bkt-chevron">›</div>
      </div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
  setTimeout(wireAllocKeys,50);
}

function bhStartEdit(mid){
  const pi=monthProjectedIncome(mid);
  const wrap=document.querySelector(`.bh-wrap`);
  if(!wrap)return;
  const valEl=document.getElementById(`bhVal_${mid}`);
  const promptEl=wrap.querySelector('.bh-set-prompt');
  const target=valEl||promptEl;
  if(!target)return;
  const inp=document.createElement('input');
  inp.className='bh-income-inp';
  inp.type='text';
  inp.inputMode='decimal';
  inp.value=pi||'';
  inp.placeholder='Enter income...';
  inp.title='Math: +50, -20, *1.05, 5% of prev income, =100+50';
  target.replaceWith(inp);
  inp.focus();inp.select();
  const commit=()=>{
    const current=monthProjectedIncome(mid)||0;
    const prevMid=getPrevMonthId(mid);
    const ref=prevMid?(monthProjectedIncome(prevMid)||0):null;
    const v=evalMoneyExpr(inp.value,current,ref);
    setProjectedIncome(mid,v);
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){inp.blur();}});
}

function renderAccountView(el,mid){
  const a=getAcct(S.activeAccount);if(!a){clearActive();return;}
  const bal=acctBalance(a.id);
  const past=mid?monthStatus(mid)==='past':false;
  // All txs for this account, newest first
  const allTxs=S.txs.filter(t=>t.accountId===a.id||t.toAccountId===a.id)
    .sort((x,y)=>new Date(y.date)-new Date(x.date)||y.id.localeCompare(x.id));
  const posted=allTxs.filter(t=>!isScheduled(t));
  const scheduled=allTxs.filter(t=>isScheduled(t)).sort((x,y)=>new Date(x.date)-new Date(y.date));
  const {balMap,schedMap}=calcAccountRunningBal(a.id);

  const totalIn=posted.filter(t=>t.type!=='opening'&&((t.accountId===a.id&&t.type==='in')||(t.toAccountId===a.id&&t.type==='xfr'))).reduce((s,t)=>s+t.amount,0);
  const totalOut=posted.filter(t=>t.type!=='opening'&&t.accountId===a.id&&(t.type==='out'||t.type==='xfr')).reduce((s,t)=>s+t.amount,0);

  let h=`<button class="back-btn" onclick="clearActive()">← Accounts</button>
  <div class="acct-hdr">
    <div style="width:12px;height:12px;border-radius:50%;background:${a.color};flex-shrink:0"></div>
    <div class="acct-hdr-name">${esc(a.name)}</div>
    <span class="chip ${a.type==='debt'?'chip-future':a.type==='savings'?'chip-future':'chip-present'}">${a.type}</span>
    <button class="tbtn" style="margin-left:auto" onclick="editAcct('${a.id}')">Edit account</button>
    <button class="tbtn" onclick="openReconcile('${a.id}')" title="Reconcile against bank statement">✓ Reconcile</button>
  </div>
  ${a.type==='debt'?renderDebtTracker(a):''}
  <div class="acct-balance-block">
    <div class="ps-cell hi"><div class="ps-label">${a.type==='debt'?'Amount Owed':'Available in Account'}</div><div class="ps-val ${bal>=0?'green':'red'}" style="font-size:22px">${$f(bal)}</div><div class="ps-sub">${a.type==='budget'?'your spending ceiling here':a.type==='savings'?'parked — not in RTS pool':'physical balance'}</div></div>
    <div class="ps-cell"><div class="ps-label">Total In (all time)</div><div class="ps-val dim">${$f(totalIn)}</div></div>
    <div class="ps-cell"><div class="ps-label">Total Out (all time)</div><div class="ps-val dim">${$f(totalOut)}</div></div>
  </div>`;

  if(scheduled.length){
    h+=`<div class="det-block">
    <div class="det-block-title" style="color:var(--accent)">Scheduled / Upcoming</div>
    <div class="tx-list" style="padding:0">`;
    scheduled.forEach(tx=>{
      h+=txRowHtml(tx,past,true,schedMap.get(tx.id)??null,true);
    });
    h+=`</div></div>`;
  }

  h+=`<div class="det-block" style="padding:0">
    <div class="det-block-title" style="padding:10px 14px 8px">All Transactions</div>
    <div class="tx-list" style="padding:0">`;
  if(!posted.length){
    h+=`<div style="padding:20px 0;text-align:center;font-size:13px;color:var(--text3)">No posted transactions yet</div>`;
  } else {
    posted.slice(0,100).forEach(tx=>{
      h+=txRowHtml(tx,past,false,balMap.get(tx.id)??null,true);
    });
    if(posted.length>100){
      h+=`<div style="padding:12px 14px;font-size:12px;color:var(--text3);text-align:center">Showing 100 of ${posted.length} transactions</div>`;
    }
  }
  h+=`</div></div>`;
  el.innerHTML=h;
}

        onkeydown="if(event.key==='Enter')updateBudget('${b.id}')" />
      <button class="tbtn" style="font-size:12px;padding:5px 9px" onclick="updateBudget('${b.id}')">Set</button>
    </div>`;
  }
  // Smart target suggestion (Phase 9)
  if(!isSink&&!isGoal&&!past){
    const sugg=bucketSpendSuggestion(b.id,mid);
    if(sugg&&Math.abs(sugg.suggested-(target||0))>5){
      h+=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="flex:1;font-size:12px;color:var(--text3)">💡 6-mo avg: <strong style="color:var(--text)">${$f(sugg.avg)}</strong> → suggested target ${$f(sugg.suggested)}</span>
        <button class="tbtn" style="font-size:11px;padding:3px 9px;white-space:nowrap" onclick="applySmartTarget('${b.id}',${sugg.suggested})">Apply ${$f(sugg.suggested)}</button>
      </div>`;
    }
  }
  // Anomaly alert (Phase 9)
  const anomaly=catAnomalyCheck(b.catId,mid);
  if(anomaly){
    h+=`<div style="background:color-mix(in srgb,var(--amber) 10%,transparent);border:1px solid var(--amber);border-radius:var(--r);padding:8px 12px;margin-top:6px;font-size:12px">
      ⚠ <strong style="color:var(--amber)">Unusual spending</strong> — category is ${anomaly.z}σ above the 12-month average (${$f(anomaly.excess)} more than usual)
    </div>`;
  }
  // Spending trend — last 6 completed months
  const trendMonths=S.months.filter(mo=>monthStatus(mo.id)==='past').slice(-6);
  if(trendMonths.length>=2){
    const trendData=trendMonths.map(mo=>({
      label:mo.label.slice(0,3),
      spent:bSpent(mo.id,b.id),
      budget:bBudget(mo.id,b.id)
    }));
    const maxVal=Math.max(...trendData.map(d=>Math.max(d.spent,d.budget)),1);
    let bars='';
    trendData.forEach(d=>{
      const h=Math.round((d.spent/maxVal)*100);
      const bh=Math.round((d.budget/maxVal)*100);
      const cls=d.spent===0?'empty':d.spent>d.budget&&d.budget>0?'over':d.spent>d.budget*0.8?'warn':'ok';
      bars+=`<div class="trend-bar-wrap">
        <div class="trend-bar-outer">
          <div class="trend-bar ${cls}" style="height:${h}%"></div>
          ${d.budget>0?`<div class="trend-budget-line" style="bottom:${bh}%"></div>`:''}
        </div>
        <div class="trend-label">${d.label}</div>
        <div class="trend-val">${d.spent>0?'$'+Math.round(d.spent):''}</div>
      </div>`;
    });
    h+=`<div class="trend-section">
      <div class="trend-title">Spending History <span style="font-weight:400;color:var(--text3)">— dashed line = budget</span></div>
      <div class="trend-chart">${bars}</div>
    </div>`;
  }
  return h;
}

// Running account balance for each tx — only used in account view
// Returns {balMap: Map(txId→balAfter), schedMap: Map(txId→projBalAfter)}
function calcAccountRunningBal(aid){
  const acct=getAcct(aid);
  const mult=(acct&&acct.type==='debt')?-1:1;
  const cleared=acctBalance(aid);
  const balMap=new Map();
  const schedMap=new Map();

  // Posted: walk backwards from current cleared balance.
  // Sort must exactly match renderAccountView's display order so balMap[id] lines up correctly.
  const posted=S.txs.filter(t=>
    (t.accountId===aid||t.toAccountId===aid)&&t.type!=='opening'&&!isScheduled(t)
  ).sort((a,b)=>new Date(b.date)-new Date(a.date)||b.id.localeCompare(a.id));
  let bal=cleared;
  posted.forEach(t=>{
    balMap.set(t.id,bal);
    if(t.accountId===aid){
      if(t.type==='in')bal-=mult*t.amount;
      if(t.type==='out')bal+=mult*t.amount;
      if(t.type==='xfr')bal+=mult*t.amount;
    }
    if(t.toAccountId===aid&&t.type==='xfr')bal-=mult*t.amount;
  });

  // Scheduled: project forward from cleared balance
  let proj=cleared;
  S.txs.filter(t=>
    (t.accountId===aid||t.toAccountId===aid)&&isScheduled(t)
  ).sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(t=>{
    if(t.accountId===aid){
      if(t.type==='in')proj+=mult*t.amount;
      if(t.type==='out')proj-=mult*t.amount;
      if(t.type==='xfr')proj-=mult*t.amount;
    }
    if(t.toAccountId===aid&&t.type==='xfr')proj+=mult*t.amount;
    schedMap.set(t.id,proj);
  });

  return {balMap,schedMap};
}

function renderTxList(){

  let txs=S.txs.filter(t=>{
    if(S.activeAccount)return t.accountId===S.activeAccount||t.toAccountId===S.activeAccount;
    return t.monthId===mid;
  });

  // Running balance maps — only computed when viewing a single account
  const runBals=S.activeAccount?calcAccountRunningBal(S.activeAccount):{balMap:new Map(),schedMap:new Map()};

  const filter=S.txFilter||'all';
  if(filter==='in')txs=txs.filter(t=>t.type==='in');
  if(filter==='out')txs=txs.filter(t=>t.type==='out');

  txs=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(!txs.length){list.innerHTML=`<div class="tx-empty">No transactions${search?` matching "${esc(search)}"`:''}.<br>${past?'Month is closed.':'Log one above.'}</div>`;return;}

  // Split into scheduled (future) and posted (today or earlier)
  const today=todayStr();
  const scheduled=txs.filter(t=>t.date>today);
  const posted=txs.filter(t=>t.date<=today);

  // Summary bar (month view only — account view uses balance badge)
  const summaryBar=document.getElementById('txSummaryBar');
  if(summaryBar){
    if(!S.activeAccount&&(posted.length||scheduled.length)){
      const sIn=posted.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
      const sOut=posted.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
      const sNet=sIn-sOut;
      summaryBar.innerHTML=`<div style="display:flex;gap:14px;align-items:center;padding:5px 14px;font-size:11px;background:var(--bg3);border-bottom:1px solid var(--border)">
        <span>↓ <strong style="font-family:var(--mono);color:var(--green)">${$f(sIn)}</strong></span>
        <span>↑ <strong style="font-family:var(--mono);color:var(--red)">${$f(sOut)}</strong></span>
        <span style="margin-left:auto;color:var(--text3)">${posted.length} posted</span>
        <span style="font-family:var(--mono);font-weight:700;color:${sNet>=0?'var(--green)':'var(--red)'}">${sNet>=0?'+':''}${$f(sNet)}</span>
      </div>`;
    } else {
      summaryBar.innerHTML='';
    }
  }
  // Search clear button visibility
  const clearBtn=document.getElementById('rpSearchClear');
  if(clearBtn)clearBtn.style.display=search?'block':'none';

  const groups={};
  posted.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});
  let h='';

  // Scheduled section at the top
  if(scheduled.length){
    h+=`<div class="tx-scheduled-hdr">⏱ Scheduled <span style="font-weight:400;opacity:.7">(not yet affecting balances)</span></div>`;
    scheduled.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(tx=>{
      const projBal=runBals.schedMap.has(tx.id)?runBals.schedMap.get(tx.id):null;
      h+=txRowHtml(tx,past,true,projBal);
    });
    if(posted.length)h+=`<div style="padding:4px 12px 3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border)">Posted</div>`;
  }

  Object.keys(groups).sort((a,b)=>new Date(b)-new Date(a)).forEach(date=>{
    h+=`<div class="tx-date-hdr">${ld(date)}</div>`;
    groups[date].forEach(tx=>{
      const rb=runBals.balMap.has(tx.id)?runBals.balMap.get(tx.id):null;
      h+=txRowHtml(tx,past,false,rb);
    });
  });
  list.innerHTML=h;
}

  const editFn=(past||forceModal)?'openTxEditModal':'editTx';

  if(tx.recurring)metaLine+=`<span class="tx-dot2"></span><span style="color:var(--accent)">↻</span>`;
  // Running balance line — only shown in account view (runBal !== null)
  const balLine=runBal!==null
    ?`<div class="tx-run-bal${sched?' proj':runBal<0?' neg':''}">${sched?'~':''}${$f(runBal)}</div>`
    :'';
  return `<div class="tx-row${sched?' tx-sched':''}" data-txid="${tx.id}">
    <div class="tx-indicator" style="background:${sched?'var(--border2)':indColor}"></div>
    <div class="tx-l">
      <div class="tx-name">${esc(tx.desc)}</div>
      <div class="tx-meta">${metaLine||'<span style="color:var(--text3)">—</span>'}</div>
    </div>
    <div class="tx-r">
      <div class="tx-amt ${sched?'muted':amtCls}">${amtPfx}${$f(tx.amount)}</div>
      ${balLine}
    </div>
    <div class="tx-acts">
      ${tx.reconciled?'<span title="Reconciled" style="font-size:10px;color:var(--green);padding:0 4px">✓</span>':''}
      ${!tx.autoGenerated?(!tx.reconciled?`<button class="ib" onclick="${editFn}('${tx.id}')">✎</button><button class="ib del" onclick="delTx('${tx.id}')">×</button>`:`<button class="ib" onclick="${editFn}('${tx.id}')">✎</button>`):''}
    </div>
  </div>`;
}

// Phase 9: Statistical Intelligence helpers
function bucketSpendSuggestion(bid,mid){
  const all=[...S.months].sort((a,b)=>a.id<b.id?-1:1);
  const ci=all.findIndex(m=>m.id===mid);if(ci<0)return null;
  const prev=all.slice(Math.max(0,ci-6),ci);if(prev.length<3)return null;
  const spends=prev.map(mo=>bSpent(mo.id,bid));
  const nonZero=spends.filter(v=>v>0);if(nonZero.length<3)return null;
  const avg=spends.reduce((s,v)=>s+v,0)/spends.length;
  const suggested=Math.ceil(avg*1.1/5)*5;
  return{avg:Math.round(avg*100)/100,suggested,months:nonZero.length};
}
function bucketMoMTrend(bid,mid){
  const all=[...S.months].sort((a,b)=>a.id<b.id?-1:1);
  const ci=all.findIndex(m=>m.id===mid);if(ci<=0)return null;
  const cur=bSpent(mid,bid),prev=bSpent(all[ci-1].id,bid);
  if(!cur&&!prev)return null;if(!prev)return null;
  return{pct:Math.round((cur-prev)/prev*100),cur,prev};
}
function catAnomalyCheck(catId,mid){
  const bkts=sortedBuckets(catId).filter(b=>!b.archived);if(!bkts.length)return null;
  const all=[...S.months].sort((a,b)=>a.id<b.id?-1:1);
  const ci=all.findIndex(m=>m.id===mid);if(ci<3)return null;
  const hist=all.slice(Math.max(0,ci-12),ci);if(hist.length<3)return null;
  const hSpends=hist.map(mo=>bkts.reduce((s,b)=>s+bSpent(mo.id,b.id),0));
  const mean=hSpends.reduce((s,v)=>s+v,0)/hSpends.length;if(mean===0)return null;
  const sd=Math.sqrt(hSpends.reduce((s,v)=>s+(v-mean)**2,0)/hSpends.length);if(sd===0)return null;
  const cur=bkts.reduce((s,b)=>s+bSpent(mid,b.id),0);
  const z=(cur-mean)/sd;
  return z>=2?{z:Math.round(z*10)/10,excess:Math.round((cur-mean)*100)/100,cur}:null;
}
function fundCategory(catId,mid){
  const m=getMonth(mid);if(!m)return;if(!m.allocations)m.allocations={};
  S.buckets.filter(b=>b.catId===catId&&!b.archived).forEach(b=>{
    // Use existing budget target, fall back to default, never go below 0
    const target=Math.max(m.budgets[b.id]||b.defaultBudget||0, 0);
    m.allocations[b.id]=target;
  });
  save();render();
}

function upsertPayee(desc,bucketId){

  const name=desc.trim();
