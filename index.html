<script>
// ═══════════════════════════════════════════════════════
// PALETTE & KEY
// ═══════════════════════════════════════════════════════
const isMobile=()=>window.innerWidth<768;
const COLORS=['#2a7c6f','#3b82c4','#7c3b82','#c45c3b','#3b8248','#c4a43b','#c43b6a','#6a3bc4','#3b9ea6','#a6753b','#5c6bc0','#e57373','#4db6ac','#81c784','#ffb74d','#f06292'];
const KEY='bcc_v6';
const APP_VERSION='20260404-5';

// ═══════════════════════════════════════════════════════
// SUPABASE — replace BOTH values below with your project
// ═══════════════════════════════════════════════════════
const SUPA_URL = 'https://exojuwforrrtewccqjfu.supabase.co';       // e.g. https://xxxx.supabase.co
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b2p1d2ZvcnJydGV3Y2NxamZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NjYwNzcsImV4cCI6MjA4MjU0MjA3N30.ZE-vLmDg9y4FxLby3AEOGYyJcYLk0Tvazwl94CdzjUI';  // from Settings → API → anon public

let _supa = null;
let _supaUser = null;
let _pendingSync = false;
let _appInitialized = false;

function supaClient(){
  try{
    if(!_supa && typeof supabase !== 'undefined' && supabase.createClient){
      _supa = supabase.createClient(SUPA_URL, SUPA_KEY, {
        auth: {
          // Isolate this app's auth session from other apps on the same Supabase project.
          // Without this, sharing a project causes both apps to share one auth token in
          // localStorage — logging out of one logs out of both, and session changes in
          // one app corrupt the other's mid-request.
          storageKey: 'bcc-auth'
        }
      });
    }
  }catch(e){console.warn('Supabase client error:',e.message);}
  return _supa;
}

function supaReady(){
  return typeof supabase !== 'undefined' &&
    !!supaClient() &&
    SUPA_URL !== 'YOUR_SUPABASE_URL' &&
    SUPA_KEY !== 'YOUR_SUPABASE_ANON_KEY';
}

// ═══════════════════════════════════════════════════════
// AUTH & SYNC
// ═══════════════════════════════════════════════════════

function setSyncStatus(state, label){
  const el=document.getElementById('syncStatus');
  if(!el)return;
  if(!supaReady()){el.style.display='none';return;}
  el.style.display='';
  el.className='';
  el.classList.add(state);
  el.textContent=label;
}

async function authInit(){
  if(!supaReady()){
    setSyncStatus('offline','Offline');
    return;
  }

  const client=supaClient();

  // Listen for auth state changes
  client.auth.onAuthStateChange(async(event, session)=>{
    if(event==='SIGNED_IN'||event==='INITIAL_SESSION'){
      if(!session){
        // INITIAL_SESSION with no session — user is not logged in
        document.getElementById('authScreen').classList.remove('hidden');
        setSyncStatus('offline','Not signed in');
        return;
      }
      _supaUser=session.user;
      document.getElementById('authScreen').classList.add('hidden');
      updateAuthBtn();
      if(!_appInitialized){
        _appInitialized=true;
        setSyncStatus('syncing','Syncing…');
        const loaded=await loadFromSupabase();
        if(loaded){
          ensureMonth();
          if(!S.activeMonth||!S.months.find(m=>m.id===S.activeMonth)){
            S.activeMonth=currentMonthId();
          }
          normalizeCatOrder();normalizeBktOrder();
        }
        // Always reset WI session — must not persist across page loads
        S.wiOpen=false;S.scenario=false;S.wiScenario=null;
        if(!S.scenarios)S.scenarios=[];
        setSyncStatus('synced','Synced');
        if(isMobile()){initMobile();}else{initDesktop();}
        if(!S.accounts.length){startWizard();}
      }
    } else if(event==='TOKEN_REFRESHED'){
      // Session silently renewed — push any pending offline changes
      if(_supaUser&&_pendingSync){
        setSyncStatus('syncing','Syncing…');
        await supabase_push();
      }
    } else if(event==='SIGNED_OUT'){
      _supaUser=null;
      _appInitialized=false;
      updateAuthBtn();
      setSyncStatus('offline','Not signed in');
      showAuthSignIn();
      document.getElementById('authScreen').classList.remove('hidden');
    }
  });

  // Check for existing session immediately so we don't flash the auth screen
  const {data:{session}}=await client.auth.getSession();
  if(session){
    _supaUser=session.user;
    updateAuthBtn();
    if(!_appInitialized){
      _appInitialized=true;
      setSyncStatus('syncing','Syncing…');
      const loaded=await loadFromSupabase();
      if(loaded){
        ensureMonth();
        if(!S.activeMonth||!S.months.find(m=>m.id===S.activeMonth)){
          S.activeMonth=currentMonthId();
        }
        normalizeCatOrder();normalizeBktOrder();
      }
      // Always reset WI session — must not persist across page loads
      S.wiOpen=false;S.scenario=false;S.wiScenario=null;
      if(!S.scenarios)S.scenarios=[];
      setSyncStatus('synced','Synced');
      if(isMobile()){initMobile();}else{initDesktop();}
      if(!S.accounts.length){startWizard();}
    }
  } else {
    // No session — auth screen is visible by default, nothing to do
    setSyncStatus('offline','Not signed in');
  }

  // Push pending offline changes when coming back online
  window.addEventListener('online',async()=>{
    if(_supaUser&&_pendingSync){
      setSyncStatus('syncing','Syncing…');
      await supabase_push();
      setSyncStatus('synced','Synced');
    }
  });
  window.addEventListener('offline',()=>{
    setSyncStatus('offline','Offline');
  });
}

// ── Auth form toggles ─────────────────────────────────────────────────────────
function showAuthSignIn(){
  document.getElementById('authSignInForm').style.display='';
  document.getElementById('authRegisterForm').style.display='none';
  document.getElementById('authTitle').textContent='Sign in';
  document.getElementById('authSub').textContent='Your budget data syncs across all your devices.';
  document.getElementById('authMsg').style.display='none';
  document.getElementById('authEmail')?.focus();
}

function showAuthRegister(){
  document.getElementById('authSignInForm').style.display='none';
  document.getElementById('authRegisterForm').style.display='';
  document.getElementById('authTitle').textContent='Create account';
  document.getElementById('authSub').textContent='Set up your Budget Command Center account.';
  document.getElementById('authMsg').style.display='none';
  document.getElementById('authRegEmail')?.focus();
}

// ── Sign In ───────────────────────────────────────────────────────────────────
async function authSignIn(){
  const email=document.getElementById('authEmail')?.value.trim();
  const password=document.getElementById('authPassword')?.value;
  if(!email||!password){showAuthMsg('error','Please enter your email and password.');return;}
  if(!supaReady()){showAuthMsg('error','Supabase not configured. Check SUPA_URL and SUPA_KEY.');return;}

  const btn=document.getElementById('authSignInBtn');
  btn.disabled=true;btn.textContent='Signing in…';

  const {error}=await supaClient().auth.signInWithPassword({email,password});
  if(error){
    showAuthMsg('error',error.message);
    btn.disabled=false;btn.textContent='Sign In';
  }
  // Success handled by onAuthStateChange listener
}

// ── Register ──────────────────────────────────────────────────────────────────
async function authRegister(){
  const email=document.getElementById('authRegEmail')?.value.trim();
  const pw=document.getElementById('authRegPassword')?.value;
  const pw2=document.getElementById('authRegPassword2')?.value;
  if(!email||!pw){showAuthMsg('error','Please fill in all fields.');return;}
  if(pw.length<6){showAuthMsg('error','Password must be at least 6 characters.');return;}
  if(pw!==pw2){showAuthMsg('error','Passwords do not match.');return;}
  if(!supaReady()){showAuthMsg('error','Supabase not configured.');return;}

  const btn=document.querySelector('#authRegisterForm .auth-btn');
  btn.disabled=true;btn.textContent='Creating account…';

  const {data,error}=await supaClient().auth.signUp({email,password:pw});
  if(error){
    showAuthMsg('error',error.message);
    btn.disabled=false;btn.textContent='Create Account';
  } else if(data?.user&&!data?.session){
    showAuthMsg('success','Account created! Check your email to confirm, then sign in.');
    setTimeout(()=>showAuthSignIn(),2000);
  }
  // If session returned immediately (email confirm disabled), onAuthStateChange handles it
}

function showAuthMsg(type, text){
  const el=document.getElementById('authMsg');
  if(!el)return;
  el.style.display='block';
  el.className='auth-msg '+type;
  el.textContent=text;
}

function skipAuth(){
  _appInitialized=true; // Allow init/resize to proceed in offline mode
  document.getElementById('authScreen').classList.add('hidden');
  setSyncStatus('offline','Offline mode');
  if(isMobile()){initMobile();}else{initDesktop();}
  if(!S.accounts.length){startWizard();}
}

async function signOut(){
  const client=supaReady()?supaClient():null;
  // Clear in-memory state only — localStorage stays as backup for next login
  // (Supabase is the source of truth; local cache is restored on next sign-in)
  S={accounts:[],cats:[],buckets:[],months:[],txs:[],activeMonth:null,activeBucket:null,
     activeAccount:null,scenario:false,scenarioBudgets:{},scenarios:[],wiScenario:null,
     wiOpen:false,txFilter:'all',onboarded:false};
  _supaUser=null;
  _appInitialized=false;
  _pendingSync=false;
  document.getElementById('wiOverlay')?.classList.add('hidden');
  document.getElementById('wiStrip')?.classList.add('hidden');
  updateAuthBtn();
  setSyncStatus('offline','Not signed in');
  showAuthSignIn();
  document.getElementById('authScreen').classList.remove('hidden');
  if(client) client.auth.signOut().catch(err=>console.warn('SignOut error:',err.message));
}

function authAction(){
  if(_supaUser){
    if(confirm('Sign out of '+(_supaUser.email||'your account')+'?'))signOut();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
  }
}

function updateAuthBtn(){
  if(!supaReady())return;
  const btns=[document.getElementById('authBtn'),document.getElementById('mAuthBtn')];
  btns.forEach(btn=>{
    if(!btn)return;
    btn.style.display='';
    if(_supaUser){
      btn.textContent=_supaUser.email?.split('@')[0]||'Account';
      btn.title='Signed in as '+_supaUser.email;
      btn.onclick=authAction;
    } else {
      btn.textContent='Sign in';
      btn.onclick=()=>document.getElementById('authScreen').classList.remove('hidden');
    }
  });
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let S={
  accounts:[],  // {id,name,color,type:'budget'|'savings',openingBalance}
  cats:[],       // {id,name,color}
  buckets:[],    // {id,catId,name,type,dueDay,recurring,rollover,archived,defaultBudget,targetAmount,targetDate,contribFreq}
  months:[],     // {id,label,year,month,budgets:{},allocations:{},projectedIncome?}
  txs:[],        // {id,accountId,toAccountId?,monthId,bucketId?,desc,amount,type:'in'|'out'|'xfr'|'opening',date,recurring}
  activeMonth:null,
  activeBucket:null,
  activeAccount:null,
  scenario:false,
  scenarioBudgets:{},
  scenarios:[],
  wiScenario:null,
  wiOpen:false,
  txFilter:'all',
  onboarded:false,
};
// ── Save: localStorage immediately + Supabase async ────────────────────────
function save(){
  localStorage.setItem(KEY, JSON.stringify(S));
  if(supaReady()&&_supaUser){
    _pendingSync=true;
    setSyncStatus('syncing','Syncing…');
    supabase_push().catch(err=>console.warn('Sync failed:',err.message));
  }
}

async function supabase_push(){
  if(!supaReady()||!_supaUser)return;
  const client=supaClient();
  const now=new Date().toISOString();

  // Step 1: write
  const {error}=await client
    .from('bcc_budget_state')
    .upsert({user_id:_supaUser.id, data:S, updated_at:now},{onConflict:'user_id'});

  if(error){
    console.warn('Supabase push error:',error.message,'(code:'+error.code+')');
    setSyncStatus('error','Sync error — see console');
    return;
  }

  // Step 2: verify the write landed (catches silent RLS blocks)
  const {data:verify,error:verErr}=await client
    .from('bcc_budget_state')
    .select('updated_at')
    .eq('user_id',_supaUser.id)
    .maybeSingle();

  if(verErr){
    console.warn('Supabase verify error:',verErr.message);
    setSyncStatus('error','Sync unverified — see console');
  } else if(!verify){
    console.warn('Supabase write blocked — row not found after upsert.',
      'Check RLS policies on bcc_budget_state table.');
    setSyncStatus('error','Sync blocked — check RLS (see console)');
  } else {
    _pendingSync=false;
    localStorage.setItem(KEY+'_saved_at', String(new Date(now).getTime()));
    setSyncStatus('synced','Synced ✓');
    setTimeout(()=>setSyncStatus('synced','●'),4000);
  }
}

// ── Load: Supabase first, fall back to localStorage ─────────────────────────
async function loadFromSupabase(){
  if(!supaReady())return false;
  const client=supaClient();

  // Get current session
  const {data:sessionData}=await client.auth.getSession();
  if(!sessionData?.session?.user)return false;
  _supaUser=sessionData.session.user;

  // Fetch from Supabase — maybeSingle() returns null (not error) when no row exists
  const {data,error}=await client
    .from('bcc_budget_state')
    .select('data, updated_at')
    .eq('user_id',_supaUser.id)
    .maybeSingle();

  // Table missing or real error
  if(error){
    console.warn('Supabase load error:',error.message,'(code:'+error.code+')');
    // If table doesn't exist yet, just use localStorage
    if(error.code==='42P01'||error.message.includes('does not exist')){
      console.warn('Table bcc_budget_state not found — run the SQL setup first.');
      setSyncStatus('error','Table missing — run SQL setup');
    }
    return false;
  }

  // No remote data yet — fresh account or first sync
  // Keep whatever is in S (already loaded from localStorage by load())
  // and push it up to Supabase to back it up
  if(!data){
    console.log('No Supabase data yet — pushing existing local data up');
    S.wiOpen=false;S.scenario=false;S.wiScenario=null;
    if(!S.scenarios)S.scenarios=[];
    if(S.accounts?.length||S.cats?.length||S.txs?.length){
      await supabase_push();
    }
    return true;
  }

  // We have remote data — compare timestamps with localStorage.
  // Normalize the Supabase timestamp ("2026-04-04 13:31:59.556+00") to ISO 8601
  // before parsing — iOS Safari rejects the space-separator and bare "+00" offset.
  const localRaw=localStorage.getItem(KEY);
  const localTime=parseInt(localStorage.getItem(KEY+'_saved_at')||'0');
  const remoteIso=(data.updated_at||'').replace(' ','T').replace(/\+00$/,'+00:00');
  const remoteTime=new Date(remoteIso).getTime()||0;

  if(localRaw&&localTime>remoteTime){
    // Local is newer — keep it and push to Supabase
    try{
      S=JSON.parse(localRaw);
      S.wiOpen=false;S.scenario=false;S.wiScenario=null;
      if(!S.scenarios)S.scenarios=[];
      console.log('Kept localStorage (newer by '+(localTime-remoteTime)+'ms), syncing up');
      await supabase_push();
    }catch(e){
      S=data.data;
    }
  } else {
    // Remote is newer (or no local) — use Supabase data
    // But only if it actually has content — never replace good data with empty
    const remoteHasData=data.data&&(
      (data.data.accounts&&data.data.accounts.length>0)||
      (data.data.cats&&data.data.cats.length>0)||
      (data.data.txs&&data.data.txs.length>0)
    );
    const localHasData=S.accounts?.length>0||S.cats?.length>0||S.txs?.length>0;
    if(remoteHasData||!localHasData){
      S=data.data;
      // WI session state should never persist across page loads
      S.wiOpen=false;S.scenario=false;S.wiScenario=null;
      if(!S.scenarios)S.scenarios=[];
      localStorage.setItem(KEY,JSON.stringify(S));
      localStorage.setItem(KEY+'_saved_at',String(remoteTime||Date.now()));
      console.log('Loaded from Supabase (newer by '+(remoteTime-localTime)+'ms)');
    } else {
      console.log('Remote is empty but local has data — keeping local, pushing up');
      S.wiOpen=false;S.scenario=false;S.wiScenario=null;
      if(!S.scenarios)S.scenarios=[];
      await supabase_push();
    }
  }

  // Ensure data integrity — never let these be undefined
  if(!S||typeof S!=='object')S={};
  if(!S.months)S.months=[];
  S.months.forEach(m=>{if(!m.allocations)m.allocations={};});
  if(!S.accounts)S.accounts=[];
  if(!S.cats)S.cats=[];
  if(!S.buckets)S.buckets=[];
  if(!S.txs)S.txs=[];
  if(!S.txFilter)S.txFilter='all';

  return true;
}

function load(){
  // Synchronous localStorage load — fast, works offline
  const r6=localStorage.getItem(KEY);
  if(r6){
    try{
      S=JSON.parse(r6);
      S.months.forEach(m=>{if(!m.allocations)m.allocations={};});
    }catch(e){}
  } else {
    const r5=localStorage.getItem('buckets_v5');
    if(r5){migrateV5(r5);}
  }
  ensureMonth();
  if(!S.activeMonth&&S.months.length)S.activeMonth=currentMonthId();
  if(!S.txFilter)S.txFilter='all';
  normalizeCatOrder();
  normalizeBktOrder();
}

function migrateV5(raw){
  try{
    const old=JSON.parse(raw);
    // Create default checking account
    const acct={id:'_acct_default',name:'Checking',color:COLORS[0],type:'budget',openingBalance:0};
    S.accounts=[acct];
    S.cats=old.cats||[];
    S.buckets=old.buckets||[];
    S.months=(old.months||[]).map(m=>({...m,allocations:m.allocations||{}}));
    // Assign all txs to default account; fix monthId based on date
    S.txs=(old.txs||[]).map(t=>({
      ...t,
      accountId:acct.id,
      monthId:dateToMonthId(t.date)||t.monthId,
    }));
    S.activeMonth=old.activeMonth;
    S.onboarded=true;
    save();
  }catch(e){console.warn('Migration failed',e);}
}

// ═══════════════════════════════════════════════════════
// MONTH HELPERS
// ═══════════════════════════════════════════════════════
const nowY=()=>new Date().getFullYear();
const nowM=()=>new Date().getMonth();
const mId=(y,m)=>`m_${y}_${m}`;
const currentMonthId=()=>mId(nowY(),nowM());
const mLabel=(y,m)=>new Date(y,m,1).toLocaleString('default',{month:'short',year:'numeric'});
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();

function dateToMonthId(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr+'T12:00:00');
  return mId(d.getFullYear(),d.getMonth());
}

function _inheritProjectedIncome(){
  // Find the most recent month that has projectedIncome set
  const sorted=[...S.months].sort((a,b)=>a.year!==b.year?b.year-a.year:b.month-a.month);
  for(const m of sorted){if(m.projectedIncome!=null)return m.projectedIncome;}
  return null;
}

function ensureMonth(){
  const id=currentMonthId();
  if(!S.months.find(m=>m.id===id)){
    const budgets={},allocations={};
    S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
    const pi=_inheritProjectedIncome();
    const nm={id,label:mLabel(nowY(),nowM()),year:nowY(),month:nowM(),budgets,allocations};
    if(pi!=null)nm.projectedIncome=pi;
    S.months.push(nm);
    S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  }
}

function addNextMonth(){
  const last=S.months[S.months.length-1];
  if(!last){ensureMonth();render();return;}
  let y=last.year,m=last.month+1;if(m>11){m=0;y++;}
  const id=mId(y,m);if(S.months.find(mo=>mo.id===id)){render();return;}
  const budgets={},allocations={};
  S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
  const pi=_inheritProjectedIncome();
  const nm={id,label:mLabel(y,m),year:y,month:m,budgets,allocations};
  if(pi!=null)nm.projectedIncome=pi;
  S.months.push(nm);
  S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  save();render();
}

function _ensureMonthForWI(y,m){
  const id=mId(y,m);
  if(!S.months.find(mo=>mo.id===id)){
    const budgets={},allocations={};
    S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
    const pi=_inheritProjectedIncome();
    const nm={id,label:mLabel(y,m),year:y,month:m,budgets,allocations};
    if(pi!=null)nm.projectedIncome=pi;
    S.months.push(nm);
    S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  }
  return id;
}

function monthStatus(id){
  const m=S.months.find(x=>x.id===id);if(!m)return'present';
  if(m.year===nowY()&&m.month===nowM())return'present';
  if(m.year<nowY()||(m.year===nowY()&&m.month<nowM()))return'past';
  return'future';
}

function resolveDue(b,y,m){if(!b.dueDay)return null;if(b.dueDay==='eom')return lastDay(y,m);return Math.min(parseInt(b.dueDay),lastDay(y,m));}
function daysUntilDue(b,y,m){const d=resolveDue(b,y,m);if(d===null)return null;const due=new Date(y,m,d),now=new Date();now.setHours(0,0,0,0);return Math.round((due-now)/864e5);}

// ═══════════════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════════════
const getMonth=id=>S.months.find(m=>m.id===id);
const getBucket=id=>S.buckets.find(b=>b.id===id);
const getCat=id=>S.cats.find(c=>c.id===id);
const getAcct=id=>S.accounts.find(a=>a.id===id);

function acctBalance(aid){
  const acct=getAcct(aid);if(!acct)return 0;
  // Sum all opening transactions for this account (should only be one, but defensive)
  const openingTotal=S.txs.filter(t=>t.accountId===aid&&t.type==='opening').reduce((s,t)=>s+t.amount,0);
  let bal=openingTotal>0?openingTotal:(acct.openingBalance||0);
  // Apply all subsequent regular transactions
  S.txs.forEach(t=>{
    if(t.type==='opening')return;
    if(t.accountId===aid&&t.type==='in')bal+=t.amount;
    if(t.accountId===aid&&t.type==='out')bal-=t.amount;
    if(t.accountId===aid&&t.type==='xfr')bal-=t.amount;
    if(t.toAccountId===aid&&t.type==='xfr')bal+=t.amount;
  });
  return bal;
}

function totalCash(){return S.accounts.reduce((s,a)=>s+acctBalance(a.id),0);}

const mTxs=mid=>S.txs.filter(t=>t.monthId===mid);

// Income = only explicit type:'in' txs on budget accounts
// Opening balances, transfers, expenses are all excluded from Ready to Spend
function monthIncome(mid){
  const budgetAccts=new Set(S.accounts.filter(a=>a.type==='budget').map(a=>a.id));
  return mTxs(mid)
    .filter(t=>t.type==='in'&&budgetAccts.has(t.accountId))
    .reduce((s,t)=>s+t.amount,0);
}

function bAlloc(mid,bid){const m=getMonth(mid);return m?(m.allocations[bid]||0):0;}
function bBudget(mid,bid){
  if(S.scenario&&S.wiScenario?.budgets?.[bid]!==undefined)return S.wiScenario.budgets[bid];
  const m=getMonth(mid);return m?(m.budgets[bid]||0):0;
}
function monthProjectedIncome(mid){const m=getMonth(mid);return m?.projectedIncome??null;}
function setProjectedIncome(mid,val){
  const m=getMonth(mid);if(!m)return;
  m.projectedIncome=val>0?val:null;
  save();render();if(isMobile())mRenderAll();
}
const bSpent=(mid,bid)=>mTxs(mid).filter(t=>t.bucketId===bid&&t.type==='out').reduce((s,t)=>s+t.amount,0);
const totalAllocated=mid=>S.buckets.filter(b=>!b.archived).reduce((s,b)=>s+bAlloc(mid,b.id),0);
// Ready to Spend = sum of all budget account balances minus total allocated
// This reflects real cash on hand, not just this month's income
function readyToSpend(mid){
  const budgetBal=S.accounts
    .filter(a=>a.type==='budget')
    .reduce((s,a)=>s+acctBalance(a.id),0);
  return budgetBal-totalAllocated(mid);
}

function rolloverBal(bid,mid){
  const m=getMonth(mid);if(!m)return 0;
  const b=getBucket(bid);if(!b||!b.rollover)return 0;
  const prior=S.months.filter(mo=>mo.year<m.year||(mo.year===m.year&&mo.month<m.month));
  return prior.reduce((s,mo)=>{const a=mo.allocations?mo.allocations[bid]||0:0;return s+(a-bSpent(mo.id,bid));},0);
}
const sinkingSaved=bid=>S.txs.filter(t=>t.bucketId===bid&&t.type==='out').reduce((s,t)=>s+t.amount,0);
function contribAmt(b){const m=b.defaultBudget||0;if(b.contribFreq==='weekly')return+(m/4.33).toFixed(2);if(b.contribFreq==='biweekly')return+(m/2).toFixed(2);return m;}

// FORMAT
// ═══════════════════════════════════════════════════════
const $f=n=>'$'+(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const ld=d=>{if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

// ═══════════════════════════════════════════════════════
// EXPRESSION EVALUATOR
// ═══════════════════════════════════════════════════════
function evalMoneyExpr(expr,currentVal,refVal){
  if(typeof expr!=='string')return currentVal;
  expr=expr.trim();
  if(!expr)return currentVal;
  if(/^[+\-]/.test(expr)){const delta=parseFloat(expr);return isNaN(delta)?currentVal:Math.round((currentVal+delta)*100)/100;}
  if(/^\*/.test(expr)){const factor=parseFloat(expr.slice(1));return isNaN(factor)?currentVal:Math.round(currentVal*factor*100)/100;}
  if(/^\//.test(expr)){const divisor=parseFloat(expr.slice(1));return(!divisor||isNaN(divisor))?currentVal:Math.round(currentVal/divisor*100)/100;}
  if(expr.endsWith('%')){const pct=parseFloat(expr)/100;if(isNaN(pct))return currentVal;const base=(refVal!=null&&refVal>0)?refVal:currentVal;return Math.round(base*pct*100)/100;}
  if(expr.startsWith('=')){const formula=expr.slice(1);if(!/^[\d\s\+\-\*\/\.\(\)]+$/.test(formula))return currentVal;try{const result=Function('"use strict";return('+formula+')')();return(typeof result==='number'&&!isNaN(result))?Math.round(result*100)/100:currentVal;}catch(e){return currentVal;}}
  const val=parseFloat(expr);return isNaN(val)?currentVal:val;
}

function getPrevMonthId(mid){
  const idx=S.months.findIndex(m=>m.id===mid);
  return idx>0?S.months[idx-1].id:null;
}

    <div class="ps-cell hi">
      <div class="ps-label">Ready to Spend</div>
      <div class="ps-val ${rts>0?'green':rts<0?'red':'dim'}">${$f(Math.abs(rts))}</div>
      <div class="ps-sub">${rts>0?'unallocated cash':rts<0?'⚠ over-allocated':'fully allocated ✓'}</div>
    </div>
    <div class="ps-cell">
      <div class="ps-label">Spent</div>
      <div class="ps-val dim">${totalSpent>0?$f(totalSpent):'—'}</div>
      <div class="ps-sub">from transactions</div>
    </div>
  </div>`;

  // Hints
  if(!past&&income>0&&unalloc>0&&rts>0)
    h+=`<div class="hint-bar info">💡 ${$f(rts)} unallocated — ${unalloc} bucket${unalloc!==1?'s':''} waiting. Click the Allocated field to assign money.</div>`;
  else if(!past&&rts<0)
    h+=`<div class="hint-bar warn">⚠ Over-allocated by ${$f(Math.abs(rts))} — reduce bucket allocations until Ready to Spend reaches $0.</div>`;
  else if(!past&&rts===0&&alloc>0)
    h+=`<div class="hint-bar success">✓ Every dollar has a job. You're fully allocated.</div>`;

  // No buckets
  if(!S.buckets.filter(b=>!b.archived).length){
    h+=`<div class="empty-wrap" style="min-height:160px;padding:30px 0;">
      <div class="empty-title" style="font-size:15px">No buckets yet</div>
      <div class="empty-sub" style="font-size:13px;margin-bottom:14px">Add buckets to categories to start tracking.</div>
      <button class="empty-btn" onclick="openModal('bkt')">Add a bucket</button>
    </div>`;el.innerHTML=h;return;
  }

  // Category sections
  sortedCats().forEach(cat=>{
    const catBuckets=sortedBuckets(cat.id);
    if(!catBuckets.length)return;
    const color=cat.color||COLORS[0];
    const catAlloc=catBuckets.reduce((s,b)=>s+bAlloc(mid,b.id),0);
    const catTarget=catBuckets.reduce((s,b)=>s+bBudget(mid,b.id),0);
    // Sort by due date urgency within the user's preferred order
    const sorted=[...catBuckets].sort((a,b)=>{
      const da=daysUntilDue(a,m.year,m.month);
      const db=daysUntilDue(b,m.year,m.month);
      // Overdue/urgent float to top, rest keep user order
      if(da!==null&&da<=0&&(db===null||db>0))return -1;
      if(db!==null&&db<=0&&(da===null||da>0))return 1;
      return (a.order??0)-(b.order??0);
    });

    h+=`<div class="cat-sec">
      <div class="cat-sec-hdr">
        <div class="csh-color" style="background:${color}"></div>
        <span class="csh-name">${cat.name}</span>
        <span class="csh-totals">${$f(catAlloc)} allocated · ${$f(catTarget)} target</span>
        ${!past?`<button class="fund-btn" onclick="event.stopPropagation();fundCategory('${cat.id}','${mid}')">Fund all</button>`:''}
      </div>
      <table class="btable">
      <thead><tr>
        <th style="width:3px;padding:0"></th>
        <th>Bucket</th>
        <th style="width:128px">Allocated</th>
        <th style="width:72px">Progress</th>
        <th style="width:86px;text-align:right">Spent</th>
        <th style="width:86px;text-align:right">Available</th>
        <th style="width:58px;text-align:right"></th>
      </tr></thead><tbody>`;

    sorted.forEach(b=>{
      const alloc=bAlloc(mid,b.id);
      const target=bBudget(mid,b.id);
      const roll=rolloverBal(b.id,mid);
      const eff=alloc+roll;
      const spent=bSpent(mid,b.id);
      const avail=eff-spent;
      const pctRaw=eff>0?spent/eff:0;
      const pct=Math.min(pctRaw,1);
      const fillCls=pctRaw>1?'bf-over':pctRaw>0.8?'bf-warn':'bf-ok';
      const days=daysUntilDue(b,m.year,m.month);
      let dueHtml='';
      if(days!==null){const cls=days<0?'urgent':days<=7?'soon':'ok';const txt=days<0?`${Math.abs(days)}d overdue`:days===0?'due today':`due ${days}d`;dueHtml=`<span class="bndue ${cls}">${txt}</span>`;}
      const tags=[];
      if(b.type==='sinking')tags.push('saving');
      if(b.recurring)tags.push('↻');
      if(roll>0)tags.push(`+${$f(roll)} rolled`);

      let pillHtml='';
      if(past&&spent===0&&alloc>0)pillHtml=`<span class="pill pill-missed">Missed</span>`;
      else if(alloc===0)pillHtml=`<span class="pill pill-empty">Unfunded</span>`;
      else if(avail<0)pillHtml=`<span class="pill pill-over">Over</span>`;
      else if(spent>=eff&&eff>0)pillHtml=`<span class="pill pill-done">Done</span>`;
      else if(alloc>=target&&target>0)pillHtml=`<span class="pill pill-funded">Funded</span>`;
      else pillHtml=`<span class="pill pill-partial">Partial</span>`;

      const allocCls=alloc===0?'':alloc>=target?'funded':'';

      h+=`<tr class="brow${S.activeBucket===b.id?' act':''}" onclick="setBucket('${b.id}')" tabindex="0" onkeydown="if(event.key==='Enter')setBucket('${b.id}')">
        <td class="td-accent"><div class="accent-bar" style="background:${color}"></div></td>
        <td class="td-name">
          <div class="bn">${b.name}</div>
          <div class="bt">${tags.map(t=>`<span class="bntag">${t}</span>`).join('')}${dueHtml}</div>
        </td>
        <td class="td-alloc" onclick="event.stopPropagation()">
          ${past?`<span class="tv dim">${$f(alloc)}</span>`:`
          <div class="alloc-wrap">
            <span class="alloc-pfx">$</span>
            <input class="alloc-inp ${allocCls}" type="text" inputmode="decimal"
              value="${alloc||''}" placeholder="0" title="Math: +50, -20, *1.05, 5% of income, =100+50"
              onchange="(function(inp){var cur=bAlloc('${mid}','${b.id}');var ref=monthProjectedIncome('${mid}');var v=evalMoneyExpr(inp.value,cur,ref);inp.value=v;setAlloc('${mid}','${b.id}',v);})(this)"
              onkeydown="if(event.key==='Enter')this.blur()"
              onfocus="this.select()" />
            <span class="expr-hint">𝑓x</span>
          </div>`}
        </td>
        <td class="td-bar">
          <div class="bbar"><div class="bbar-fill ${eff>0?fillCls:'bf-ok'}" style="width:${eff>0?Math.round(pct*100):0}%"></div></div>
          <div class="bbar-sub">${eff>0?Math.round(pctRaw*100)+'%':''}</div>
        </td>
        <td class="td-spent"><span class="tv ${spent>0?'dim':'muted'}">${spent>0?$f(spent):'—'}</span>${target>0?`<div class="tv-sub">of ${$f(target)}</div>`:''}</td>
        <td class="td-avail"><span class="tv ${avail>0?'green':avail<0?'red':'muted'}">${eff>0||spent>0?$f(avail):'—'}</span></td>
        <td class="td-pill">${pillHtml}</td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  });
  el.innerHTML=h;
}

}

function renderTxList(){
  const mid=S.activeMonth;
  const past=monthStatus(mid)==='past';
  document.getElementById('txForm').style.display=past?'none':'flex';
  updateTxFormForType();

  let txs=S.txs.filter(t=>{
    if(S.activeAccount)return t.accountId===S.activeAccount||t.toAccountId===S.activeAccount;
    return t.monthId===mid;
  });

  const filter=S.txFilter||'all';
  if(filter==='in')txs=txs.filter(t=>t.type==='in');
  if(filter==='out')txs=txs.filter(t=>t.type==='out');
  if(filter==='xfr')txs=txs.filter(t=>t.type==='xfr');

  const search=(document.getElementById('rpSearch')?.value||'').toLowerCase();
  if(search)txs=txs.filter(t=>t.desc.toLowerCase().includes(search)||(getBucket(t.bucketId)?.name||'').toLowerCase().includes(search));

  if(S.activeBucket)txs=txs.filter(t=>t.bucketId===S.activeBucket);

  // Update title
  let title='Transactions';
  if(S.activeBucket)title=getBucket(S.activeBucket)?.name||'Transactions';
  else if(S.activeAccount)title=getAcct(S.activeAccount)?.name||'Transactions';
  document.getElementById('rpTitle').textContent=title;

  // Pre-fill form bucket
  if(S.activeBucket){
    const b=getBucket(S.activeBucket);
    if(b){document.getElementById('txCat').value=b.catId;syncTxBuckets();document.getElementById('txBkt').value=b.id;}
  } else {
    populateTxCats();
  }

  txs=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const list=document.getElementById('txList');
  if(!txs.length){list.innerHTML=`<div class="tx-empty">No transactions${search?` matching "${search}"`:''}.<br>${past?'Month is closed.':'Log one above.'}</div>`;return;}

  const groups={};
  txs.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});
  let h='';
  Object.keys(groups).sort((a,b)=>new Date(b)-new Date(a)).forEach(date=>{
    h+=`<div class="tx-date-hdr">${ld(date)}</div>`;
    groups[date].forEach(tx=>{
      const b=getBucket(tx.bucketId);const cat=b?getCat(b.catId):null;
      const color=cat?.color||'var(--text3)';
      const acct=getAcct(tx.accountId);
      const toAcct=tx.toAccountId?getAcct(tx.toAccountId):null;
      const isXfrIn=tx.type==='xfr'&&tx.toAccountId===S.activeAccount;
      const isOpening=tx.type==='opening';
      const amtCls=isOpening?'in':tx.type==='xfr'?'xfr':tx.type==='in'?'in':'out';
      const amtPfx=isOpening||tx.type==='in'||isXfrIn?'+':'-';
      // Color indicator bar by type
      const indColor=tx.type==='in'?'var(--green)':tx.type==='xfr'?'var(--purple)':isOpening?'var(--blue)':'var(--red)';
      // Meta line: account > category > bucket
      let metaLine='';
      if(acct)metaLine+=`<span class="tx-meta-acct">${acct.name}</span>`;
      if(cat){metaLine+=`<span class="tx-dot2"></span><span class="tx-meta-cat" style="color:${color}">${cat.name}</span>`;}
      if(b){metaLine+=`<span class="tx-dot2"></span><span class="tx-meta-bkt">${b.name}</span>`;}
      if(tx.type==='xfr'&&toAcct){metaLine+=`<span class="tx-dot2"></span><span style="color:var(--purple)">→ ${toAcct.name}</span>`;}
      if(tx.recurring)metaLine+=`<span class="tx-dot2"></span><span style="color:var(--accent)">↻</span>`;
      h+=`<div class="tx-row">
        <div class="tx-indicator" style="background:${indColor}"></div>
        <div class="tx-l">
          <div class="tx-name">${tx.desc}</div>
          <div class="tx-meta">${metaLine||'<span style="color:var(--text3)">—</span>'}</div>
        </div>
        <div class="tx-r">
          <div class="tx-amt ${amtCls}">${amtPfx}${$f(tx.amount)}</div>
        </div>
        <div class="tx-acts">
          ${!past?`<button class="ib" onclick="editTx('${tx.id}')">✎</button><button class="ib del" onclick="delTx('${tx.id}')">×</button>`:''}
        </div>
      </div>`;
    });
  });
  list.innerHTML=h;
}

function setAlloc(mid,bid,val){
  const m=getMonth(mid);if(!m)return;if(!m.allocations)m.allocations={};
  m.allocations[bid]=Math.max(parseFloat(val)||0,0);
  save();renderTopbar();renderSidebar();renderMain();
}
function commitAlloc(mid,bid){
  const val=parseFloat(document.getElementById('aerAlloc')?.value)||0;
  const m=getMonth(mid);if(!m)return;if(!m.allocations)m.allocations={};
  m.allocations[bid]=val;save();renderTopbar();renderSidebar();renderMain();
}
function updateBudget(bid){
  const val=parseFloat(document.getElementById('aerBudget')?.value)||0;
  const m=getMonth(S.activeMonth);if(!m)return;
  m.budgets[bid]=val;const b=getBucket(bid);if(b)b.defaultBudget=val;save();renderMain();
}
function fundCategory(catId,mid){
  const m=getMonth(mid);if(!m)return;if(!m.allocations)m.allocations={};
  S.buckets.filter(b=>b.catId===catId&&!b.archived).forEach(b=>{
    // Use existing budget target, fall back to default, never go below 0
    const target=Math.max(m.budgets[b.id]||b.defaultBudget||0, 0);
    m.allocations[b.id]=target;
  });
  save();render();
}

function setMonth(id){S.activeMonth=id;S.activeBucket=null;S.activeAccount=null;save();render();setTimeout(()=>{const el=document.querySelector('.mtab.active');if(el)el.scrollIntoView({behavior:'smooth',inline:'nearest'});},50);}
function setBucket(id){S.activeBucket=id||null;S.activeAccount=null;save();renderSidebar();renderMain();renderTxList();}
function setActiveAccount(id){S.activeAccount=id;S.activeBucket=null;save();renderSidebar();renderMain();renderTxList();}
function clearActive(){S.activeBucket=null;S.activeAccount=null;save();renderSidebar();renderMain();renderTxList();}
function setFilter(f){
  S.txFilter=f;
  ['All','In','Out','Xfr'].forEach(x=>{const el=document.getElementById('f'+x);if(el)el.className='rfbtn'+(f===x.toLowerCase()?' active':'');});
  renderTxList();
}
function archiveOrDelete(id){
  const b=getBucket(id);if(!b)return;
  const hasTxs=S.txs.some(t=>t.bucketId===id);
  if(hasTxs){if(!confirm(`Archive "${b.name}"? Transactions preserved, hidden from active view.`))return;b.archived=true;}
  else{if(!confirm(`Delete "${b.name}"?`))return;S.buckets=S.buckets.filter(x=>x.id!==id);S.months.forEach(m=>{delete m.budgets[id];if(m.allocations)delete m.allocations[id];});}
  if(S.activeBucket===id)S.activeBucket=null;
  save();render();populateTxCats();
}

let txType='out';
let editingTxId=null;

function setTxType(t){
  txType=t;
  document.getElementById('ttOut').className='ttbtn'+(t==='out'?' sel-out':'');
  document.getElementById('ttIn').className='ttbtn'+(t==='in'?' sel-in':'');
  document.getElementById('ttXfr').className='ttbtn'+(t==='xfr'?' sel-xfr':'');
  updateTxFormForType();
}
function updateTxFormForType(){
  const bktRow=document.getElementById('txBktRow');
  const xfrRow=document.getElementById('txXfrRow');
  if(!bktRow||!xfrRow)return;
  bktRow.style.display=txType==='out'?'flex':'none';
  xfrRow.style.display=txType==='xfr'?'flex':'none';
  // Add gap between rows when shown
  bktRow.style.gap='6px';
  // Populate accounts
  const asel=document.getElementById('txAcct');if(!asel)return;
  const prevA=asel.value;
  asel.innerHTML='<option value="">Account...</option>';
  S.accounts.forEach(a=>asel.innerHTML+=`<option value="${a.id}">${a.name}</option>`);
  if(prevA)asel.value=prevA;
  // Transfer-to accounts
  const tsel=document.getElementById('txXfrTo');if(!tsel)return;
  const prevT=tsel.value;
  tsel.innerHTML='<option value="">To account...</option>';
  S.accounts.forEach(a=>tsel.innerHTML+=`<option value="${a.id}">${a.name}</option>`);
  if(prevT)tsel.value=prevT;
}
function onTxTypeOrAcctChange(){updateTxFormForType();}
function populateTxCats(){
  const sel=document.getElementById('txCat');if(!sel)return;
  const prev=sel.value;
  sel.innerHTML='<option value="">Category...</option>';
  sortedCats().forEach(c=>sel.innerHTML+=`<option value="${c.id}">${c.name}</option>`);
  if(prev)sel.value=prev;
  syncTxBuckets();
}
function syncTxBuckets(){
  const catId=document.getElementById('txCat')?.value;
  const bsel=document.getElementById('txBkt');if(!bsel)return;
  const prev=bsel.value;
  bsel.innerHTML='<option value="">Bucket...</option>';
  sortedBuckets(catId).forEach(b=>bsel.innerHTML+=`<option value="${b.id}">${b.name}</option>`);
  if(prev)bsel.value=prev;
}
function addTx(){
  const desc=document.getElementById('txDesc').value.trim();
  const txAmtEl=document.getElementById('txAmt');
  const txAmtRaw=txAmtEl.value;
  const txAmtCurrent=parseFloat(txAmtRaw)||0;
  const txAmtRef=monthProjectedIncome(S.activeMonth);
  const amt=evalMoneyExpr(txAmtRaw,txAmtCurrent,txAmtRef);
  txAmtEl.value=amt||'';
  const date=document.getElementById('txDate').value;
  const rec=document.getElementById('txRec').checked;
  const acctId=document.getElementById('txAcct').value;
  const bkt=txType==='out'?document.getElementById('txBkt').value:null;
  const toAcct=txType==='xfr'?document.getElementById('txXfrTo').value:null;

  if(!desc){document.getElementById('txDesc').focus();return;}
  if(!amt||amt<=0){document.getElementById('txAmt').focus();return;}
  if(!date){document.getElementById('txDate').focus();return;}
  if(!acctId){alert('Please select an account.');return;}
  if(txType==='out'&&!bkt){alert('Please select a bucket.');return;}
  if(txType==='xfr'&&!toAcct){alert('Please select destination account.');return;}
  if(txType==='xfr'&&toAcct===acctId){alert('Cannot transfer to the same account.');return;}

  // Determine correct month from date
  const monthId=dateToMonthId(date);
  // Ensure that month exists
  const d=new Date(date+'T12:00:00');
  const my=d.getFullYear(),mm=d.getMonth();
  addMonth(my,mm);

  const tx={
    id:'_'+Math.random().toString(36).slice(2,9),
    accountId:acctId,
    toAccountId:toAcct||null,
    monthId,
    bucketId:bkt||null,
    desc,amount:amt,type:txType,date,recurring:rec
  };

  if(editingTxId){
    const idx=S.txs.findIndex(t=>t.id===editingTxId);
    if(idx>-1)S.txs[idx]={...S.txs[idx],...tx,id:editingTxId};
    editingTxId=null;
    document.getElementById('txSubmitBtn').textContent='Add Transaction';
  } else {
    S.txs.push(tx);
  }
  save();
  document.getElementById('txDesc').value='';
  document.getElementById('txAmt').value='';
  document.getElementById('txRec').checked=false;
  render();
}

function addMonth(y,m){
  const id=mId(y,m);if(S.months.find(mo=>mo.id===id))return;
  const budgets={},allocations={};
  S.buckets.filter(b=>!b.archived).forEach(b=>{budgets[b.id]=b.defaultBudget||0;allocations[b.id]=0;});
  S.months.push({id,label:mLabel(y,m),year:y,month:m,budgets,allocations});
  S.months.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
}

function editTx(id){
  const tx=S.txs.find(t=>t.id===id);if(!tx)return;
  editingTxId=id;
  document.getElementById('txDesc').value=tx.desc;
  document.getElementById('txAmt').value=tx.amount;
  document.getElementById('txDate').value=tx.date;
  document.getElementById('txRec').checked=tx.recurring;
  setTxType(tx.type);
  document.getElementById('txAcct').value=tx.accountId||'';
  if(tx.bucketId){const b=getBucket(tx.bucketId);if(b){document.getElementById('txCat').value=b.catId;syncTxBuckets();document.getElementById('txBkt').value=tx.bucketId;}}
  if(tx.toAccountId)document.getElementById('txXfrTo').value=tx.toAccountId;
  document.getElementById('txSubmitBtn').textContent='Update Transaction';
  document.getElementById('txDesc').focus();
}
function delTx(id){
  if(!confirm('Delete this transaction?'))return;
  S.txs=S.txs.filter(t=>t.id!==id);save();render();
}

function _wiPanelHTML(){

  const sc=S.wiScenario;
  if(!sc)return'';
  const piReal=monthProjectedIncome(mid)||0;
  const piSc=sc.incomeOverrides[mid]!==undefined?sc.incomeOverrides[mid]:piReal;
  const scAlloc=S.buckets.filter(b=>!b.archived).reduce((s,b)=>s+(sc.budgets[b.id]??bBudget(mid,b.id)),0);
  const scSurplus=piSc-scAlloc;

  </div>

  // Left col: income + summary + bucket adjustments

      title="Math: +50, -20, *1.05, 5% of income, =100+50"
      onchange="(function(inp){var cur=S.wiScenario.incomeOverrides['${mid}']??${piReal};var val=evalMoneyExpr(inp.value,cur,cur);inp.value=val;S.wiScenario.incomeOverrides['${mid}']=val;renderWI();renderMain();})(this)"

  </div>
  <div style="display:flex;gap:12px;font-size:12px;padding-bottom:10px;border-bottom:1px solid var(--border);">
    <span style="color:var(--text3)">Allocated: <strong style="color:var(--text)">${$f(scAlloc)}</strong></span>
    <span style="color:${surplusColor}">${scSurplus>=0?'Surplus +':'Deficit '}${$f(Math.abs(scSurplus))}</span>

  sortedCats().forEach(cat=>{

    h+=`<div class="wi-cat-hdr" onclick="this.nextElementSibling.classList.toggle('hidden');this.querySelector('.wi-cat-arrow').classList.toggle('open')">
      <span class="wi-cat-arrow open">▶</span>${esc(cat.name)}
    </div><div>`;
    bkts.forEach(b=>{
      const real=getMonth(mid)?.budgets[b.id]||0;
      const val=sc.budgets[b.id]!==undefined?sc.budgets[b.id]:real;
      const diff=val-real;
      const diffHtml=diff!==0?`<span class="wi-diff ${diff>0?'pos':'neg'}">${diff>0?'+':''}${$f(diff)}</span>`:'';
      h+=`<div class="wi-bkt-row">
        <span class="wi-bkt-label">${esc(b.name)}</span>
        ${diffHtml}
        <input class="wi-s-inp" type="text" inputmode="decimal" value="${val||''}" placeholder="0" style="width:80px"
          title="Math: +50, -20, *1.05, 5% of income, =100+50"
          onchange="(function(inp){var cur=S.wiScenario.budgets['${b.id}']??${real};var ref=S.wiScenario.incomeOverrides['${mid}']??${piReal};var v=evalMoneyExpr(inp.value,cur,ref);inp.value=v;S.wiScenario.budgets['${b.id}']=v;renderWI();renderMain();})(this)"
          onkeydown="if(event.key==='Enter')this.blur()" />

        ${ov?'<span style="color:var(--amber);font-size:10px">*</span>':''}
      </td>
      <td>${$f(aR)}</td>
      <td>${sR>=0?'+':''}${$f(sR)}</td>
      <td>${cum2>=0?'+':''}${$f(cum2)}</td>
    </tr>`;
    cm2++;if(cm2>11){cm2=0;cy2++;}
  }
  h+=`</tbody></table></div>
  <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn-save" onclick="promoteScenario()">Promote to real budgets</button>
    <button class="btn-cancel" onclick="exitWI()">Exit What If</button>
  </div>`;
  return h;
}

function exitWI(){
  S.scenario=false;S.wiScenario=null;S.wiOpen=false;
  document.getElementById('wiStrip')?.classList.add('hidden');
  document.getElementById('wiOverlay')?.classList.add('hidden');
  const btn=document.getElementById('wiBtnTop');if(btn)btn.className='tbtn';
  const mBtn=document.getElementById('mWiBtn');if(mBtn){mBtn.style.borderColor='';mBtn.style.color='';}
  closeModal();
  render();
}

function saveScenario(){
  if(!S.wiScenario)return;
  if(!S.scenarios)S.scenarios=[];
  // Update name from input
  const inp=document.getElementById('wiNameInp');
  if(inp)S.wiScenario.name=inp.value||S.wiScenario.name;
  // Remove duplicate
  S.scenarios=S.scenarios.filter(s=>s.id!==S.wiScenario.id);
  S.scenarios.push({...S.wiScenario});
  // Max 3
  if(S.scenarios.length>3)S.scenarios=S.scenarios.slice(-3);
  save();
  if(isMobile())openModal('__wi__');else renderWI();
}

function loadScenario(id){
  const sc=S.scenarios?.find(s=>s.id===id);
  if(!sc)return;
  S.wiScenario=JSON.parse(JSON.stringify(sc));
  S.scenario=true;
  if(isMobile())openModal('__wi__');else renderWI();renderMain();
}

function deleteScenario(id){
  S.scenarios=S.scenarios?.filter(s=>s.id!==id)||[];
  save();
  if(isMobile())openModal('__wi__');else renderWI();
}

function promoteScenario(){
  if(!S.wiScenario)return;
  if(!confirm('Apply scenario targets to current and future months?'))return;
  const now=new Date();
  S.months.forEach(m=>{
    if(m.year>now.getFullYear()||(m.year===now.getFullYear()&&m.month>=now.getMonth())){
      Object.keys(S.wiScenario.budgets).forEach(bid=>{m.budgets[bid]=S.wiScenario.budgets[bid];});
      if(S.wiScenario.incomeOverrides[m.id]!==undefined)m.projectedIncome=S.wiScenario.incomeOverrides[m.id];
    }
  });
  S.buckets.forEach(b=>{if(S.wiScenario.budgets[b.id]!==undefined)b.defaultBudget=S.wiScenario.budgets[b.id];});
  exitWI();save();render();
}

function moveAcct(id,dir){
  const idx=S.accounts.findIndex(a=>a.id===id);

  if(swap<0||swap>=S.accounts.length)return;
  const tmp=S.accounts[idx];S.accounts[idx]=S.accounts[swap];S.accounts[swap]=tmp;
  save();openSettings();renderTopbar();
}

  const name=document.getElementById('wAcctName').value.trim();

  const m=parseFloat(row.budget)||0;

  const per=row.contrib==='weekly'?+(m/4.33).toFixed(2):row.contrib==='biweekly'?+(m/2).toFixed(2):m;

function saveModal(){
  MsnapBuilder();
  if(M.tab==='acct'){
    MsnapAcct();
    const name=M.acctName.trim();if(!name){document.getElementById('mAcctName')?.focus();return;}
    if(M.acctEditId){
      const a=getAcct(M.acctEditId);if(a){a.name=name;a.color=M.acctColor;a.type=M.acctType;}
    } else {
      const id='_'+Math.random().toString(36).slice(2,9);
      S.accounts.push({id,name,color:M.acctColor,type:M.acctType,openingBalance:0});
      const bal=parseFloat(M.acctBal)||0;
      if(bal!==0){
        const today=new Date().toISOString().split('T')[0];
        addMonth(new Date().getFullYear(),new Date().getMonth());
        S.txs.push({id:'_'+Math.random().toString(36).slice(2,9),accountId:id,toAccountId:null,monthId:dateToMonthId(today),bucketId:null,desc:'Opening Balance',amount:bal,type:'opening',date:today,recurring:false});
      }
    }
    save();closeModal();render();updateTxFormForType();

  } else if(M.tab==='bkt'){
    // Single bucket edit/create
    MsnapBkt();
    const name=M.bktName.trim();
    const catId=M.bktCat;
    if(!name){document.getElementById('mBktName')?.focus();return;}
    if(!catId){alert('Please select a category.');return;}
    const type=M.bktType;
    const budget=parseFloat(M.bktBudget)||0;
    const dueDay=M.bktDueDay||null;
    const goal=type==='sinking'?parseFloat(M.bktGoal)||null:null;
    const tDate=type==='sinking'?M.bktDate||null:null;
    const contrib=type==='sinking'?M.bktContrib:'monthly';
    if(M.bktEditId){
      const b=getBucket(M.bktEditId);
      if(b){b.name=name;b.catId=catId;b.type=type;b.defaultBudget=budget;b.dueDay=dueDay;b.recurring=M.bktRecurring;b.rollover=M.bktRollover;b.targetAmount=goal;b.targetDate=tDate;b.contribFreq=contrib;}
      S.months.forEach(m=>{if(!m.budgets)m.budgets={};if(m.budgets[M.bktEditId]===undefined)m.budgets[M.bktEditId]=budget;});
    } else {
      const id='_'+Math.random().toString(36).slice(2,9);
      const cnt=S.buckets.filter(b=>b.catId===catId).length;
      S.buckets.push({id,catId,name,type,defaultBudget:budget,dueDay,recurring:M.bktRecurring,rollover:M.bktRollover,archived:false,targetAmount:goal,targetDate:tDate,contribFreq:contrib,order:cnt});
      S.months.forEach(m=>{if(!m.budgets)m.budgets={};m.budgets[id]=budget;if(!m.allocations)m.allocations={};m.allocations[id]=0;});
    }
    save();closeModal();render();populateTxCats();

  } else {
    // Category + bulk buckets (isCat or isBuilder)
    const isCat=M.tab==='cat';

    // If on cat tab and category hasn't been saved/named yet, save it first
    let catId=M.catEditId||M.builderCatId;
    if(isCat){
      const name=M.catName.trim();
      if(!name){document.getElementById('mCatName')?.focus();return;}
      if(M.catEditId){
        const c=getCat(M.catEditId);if(c){c.name=name;c.color=M.catColor;}
        catId=M.catEditId;
      } else {
        // Create new category
        const newCat={id:'_'+Math.random().toString(36).slice(2,9),name,color:M.catColor,order:S.cats.length};
        S.cats.push(newCat);ensureMonth();
        catId=newCat.id;
        M.catEditId=catId;
        M.builderCatId=catId;
      }
    }

    // If no buckets with names, and it's just category save, close
    const namedBuckets=(M.buckets||[]).filter(r=>r.name.trim());
    if(!namedBuckets.length){
      save();closeModal();render();populateTxCats();return;
    }

    if(!catId){save();closeModal();render();populateTxCats();return;}

    // Save all bucket rows that have names
    namedBuckets.forEach((row,idx)=>{
      const type=row.type;
      const budget=parseFloat(row.budget)||0;
      const dueDay=row.dueDay||null;
      const goal=type==='sinking'?parseFloat(row.goal)||null:null;
      const tDate=type==='sinking'?row.goalDate||null:null;
      const contrib=type==='sinking'?row.contrib:'monthly';

      // If row has a real bucket id (editing existing), update it
      if(row._id&&S.buckets.find(b=>b.id===row._id)){
        const b=getBucket(row._id);
        if(b){b.name=row.name.trim();b.type=type;b.defaultBudget=budget;b.dueDay=dueDay;b.recurring=row.recurring;b.rollover=row.rollover;b.targetAmount=goal;b.targetDate=tDate;b.contribFreq=contrib;}
        S.months.forEach(m=>{if(!m.budgets)m.budgets={};if(m.budgets[row._id]===undefined)m.budgets[row._id]=budget;});
      } else {
        // New bucket
        const id='_'+Math.random().toString(36).slice(2,9);
        const cnt=S.buckets.filter(b=>b.catId===catId).length;
        S.buckets.push({id,catId,name:row.name.trim(),type,defaultBudget:budget,dueDay,recurring:row.recurring,rollover:row.rollover,archived:false,targetAmount:goal,targetDate:tDate,contribFreq:contrib,order:cnt});
        S.months.forEach(m=>{if(!m.budgets)m.budgets={};m.budgets[id]=budget;if(!m.allocations)m.allocations={};m.allocations[id]=0;});
      }
    });

    save();closeModal();render();populateTxCats();
  }
}

function Mdelete(){
  if(M.tab==='acct'&&M.acctEditId){
    if(!confirm('Delete this account? All its transactions will be removed.'))return;
    S.txs=S.txs.filter(t=>t.accountId!==M.acctEditId&&t.toAccountId!==M.acctEditId);
    S.accounts=S.accounts.filter(a=>a.id!==M.acctEditId);
    if(S.activeAccount===M.acctEditId)S.activeAccount=null;
  } else if(M.tab==='cat'&&M.catEditId){
    if(!confirm('Delete this category and everything inside it?'))return;
    S.buckets.filter(b=>b.catId===M.catEditId).forEach(b=>{S.txs=S.txs.filter(t=>t.bucketId!==b.id);});
    S.buckets=S.buckets.filter(b=>b.catId!==M.catEditId);
    S.cats=S.cats.filter(c=>c.id!==M.catEditId);
    if(S.activeBucket&&!getBucket(S.activeBucket))S.activeBucket=null;
  } else if(M.tab==='bkt'&&M.bktEditId){
    closeModal();archiveOrDelete(M.bktEditId);return;
  }
  save();closeModal();render();populateTxCats();updateTxFormForType();
}

function closeModal(){document.getElementById('overlay').classList.add('hidden');document.getElementById('modalBox').innerHTML='';}

function delCat(id){
  if(!confirm('Delete this category and all its buckets and transactions?'))return;
  S.buckets.filter(b=>b.catId===id).forEach(b=>{S.txs=S.txs.filter(t=>t.bucketId!==b.id);});
  S.buckets=S.buckets.filter(b=>b.catId!==id);S.cats=S.cats.filter(c=>c.id!==id);
  if(S.activeBucket&&!getBucket(S.activeBucket))S.activeBucket=null;
  save();render();populateTxCats();
}

// REORDER
// ═══════════════════════════════════════════════════════
function normalizeCatOrder(){
  S.cats.forEach((c,i)=>{if(c.order===undefined||c.order===null)c.order=i;});
}
function normalizeBktOrder(){
  S.cats.forEach(cat=>{
    const bkts=S.buckets.filter(b=>b.catId===cat.id);
    bkts.forEach((b,i)=>{if(b.order===undefined||b.order===null)b.order=i;});
  });
}

function sortedCats(){
  normalizeCatOrder();
  return [...S.cats].sort((a,b)=>a.order-b.order);
}
function sortedBuckets(catId){
  normalizeBktOrder();
  return S.buckets.filter(b=>b.catId===catId&&!b.archived).sort((a,b)=>a.order-b.order);
}

function moveCat(id,dir){
  normalizeCatOrder();
  const sorted=[...S.cats].sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(c=>c.id===id);
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=sorted.length)return;
  const tmp=sorted[idx].order;
  sorted[idx].order=sorted[swapIdx].order;
  sorted[swapIdx].order=tmp;
  save();renderSidebar();renderMain();
}

function moveBkt(id,dir){
  normalizeBktOrder();
  const b=getBucket(id);if(!b)return;
  const sorted=S.buckets.filter(bk=>bk.catId===b.catId&&!bk.archived).sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(bk=>bk.id===id);
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=sorted.length)return;
  const tmp=sorted[idx].order;
  sorted[idx].order=sorted[swapIdx].order;
  sorted[swapIdx].order=tmp;
  save();renderSidebar();renderMain();
}

function exportData(){
  const snapshot={
    version:6,
    exportedAt:new Date().toISOString(),
    data:S,
  };
  const json=JSON.stringify(snapshot,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().split('T')[0];
  a.href=url;
  a.download=`budget-command-center-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  // Record last export time
  localStorage.setItem('bcc_last_export', Date.now().toString());
  renderSidebar();
  // Brief confirmation
  const btn=event?.currentTarget;
  if(btn){
    const orig=btn.innerHTML;
    btn.style.color='var(--green)';
    btn.querySelector('span').textContent='✓ Exported!';
    setTimeout(()=>{btn.style.color='';renderSidebar();},2000);
  }
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const imported=parsed.data||parsed;
      if(!Array.isArray(imported.accounts)&&!Array.isArray(imported.cats)){
        alert('Invalid backup file — this does not look like a Budget Command Center export.');
        event.target.value='';return;
      }
      const exportDate=parsed.exportedAt?new Date(parsed.exportedAt).toLocaleString():'unknown date';
      const msg='Import backup from '+exportDate+'?\n\nThis will REPLACE all current data.\n\nContinue?';
      if(!confirm(msg)){event.target.value='';return;}
      S=Object.assign({
        accounts:[],cats:[],buckets:[],months:[],txs:[],
        activeMonth:null,activeBucket:null,activeAccount:null,
        scenario:false,scenarioBudgets:{},scenarios:[],wiScenario:null,wiOpen:false,txFilter:'all',onboarded:true,
      },imported);
      S.months.forEach(m=>{if(!m.allocations)m.allocations={};});
      normalizeCatOrder();normalizeBktOrder();
      save();ensureMonth();
      if(!S.activeMonth)S.activeMonth=currentMonthId();
      render();populateTxCats();updateTxFormForType();wireFormKeys();
      event.target.value='';
      alert('Backup imported successfully!');
    }catch(err){
      alert('Failed to read backup file: '+err.message);
      event.target.value='';
    }
  };
  reader.readAsText(file);
}

// Tab order in the tx form: desc → amt → date → acct → cat → bkt → submit
// Enter in any tx field submits the form
function txFieldEnter(e){
  if(e.key==='Enter'){e.preventDefault();addTx();}
}

// Advance focus to next field on Enter within tx form inputs
function txAdvance(e, nextId){
  if(e.key==='Enter'){
    e.preventDefault();
    const next = document.getElementById(nextId);
    if(next) next.focus();
    else addTx();
  }
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName?.toLowerCase();
  const inInput = tag==='input'||tag==='select'||tag==='textarea';
  const modalOpen = !document.getElementById('overlay').classList.contains('hidden');
  const wizOpen   = !document.getElementById('wizardOverlay').classList.contains('hidden');

  // ── Always available ──────────────────────────────
  const wiOpen2=S.wiOpen&&!document.getElementById('wiOverlay')?.classList.contains('hidden');
  if(e.key==='Escape'){
    if(wiOpen2&&!isMobile()){exitWI();return;}
    if(modalOpen){closeModal();return;}
    if(wizOpen){closeWizard();return;}
    // Escape from bucket detail → back to overview
    if(S.activeBucket){setBucket(null);return;}
    if(S.activeAccount){clearActive();return;}
  }

  // ── Modal shortcuts ───────────────────────────────
  if(modalOpen){
    if(e.key==='Enter'&&!inInput){e.preventDefault();saveModal();}
    return; // don't fire global shortcuts while modal is open
  }

  // ── Transaction form shortcuts ────────────────────
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();addTx();return;}

  // Don't fire navigation shortcuts when typing in an input
  if(inInput)return;

  // ── Global navigation ─────────────────────────────
  // N = focus description field (start new transaction)
  if(e.key==='n'||e.key==='N'){
    e.preventDefault();
    const desc=document.getElementById('txDesc');
    if(desc&&document.getElementById('txForm').style.display!=='none'){
      desc.focus();desc.select();
    }
    return;
  }

  // I = focus income (set type to In, focus desc)
  if(e.key==='i'||e.key==='I'){
    e.preventDefault();
    setTxType('in');
    document.getElementById('txDesc')?.focus();
    return;
  }

  // Left/Right arrow = previous/next month
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();
    const idx=S.months.findIndex(m=>m.id===S.activeMonth);
    if(idx===-1)return;
    const next=e.key==='ArrowRight'?idx+1:idx-1;
    if(next>=0&&next<S.months.length)setMonth(S.months[next].id);
    return;
  }

  // O = overview (clear active bucket/account)
  if(e.key==='o'||e.key==='O'){
    e.preventDefault();
    clearActive();
    return;
  }
});

// Wire up Enter key on tx form fields to advance or submit
document.addEventListener('DOMContentLoaded',()=>{
  // These fire after render since fields are static HTML
  wireFormKeys();
});

function wireFormKeys(){
  const fields=['txDesc','txAmt','txDate','txAcct','txCat','txBkt','txXfrTo'];
  fields.forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      e.preventDefault();
      // Find next visible field
      let found=false;
      for(let j=i+1;j<fields.length;j++){
        const next=document.getElementById(fields[j]);
        if(next&&next.offsetParent!==null&&!next.disabled){
          next.focus();found=true;break;
        }
      }
      if(!found)addTx();
    });
  });
  // Evaluate expression in txAmt on blur — wire once via flag
  const txAmtEl=document.getElementById('txAmt');
  if(txAmtEl&&!txAmtEl._exprWired){
    txAmtEl._exprWired=true;
    txAmtEl.addEventListener('blur',()=>{
      const raw=txAmtEl.value;
      if(!raw)return;
      const cur=parseFloat(raw)||0;
      const ref=monthProjectedIncome(S.activeMonth);
      const v=evalMoneyExpr(raw,cur,ref);
      if(String(v)!==raw)txAmtEl.value=v||'';
    });
  }
}

// Wire allocation input Enter to commit and move to next bucket
function wireAllocKeys(){
  document.querySelectorAll('.alloc-inp').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key!=='Enter'&&e.key!=='Tab')return;
      if(e.key==='Tab')return; // let browser handle tab
      e.preventDefault();
      inp.dispatchEvent(new Event('change'));
      // Move focus to next alloc input
      const all=[...document.querySelectorAll('.alloc-inp')];
      const idx=all.indexOf(inp);
      if(idx>-1&&idx<all.length-1)all[idx+1].focus();
    });
  });
}

// Defer init until DOM is fully ready
document.addEventListener('DOMContentLoaded',()=>{
  // Apply saved theme immediately
  applyTheme(localStorage.getItem('bcc_theme')||'dark');

  // Show update banner if app version changed since last visit
  const lastVersion=localStorage.getItem('bcc_app_version');
  if(lastVersion&&lastVersion!==APP_VERSION){
    document.getElementById('updateBanner')?.classList.remove('hidden');
  }
  localStorage.setItem('bcc_app_version',APP_VERSION);

  // Resize handler — only re-init if app is already initialized (auth complete)
  window.addEventListener('resize',()=>{
    clearTimeout(_resizeTimer);
    _resizeTimer=setTimeout(()=>{
      if(!_appInitialized)return; // Never re-init before auth completes
      const nowMobile=isMobile();
      if(nowMobile===_layoutIsMobile)return;
      _layoutIsMobile=nowMobile;
      if(nowMobile){initMobile();}
      else{initDesktop();}
    },150);
  });

  if(supaReady()){
    // Supabase configured — auth flow handles app init
    authInit().catch(err=>{
      console.error('authInit failed, falling back to offline mode:',err);
      _appInitialized=true;
      setSyncStatus('error','Auth error — running offline');
      if(isMobile()){initMobile();}else{initDesktop();}
      if(!S.accounts.length){startWizard();}
    });
  } else {
    // No Supabase config — run locally without auth gate
    _appInitialized=true;
    if(isMobile()){initMobile();}
    else{initDesktop();}
    if(!S.accounts.length){startWizard();}
  }
});

// ── Init mobile ──────────────────────────────────────────────────────────────

// ── Tab navigation ───────────────────────────────────────────────────────────
function mGoTab(tab){
  // Animate out current
  const cur=document.getElementById('ms'+capitalize(mTab));
  cur?.classList.add('slide-left');
  setTimeout(()=>cur?.classList.remove('slide-left'),300);

  mTab=tab;
  // Update nav buttons
  ['dash','buckets','log','ledger'].forEach(t=>{
    const btn=document.getElementById('mn'+capitalize(t));
    btn?.classList.toggle('active',t===tab);
  });
  // Activate screen
  document.querySelectorAll('.mScreen').forEach(s=>s.classList.remove('active'));
  const next=document.getElementById('ms'+capitalize(tab));
  next?.classList.add('active');

  // Render content
  if(tab==='dash')mRenderDash();
  else if(tab==='buckets')mRenderBuckets();
  else if(tab==='log')mRenderLog();
  else if(tab==='ledger')mRenderLedger();
}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ── Dashboard ────────────────────────────────────────────────────────────────

  const budgetBal=S.accounts.filter(a=>a.type==='budget').reduce((s,a)=>s+acctBalance(a.id),0);
  const income=monthIncome(mid);
  const alloc=totalAllocated(mid);
  const rts=readyToSpend(mid);
  const spent=S.buckets.filter(b=>!b.archived).reduce((s,b)=>s+bSpent(mid,b.id),0);

  let h='';

  // Account chips
  h+=`<div class="m-accounts-hdr">
    <span class="m-section-label" style="margin:0">Accounts</span>
    <button class="m-cat-add-btn" onclick="openModal('acct')">+ Account</button>
  </div>`;
  h+=`<div class="m-accounts">`;
  S.accounts.forEach(a=>{
    const bal=acctBalance(a.id);
    const color=a.color||COLORS[0];
    h+=`<div class="m-acct-chip" onclick="mOpenAcct('${a.id}')">
      <div class="m-acct-chip-name"><div class="m-acct-chip-dot" style="background:${color}"></div>${a.name}<span class="m-acct-chip-type">${a.type==='savings'?'savings':''}</span></div>
      <div class="m-acct-chip-bal" style="color:${bal>=0?'var(--text)':'var(--red)'}">${$f(bal)}</div>
    </div>`;
  });
  if(!S.accounts.length)h+=`<div style="padding:10px;color:var(--text3);font-size:13px;">No accounts yet</div>`;
  h+=`</div>`;

  // Budget health bar
  h+=mRenderBudgetHealth(mid);

  // Pool numbers
  h+=`<div class="m-pool-grid">
    <div class="m-pool-cell hero">
      <div class="m-pool-label">Ready to Spend</div>
      <div class="m-pool-val lg ${rts>0?'green':rts<0?'red':'dim'}">${$f(Math.abs(rts))}</div>
      <div class="m-pool-sub">${rts>0?'unallocated':rts<0?'over-allocated':'fully allocated ✓'}</div>
    </div>
    <div class="m-pool-cell">
      <div class="m-pool-label">Income</div>
      <div class="m-pool-val ${income>0?'green':'dim'}">${income>0?$f(income):'—'}</div>
      <div class="m-pool-sub">this month</div>
    </div>
    <div class="m-pool-cell">
      <div class="m-pool-label">Spent</div>
      <div class="m-pool-val dim">${spent>0?$f(spent):'—'}</div>
      <div class="m-pool-sub">from buckets</div>
    </div>
    <div class="m-pool-cell">
      <div class="m-pool-label">Allocated</div>
      <div class="m-pool-val dim">${alloc>0?$f(alloc):'—'}</div>
      <div class="m-pool-sub">to buckets</div>
    </div>
    <div class="m-pool-cell">
      <div class="m-pool-label">Total Cash</div>
      <div class="m-pool-val dim">${$f(totalCash())}</div>
      <div class="m-pool-sub">all accounts</div>
    </div>
  </div>`;

  // Urgency items
  const urgency=[];
  const m=getMonth(mid);
  if(m){
    S.buckets.filter(b=>!b.archived).forEach(b=>{
      const days=daysUntilDue(b,m.year,m.month);
      const alloc=bAlloc(mid,b.id);
      const spent=bSpent(mid,b.id);
      const avail=alloc+rolloverBal(b.id,mid)-spent;
      if(avail<0)urgency.push({type:'over',b,avail,days,priority:0});
      else if(days!==null&&days<=0&&alloc===0)urgency.push({type:'overdue',b,avail,days,priority:1});
      else if(days!==null&&days<=3&&alloc===0)urgency.push({type:'due-soon',b,avail,days,priority:2});
      else if(alloc===0&&bBudget(mid,b.id)>0)urgency.push({type:'unfunded',b,avail,days,priority:3});
    });
    urgency.sort((a,b)=>a.priority-b.priority||((a.days??999)-(b.days??999)));
  }

  if(urgency.length){
    h+=`<div class="m-section-label">Needs Attention</div>`;
    urgency.slice(0,8).forEach(u=>{
      const cat=getCat(u.b.catId);
      const color=cat?.color||COLORS[0];
      let dotColor='var(--red)',sub='';
      if(u.type==='over'){sub=`Overspent ${$f(Math.abs(u.avail))}`;dotColor='var(--red)';}
      else if(u.type==='overdue'){sub=`${Math.abs(u.days)}d overdue · unfunded`;dotColor='var(--red)';}
      else if(u.type==='due-soon'){sub=`Due in ${u.days}d · unfunded`;dotColor='var(--amber)';}
      else{sub=`Unfunded · ${$f(bBudget(mid,u.b.id))} target`;dotColor='var(--text3)';}

        <div class="m-urgency-dot" style="background:${dotColor}"></div>
        <div style="flex:1">
          <div class="m-urgency-name">${u.b.name}</div>
          <div class="m-urgency-sub" style="color:${color}">${cat?.name||''} · ${sub}</div>
        </div>
        <span style="color:var(--text3);font-size:18px">›</span>
      </div>`;
    });
  } else if(alloc>0){
    h+=`<div style="padding:20px 16px;text-align:center;color:var(--green);font-size:14px">✓ Everything looks good</div>`;
  }

  // Recent transactions preview
  const recent=S.txs.filter(t=>t.monthId===mid).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
  if(recent.length){
    h+=`<div class="m-section-label">Recent</div>`;
    recent.forEach(tx=>h+=mTxRowHtml(tx));
  }

  // Settings row
  h+=`<div class="m-settings-row">
    <button class="m-settings-btn" onclick="openSettings()">&#x2699; Settings</button>
    <button class="m-settings-btn" onclick="exportData()">&#x2193; Export</button>
    <button class="m-settings-btn" onclick="document.getElementById('importFileMobile').click()">&#x2191; Import</button>
    <button class="m-settings-btn" style="color:var(--red)" onclick="confirmFreshStart()">&#x21BA; Fresh Start</button>
  </div>
  <input type="file" id="importFileMobile" accept=".json" style="display:none" onchange="importData(event)" />`;

  h+=`<div style="height:16px"></div>`;
  el.innerHTML=h;
}

// ── Buckets ───────────────────────────────────────────────────────────────────
function mRenderBuckets(){
  const el=document.getElementById('mBucketsScroll');
  if(!el)return;
  const mid=S.activeMonth;

  if(!S.cats.length){
    el.innerHTML=`<div style="padding:40px 16px;text-align:center">
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">No categories yet</div>
      <div style="color:var(--text3);font-size:14px;margin-bottom:20px">Create a category to get started</div>
      <button class="m-submit" style="width:auto;padding:12px 24px" onclick="openModal('cat')">+ Create Category</button>
    </div>`;return;
  }

  let h='';
  sortedCats().forEach(cat=>{
    const catBuckets=sortedBuckets(cat.id);
    const color=cat.color||COLORS[0];
    const catAlloc=catBuckets.reduce((s,b)=>s+bAlloc(mid,b.id),0);
    const catTarget=catBuckets.reduce((s,b)=>s+bBudget(mid,b.id),0);

    h+=`<div class="m-cat-sec">
      <div class="m-cat-hdr">
        <div class="m-cat-color" style="background:${color}"></div>
        <span class="m-cat-name">${cat.name}</span>
        <span class="m-cat-totals">${$f(catAlloc)} / ${$f(catTarget)}</span>
        <button class="m-cat-add-btn" onclick="event.stopPropagation();openModal('bkt','${cat.id}')">+ Bucket</button>
      </div>`;

    if(!catBuckets.length){
      h+=`<div style="padding:12px 16px;color:var(--text3);font-size:13px;font-style:italic">No buckets yet — tap + Bucket to add one</div>`;
    }

    const m=getMonth(mid);
    const sorted=[...catBuckets].sort((a,b)=>{
      const da=daysUntilDue(a,m?.year,m?.month);
      const db=daysUntilDue(b,m?.year,m?.month);
      if(da!==null&&da<=0&&(db===null||db>0))return -1;
      if(db!==null&&db<=0&&(da===null||da>0))return 1;
      return (a.order??0)-(b.order??0);
    });

    sorted.forEach(b=>{
      const alloc=bAlloc(mid,b.id);
      const target=bBudget(mid,b.id);
      const roll=rolloverBal(b.id,mid);
      const eff=alloc+roll;
      const spent=bSpent(mid,b.id);
      const avail=eff-spent;
      const pctRaw=eff>0?spent/eff:0;
      const pct=Math.min(pctRaw,1);
      const days=daysUntilDue(b,m?.year,m?.month);
      let pillCls='pill-empty',pillTxt='Unfunded';
      if(avail<0){pillCls='pill-over';pillTxt='Over';}
      else if(spent>=eff&&eff>0){pillCls='pill-done';pillTxt='Done';}
      else if(alloc>=target&&target>0){pillCls='pill-funded';pillTxt='Funded';}
      else if(alloc>0){pillCls='pill-partial';pillTxt=Math.round(pctRaw*100)+'%';}
      let dueStr='';
      if(days!==null){dueStr=days<0?`${Math.abs(days)}d overdue`:days===0?'due today':days<=7?`due ${days}d`:'';}
      const fillColor=pctRaw>1?'var(--red)':pctRaw>0.8?'var(--amber)':'var(--green)';

      h+=`<div class="m-bucket-item" onclick="mOpenBucket('${b.id}')">
        <div style="width:4px;border-radius:2px;align-self:stretch;min-height:40px;background:${color};flex-shrink:0"></div>
        <div class="m-bkt-left">
          <div class="m-bkt-name">${b.name}</div>
          <div class="m-bkt-sub">
            ${dueStr?`<span style="color:${days<=0?'var(--red)':days<=3?'var(--amber)':'var(--text3)'}">${dueStr}</span><span>·</span>`:''}
            <span>${$f(spent)} spent</span>
          </div>
          <div class="m-bkt-bar"><div class="m-bkt-bar-fill" style="width:${Math.round(pct*100)}%;background:${fillColor}"></div></div>
        </div>
        <div class="m-bkt-right">
          <div class="m-bkt-alloc" style="color:${alloc>=target&&target>0?'var(--green)':alloc>0?'var(--text)':'var(--text3)'}">${alloc>0?$f(alloc):'—'}</div>
          <div class="m-bkt-pill ${pillCls}">${pillTxt}</div>
        </div>
        <div class="m-chevron">›</div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`<div style="height:16px"></div>`;
  el.innerHTML=h;
}

function mRenderBulkLog(el){
  if(!mBulkRows.length)mAddBulkRow();

  mBulkRows.forEach((row,i)=>{
    const catOpts=mCatOptions(row.catId);

    const acctOpts=mAcctOptions(row.acctId);
    h+=`<div class="m-bulk-row">

          oninput="mBulkRows[${i}].desc=this.value" />
