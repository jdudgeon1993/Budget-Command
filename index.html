          placeholder="0.00" inputmode="decimal" value="${row.amt||''}"
          oninput="mBulkRows[${i}].amt=this.value" />
        <button class="m-bulk-del" onclick="mBulkRows.splice(${i},1);if(!mBulkRows.length)mAddBulkRow();mRenderLog()">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select class="m-select" style="font-size:14px;padding:9px 10px"
          onchange="mBulkRows[${i}].acctId=this.value">${acctOpts}</select>
        <div class="m-type-row" style="margin:0">
          <button class="m-type-btn${(row.type||'out')==='out'?' sel-out':''}" style="font-size:11px;padding:9px 0"
            onclick="mBulkRows[${i}].type='out';mRenderLog()">↑ Out</button>
          <button class="m-type-btn${(row.type||'out')==='in'?' sel-in':''}" style="font-size:11px;padding:9px 0"
            onclick="mBulkRows[${i}].type='in';mRenderLog()">↓ In</button>
          <button class="m-type-btn${(row.type||'out')==='xfr'?' sel-xfr':''}" style="font-size:11px;padding:9px 0"
            onclick="mBulkRows[${i}].type='xfr';mRenderLog()">⇄</button>
        </div>
      </div>
      ${(row.type||'out')==='out'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select class="m-select" style="font-size:14px;padding:9px 10px"
          onchange="mBulkRows[${i}].catId=this.value;mRenderLog()">${catOpts}</select>
        <select class="m-select" style="font-size:14px;padding:9px 10px"
          onchange="mBulkRows[${i}].bktId=this.value">${bktOpts}</select>
      </div>`:''}
    </div>`;
  });
  h+=`</div>
  <div style="padding:0 16px 8px">
    <button class="m-submit" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)"
      onclick="mAddBulkRow()">+ Add Row</button>
  </div>
  <div class="m-submit-wrap">
    <button class="m-submit" onclick="mSaveAllBulk()">Save All (${mBulkRows.length})</button>
  </div>`;
  el.innerHTML=h;
}

function mAddBulkRow(){
  mBulkRows.push({desc:'',amt:'',type:mStickyLog.type||'out',acctId:mStickyLog.acctId,catId:mStickyLog.catId,bktId:mStickyLog.bktId,toAcctId:''});
}

function mSaveAllBulk(){
  const today=new Date().toISOString().split('T')[0];
  let saved=0;
  mBulkRows.forEach(row=>{
    const desc=(row.desc||'').trim();
    const amt=parseFloat(row.amt)||0;
    if(!desc||!amt||!row.acctId)return;
    if((row.type||'out')==='out'&&!row.bktId)return;
    const monthId=dateToMonthId(today);
    const d=new Date(today+'T12:00:00');
    addMonth(d.getFullYear(),d.getMonth());
    S.txs.push({id:'_'+Math.random().toString(36).slice(2,9),accountId:row.acctId,toAccountId:row.toAcctId||null,monthId,bucketId:row.bktId||null,desc,amount:amt,type:row.type||'out',date:today,recurring:false});
    saved++;
  });
  if(!saved){alert('Please fill in at least one complete row.');return;}
  save();mBulkRows=[];mBulkMode=false;
  mRenderAll();mShowToast('check','Saved '+saved+' transaction'+(saved!==1?'s':''),'');
}

// ── Add single tx from mobile ─────────────────────────────────────────────────
function mAddTx(){
  const desc=document.getElementById('mLogDesc')?.value.trim();
  const amt=parseFloat(document.getElementById('mLogAmt')?.value);
  const date=document.getElementById('mLogDate')?.value;
  const acctId=document.getElementById('mLogAcct')?.value;
  const t=mStickyLog.type||'out';
  const bkt=t==='out'?document.getElementById('mLogBkt')?.value:null;
  const toAcct=t==='xfr'?document.getElementById('mLogXfrTo')?.value:null;
  const rec=document.getElementById('mRecToggle')?.classList.contains('on')||false;

  if(!desc){document.getElementById('mLogDesc')?.focus();mShakeInput('mLogDesc');return;}
  if(!amt||amt<=0){mShakeInput('mLogAmt');return;}
  if(!acctId){mShakeInput('mLogAcct');return;}
  if(t==='out'&&!bkt){mShakeInput('mLogBkt');return;}
  if(t==='xfr'&&!toAcct){mShakeInput('mLogXfrTo');return;}

  // Persist sticky fields
  mStickyLog.acctId=acctId;
  if(bkt){mStickyLog.bktId=bkt;}
  if(document.getElementById('mLogCat'))mStickyLog.catId=document.getElementById('mLogCat').value;

  const monthId=dateToMonthId(date);
  const d=new Date(date+'T12:00:00');
  addMonth(d.getFullYear(),d.getMonth());

  S.txs.push({id:'_'+Math.random().toString(36).slice(2,9),accountId:acctId,toAccountId:toAcct||null,monthId,bucketId:bkt||null,desc,amount:amt,type:t,date,recurring:rec});
  save();

  // Get bucket name for toast
  const bktName=getBucket(bkt)?.name||'';
  const amtStr=(t==='in'?'+':t==='xfr'?'⇄':'-')+$f(amt);
  mShowToast(t==='in'?'in':t==='xfr'?'xfr':'out', desc, amtStr+(bktName?' · '+bktName:''));

  // Re-render log (sticky fields preserved, desc+amt cleared)
  mRenderLog();
  // Update other screens
  mRenderTopbar();
  if(mTab==='dash')mRenderDash();
  else if(mTab==='ledger')mRenderLedger();
  // Refocus description for quick next entry
  setTimeout(()=>document.getElementById('mLogDesc')?.focus(),100);
}

function mShakeInput(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.style.borderColor='var(--red)';
  el.focus();
  setTimeout(()=>el.style.borderColor='',1500);
}

// ── Ledger ────────────────────────────────────────────────────────────────────
function mSetLedgerFilter(f,btn){
  mLedgerFilter=f;
  document.querySelectorAll('#mLedgerFilters .m-chip-btn').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
  mRenderLedger();
}

function mRenderLedger(){
  const el=document.getElementById('mLedgerScroll');
  if(!el)return;
  const mid=S.activeMonth;
  let txs=S.txs.filter(t=>t.monthId===mid);

  if(mLedgerFilter==='in')txs=txs.filter(t=>t.type==='in');
  else if(mLedgerFilter==='out')txs=txs.filter(t=>t.type==='out');
  else if(mLedgerFilter==='xfr')txs=txs.filter(t=>t.type==='xfr');

  const search=(document.getElementById('mLedgerSearch')?.value||'').toLowerCase();
  if(search)txs=txs.filter(t=>t.desc.toLowerCase().includes(search)||(getBucket(t.bucketId)?.name||'').toLowerCase().includes(search));

  txs=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(!txs.length){
    el.innerHTML=`<div style="padding:40px 16px;text-align:center;color:var(--text3)">No transactions${search?' matching "'+search+'"':''}.</div>`;
    return;
  }

  const groups={};
  txs.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});

  let h='';
  Object.keys(groups).sort((a,b)=>new Date(b)-new Date(a)).forEach(date=>{
    h+=`<div class="m-tx-date-hdr">${ld(date)}</div>`;
    groups[date].forEach(tx=>h+=mTxRowHtml(tx,true));
  });
  h+=`<div style="height:16px"></div>`;
  el.innerHTML=h;
}

function mTxRowHtml(tx,tappable){
  const b=getBucket(tx.bucketId);
  const cat=b?getCat(b.catId):null;
  const acct=getAcct(tx.accountId);
  const color=cat?.color||'var(--text3)';
  const isOpening=tx.type==='opening';
  const amtCls=isOpening?'in':tx.type==='xfr'?'xfr':tx.type==='in'?'in':'out';
  const amtPfx=isOpening||tx.type==='in'?'+':'-';
  const indColor=tx.type==='in'||isOpening?'var(--green)':tx.type==='xfr'?'var(--purple)':'var(--red)';
  const metaParts=[];
  if(acct)metaParts.push(acct.name);
  if(cat)metaParts.push(cat.name);
  if(b)metaParts.push(b.name);
  if(tx.type==='xfr')metaParts.push('→ '+(getAcct(tx.toAccountId)?.name||''));
  const onclick=tappable?`onclick="mEditTxSheet('${tx.id}')"`:'' ;
  return `<div class="m-tx-row" ${onclick}>
    <div class="m-tx-ind" style="background:${indColor}"></div>
    <div class="m-tx-l">
      <div class="m-tx-name">${tx.desc}</div>
      <div class="m-tx-meta" style="color:${color}">${metaParts.join(' · ')}</div>
    </div>
    <div class="m-tx-amt ${amtCls}">${amtPfx}${$f(tx.amount)}</div>
  </div>`;
}

// ── Subviews ─────────────────────────────────────────────────────────────────
function mOpenBucket(id){
  mSubview={type:'bucket',id};
  history.pushState({},'','');
  document.getElementById('mSubBucket').classList.add('active');
  mRenderSubview();
}

function mOpenAcct(id){
  mSubview={type:'account',id};
  history.pushState({},'','');
  document.getElementById('mSubAccount').classList.add('active');
  mRenderSubview();
}

function mCloseSubview(){
  if(!mSubview)return;
  const el=mSubview.type==='bucket'?document.getElementById('mSubBucket'):document.getElementById('mSubAccount');
  el?.classList.remove('active');
  mSubview=null;
}

function mEditActiveBucket(){if(mSubview?.type==='bucket')editBucket(mSubview.id);}
function mEditActiveAcct(){if(mSubview?.type==='account')editAcct(mSubview.id);}

function mRenderSubview(){
  if(!mSubview)return;
  if(mSubview.type==='bucket')mRenderBucketDetail(mSubview.id);
  else if(mSubview.type==='account')mRenderAcctDetail(mSubview.id);
}

function mRenderBucketDetail(bid){
  const b=getBucket(bid);if(!b)return;
  const el=document.getElementById('mSubBucketScroll');
  const title=document.getElementById('mSubBucketTitle');
  if(!el||!title)return;
  title.textContent=b.name;
  const cat=getCat(b.catId);const color=cat?.color||COLORS[0];
  const mid=S.activeMonth;
  const alloc=bAlloc(mid,bid);
  const target=bBudget(mid,bid);
  const roll=rolloverBal(bid,mid);
  const eff=alloc+roll;
  const spent=bSpent(mid,bid);
  const avail=eff-spent;
  const pctRaw=eff>0?spent/eff:0;
  const pct=Math.min(pctRaw,1);
  const fillColor=pctRaw>1?'var(--red)':pctRaw>0.8?'var(--amber)':'var(--green)';
  const isSink=b.type==='sinking';
  const past=monthStatus(mid)==='past';
  const m=getMonth(mid);
  const days=daysUntilDue(b,m?.year,m?.month);

  let h=`<div class="m-det-hero" style="border-left:4px solid ${color}">
    <div class="m-det-name">${b.name}</div>
    <div class="m-det-meta">
      <span style="color:${color}">${cat?.name||''}</span>
      ${days!==null?`<span>·</span><span style="color:${days<=0?'var(--red)':days<=7?'var(--amber)':'var(--text3)'}">Due ${days<0?Math.abs(days)+'d ago':days===0?'today':'in '+days+'d'}</span>`:''}
      ${b.rollover?'<span>·</span><span>Rolls over</span>':''}
    </div>
  </div>
  <div class="m-det-nums">
    <div class="m-det-num-cell"><div class="m-det-num-label">Allocated</div><div class="m-det-num-val" style="color:${alloc>=target&&target>0?'var(--green)':'var(--text)'}">${$f(alloc)}</div></div>
    <div class="m-det-num-cell"><div class="m-det-num-label">Spent</div><div class="m-det-num-val" style="color:var(--text2)">${$f(spent)}</div></div>
    <div class="m-det-num-cell"><div class="m-det-num-label">Available</div><div class="m-det-num-val" style="color:${avail>0?'var(--green)':avail<0?'var(--red)':'var(--text3)'}">${$f(avail)}</div></div>
  </div>
  <div class="m-prog-wrap">
    <div class="m-prog-track"><div class="m-prog-fill" style="width:${Math.round(pct*100)}%;background:${fillColor}"></div></div>
    <div class="m-prog-note"><span>${Math.round(pctRaw*100)}% used</span><span>${pctRaw>1?'⚠ over by '+$f(spent-eff):$f(Math.max(eff-spent,0))+' remaining'}</span></div>
  </div>`;

  if(isSink){
    const saved=sinkingSaved(bid);const tgt=b.targetAmount||0;
    const now=new Date();const td=b.targetDate?new Date(b.targetDate+'-01'):null;
    const mLeft=td?Math.max((td.getFullYear()-now.getFullYear())*12+(td.getMonth()-now.getMonth()),0):0;
    const mNeed=mLeft>0?Math.ceil((tgt-saved)/mLeft):0;
    const contrib=contribAmt(b);
    h+=`<div class="m-sink-grid">
      <div class="m-sink-cell"><div class="m-sink-label">Saved</div><div class="m-sink-val" style="color:var(--green)">${$f(saved)}</div></div>
      <div class="m-sink-cell"><div class="m-sink-label">Goal</div><div class="m-sink-val">${$f(tgt)}</div></div>
      <div class="m-sink-cell"><div class="m-sink-label">Months Left</div><div class="m-sink-val">${mLeft||'—'}</div></div>
      <div class="m-sink-cell"><div class="m-sink-label">Per Contrib</div><div class="m-sink-val" style="color:var(--accent)">${$f(contrib)}</div></div>
    </div>`;
  }

  if(!past){
    h+=`<div class="m-alloc-block">
      <div class="m-alloc-block-label">Allocate this month <span style="color:var(--text3);font-size:11px">target: ${$f(target)}</span></div>
      <div class="m-alloc-inp-row">
        <input class="m-alloc-big" id="mAllocInp" type="number" inputmode="decimal" value="${alloc||''}" placeholder="0.00"
          onkeydown="if(event.key==='Enter')mSetAlloc('${bid}')" />
        <button class="m-alloc-set-btn" onclick="mSetAlloc('${bid}')">Set</button>
      </div>
      ${target>0&&alloc<target?`<button style="margin-top:10px;width:100%;padding:11px;background:var(--gbg);color:var(--green);border:1px solid var(--gb);border-radius:var(--r);font-size:14px;font-family:var(--sans);font-weight:600;cursor:pointer"
        onclick="mFundBucket('${bid}')">Fund at target (${$f(target)})</button>`:''}
    </div>`;
  }

  // Bucket transactions
  const txs=S.txs.filter(t=>t.monthId===mid&&t.bucketId===bid).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(txs.length){
    h+=`<div class="m-section-label">Transactions</div>`;
    txs.forEach(tx=>h+=mTxRowHtml(tx,!past));
  }
  h+=`<div style="height:16px"></div>`;
  el.innerHTML=h;
  // Focus allocation input
  setTimeout(()=>{
    if(!past)document.getElementById('mAllocInp')?.focus();
  },200);
}

function mSetAlloc(bid){
  const val=parseFloat(document.getElementById('mAllocInp')?.value)||0;
  const m=getMonth(S.activeMonth);if(!m)return;
  if(!m.allocations)m.allocations={};
  m.allocations[bid]=val;
  save();mRenderTopbar();mRenderSubview();
  mShowToast('alloc',getBucket(bid)?.name+' allocated',$f(val));
}

function mFundBucket(bid){
  const target=bBudget(S.activeMonth,bid);
  const m=getMonth(S.activeMonth);if(!m)return;
  if(!m.allocations)m.allocations={};
  m.allocations[bid]=target;
  save();mRenderTopbar();mRenderSubview();
  mShowToast('alloc',getBucket(bid)?.name+' funded',$f(target));
}

function mRenderAcctDetail(aid){
  const a=getAcct(aid);if(!a)return;
  const el=document.getElementById('mSubAcctScroll');
  const title=document.getElementById('mSubAcctTitle');
  if(!el||!title)return;
  title.textContent=a.name;
  const bal=acctBalance(aid);
  const txs=S.txs.filter(t=>t.accountId===aid||t.toAccountId===aid).sort((a,b)=>new Date(b.date)-new Date(a.date));
  let h=`<div class="m-det-hero">
    <div class="m-det-name">${$f(bal)}</div>
    <div class="m-det-meta"><span style="color:${a.color}">${a.name}</span><span>·</span><span>${a.type}</span></div>
  </div>
  <div class="m-section-label">Transactions</div>`;
  if(txs.length)txs.forEach(tx=>h+=mTxRowHtml(tx,false));
  else h+=`<div style="padding:20px 16px;text-align:center;color:var(--text3)">No transactions yet</div>`;
  h+=`<div style="height:16px"></div>`;
  el.innerHTML=h;
}

// ── Edit sheet ────────────────────────────────────────────────────────────────
function mEditTxSheet(id){
  const tx=S.txs.find(t=>t.id===id);if(!tx)return;
  const b=getBucket(tx.bucketId);const cat=b?getCat(b.catId):null;
  const acct=getAcct(tx.accountId);
  const body=document.getElementById('mSheetBody');
  const foot=document.getElementById('mSheetFoot');
  document.getElementById('mSheetTitle').textContent='Edit Transaction';

  const catOpts=mCatOptions(b?.catId||'');
  const bktOpts=mBktOptions(b?.catId||'',tx.bucketId||'');
  const acctOpts=mAcctOptions(tx.accountId);

  body.innerHTML=`
    <div>
      <div class="m-field-label" style="margin-bottom:6px">Description</div>
      <input class="m-input" id="sDesc" value="${tx.desc}" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><div class="m-field-label" style="margin-bottom:6px">Amount</div>
        <input class="m-input mono" id="sAmt" type="number" value="${tx.amount}" inputmode="decimal" /></div>
      <div><div class="m-field-label" style="margin-bottom:6px">Date</div>
        <input class="m-input" id="sDate" type="date" value="${tx.date}" /></div>
    </div>
    <div><div class="m-field-label" style="margin-bottom:6px">Account</div>
      <select class="m-select" id="sAcct">${acctOpts}</select></div>
    ${tx.type==='out'?`
    <div><div class="m-field-label" style="margin-bottom:6px">Category</div>
      <select class="m-select" id="sCat" onchange="mSheetCatChange(this.value)">${catOpts}</select></div>
    <div><div class="m-field-label" style="margin-bottom:6px">Bucket</div>
      <select class="m-select" id="sBkt">${bktOpts}</select></div>`:''}`;

  foot.innerHTML=`
    <button style="flex:1;padding:12px;background:var(--rbg);color:var(--red);border:1px solid var(--rb);border-radius:var(--r);font-size:14px;font-family:var(--sans);font-weight:600;cursor:pointer" onclick="mDeleteTxSheet('${id}')">Delete</button>
    <button style="flex:2;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-family:var(--sans);font-weight:600;cursor:pointer" onclick="mSaveTxSheet('${id}','${tx.type}')">Save</button>`;

  document.getElementById('mSheetOverlay').classList.add('show');
  document.getElementById('mSheet').classList.add('show');
}

function mSheetCatChange(catId){
  const bsel=document.getElementById('sBkt');
  if(!bsel)return;
  bsel.innerHTML='<option value="">Bucket...</option>';
  sortedBuckets(catId).forEach(b=>bsel.innerHTML+=`<option value="${b.id}">${b.name}</option>`);
}

function mSaveTxSheet(id,type){
  const tx=S.txs.find(t=>t.id===id);if(!tx)return;
  tx.desc=document.getElementById('sDesc')?.value||tx.desc;
  tx.amount=parseFloat(document.getElementById('sAmt')?.value)||tx.amount;
  tx.date=document.getElementById('sDate')?.value||tx.date;
  tx.accountId=document.getElementById('sAcct')?.value||tx.accountId;
  tx.monthId=dateToMonthId(tx.date);
  if(type==='out'){
    tx.bucketId=document.getElementById('sBkt')?.value||tx.bucketId;
  }
  save();mCloseSheet();mRenderAll();
}

function mDeleteTxSheet(id){
  if(!confirm('Delete this transaction?'))return;
  S.txs=S.txs.filter(t=>t.id!==id);
  save();mCloseSheet();mRenderAll();
}

function mCloseSheet(){
  document.getElementById('mSheetOverlay').classList.remove('show');
  document.getElementById('mSheet').classList.remove('show');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let mToastTimer=null;
function mShowToast(type,text,amt){
  const toast=document.getElementById('mToast');
  const icon=document.getElementById('mToast-icon');
  const textEl=document.getElementById('mToast-text');
  const amtEl=document.getElementById('mToast-amt');
  if(!toast)return;
  icon.textContent=type==='in'?'↓':type==='out'?'↑':type==='xfr'?'⇄':type==='alloc'?'◎':'✓';
  icon.style.color=type==='in'?'var(--green)':type==='out'?'var(--red)':type==='xfr'?'var(--purple)':type==='alloc'?'var(--accent)':'var(--green)';
  textEl.textContent=text;
  amtEl.textContent=amt;
  amtEl.style.color=type==='in'?'var(--green)':type==='out'?'var(--red)':'var(--text2)';
  toast.classList.add('show');
  if(mToastTimer)clearTimeout(mToastTimer);
  mToastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function mCatOptions(selectedCatId){
  let h='<option value="">Category...</option>';
  sortedCats().forEach(c=>h+=`<option value="${c.id}"${c.id===selectedCatId?' selected':''}>${c.name}</option>`);
  return h;
}
function mBktOptions(catId,selectedBktId){
  let h='<option value="">Bucket...</option>';
  if(catId)sortedBuckets(catId).forEach(b=>h+=`<option value="${b.id}"${b.id===selectedBktId?' selected':''}>${b.name}</option>`);
  return h;
}
function mAcctOptions(selectedId){
  let h='<option value="">Account...</option>';
  S.accounts.forEach(a=>h+=`<option value="${a.id}"${a.id===selectedId?' selected':''}>${a.name}</option>`);
  return h;
}

      <div class="m-month-bar">
        <button class="m-month-arrow" onclick="mPrevMonth()">&#8249;</button>
        <select class="m-month-sel" id="mMonthSel" onchange="mSetMonthFromSel(this.value)"></select>
        <button class="m-month-arrow" onclick="mNextMonth()">&#8250;</button>
        <button class="m-month-arrow" onclick="toggleWI()" id="mWiBtn" style="font-size:13px;padding:6px 10px;border-color:var(--border2);">⚡</button>
      </div>
      <div class="mscroll" id="mDashScroll"></div>
    </div>

    <!-- BUCKETS -->
    <div class="mScreen" id="msBuckets">
      <div class="mhdr">
        <div class="mhdr-title">Buckets</div>
        <button class="mhdr-action" onclick="openModal('cat')">+ Category</button>
        <button class="mhdr-action" onclick="openModal('bkt')">+ Bucket</button>
      </div>
      <div class="mscroll" id="mBucketsScroll"></div>
    </div>

    <!-- LOG -->
    <div class="mScreen" id="msLog">
      <div class="mhdr">
        <div class="mhdr-title" id="mLogTitle">Log Transaction</div>
        <button class="mhdr-action" id="mBulkToggle" onclick="mToggleBulk()">Bulk</button>
      </div>
      <div class="mscroll" id="mLogScroll"></div>
    </div>

    <!-- LEDGER -->
    <div class="mScreen" id="msLedger">
      <div class="mhdr">
        <div class="mhdr-title">Ledger</div>
      </div>
      <div class="m-ledger-head">
        <div class="m-filter-chips" id="mLedgerFilters">
          <button class="m-chip-btn active" onclick="mSetLedgerFilter('all',this)">All</button>
          <button class="m-chip-btn" onclick="mSetLedgerFilter('in',this)">↓ Income</button>
          <button class="m-chip-btn" onclick="mSetLedgerFilter('out',this)">↑ Expenses</button>
          <button class="m-chip-btn" onclick="mSetLedgerFilter('xfr',this)">⇄ Transfer</button>
        </div>
        <input class="m-search" id="mLedgerSearch" placeholder="Search transactions..." oninput="mRenderLedger()" />
      </div>
      <div class="mscroll" id="mLedgerScroll"></div>
    </div>

    <!-- BUCKET DETAIL subview -->
    <div class="mSubview" id="mSubBucket">
      <div class="mhdr">
        <button class="mhdr-back" onclick="mCloseSubview()">&#8592; Back</button>
        <div class="mhdr-title" id="mSubBucketTitle"></div>
        <button class="mhdr-action" onclick="mEditActiveBucket()">Edit</button>
      </div>
      <div class="mscroll" id="mSubBucketScroll"></div>
    </div>

    <!-- ACCOUNT DETAIL subview -->
    <div class="mSubview" id="mSubAccount">
      <div class="mhdr">
        <button class="mhdr-back" onclick="mCloseSubview()">&#8592; Back</button>
        <div class="mhdr-title" id="mSubAcctTitle"></div>
        <button class="mhdr-action" onclick="mEditActiveAcct()">Edit</button>
      </div>
      <div class="mscroll" id="mSubAcctScroll"></div>
    </div>

  </div><!-- /mScreens -->

  <!-- Bottom nav -->
  <nav id="mNav">
    <button class="mnav-btn active" id="mnDash" onclick="mGoTab('dash')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="mnav-label">Dashboard</span>
      <div class="mnav-pip"></div>
    </button>
    <button class="mnav-btn" id="mnBuckets" onclick="mGoTab('buckets')">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="mnav-label">Buckets</span>
      <div class="mnav-pip"></div>
    </button>
    <button class="mnav-btn" id="mnLog" onclick="mGoTab('log')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="mnav-label">Log</span>
      <div class="mnav-pip"></div>
    </button>
    <button class="mnav-btn" id="mnLedger" onclick="mGoTab('ledger')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span class="mnav-label">Ledger</span>
      <div class="mnav-pip"></div>
    </button>
  </nav>

</div><!-- /mShell -->

<!-- Toast -->
<div id="mToast">
  <div id="mToast-icon">✓</div>
  <div id="mToast-text"></div>
  <div id="mToast-amt"></div>
</div>

<!-- Edit bottom sheet -->
<div class="m-sheet-overlay" id="mSheetOverlay" onclick="mCloseSheet()"></div>
<div class="m-sheet" id="mSheet">
  <div class="m-sheet-handle"></div>
  <div class="m-sheet-title" id="mSheetTitle">Edit Transaction</div>
  <div class="m-sheet-body" id="mSheetBody"></div>
  <div class="m-sheet-foot" id="mSheetFoot"></div>
</div>

<!-- ════ AUTH SCREEN ════ -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-dot"></div>
      <span class="auth-logo-text">Budget / CC</span>
    </div>
    <div class="auth-title" id="authTitle">Sign in</div>
    <div class="auth-sub" id="authSub">Your budget data syncs across all your devices.</div>
    <!-- Sign In form -->
    <div id="authSignInForm">
      <input class="auth-input" id="authEmail" type="email" placeholder="Email address"
        onkeydown="if(event.key==='Enter')document.getElementById('authPassword').focus()" />
      <input class="auth-input" id="authPassword" type="password" placeholder="Password"
        onkeydown="if(event.key==='Enter')authSignIn()" />
      <button class="auth-btn" id="authSignInBtn" onclick="authSignIn()">Sign In</button>
      <button class="auth-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:0"
        onclick="showAuthRegister()">Create Account</button>
    </div>
    <!-- Register form (hidden by default) -->
    <div id="authRegisterForm" style="display:none">
      <input class="auth-input" id="authRegEmail" type="email" placeholder="Email address"
        onkeydown="if(event.key==='Enter')document.getElementById('authRegPassword').focus()" />
      <input class="auth-input" id="authRegPassword" type="password" placeholder="Password (min 6 chars)"
        onkeydown="if(event.key==='Enter')document.getElementById('authRegPassword2').focus()" />
      <input class="auth-input" id="authRegPassword2" type="password" placeholder="Confirm password"
        onkeydown="if(event.key==='Enter')authRegister()" />
      <button class="auth-btn" onclick="authRegister()">Create Account</button>
      <button class="auth-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:0"
        onclick="showAuthSignIn()">Back to Sign In</button>
    </div>
    <div id="authMsg" class="auth-msg" style="display:none"></div>
    <a class="auth-skip" onclick="skipAuth()">Use offline without account →</a>
  </div>
</div>

<!-- Update banner -->
<div id="updateBanner" class="hidden">
  🚀 App updated!
  <button onclick="window.location.reload(true)">Refresh now</button>
  <button onclick="document.getElementById('updateBanner').classList.add('hidden')" style="background:rgba(255,255,255,.15)">Later</button>
</div>
</body>
</html>
