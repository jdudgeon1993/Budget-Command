function saveModal(){
  MsnapBuilder();
  if(M.tab==='acct'){
    MsnapAcct();
    const name=M.acctName.trim();if(!name){document.getElementById('mAcctName')?.focus();return;}
    const debtAPR=M.acctType==='debt'?(parseFloat(M.acctAPR)||null):null;
    const debtMinPayment=M.acctType==='debt'?(parseFloat(M.acctMinPay)||null):null;
    if(M.acctEditId){
      const a=getAcct(M.acctEditId);if(a){a.name=name;a.color=M.acctColor;a.type=M.acctType;a.debtAPR=debtAPR;a.debtMinPayment=debtMinPayment;}
      // Update opening balance (P5-A)
      const newBal=parseFloat(M.acctBal)||0;
      const existingOpenTx=S.txs.find(t=>t.accountId===M.acctEditId&&t.type==='opening');
      if(existingOpenTx){existingOpenTx.amount=newBal;}
      else if(newBal!==0){const today=new Date().toISOString().split('T')[0];addMonth(new Date().getFullYear(),new Date().getMonth());S.txs.push({id:uid(),accountId:M.acctEditId,toAccountId:null,monthId:dateToMonthId(today),bucketId:null,desc:'Opening Balance',amount:newBal,type:'opening',date:today,recurring:false});}
    } else {
      const id='_'+Math.random().toString(36).slice(2,9);
      S.accounts.push({id,name,color:M.acctColor,type:M.acctType,openingBalance:0,debtAPR,debtMinPayment});
      const bal=parseFloat(M.acctBal)||0;
      if(bal!==0){
        const today=new Date().toISOString().split('T')[0];
        addMonth(new Date().getFullYear(),new Date().getMonth());
        S.txs.push({id:'_'+Math.random().toString(36).slice(2,9),accountId:id,toAccountId:null,monthId:dateToMonthId(today),bucketId:null,desc:'Opening Balance',amount:bal,type:'opening',date:today,recurring:false});
      }
    }
    save();closeMForm();render();updateTxFormForType();
    showToast((M.acctEditId?'Updated':'Added')+' account: '+name,'save');

  } else if(M.tab==='bkt'){
    // Single bucket edit/create
    MsnapBkt();
    const name=M.bktName.trim();
    const catId=M.bktCat;
    if(!name){document.getElementById('mBktName')?.focus();return;}
    if(!catId){alert('Please select a category.');return;}
    const type=M.bktType;
    const budget=parseFloat(M.bktBudget)||0;
    const dueDay=M.bktDueDay||null;
    const dueDay2=M.bktSplit?M.bktDueDay2||null:null;
    const dueAmount=M.bktSplit?parseFloat(M.bktDueAmount)||null:null;
    const dueAmount2=M.bktSplit?parseFloat(M.bktDueAmount2)||null:null;
    const notes=M.bktNotes.trim()||null;
    const goal=(type==='sinking'||type==='goal')?parseFloat(M.bktGoal)||null:null;
    const tDate=(type==='sinking'||type==='goal')?M.bktDate||null:null;
    const contrib=type==='sinking'?M.bktContrib:'monthly';
    if(M.bktEditId){
      const b=getBucket(M.bktEditId);
      if(b){b.name=name;b.catId=catId;b.type=type;b.defaultBudget=budget;b.dueDay=dueDay;b.dueDay2=dueDay2;b.dueAmount=dueAmount;b.dueAmount2=dueAmount2;b.notes=notes;b.recurring=M.bktRecurring;b.rollover=M.bktRollover;b.targetAmount=goal;b.targetDate=tDate;b.contribFreq=contrib;}
      S.months.forEach(m=>{if(!m.budgets)m.budgets={};if(m.budgets[M.bktEditId]===undefined)m.budgets[M.bktEditId]=budget;});
    } else {
      const id='_'+Math.random().toString(36).slice(2,9);
      const cnt=S.buckets.filter(b=>b.catId===catId).length;
      S.buckets.push({id,catId,name,type,defaultBudget:budget,dueDay,dueDay2,dueAmount,dueAmount2,notes,recurring:M.bktRecurring,rollover:M.bktRollover,archived:false,targetAmount:goal,targetDate:tDate,contribFreq:contrib,order:cnt});
      S.months.forEach(m=>{if(!m.budgets)m.budgets={};m.budgets[id]=budget;if(!m.allocations)m.allocations={};m.allocations[id]=0;});
    }
    save();closeMForm();render();populateTxCats();
    showToast((M.bktEditId?'Updated':'Created')+' bucket: '+name,'save');

  } else {
    // Category + bulk buckets (isCat or isBuilder)
    const isCat=M.tab==='cat';
    let justCreated=false; // track if we just created the category in this call

    // If on cat tab and category hasn't been saved/named yet, save it first
    let catId=M.catEditId||M.builderCatId;
    if(isCat){
      const name=M.catName.trim();
      if(!name){document.getElementById('mCatName')?.focus();return;}
      if(M.catEditId){
        const c=getCat(M.catEditId);if(c){c.name=name;c.color=M.catColor;}
        catId=M.catEditId;
      } else {
        // Create new category
        const newCat={id:'_'+Math.random().toString(36).slice(2,9),name,color:M.catColor,order:S.cats.length};
        S.cats.push(newCat);ensureMonth();
        catId=newCat.id;
        M.catEditId=catId;
        M.builderCatId=catId;
        justCreated=true;
      }
    }

    // If no buckets with names yet — either show bucket builder (new cat) or close (existing cat)
    const namedBuckets=(M.buckets||[]).filter(r=>r.name.trim());
    if(!namedBuckets.length){
      save();
      if(justCreated){
        // Category just saved — switch to builder tab and seed an initial row
        M.tab='builder';
        if(!M.buckets?.length)M.buckets=[mkBkt()];
        render();populateTxCats();renderModal();
        showToast('Category created — now add buckets below','save');
      } else {
        closeMForm();render();populateTxCats();
      }
      return;
    }

    if(!catId){save();closeMForm();render();populateTxCats();return;}

    // Save all bucket rows that have names
    namedBuckets.forEach((row,idx)=>{
      const type=row.type;
      const budget=parseFloat(row.budget)||0;
      const dueDay=row.dueDay||null;
      const goal=(type==='sinking'||type==='goal')?parseFloat(row.goal)||null:null;
      const tDate=(type==='sinking'||type==='goal')?row.goalDate||null:null;
      const contrib=type==='sinking'?row.contrib:'monthly';

      // If row has a real bucket id (editing existing), update it
      if(row._id&&S.buckets.find(b=>b.id===row._id)){
        const b=getBucket(row._id);
        if(b){b.name=row.name.trim();b.type=type;b.defaultBudget=budget;b.dueDay=dueDay;b.recurring=row.recurring;b.rollover=row.rollover;b.targetAmount=goal;b.targetDate=tDate;b.contribFreq=contrib;}
        S.months.forEach(m=>{if(!m.budgets)m.budgets={};if(m.budgets[row._id]===undefined)m.budgets[row._id]=budget;});
      } else {
        // New bucket
        const id='_'+Math.random().toString(36).slice(2,9);
        const cnt=S.buckets.filter(b=>b.catId===catId).length;
        S.buckets.push({id,catId,name:row.name.trim(),type,defaultBudget:budget,dueDay,recurring:row.recurring,rollover:row.rollover,archived:false,targetAmount:goal,targetDate:tDate,contribFreq:contrib,order:cnt});
        S.months.forEach(m=>{if(!m.budgets)m.budgets={};m.budgets[id]=budget;if(!m.allocations)m.allocations={};m.allocations[id]=0;});
      }
    });

    save();closeMForm();render();populateTxCats();
  }
}

function Mdelete(){
  if(M.tab==='acct'&&M.acctEditId){
    if(!confirm('Delete this account? All its transactions will be removed.'))return;
    S.txs=S.txs.filter(t=>t.accountId!==M.acctEditId&&t.toAccountId!==M.acctEditId);
    S.accounts=S.accounts.filter(a=>a.id!==M.acctEditId);
    if(S.activeAccount===M.acctEditId)S.activeAccount=null;
  } else if(M.tab==='cat'&&M.catEditId){
    if(!confirm('Delete this category and everything inside it?'))return;
    S.buckets.filter(b=>b.catId===M.catEditId).forEach(b=>{S.txs=S.txs.filter(t=>t.bucketId!==b.id);});
    S.buckets=S.buckets.filter(b=>b.catId!==M.catEditId);
    S.cats=S.cats.filter(c=>c.id!==M.catEditId);
    if(S.activeBucket&&!getBucket(S.activeBucket))S.activeBucket=null;
  } else if(M.tab==='bkt'&&M.bktEditId){
    closeMForm();archiveOrDelete(M.bktEditId);return;

  save();closeMForm();render();populateTxCats();updateTxFormForType();
}

function delCat(id){
  if(!confirm('Delete this category and all its buckets and transactions?'))return;
  S.buckets.filter(b=>b.catId===id).forEach(b=>{S.txs=S.txs.filter(t=>t.bucketId!==b.id);});
  S.buckets=S.buckets.filter(b=>b.catId!==id);S.cats=S.cats.filter(c=>c.id!==id);
  if(S.activeBucket&&!getBucket(S.activeBucket))S.activeBucket=null;
  save();render();populateTxCats();
}

// REORDER

function normalizeCatOrder(){
  S.cats.forEach((c,i)=>{if(c.order===undefined||c.order===null)c.order=i;});
}
function normalizeBktOrder(){
  S.cats.forEach(cat=>{
    const bkts=S.buckets.filter(b=>b.catId===cat.id);
    bkts.forEach((b,i)=>{if(b.order===undefined||b.order===null)b.order=i;});
  });
}

function sortedCats(){
  normalizeCatOrder();
  return [...S.cats].sort((a,b)=>a.order-b.order);
}
function sortedBuckets(catId){
  normalizeBktOrder();
  return S.buckets.filter(b=>b.catId===catId&&!b.archived).sort((a,b)=>a.order-b.order);
}

function moveCat(id,dir){
  normalizeCatOrder();
  const sorted=[...S.cats].sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(c=>c.id===id);
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=sorted.length)return;
  const tmp=sorted[idx].order;
  sorted[idx].order=sorted[swapIdx].order;
  sorted[swapIdx].order=tmp;
  save();renderSidebar();renderMain();
}

function moveBkt(id,dir){
  normalizeBktOrder();
  const b=getBucket(id);if(!b)return;
  const sorted=S.buckets.filter(bk=>bk.catId===b.catId&&!bk.archived).sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(bk=>bk.id===id);
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=sorted.length)return;
  const tmp=sorted[idx].order;
  sorted[idx].order=sorted[swapIdx].order;
  sorted[swapIdx].order=tmp;
  save();renderSidebar();renderMain();
}

function exportData(){
  const snapshot={
    version:6,
    exportedAt:new Date().toISOString(),
    data:S,
  };
  const json=JSON.stringify(snapshot,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().split('T')[0];
  a.href=url;
  a.download=`imperium-fisci-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  // Record last export time
  localStorage.setItem('bcc_last_export', Date.now().toString());
  renderSidebar();
  // Brief confirmation
  const btn=event?.currentTarget;
  if(btn){
    const orig=btn.innerHTML;
    btn.style.color='var(--green)';
    btn.querySelector('span').textContent='✓ Exported!';
    setTimeout(()=>{btn.style.color='';renderSidebar();},2000);
  }
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const imported=parsed.data||parsed;
      if(!Array.isArray(imported.accounts)&&!Array.isArray(imported.cats)){
        alert('Invalid backup file — this does not look like an Imperium Fisci export.');
        event.target.value='';return;
      }
      const exportDate=parsed.exportedAt?new Date(parsed.exportedAt).toLocaleString():'unknown date';
      const msg='Import backup from '+exportDate+'?\n\nThis will REPLACE all current data.\n\nContinue?';
      if(!confirm(msg)){event.target.value='';return;}
      S=Object.assign({
        accounts:[],cats:[],buckets:[],months:[],txs:[],
        activeMonth:null,activeBucket:null,activeAccount:null,
        scenario:false,scenarioBudgets:{},scenarios:[],wiScenario:null,wiOpen:false,txFilter:'all',onboarded:true,payees:[],allocationRules:[],recurringBills:[],
      },imported);
      S.months.forEach(m=>{if(!m.allocations)m.allocations={};});
      normalizeCatOrder();normalizeBktOrder();
      // Ensure missing fields from older exports don't break things
      if(!S.scenarioBudgets)S.scenarioBudgets={};
      if(!S.payees)S.payees=[];
      if(!S.allocationRules)S.allocationRules=[];
      save();ensureMonth();
      if(!S.activeMonth)S.activeMonth=currentMonthId();
      render();populateTxCats();updateTxFormForType();wireFormKeys();
      event.target.value='';
      alert('Backup imported successfully!');
    }catch(err){
      alert('Failed to read backup file: '+err.message);
      event.target.value='';
    }
  };
  reader.readAsText(file);
}

// Tab order in the tx form: desc → amt → date → acct → cat → bkt → submit
// Enter in any tx field submits the form
function txFieldEnter(e){
  if(e.key==='Enter'){e.preventDefault();addTx();}
}

// Advance focus to next field on Enter within tx form inputs
function txAdvance(e, nextId){
  if(e.key==='Enter'){
    e.preventDefault();
    const next = document.getElementById(nextId);
    if(next) next.focus();
    else addTx();
  }
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName?.toLowerCase();
  const inInput = tag==='input'||tag==='select'||tag==='textarea';
  const modalOpen = !document.getElementById('overlay').classList.contains('hidden');
  const wizOpen   = !document.getElementById('wizardOverlay').classList.contains('hidden');

  // ── Always available ──────────────────────────────
  const wiOpen2=S.wiOpen&&!document.getElementById('wiOverlay')?.classList.contains('hidden');
  if(e.key==='Escape'){
    if(wiOpen2&&!isMobile()){exitWI();return;}
    if(modalOpen){closeModal();return;}
    if(wizOpen){closeWizard();return;}
    // Escape from bucket detail → back to overview
    if(S.activeBucket){setBucket(null);return;}
    if(S.activeAccount){clearActive();return;}
  }

  // ── Modal shortcuts ───────────────────────────────
  if(modalOpen){
    if(e.key==='Enter'&&!inInput){e.preventDefault();saveModal();}
    return; // don't fire global shortcuts while modal is open
  }

  // ── Transaction form shortcuts ────────────────────
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();addTx();return;}

  // Don't fire navigation shortcuts when typing in an input
  if(inInput)return;

  // ── Global navigation ─────────────────────────────
  // N = focus description field (start new transaction)
  if(e.key==='n'||e.key==='N'){
    e.preventDefault();
    const desc=document.getElementById('txDesc');
    if(desc&&document.getElementById('txForm').style.display!=='none'){
      desc.focus();desc.select();
    }
    return;
  }

  // I = focus income (set type to In, focus desc)
  if(e.key==='i'||e.key==='I'){
    e.preventDefault();
    setTxType('in');
    document.getElementById('txDesc')?.focus();
    return;
  }

  // Left/Right arrow = previous/next month
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();
    const idx=S.months.findIndex(m=>m.id===S.activeMonth);
    if(idx===-1)return;
    const next=e.key==='ArrowRight'?idx+1:idx-1;
    if(next>=0&&next<S.months.length)setMonth(S.months[next].id);
    return;
  }

  // O = overview (clear active bucket/account)
  if(e.key==='o'||e.key==='O'){
    e.preventDefault();
    clearActive();
    return;
  }
});

// Wire up Enter key on tx form fields to advance or submit
document.addEventListener('DOMContentLoaded',()=>{
  // These fire after render since fields are static HTML
  wireFormKeys();
});

function wireFormKeys(){
  const fields=['txDesc','txAmt','txDate','txAcct','txCat','txBkt','txXfrTo'];
  fields.forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(el._keyWired)return; el._keyWired=true;
    el.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      e.preventDefault();
      // Find next visible field
      let found=false;
      for(let j=i+1;j<fields.length;j++){
        const next=document.getElementById(fields[j]);
        if(next&&next.offsetParent!==null&&!next.disabled){
          next.focus();found=true;break;
        }
      }
      if(!found)addTx();
    });
  });
  // Evaluate expression in txAmt on blur — wire once via flag
  const txAmtEl=document.getElementById('txAmt');
  if(txAmtEl&&!txAmtEl._exprWired){
    txAmtEl._exprWired=true;
    txAmtEl.addEventListener('blur',()=>{
      const raw=txAmtEl.value;
      if(!raw)return;
      const cur=parseFloat(raw)||0;
      const ref=monthProjectedIncome(S.activeMonth);
      const v=evalMoneyExpr(raw,cur,ref);
      if(String(v)!==raw)txAmtEl.value=v||'';
    });
  }
}

// Expression fx popover — YNAB-style clickable operator menu
function toggleExprMenu(btn){
  document.querySelectorAll('.expr-menu').forEach(m=>m.remove());
  const wrap=btn.closest('.alloc-wrap');
  const inp=wrap?.querySelector('.alloc-inp');
  if(!inp)return;
  // Use getBoundingClientRect + position:fixed so no ancestor overflow:hidden clips the menu
  const rect=wrap.getBoundingClientRect();
  const menu=document.createElement('div');
  menu.className='expr-menu';
  menu.style.cssText=`position:fixed;top:${rect.bottom+4}px;right:${Math.round(window.innerWidth-rect.right)}px;`;
  const opts=[
    {sym:'+',label:'Add amount',hint:'+50',insert:'+'},
    {sym:'−',label:'Subtract',hint:'−20',insert:'-'},
    {sym:'×',label:'Multiply',hint:'×1.5',insert:'*'},
    {sym:'÷',label:'Divide',hint:'÷2',insert:'/'},
    {sym:'%',label:'% of income',hint:'25%',insert:'25%',sel:[0,2]},
  ];
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.type='button';b.className='expr-menu-item';
    b.innerHTML=`<span class="emi-sym">${o.sym}</span><span class="emi-label">${o.label}</span><span class="emi-hint">${o.hint}</span>`;
    b.onmousedown=e=>{
      e.preventDefault();
      inp.value=o.insert;
      inp.focus();
      inp.setSelectionRange(o.sel?o.sel[0]:o.insert.length,o.sel?o.sel[1]:o.insert.length);
      menu.remove();
    };
    menu.appendChild(b);
  });
  document.body.appendChild(menu);
  const close=e=>{if(!menu.contains(e.target)&&e.target!==btn){menu.remove();document.removeEventListener('mousedown',close);}};
  setTimeout(()=>document.addEventListener('mousedown',close),0);
}

// Desktop toast notification
function showToast(msg, type='save'){
  const wrap=document.getElementById('dToastWrap');if(!wrap)return;
  const t=document.createElement('div');
  t.className='d-toast';
  t.innerHTML=`<div class="d-toast-dot ${type}"></div><span>${esc(msg)}</span>`;
  wrap.appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),350);},2800);
}

// Wire allocation inputs — stopPropagation so Enter/Space don't bubble to <tr> row handler

}

        <div class="m-type-row" style="margin:0">
          <button class="m-type-btn${(row.type||'out')==='out'?' sel-out':''}" style="font-size:11px;padding:9px 0"
            onclick="mBulkRows[${i}].type='out';mRenderLog()">↑ Out</button>
          <button class="m-type-btn${(row.type||'out')==='in'?' sel-in':''}" style="font-size:11px;padding:9px 0"
            onclick="mBulkRows[${i}].type='in';mRenderLog()">↓ In</button>
          <button class="m-type-btn${(row.type||'out')==='xfr'?' sel-xfr':''}" style="font-size:11px;padding:9px 0"
            onclick="mBulkRows[${i}].type='xfr';mRenderLog()">⇄</button>
        </div>
      </div>
      ${(row.type||'out')==='out'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select class="m-select" style="font-size:14px;padding:9px 10px"
          onchange="mBulkRows[${i}].catId=this.value;mRenderLog()">${catOpts}</select>
        <select class="m-select" style="font-size:14px;padding:9px 10px"
          onchange="mBulkRows[${i}].bktId=this.value">${bktOpts}</select>
      </div>`:''}
    </div>`;
  });
  h+=`</div>
  <div style="padding:0 16px 8px">
    <button class="m-submit" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)"
      onclick="mAddBulkRow()">+ Add Row</button>
  </div>
  <div class="m-submit-wrap">
    <button class="m-submit" onclick="mSaveAllBulk()">Save All (${mBulkRows.length})</button>
  </div>`;
  el.innerHTML=h;
}

function mAddBulkRow(){
  mBulkRows.push({desc:'',amt:'',type:mStickyLog.type||'out',acctId:mStickyLog.acctId,catId:mStickyLog.catId,bktId:mStickyLog.bktId,toAcctId:''});
}

function mSaveAllBulk(){
  const today=new Date().toISOString().split('T')[0];
  let saved=0;
  mBulkRows.forEach(row=>{
    const desc=(row.desc||'').trim();
    const amt=parseFloat(row.amt)||0;
    if(!desc||!amt||!row.acctId)return;
    if((row.type||'out')==='out'&&!row.bktId)return;
    const monthId=dateToMonthId(today);
    const d=new Date(today+'T12:00:00');
    addMonth(d.getFullYear(),d.getMonth());
    S.txs.push({id:'_'+Math.random().toString(36).slice(2,9),accountId:row.acctId,toAccountId:row.toAcctId||null,monthId,bucketId:row.bktId||null,desc,amount:amt,type:row.type||'out',date:today,recurring:false});
    saved++;
  });
  if(!saved){alert('Please fill in at least one complete row.');return;}
  save();mBulkRows=[];mBulkMode=false;
  render();mShowToast('check','Saved '+saved+' transaction'+(saved!==1?'s':''),'');
}

// ── Add single tx from mobile ─────────────────────────────────────────────────
function mAddTx(){
  const desc=document.getElementById('mLogDesc')?.value.trim();
  const amt=parseFloat(document.getElementById('mLogAmt')?.value);
  const date=document.getElementById('mLogDate')?.value;
  const acctId=document.getElementById('mLogAcct')?.value;
  const t=mStickyLog.type||'out';
  const bkt=t==='out'?document.getElementById('mLogBkt')?.value:null;
  const toAcct=t==='xfr'?document.getElementById('mLogXfrTo')?.value:null;
  const rec=document.getElementById('mRecToggle')?.classList.contains('on')||false;

  if(!desc){document.getElementById('mLogDesc')?.focus();mShakeInput('mLogDesc');return;}
  if(!amt||amt<=0){mShakeInput('mLogAmt');return;}
  if(!acctId){mShakeInput('mLogAcct');return;}
  if(t==='out'&&!bkt){mShakeInput('mLogBkt');return;}
  if(t==='xfr'&&!toAcct){mShakeInput('mLogXfrTo');return;}

  // Persist sticky fields
  mStickyLog.acctId=acctId;
  if(bkt){mStickyLog.bktId=bkt;}
  if(document.getElementById('mLogCat'))mStickyLog.catId=document.getElementById('mLogCat').value;

  const monthId=dateToMonthId(date);
  const d=new Date(date+'T12:00:00');
  addMonth(d.getFullYear(),d.getMonth());

  S.txs.push({id:'_'+Math.random().toString(36).slice(2,9),accountId:acctId,toAccountId:toAcct||null,monthId,bucketId:bkt||null,desc,amount:amt,type:t,date,recurring:rec});
  upsertPayee(desc, bkt);
  save();

  // Get bucket name for toast
  const bktName=getBucket(bkt)?.name||'';
  const amtStr=(t==='in'?'+':t==='xfr'?'⇄':'-')+$f(amt);
  mShowToast(t==='in'?'in':t==='xfr'?'xfr':'out', desc, amtStr+(bktName?' · '+bktName:''));

  // Prompt allocation rules on new income
  if(t==='in')setTimeout(()=>promptAllocationRules(amt,monthId),400);

  // Re-render log (sticky fields preserved, desc+amt cleared)
  mRenderLog();
  // Update topbar and active pane
  renderTopbar();
  renderActivePane();
  // Refocus description for quick next entry
  setTimeout(()=>document.getElementById('mLogDesc')?.focus(),100);
}

function mShakeInput(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.style.borderColor='var(--red)';
  el.focus();
  setTimeout(()=>el.style.borderColor='',1500);
}

function mTxRowHtml(tx,tappable,runBal=null){
  const {b,cat,color,acct,isOpening,sched,amtCls,amtPfx,indColor:baseIndColor}=computeTxMeta(tx,null);
  const indColor=sched?'var(--amber)':baseIndColor;
  const metaParts=[];
  if(sched)metaParts.push(`⏱ ${ld(tx.date)}`);
  if(acct)metaParts.push(esc(acct.name));
  if(cat)metaParts.push(esc(cat.name));
  if(b)metaParts.push(esc(b.name));
  if(tx.type==='xfr')metaParts.push('→ '+esc(getAcct(tx.toAccountId)?.name||''));
  const balLine=runBal!==null
    ?`<div class="m-tx-run-bal${sched?' proj':runBal<0?' neg':''}">${sched?'~':''}${$f(runBal)}</div>`:'';
  const onclick=tappable?`onclick="mEditTxSheet('${tx.id}')"`:'' ;
  return `<div class="m-tx-row${sched?' m-tx-sched':''}" ${onclick}>
    <div class="m-tx-ind" style="background:${indColor}"></div>
    <div class="m-tx-l">
      <div class="m-tx-name">${esc(tx.desc)}</div>
      <div class="m-tx-meta" style="color:${sched?'var(--amber)':color}">${metaParts.join(' · ')}</div>
    </div>
    <div class="m-tx-r">
      <div class="m-tx-amt ${sched?'':amtCls}" style="${sched?'color:var(--text3)':''}">${amtPfx}${$f(tx.amount)}</div>
      ${tx.reconciled?'<div style="font-size:9px;color:var(--green);text-align:right">✓ reconciled</div>':''}
      ${balLine}
    </div>
  </div>`;
}

// ── Edit sheet ────────────────────────────────────────────────────────────────
function mEditTxSheet(id){
  const tx=S.txs.find(t=>t.id===id);if(!tx)return;
  const b=getBucket(tx.bucketId);const cat=b?getCat(b.catId):null;
  const acct=getAcct(tx.accountId);
  const body=document.getElementById('mSheetBody');
  const foot=document.getElementById('mSheetFoot');
  document.getElementById('mSheetTitle').textContent='Edit Transaction';

  const catOpts=mCatOptions(b?.catId||'');
  const bktOpts=mBktOptions(b?.catId||'',tx.bucketId||'');
  const acctOpts=mAcctOptions(tx.accountId);

  body.innerHTML=`
    <div>
      <div class="m-field-label" style="margin-bottom:6px">Description</div>
      <input class="m-input" id="sDesc" value="${esc(tx.desc)}" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><div class="m-field-label" style="margin-bottom:6px">Amount</div>
        <input class="m-input mono" id="sAmt" type="number" value="${tx.amount}" inputmode="decimal" /></div>
      <div><div class="m-field-label" style="margin-bottom:6px">Date</div>
        <input class="m-input" id="sDate" type="date" value="${tx.date}" /></div>
    </div>
    <div><div class="m-field-label" style="margin-bottom:6px">Account</div>
      <select class="m-select" id="sAcct">${acctOpts}</select></div>
    ${tx.type==='out'?`
    <div><div class="m-field-label" style="margin-bottom:6px">Category</div>
      <select class="m-select" id="sCat" onchange="mSheetCatChange(this.value)">${catOpts}</select></div>
    <div><div class="m-field-label" style="margin-bottom:6px">Bucket</div>
      <select class="m-select" id="sBkt">${bktOpts}</select></div>`:''}`;

  foot.innerHTML=`
    <button style="flex:1;padding:12px;background:var(--rbg);color:var(--red);border:1px solid var(--rb);border-radius:var(--r);font-size:14px;font-family:var(--sans);font-weight:600;cursor:pointer" onclick="mDeleteTxSheet('${id}')">Delete</button>
    <button style="flex:2;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-family:var(--sans);font-weight:600;cursor:pointer" onclick="mSaveTxSheet('${id}','${tx.type}')">Save</button>`;

  document.getElementById('mSheetOverlay').classList.add('show');
  document.getElementById('mSheet').classList.add('show');
}

function mSheetCatChange(catId){
  const bsel=document.getElementById('sBkt');
  if(!bsel)return;
  bsel.innerHTML=mBktOptions(catId,'');
}

function mSaveTxSheet(id,type){
  const tx=S.txs.find(t=>t.id===id);if(!tx)return;
  tx.desc=document.getElementById('sDesc')?.value||tx.desc;
  tx.amount=parseFloat(document.getElementById('sAmt')?.value)||tx.amount;
  tx.date=document.getElementById('sDate')?.value||tx.date;
  tx.accountId=document.getElementById('sAcct')?.value||tx.accountId;
  tx.monthId=dateToMonthId(tx.date);
  if(type==='out'){
    tx.bucketId=document.getElementById('sBkt')?.value||tx.bucketId;
  }
  save();mCloseSheet();render();
}

function mDeleteTxSheet(id){
  if(!confirm('Delete this transaction?'))return;
  S.txs=S.txs.filter(t=>t.id!==id);
  save();mCloseSheet();render();
}

function mCloseSheet(){
  document.getElementById('mSheetOverlay').classList.remove('show');
  document.getElementById('mSheet').classList.remove('show');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let mToastTimer=null;
function mShowToast(type,text,amt){
  const toast=document.getElementById('mToast');
  const icon=document.getElementById('mToast-icon');
  const textEl=document.getElementById('mToast-text');
  const amtEl=document.getElementById('mToast-amt');
  if(!toast)return;
  icon.textContent=type==='in'?'↓':type==='out'?'↑':type==='xfr'?'⇄':type==='alloc'?'◎':'✓';
  icon.style.color=type==='in'?'var(--green)':type==='out'?'var(--red)':type==='xfr'?'var(--purple)':type==='alloc'?'var(--accent)':'var(--green)';
  textEl.textContent=text;
  amtEl.textContent=amt;
  amtEl.style.color=type==='in'?'var(--green)':type==='out'?'var(--red)':'var(--text2)';
  toast.classList.add('show');
  if(mToastTimer)clearTimeout(mToastTimer);
  mToastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function mCatOptions(selectedCatId){
  let h='<option value="">Category...</option>';
  sortedCats().forEach(c=>h+=`<option value="${c.id}"${c.id===selectedCatId?' selected':''}>${esc(c.name)}</option>`);
  return h;
}
function mBktOptions(catId,selectedBktId){
  let h='<option value="">Bucket...</option>';
  if(catId)sortedBuckets(catId).forEach(b=>h+=`<option value="${b.id}"${b.id===selectedBktId?' selected':''}>${esc(b.name)}</option>`);
  return h;
}
function mAcctOptions(selectedId){
  let h='<option value="">Account...</option>';
  S.accounts.forEach(a=>h+=`<option value="${a.id}"${a.id===selectedId?' selected':''}>${esc(a.name)}</option>`);
  return h;
}

</script>

  <div id="mToast-text"></div>

</div>

  <div class="m-sheet-title" id="mSheetTitle">Edit Transaction</div>
  <div class="m-sheet-body" id="mSheetBody"></div>
  <div class="m-sheet-foot" id="mSheetFoot"></div>
</div>

<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-dot"></div>
      <span class="auth-logo-text">Budget / CC</span>
    </div>
    <div class="auth-title" id="authTitle">Sign in</div>
    <div class="auth-sub" id="authSub">Your budget data syncs across all your devices.</div>
    <!-- Sign In form -->
    <div id="authSignInForm">
      <input class="auth-input" id="authEmail" type="email" placeholder="Email address"
        onkeydown="if(event.key==='Enter')document.getElementById('authPassword').focus()" />
      <input class="auth-input" id="authPassword" type="password" placeholder="Password"
        onkeydown="if(event.key==='Enter')authSignIn()" />
      <button class="auth-btn" id="authSignInBtn" onclick="authSignIn()">Sign In</button>
      <button class="auth-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:0"
        onclick="showAuthRegister()">Create Account</button>
    </div>
    <!-- Register form (hidden by default) -->
    <div id="authRegisterForm" style="display:none">

        onkeydown="if(event.key==='Enter')document.getElementById('authRegPassword').focus()" />
