<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Imperium Fisci</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--bg2:#161920;--bg3:#1d2028;
  --surface:#232730;--surface2:#2a2f3a;
  --border:#2e333f;--border2:#3a404e;
  --text:#f0f2f5;--text2:#8b92a0;--text3:#555d6e;
  --green:#3dba8c;--gbg:#1a3329;--gb:#2a5c42;
  --red:#e05c5c;--rbg:#2f1818;--rb:#5c2a2a;
  --amber:#e0a43c;--abg:#2f2210;--ab:#5c4010;
  --blue:#4a9edd;--bbg:#1a2535;--bb:#2a4a6e;
  --purple:#9b7fe8;--pbg:#1e1a30;--pb:#3d3060;
  --accent:#2a7c6f;--accent2:#1f5f55;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --r:8px;--rl:12px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ═══ TOPBAR ═══ */
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;z-index:100;overflow:hidden;}
.tb-logo{display:flex;align-items:center;gap:8px;padding:0 20px;border-right:1px solid var(--border);font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;width:200px;}
.tb-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}

.tb-accounts{display:flex;align-items:stretch;gap:0;overflow-x:auto;scrollbar-width:none;border-right:1px solid var(--border);}
.tb-accounts::-webkit-scrollbar{display:none;}
.acct-chip{display:flex;flex-direction:column;justify-content:center;padding:0 16px;border-right:1px solid var(--border);cursor:pointer;transition:background .12s;min-width:120px;flex-shrink:0;}
.acct-chip:hover{background:var(--bg3);}
.acct-chip:last-child{border-right:none;}
.ac-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:1px;display:flex;align-items:center;gap:5px;}
.ac-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ac-bal{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-.5px;}
.ac-bal.pos{color:var(--text);}
.ac-bal.neg{color:var(--red);}
.ac-type{font-size:9px;color:var(--text3);}

.tb-total{display:flex;flex-direction:column;justify-content:center;padding:0 20px;border-right:1px solid var(--border);min-width:140px;flex-shrink:0;}
.tb-total-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:1px;}
.tb-total-val{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-.5px;color:var(--text);}

.tb-rts{display:flex;flex-direction:column;justify-content:center;padding:0 20px;border-right:1px solid var(--border);flex-shrink:0;}
.tb-rts-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:1px;}
.tb-rts-val{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-.5px;}
.tb-rts-val.pos{color:var(--green);}
.tb-rts-val.neg{color:var(--red);}
.tb-rts-val.zero{color:var(--text3);}

.tb-wi{display:flex;align-items:center;justify-content:center;padding:0 20px;border-right:1px solid var(--border);flex-shrink:0;}
.tb-wi-btn{background:none;border:1px solid var(--border2);border-radius:var(--r);padding:7px 18px;font-size:13px;font-family:var(--sans);font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:.2px;}
.tb-wi-btn:hover{border-color:var(--amber);color:var(--amber);}
.tb-wi-btn.on{background:var(--abg);border-color:var(--amber);color:var(--amber);}

.tb-right{display:flex;align-items:center;gap:10px;padding:0 20px;margin-left:auto;flex-shrink:0;}
.tb-sync{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tb-sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.tb-sync-dot.off{background:var(--border2);}
.tb-actions{display:flex;align-items:center;gap:6px;padding:0 14px;border-left:1px solid var(--border);flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border2);color:var(--text2);padding:5px 11px;border-radius:var(--r);font-size:12px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;}
.tbtn:hover{border-color:var(--accent);color:var(--text);background:var(--bg3);}
.tbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.tbtn.primary:hover{background:var(--accent2);}
.tbtn.wi-on{background:var(--abg);border-color:var(--amber);color:var(--amber);}
.tbtn.danger{background:var(--rbg);border-color:var(--rb);color:var(--red);}

/* ═══ STRIPS ═══ */
.strip{padding:7px 24px;display:flex;align-items:center;gap:12px;font-size:12px;flex-shrink:0;}
.strip.hidden{display:none;}
.strip.wi{background:var(--abg);border-bottom:1px solid var(--ab);color:var(--amber);}
.strip.warn{background:var(--rbg);border-bottom:1px solid var(--rb);color:var(--red);}

/* ═══ LAYOUT ═══ */
.app{display:grid;grid-template-columns:200px 1fr;flex:1;overflow:hidden;min-height:0;}

/* ═══ NAV SIDEBAR ═══ */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;padding:0;flex-shrink:0;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:13px 20px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;font-family:var(--sans);background:none;border:none;border-bottom:1px solid var(--border);letter-spacing:.2px;transition:background .12s,color .12s;position:relative;width:100%;text-align:left;}
.nav-btn:hover{background:var(--bg3);color:var(--text2);}
.nav-btn.active{background:var(--bg);color:var(--text);border-right:2px solid var(--bg);margin-right:-1px;padding-right:21px;z-index:2;}
.nav-btn.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-btn-icon{font-size:14px;color:var(--text3);width:16px;text-align:center;flex-shrink:0;transition:color .12s;}
.nav-btn.active .nav-btn-icon{color:var(--accent);}
.nav-btn:hover .nav-btn-icon{color:var(--text2);}
.nav-btn-spacer{flex:1;}
.nav-foot{margin-top:auto;border-top:1px solid var(--border);}
.nav-new-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 20px;background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .12s;letter-spacing:.2px;}
.nav-new-btn:hover{background:var(--accent2);}
.nav-new-btn-icon{font-size:14px;}
.sb-link{display:flex;align-items:center;padding:8px 16px;cursor:pointer;color:var(--text2);font-size:13px;gap:9px;transition:background .1s,color .1s;}
.sb-link:hover,.sb-link.active{background:var(--bg3);color:var(--text);}
.sb-link-icon{font-size:13px;color:var(--text3);width:14px;text-align:center;}
.sb-sep{height:1px;background:var(--border);margin:8px 0;}
.sb-sec{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px;margin-top:4px;}
.sb-sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);}
.sb-add{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0;transition:color .12s;}
.sb-add:hover{color:var(--accent);}
.cat-block{margin-bottom:2px;}
.cat-row{display:flex;align-items:center;padding:5px 16px;gap:8px;cursor:default;user-select:none;}
.cat-row:hover .cat-acts{opacity:1;}
.cat-color{width:3px;height:13px;border-radius:2px;flex-shrink:0;}
.cat-label{flex:1;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);}
.cat-row:hover .cat-label{color:var(--text2);}
.cat-acts{display:flex;gap:2px;opacity:0;transition:opacity .1s;}
.bni{display:flex;align-items:center;padding:6px 16px 6px 27px;cursor:pointer;gap:8px;transition:background .1s;position:relative;}
.bni:hover{background:var(--bg3);}
.bni.active{background:var(--surface);}
.bni-line{position:absolute;left:0;top:0;bottom:0;width:2px;opacity:0;transition:opacity .12s;}
.bni.active .bni-line{opacity:1;}
.bni-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .2s;}
.bni-dot.funded{background:var(--green);}
.bni-dot.partial{background:var(--amber);}
.bni-dot.over{background:var(--red);}
.bni-dot.empty{background:var(--border2);}
.bni-name{flex:1;font-size:13px;color:var(--text2);}
.bni.active .bni-name{color:var(--text);}
.bni-val{font-size:11px;font-family:var(--mono);color:var(--text3);}
.bni-acts{display:flex;gap:2px;opacity:0;transition:opacity .1s;}
.bni:hover .bni-acts{opacity:1;}
.ib{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:2px 4px;border-radius:3px;transition:all .1s;line-height:1;}
.ib:hover{color:var(--text);background:var(--border2);}
.ib.del:hover{color:var(--red);background:var(--rbg);}

/* ═══ MAIN ═══ */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.main-scroll{flex:1;overflow-y:auto;padding:24px 28px;}
.wi-panel{display:none!important;}
.wi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px;margin-top:10px;}
.wi-row{display:flex;align-items:center;gap:8px;}
.wi-label{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wi-inp{width:86px;flex-shrink:0;padding:5px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:12px;color:var(--text);text-align:right;}
.wi-inp:focus{outline:none;border-color:var(--amber);}
.wi-foot{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);display:flex;gap:20px;}

/* ═══ MONTH HDR ═══ */
.month-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.month-title{font-size:21px;font-weight:600;letter-spacing:-.5px;}
.chip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.chip-past{background:var(--bg3);color:var(--text3);border:1px solid var(--border2);}
.chip-present{background:var(--gbg);color:var(--green);border:1px solid var(--gb);}
.chip-future{background:#1a1d2e;color:#6b7dd4;border:1px solid #3a4080;}
.notice{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:9px 14px;font-size:12px;color:var(--text3);margin-bottom:16px;}

/* ═══ POOL STRIP ═══ */
.pool-strip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--border);border-radius:var(--rl);overflow:hidden;border:1px solid var(--border);margin-bottom:8px;}
.ps-cell{background:var(--surface);padding:10px 14px;}
.ps-cell.hi{background:var(--surface2);border-right:2px solid var(--border);}
.ps-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin-bottom:2px;}
.ps-val{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:-.5px;}
.ps-cell.hi .ps-val{font-size:18px;font-weight:600;}
.ps-val.green{color:var(--green);}
.ps-val.red{color:var(--red);}
.ps-val.dim{color:var(--text2);}
.ps-sub{font-size:10px;color:var(--text3);margin-top:1px;}

/* ═══ HINT BAR ═══ */
.hint-bar{border-radius:var(--r);padding:9px 14px;margin-bottom:16px;font-size:12px;display:flex;align-items:center;gap:8px;}
.hint-bar.info{background:var(--bbg);border:1px solid var(--bb);color:var(--blue);}
.hint-bar.warn{background:var(--rbg);border:1px solid var(--rb);color:var(--red);}
.hint-bar.success{background:var(--gbg);border:1px solid var(--gb);color:var(--green);}

/* ═══ TAB CONTENT AREAS ═══ */
/* Overview tab */
.ov-month-nav{display:flex;align-items:center;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;align-self:flex-start;}
.ov-mnav-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:8px 14px;transition:all .12s;line-height:1;font-family:var(--sans);}
.ov-mnav-btn:hover{background:var(--bg3);color:var(--text);}
.ov-mnav-btn:disabled{opacity:.3;cursor:default;}
.ov-mnav-label{font-size:13px;font-weight:600;color:var(--text2);padding:8px 16px;border-left:1px solid var(--border);border-right:1px solid var(--border);letter-spacing:-.2px;white-space:nowrap;}
.ov-mnav-add{background:none;border:none;cursor:pointer;color:var(--accent);font-size:18px;padding:8px 12px;line-height:1;transition:opacity .12s;}
.ov-mnav-add:hover{opacity:.7;}

/* Ledger tab */
.ledger-layout{display:grid;grid-template-columns:300px 1fr;gap:0;height:100%;min-height:0;}
.ledger-form-col{border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.ledger-list-col{display:flex;flex-direction:column;overflow:hidden;}
.ledger-list-head{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px;}
.ledger-list-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);flex:1;}
.ledger-filters{display:flex;gap:3px;}
.ledger-search{width:100%;padding:8px 12px;background:var(--surface2);border:none;border-top:1px solid var(--border);font-size:13px;font-family:var(--sans);color:var(--text);outline:none;}
.ledger-search:focus{border-top-color:var(--accent);}
.ledger-search::placeholder{color:var(--text3);}

/* Accounts tab */
.acct-pane-wrap{padding:0;}
.acct-group-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin:16px 0 8px;}
.acct-group-hdr:first-child{margin-top:0;}
.acct-tab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:8px;}
.acct-tab-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:border-color .12s;}
.acct-tab-card:hover{border-color:var(--accent);}
.acct-tab-card-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.acct-tab-card-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.acct-tab-card-bal{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:-.5px;}

/* ═══ ACCOUNT LIQUIDITY STRIP ═══ */
.als{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;cursor:pointer;}
.als-cell{flex:1;background:var(--surface);padding:8px 12px;display:flex;align-items:center;gap:7px;transition:background .12s;cursor:pointer;}
.als-cell:hover{background:var(--bg3);}
.als-cell:hover .als-bal::after{content:' ›';color:var(--text3);font-size:11px;}
.als-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.als-name{flex:1;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.als-type{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);flex-shrink:0;}
.als-bal{font-family:var(--mono);font-size:13px;font-weight:500;flex-shrink:0;}
.ov-stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:16px 0;}
.ov-stat{background:var(--surface);padding:10px 14px;}
.ov-stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px;}
.ov-stat-val{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:-.4px;margin-bottom:2px;}
.ov-stat-val.green{color:var(--green);}
.ov-stat-val.red{color:var(--red);}
.ov-stat-val.amber{color:var(--amber);}
.ov-stat-val.dim{color:var(--text2);}
.ov-stat-sub{font-size:10px;color:var(--text3);}
.ov-widgets{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.ov-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;display:flex;flex-direction:column;}
.ov-widget-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:10px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:6px;}
.ov-widget-title-count{font-size:10px;font-weight:400;color:var(--text3);margin-left:auto;}
.ov-widget-row{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.ov-widget-row:last-child{border-bottom:none;}
.ov-widget-row.clickable{cursor:pointer;transition:background .12s;}
.ov-widget-row.clickable:hover{background:var(--bg3);}
.ov-widget-row-name{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ov-widget-row-meta{font-size:10px;color:var(--text3);flex-shrink:0;}
.ov-widget-row-val{font-family:var(--mono);font-size:12px;flex-shrink:0;}
.ov-widget-empty{padding:16px 14px;font-size:12px;color:var(--text3);text-align:center;}
.ov-widget-footer{padding:8px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--accent);cursor:pointer;text-align:center;transition:background .12s;}
.ov-widget-footer:hover{background:var(--bg3);}
.ov-spend-row{display:flex;align-items:center;gap:8px;padding:0 0 10px;margin-top:-2px;}
.ov-spend-bar-track{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.ov-spend-bar-fill{height:100%;border-radius:2px;transition:width .3s;}

/* ═══ SIDEBAR MONTH NAV ═══ */
.sb-monnav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-monnav-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:8px 10px;transition:color .12s;line-height:1;flex-shrink:0;}
.sb-monnav-btn:hover{color:var(--text);}
.sb-monnav-label{flex:1;font-size:12px;font-weight:600;text-align:center;color:var(--text2);letter-spacing:-.2px;cursor:pointer;padding:8px 2px;}
.sb-monnav-label:hover{color:var(--text);}
.sb-monnav-wi{background:none;border:none;cursor:pointer;font-size:12px;padding:8px 10px;border-left:1px solid var(--border);color:var(--text3);font-family:var(--sans);font-weight:500;transition:all .12s;flex-shrink:0;white-space:nowrap;}
.sb-monnav-wi:hover{color:var(--amber);}
.sb-monnav-wi.on{color:var(--amber);background:var(--abg);}

/* ═══ SIDEBAR ACTIONS ═══ */
.sb-actions{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-act-btn{flex:1;background:none;border:1px solid var(--border2);color:var(--text2);padding:6px 8px;border-radius:var(--r);font-size:12px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .12s;text-align:center;}
.sb-act-btn:hover{border-color:var(--accent);color:var(--text);background:var(--bg3);}
.sb-act-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.sb-act-btn.primary:hover{background:var(--accent2);}

/* ═══ REPORTS DROPDOWN ═══ */
.reports-drop-wrap{position:relative;display:inline-block;}
.reports-drop-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);z-index:200;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.4);display:none;}
.reports-drop-menu.open{display:block;}
.reports-drop-item{display:block;width:100%;background:none;border:none;padding:9px 14px;font-size:13px;font-family:var(--sans);color:var(--text2);cursor:pointer;text-align:left;transition:background .1s,color .1s;}
.reports-drop-item:hover{background:var(--bg3);color:var(--text);}
.reports-drop-item:first-child{border-radius:var(--r) var(--r) 0 0;}
.reports-drop-item:last-child{border-radius:0 0 var(--r) var(--r);}

/* ═══ RPANEL SUMMARY ═══ */
.rp-summary{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.rps-cell{background:var(--surface);padding:9px 12px;}
.rps-cell.hi{background:var(--surface2);}
.rps-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin-bottom:2px;}
.rps-val{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:-.4px;}
.rps-val.green{color:var(--green);}
.rps-val.red{color:var(--red);}
.rps-val.dim{color:var(--text2);}
.rps-sub{font-size:9px;color:var(--text3);margin-top:1px;}

/* ═══ CATEGORY + BUCKET TABLE ═══ */
.cat-sec{margin-bottom:14px;}
.cat-sec-hdr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.csh-color{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.csh-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text2);flex:1;}
.csh-totals{font-family:var(--mono);font-size:11px;color:var(--text3);}
.fund-btn{background:none;border:1px solid var(--border2);border-radius:5px;padding:2px 8px;font-size:11px;font-family:var(--sans);font-weight:500;color:var(--text3);cursor:pointer;transition:all .12s;margin-left:4px;}
.fund-btn:hover{border-color:var(--accent);color:var(--accent);}
.btable{width:100%;border-collapse:collapse;table-layout:fixed;}
.btable tr.brow{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
.btable tr.brow:last-child{border-bottom:none;}
.btable tr.brow:hover{background:var(--bg2);}
.btable tr.brow.act{background:var(--surface);}
.btable thead tr{border-bottom:1px solid var(--border);}
.btable th{padding:4px 6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);text-align:left;}
.btable th:last-child{text-align:right;}
.btable td{padding:0;vertical-align:middle;}

.td-accent{width:3px;padding:0;}
.accent-bar{width:3px;border-radius:2px;height:26px;display:block;opacity:.3;transition:opacity .12s;}
.btable tr:hover .accent-bar,.btable tr.act .accent-bar{opacity:1;}

/* Ghost-style inline allocation input — only reveals border on hover/focus */
.td-alloc{width:104px;padding:4px 6px;}
.alloc-wrap{display:flex;align-items:center;background:transparent;border:1px solid transparent;border-radius:5px;transition:border-color .15s,background .15s;position:relative;}
.alloc-wrap:hover{border-color:var(--border);background:var(--surface2);}
.alloc-wrap:focus-within{border-color:var(--accent);background:var(--surface2);}
.alloc-pfx{font-size:11px;color:var(--text3);padding:0 3px 0 4px;font-family:var(--mono);pointer-events:none;opacity:0;transition:opacity .15s;}
.alloc-wrap:hover .alloc-pfx,.alloc-wrap:focus-within .alloc-pfx{opacity:1;}
.alloc-inp{flex:1;min-width:0;padding:5px 20px 5px 0;background:none;border:none;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);text-align:right;}
.alloc-inp:focus{outline:none;}
.alloc-inp.funded{color:var(--green);}
.alloc-inp.neg{color:var(--red);}

.td-name{padding:7px 8px 7px 6px;overflow:hidden;}
.td-name .bn{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-name .bt{display:flex;align-items:center;gap:4px;margin-top:2px;}
.bntag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:1px 4px;border-radius:3px;background:var(--bg3);color:var(--text3);}
.bndue{font-size:10px;font-family:var(--mono);}
.bndue.urgent{color:var(--red);}
.bndue.soon{color:var(--amber);}
.bndue.ok{color:var(--text3);}

/* Progress bar — no sub % text, it's shown by the pill */
.td-bar{width:56px;padding:4px 6px;vertical-align:middle;}
.bbar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.bbar-fill{height:100%;border-radius:2px;transition:width .25s;}
.bf-ok{background:var(--green);}
.bf-warn{background:var(--amber);}
.bf-over{background:var(--red);}
.bbar-sub{display:none;}/* hidden — redundant with pill */

.td-spent{width:74px;padding:4px 6px;text-align:right;}
.td-avail{width:74px;padding:4px 6px;text-align:right;}
.tv{font-family:var(--mono);font-size:12px;}
.tv.dim{color:var(--text2);}
.tv.muted{color:var(--text3);}
.tv.green{color:var(--green);}
.tv.red{color:var(--red);}
.tv-sub{font-size:10px;color:var(--text3);}

.td-pill{width:54px;padding:4px 6px;text-align:right;}
.pill{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;letter-spacing:.3px;}
.pill-funded{background:var(--gbg);color:var(--green);}
.pill-partial{background:var(--abg);color:var(--amber);}
.pill-empty{background:var(--bg3);color:var(--text3);}
.pill-over{background:var(--rbg);color:var(--red);}
.pill-done{background:var(--gbg);color:var(--green);}
.pill-pending{background:var(--abg);color:var(--amber);}
.pill-missed{background:var(--rbg);color:var(--red);border:1px solid var(--rb);}

/* ═══ UNIFIED BUCKET ROWS ═══ */
.bkt-cat{border-bottom:2px solid var(--border2);margin-bottom:8px;}
.bkt-cat-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px 8px;background:var(--bg);}
.bkt-cat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.bkt-cat-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text2);flex:1;}
.bkt-cat-totals{font-family:var(--mono);font-size:11px;color:var(--text3);}
.bkt-col-hdr{display:flex;align-items:center;padding:4px 16px;border-bottom:1px solid var(--border);background:var(--bg3);}
.bkt-col-hdr span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);}
.bkt-row{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--bg2);gap:8px;transition:background .1s;min-height:44px;}
.bkt-row:hover{background:var(--surface);}
.bkt-row.act{background:var(--surface2);}
.bkt-accent{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:32px;opacity:.5;transition:opacity .12s;}
.bkt-row:hover .bkt-accent,.bkt-row.act .bkt-accent{opacity:1;}
.bkt-name-col{flex:1;min-width:0;}
.bkt-row-label{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bkt-row-sub{display:flex;align-items:center;gap:5px;margin-top:2px;}
.bkt-alloc-col{width:108px;flex-shrink:0;}
.bkt-bar-col{width:58px;flex-shrink:0;}
.bkt-spent-col{width:72px;flex-shrink:0;text-align:right;font-family:var(--mono);font-size:12px;color:var(--text2);}
.bkt-avail-col{width:72px;flex-shrink:0;text-align:right;font-family:var(--mono);font-size:13px;font-weight:500;}
.bkt-pill-col{width:58px;flex-shrink:0;text-align:right;}
.bkt-compact{display:none;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.bkt-compact-alloc{font-family:var(--mono);font-size:14px;font-weight:600;}
.bkt-mini-bar{height:2px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:5px;width:100%;}
.bkt-mini-fill{height:100%;border-radius:2px;}
.bkt-chevron{color:var(--text3);font-size:16px;flex-shrink:0;display:none;}

/* Pending dot: unfunded but has scheduled activity coming */
.bni-dot.has-pending{background:var(--amber);opacity:.45;}
/* Recurring bill row in modal */
.rb-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.rb-row-editing{background:var(--abg);border-radius:6px;padding:8px;margin:-4px -4px 4px;}
.rb-row-name{flex:1;font-size:13px;}
.rb-row-amt{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:60px;text-align:right;}
.rb-row-day{font-size:11px;color:var(--text3);}
.m-bkt-pill.pill-pending{background:var(--abg);color:var(--amber);}

/* ═══ BUCKET DETAIL ═══ */
.det-notes{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;white-space:pre-wrap;word-break:break-word;}
.back-btn{background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);display:flex;align-items:center;gap:5px;padding:0;margin-bottom:14px;font-family:var(--sans);transition:color .12s;}
.back-btn:hover{color:var(--text2);}
.det-name{font-size:23px;font-weight:600;letter-spacing:-.5px;margin-bottom:4px;}
.det-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:7px;margin-bottom:20px;flex-wrap:wrap;}
.det-sep{color:var(--border2);}
.det-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.dn{background:var(--surface);padding:13px 15px;}
.dn-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;}
.dn-val{font-family:var(--mono);font-size:17px;font-weight:500;}
.dn-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.det-bar{margin-bottom:18px;}
.det-bar-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:5px;}
.det-bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.det-bar-note{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--text3);}
.det-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 17px;margin-bottom:18px;}
.det-block-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px;}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.det-row:last-child{border-bottom:none;}
.det-row-label{font-size:13px;color:var(--text2);}
.det-row-val{font-family:var(--mono);font-size:13px;font-weight:500;}
.sink-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.ss{background:var(--surface);padding:11px 13px;}
.ss-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;}
.ss-val{font-family:var(--mono);font-size:14px;font-weight:500;}
.alloc-edit-row{display:flex;align-items:center;gap:8px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:16px;}
.aer-label{font-size:13px;color:var(--text2);flex:1;}
.aer-input{width:108px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-family:var(--mono);font-size:13px;color:var(--text);text-align:right;}
.aer-input:focus{outline:none;border-color:var(--accent);}

/* ═══ ACCOUNT VIEW ═══ */
.acct-detail{padding:0;}
.acct-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.acct-hdr-name{font-size:22px;font-weight:600;letter-spacing:-.5px;}
.acct-balance-block{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:20px;}

/* ═══ RIGHT PANEL — hidden in new desktop layout ═══ */
.rpanel{display:none;}

/* TX FORM */
.txf{display:flex;flex-direction:column;gap:5px;}
.txf-row{display:flex;gap:5px;}
.tfi{flex:1;min-width:0;padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--sans);color:var(--text);transition:border-color .12s,background .12s;}
.tfi:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.tfi::placeholder{color:var(--text3);}
.tfi.mono{font-family:var(--mono);}
.tfi.sm{flex:0 0 84px;}
.tfi-sel{flex:1;min-width:0;padding:7px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--sans);color:var(--text);cursor:pointer;}
.tfi-sel:focus{outline:none;border-color:var(--accent);}
.tfi-sel option{background:var(--surface2);}
.type-tog{display:grid;grid-template-columns:1fr 1fr 1fr;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);flex:0 0 126px;}
.ttbtn{padding:7px 0;border:none;cursor:pointer;font-size:11px;font-family:var(--sans);font-weight:500;color:var(--text3);background:var(--surface2);transition:all .12s;}
.ttbtn.sel-out{background:var(--rbg);color:var(--red);}
.ttbtn.sel-in{background:var(--gbg);color:var(--green);}
.ttbtn.sel-xfr{background:var(--pbg);color:var(--purple);}
.rec-chk{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);cursor:pointer;white-space:nowrap;}
.rec-chk input{cursor:pointer;accent-color:var(--accent);}
.txf-submit{padding:8px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-family:var(--sans);font-weight:600;cursor:pointer;transition:background .12s;white-space:nowrap;}
.txf-submit:hover{background:var(--accent2);}

/* TX LIST */
.tx-list{flex:1;overflow-y:auto;}
.tx-date-hdr{padding:5px 15px 3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;}
.tx-row{display:flex;align-items:flex-start;padding:9px 15px;gap:8px;border-bottom:1px solid var(--border);transition:background .1s;}
.tx-row:hover{background:var(--bg3);}
.tx-l{flex:1;min-width:0;}
.tx-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
/* tx-dot2 defined in right panel section */
.tx-r{text-align:right;flex-shrink:0;}
.tx-amt{font-family:var(--mono);font-size:13px;font-weight:500;}
.tx-amt.out{color:var(--red);}
.tx-amt.in{color:var(--green);}
.tx-amt.xfr{color:var(--purple);}
/* tx-acts defined in right panel section */
.tx-empty{padding:34px 15px;text-align:center;font-size:13px;color:var(--text3);line-height:1.8;}

/* ═══ EMPTY / ONBOARDING ═══ */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:54vh;text-align:center;padding:40px;}
.empty-icon{font-size:32px;margin-bottom:14px;opacity:.2;}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.7;max-width:300px;margin-bottom:22px;}
.empty-btn{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:var(--r);font-size:13px;font-family:var(--sans);font-weight:600;cursor:pointer;transition:background .12s;}
.empty-btn:hover{background:var(--accent2);}

/* ═══ ONBOARDING WIZARD ═══ */
.wizard-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.wizard-overlay.hidden{display:none;}
.wizard{background:var(--bg2);border-radius:var(--rl);width:100%;max-width:500px;border:1px solid var(--border2);box-shadow:0 32px 80px rgba(0,0,0,.7);overflow:hidden;}
.wiz-head{padding:24px 28px 0;}
.wiz-step{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;}
.wiz-title{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px;}
.wiz-sub{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:20px;}
.wiz-progress{display:flex;gap:4px;margin-bottom:20px;}
.wiz-pip{flex:1;height:3px;border-radius:2px;background:var(--border2);}
.wiz-pip.done{background:var(--accent);}
.wiz-body{padding:0 28px;}
.wiz-foot{padding:20px 28px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.wiz-acct-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.wiz-acct-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.wai-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.wai-name{flex:1;font-size:14px;font-weight:500;}
.wai-type{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:10px;}
.wai-bal{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--green);}
.wai-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;transition:color .1s;}
.wai-del:hover{color:var(--red);}
.add-acct-form{display:flex;gap:6px;align-items:flex-end;margin-bottom:4px;}

/* ═══ MODAL ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.overlay.hidden{display:none;}
.modal{background:var(--bg2);border-radius:var(--rl);width:100%;max-width:440px;border:1px solid var(--border2);box-shadow:0 24px 64px rgba(0,0,0,.6);overflow:hidden;max-height:92vh;display:flex;flex-direction:column;}
.modal-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-size:15px;font-weight:600;}
.modal-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:0 4px;transition:color .12s;}
.modal-x:hover{color:var(--text);}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.modal-tab{flex:1;padding:10px;background:none;border:none;cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:500;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
.modal-tab:hover{color:var(--text2);}
.modal-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.fg{margin-bottom:13px;}
.fg:last-child{margin-bottom:0;}
.fl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:5px;}
.fi{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:var(--sans);color:var(--text);transition:all .12s;}
.fi:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.fi option{background:var(--surface2);}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.color-row{display:flex;flex-wrap:wrap;gap:7px;}
.cswatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;}
.cswatch:hover{transform:scale(1.12);}
.cswatch.sel{border-color:var(--text);transform:scale(1.12);}
.tog-row{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.togbtn{padding:8px;border:none;cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:500;background:var(--surface2);color:var(--text3);transition:all .12s;}
.togbtn.on{background:var(--accent);color:#fff;}
.modal-foot{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--text2);padding:7px 13px;border-radius:var(--r);font-size:13px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .12s;}
.btn-cancel:hover{color:var(--text);}
.btn-save{background:var(--accent);color:#fff;border:none;padding:7px 17px;border-radius:var(--r);font-size:13px;font-family:var(--sans);font-weight:600;cursor:pointer;transition:background .12s;}
.btn-save:hover{background:var(--accent2);}
.btn-del{background:var(--rbg);color:var(--red);border:1px solid var(--rb);padding:7px 13px;border-radius:var(--r);font-size:13px;font-family:var(--sans);font-weight:500;cursor:pointer;margin-right:auto;transition:opacity .12s;}
.hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5;}
.contrib-preview{background:var(--bbg);border:1px solid var(--bb);border-radius:var(--r);padding:9px 13px;margin-top:7px;font-size:12px;color:var(--blue);}

/* ═══ BULK BUCKET BUILDER ═══ */
.modal.wide{max-width:700px;}
.bbuilder{display:flex;flex-direction:column;gap:0;}
.brow-builder{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.brow-builder:last-child{margin-bottom:0;}
.brow-main{display:grid;grid-template-columns:1fr 110px 90px 100px 60px 60px 28px;gap:6px;padding:9px 10px;align-items:center;}
.brow-input{padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:var(--sans);color:var(--text);width:100%;}
.brow-input:focus{outline:none;border-color:var(--accent);background:var(--bg3);}
.brow-input.mono{font-family:var(--mono);}
.brow-select{padding:6px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:var(--sans);color:var(--text);width:100%;cursor:pointer;}
.brow-select:focus{outline:none;border-color:var(--accent);}
.brow-select option{background:var(--surface2);}
.brow-toggle{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;user-select:none;}
.brow-toggle-btn{width:36px;height:22px;border-radius:11px;border:1px solid var(--border2);background:var(--surface2);position:relative;cursor:pointer;transition:all .15s;flex-shrink:0;}
.brow-toggle-btn.on{background:var(--accent);border-color:var(--accent);}
.brow-toggle-btn::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text3);transition:transform .15s,background .15s;}
.brow-toggle-btn.on::after{transform:translateX(14px);background:#fff;}
.brow-toggle-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.brow-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0;line-height:1;transition:color .1s;align-self:center;}
.brow-del:hover{color:var(--red);}
.brow-sink-drawer{padding:10px 10px 10px 10px;background:var(--bg3);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end;}
.brow-sink-drawer.hidden{display:none;}
.brow-field{display:flex;flex-direction:column;gap:4px;}
.brow-field-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);}
.contrib-tip{grid-column:1/-1;font-size:11px;color:var(--blue);background:var(--bbg);border:1px solid var(--bb);border-radius:5px;padding:6px 10px;margin-top:2px;}
.brow-col-hdr{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:0 10px 6px;}
.brow-hdrs{display:grid;grid-template-columns:1fr 110px 90px 100px 60px 60px 28px;gap:6px;padding:0 10px 6px;}
.add-bkt-btn{display:flex;align-items:center;gap:6px;background:none;border:1px dashed var(--border2);border-radius:var(--r);padding:9px 14px;font-size:13px;font-family:var(--sans);color:var(--text3);cursor:pointer;transition:all .12s;width:100%;margin-top:8px;}
.add-bkt-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--gbg);}

/* rpanel is hidden on desktop (content lives in tab views) */
.rpanel{display:none;}

/* Compact form — all rows inline, never taller than needed */
.rp-form{background:var(--bg3);border-bottom:2px solid var(--border2);flex-shrink:0;padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.rpf-row{display:flex;align-items:center;gap:6px;}
.rpf-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);white-space:nowrap;width:32px;flex-shrink:0;}
.rpf-submit-row{gap:8px;margin-top:2px;}

/* Ledger header */
.rp-ledger-head{padding:9px 12px 7px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
.rp-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.rpf-row.rp-filters-row{margin-bottom:0;}
.rp-filters{display:flex;gap:3px;}
.rfbtn{flex:1;padding:4px 2px;background:none;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:var(--sans);font-weight:500;color:var(--text3);cursor:pointer;transition:all .12s;text-align:center;}
.rfbtn:hover{color:var(--text2);border-color:var(--border2);}
.rfbtn.active{background:var(--surface);color:var(--text);border-color:var(--border2);}
.rp-search{width:100%;padding:6px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--sans);color:var(--text);margin-top:6px;}
.rp-search:focus{outline:none;border-color:var(--accent);}
.rp-search::placeholder{color:var(--text3);}

/* TX LIST */
.tx-list{flex:1;overflow-y:auto;}
.tx-date-hdr{padding:5px 12px 3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;}
.tx-row{display:flex;align-items:flex-start;padding:9px 12px;gap:7px;border-bottom:1px solid var(--border);transition:background .1s;cursor:default;}
.tx-row:hover{background:var(--bg3);}
.tx-indicator{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:30px;}
.tx-l{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.tx-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:3px;overflow:hidden;}
.tx-meta-acct{color:var(--text3);flex-shrink:0;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tx-meta-cat{flex-shrink:0;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tx-meta-bkt{color:var(--text3);flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tx-dot2{width:3px;height:3px;border-radius:50%;background:var(--border2);display:inline-block;flex-shrink:0;}
.tx-r{text-align:right;flex-shrink:0;}
.tx-amt{font-family:var(--mono);font-size:13px;font-weight:500;line-height:1.2;}
.tx-amt.out{color:var(--red);}
.tx-amt.in{color:var(--green);}
.tx-amt.xfr{color:var(--purple);}
.tx-acts{display:flex;gap:2px;opacity:0;transition:opacity .1s;align-self:center;flex-shrink:0;}
.tx-row:hover .tx-acts{opacity:1;}
.tx-empty{padding:32px 14px;text-align:center;font-size:13px;color:var(--text3);line-height:1.8;}
/* Running balance line (account view only) */
.tx-run-bal{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;text-align:right;}
.tx-run-bal.proj{color:var(--amber);}
.tx-run-bal.neg{color:var(--red);}
/* Account balance badge in ledger header */
.rp-bal-badge{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--green);background:var(--gbg);padding:2px 7px;border-radius:10px;letter-spacing:-.3px;}
.rp-bal-badge.neg{color:var(--red);background:var(--rbg);}
/* Scheduled (future-dated) transactions */
.tx-scheduled-hdr{padding:6px 12px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--amber);background:var(--abg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;}
.tx-sched{opacity:.7;background:var(--abg);}
.tx-highlight{animation:txFlash .4s ease 3;}
@keyframes txFlash{0%,100%{background:transparent;}50%{background:var(--abg);}}
.tx-sched:hover{background:color-mix(in srgb,var(--abg) 80%,var(--bg3) 20%);}
.tx-sched-badge{font-size:10px;font-weight:700;color:var(--amber);font-family:var(--mono);letter-spacing:.3px;flex-shrink:0;}

/* ═══ ACCESSIBILITY — focus rings for keyboard navigation ═══ */
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r);}
input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
.bni:focus{outline:2px solid var(--accent);outline-offset:-2px;}
.btable tr.brow:focus{outline:2px solid var(--accent);outline-offset:-2px;}
.alloc-inp:focus{outline:none;} /* handled by parent .alloc-wrap:focus-within */

/* ════════════════════════════════════════════════════════
   MOBILE — Android native feel, < 768px
   Responsive layout — single shell, CSS adapts
════════════════════════════════════════════════════════ */

/* ═══ UNIFIED SHELL ═══ */
.app-nav{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;padding:0;flex-shrink:0;}
.app-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative;}
.tab-pane{display:none;flex:1;flex-direction:column;overflow-y:auto;padding:24px 28px;}
.tab-pane.active{display:flex;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:11px 16px;background:none;border:none;border-left:3px solid transparent;cursor:pointer;font-family:var(--sans);font-size:13px;color:var(--text3);text-align:left;width:100%;transition:color .12s,background .12s;}
.nav-btn:hover:not(.active){color:var(--text);background:var(--bg3);}
.nav-btn.active{color:var(--accent);border-left-color:var(--accent);background:var(--gbg);}
.nav-icon-txt{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.nav-svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;display:none;}
.nav-label{flex:1;}
.nav-pip{display:none;}
.nav-mobile{display:none!important;}
.pane-hdr{display:flex;align-items:center;padding:0 16px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;}
.pane-hdr-title{flex:1;font-size:16px;font-weight:600;letter-spacing:-.3px;}
.pane-hdr-action{background:none;border:none;cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;font-family:var(--sans);padding:0;}
.pane-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pane-scroll::-webkit-scrollbar{display:none;}
.detail-panel{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:10;}
.detail-panel.active{transform:translateX(0);}
.detail-hdr{display:flex;align-items:center;padding:0 16px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;}
.detail-back{background:none;border:none;cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;font-family:var(--sans);display:flex;align-items:center;gap:4px;padding:0;white-space:nowrap;}
.detail-title{flex:1;font-size:16px;font-weight:600;letter-spacing:-.3px;text-align:center;}
.detail-act{background:none;border:none;cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;font-family:var(--sans);padding:0;white-space:nowrap;}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.detail-scroll::-webkit-scrollbar{display:none;}
.tb-month-nav{display:none;}
.tb-new-btn{display:none !important;}

@media(max-width:767px){
  /* App: single column, nav at bottom */
  .app{grid-template-columns:1fr;grid-template-rows:1fr auto;}
  .app-nav{grid-row:2;display:flex;flex-direction:row;border-right:none;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);}
  .app-main{grid-row:1;position:relative;overflow:hidden;}
  /* Nav buttons: bottom bar style */
  .nav-desktop{display:none !important;}
  .nav-mobile{display:flex !important;}
  .nav-btn{flex:1;flex-direction:column;justify-content:center;align-items:center;padding:10px 8px 8px;border-left:none;border-top:2px solid transparent;gap:3px;min-height:44px;}
  .nav-btn.active{border-left-color:transparent;border-top-color:var(--accent);background:none;}
  .nav-icon-txt{display:none;}
  .nav-svg{display:block !important;width:22px;height:22px;}
  .nav-pip{display:block !important;width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .12s;}
  .nav-btn.active .nav-pip{opacity:1;}
  .nav-label{font-size:11px;letter-spacing:.3px;}
  /* Tab panes: full screen, slide animation */
  .tab-pane{position:absolute;inset:0;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding:0;overflow-y:auto;}
  .tab-pane.active{transform:translateX(0);}
  .tab-pane.slide-left{transform:translateX(-30%);}
  /* Topbar: show month nav, hide desktop elements */
  .tb-month-nav{display:flex !important;align-items:center;gap:4px;flex:1;margin:0 4px;}
  .tb-month-sel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:14px;font-weight:500;padding:6px 8px;cursor:pointer;appearance:none;-webkit-appearance:none;flex:1;text-align:center;}
  .tb-month-arrow{background:none;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:16px;padding:6px 12px;cursor:pointer;flex-shrink:0;}
  .tb-month-arrow:active{background:var(--surface);}
  .tb-total,.tb-wi{display:none !important;}
  .tb-rts-label{display:none;}
  .tb-rts-val{font-size:13px;padding:4px 10px;border-radius:20px;background:var(--gbg);border:1px solid var(--gb);}
  .tb-rts-val.neg{background:var(--rbg);border-color:var(--rb);}
  .tb-rts-val.zero{background:var(--bg3);border-color:var(--border2);}
  .tb-new-btn{display:inline-flex !important;}
  .tb-sync{display:none;}
  /* Ledger: hide form column (use Log tab instead) */
  .ledger-layout{grid-template-columns:1fr;}
  .ledger-form-col{display:none;}
  .tx-acts{opacity:1;}
  /* Legacy mobile scroll containers — still used by content functions */
  .mscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .mscroll::-webkit-scrollbar{display:none;}

  /* Dashboard cards */
  .m-pool-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:12px 12px 0;overflow:hidden;}
  .m-pool-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:10px 11px;overflow:hidden;min-width:0;}
  .m-pool-cell.hero{grid-column:1/-1;background:var(--surface2);border-color:var(--border2);}
  .m-pool-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin-bottom:3px;}
  .m-pool-val{font-family:var(--mono);font-size:17px;font-weight:500;letter-spacing:-.5px;word-break:break-all;overflow:hidden;}
  .m-pool-val.lg{font-size:22px;}
  .m-pool-val.green{color:var(--green);}
  .m-pool-val.red{color:var(--red);}
  .m-pool-val.dim{color:var(--text2);}
  .m-pool-sub{font-size:11px;color:var(--text3);margin-top:2px;}

  /* Account chips horizontal scroll */
  .m-accounts-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;}
  .m-accounts{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
  .m-settings-row{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap;}
  .m-settings-btn{flex:1;min-width:90px;min-height:44px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 8px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:var(--sans);}
  .m-settings-btn:active{background:var(--bg);}
  .m-accounts::-webkit-scrollbar{display:none;}
  .m-acct-chip{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:10px 14px;flex-shrink:0;min-width:120px;cursor:pointer;transition:border-color .12s;}
  .m-acct-chip:active{border-color:var(--accent);}
  .m-acct-chip.debt{border-color:var(--rb);background:var(--rbg);}
  .m-acct-chip.debt:active{border-color:var(--red);}
  .m-acct-chip-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
  .m-acct-chip-dot{width:5px;height:5px;border-radius:50%;}
  .m-acct-chip-bal{font-family:var(--mono);font-size:16px;font-weight:500;}
  .m-acct-chip-type{font-size:10px;color:var(--text3);}
  .m-acct-chip-apr{font-size:10px;color:var(--red);margin-top:2px;}
  .m-acct-group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);padding:0 14px 4px;}

  /* Urgency list */
  .m-section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:14px 16px 6px;}
  .m-urgency-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;background:var(--bg2);}
  .m-urgency-item:active{background:var(--surface);}
  .m-urgency-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .m-urgency-name{flex:1;font-size:14px;}
  .m-urgency-sub{font-size:12px;color:var(--text3);}
  .m-urgency-amt{font-family:var(--mono);font-size:13px;font-weight:500;text-align:right;}

  /* Bucket list */
  .m-cat-sec{margin-bottom:4px;}
  .m-cat-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px 6px;background:var(--bg);}
  .m-cat-color{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .m-cat-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);flex:1;}
  .m-cat-totals{font-family:var(--mono);font-size:11px;color:var(--text3);}
  .m-cat-add-btn{border:none;background:none;color:var(--accent);font-size:11px;font-weight:600;padding:4px 6px;cursor:pointer;border-radius:4px;white-space:nowrap;flex-shrink:0;}
  .m-cat-add-btn:active{background:var(--surface);}
  .m-bucket-item{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg2);gap:10px;cursor:pointer;transition:background .1s;}
  .m-bucket-item:active{background:var(--surface);}
  .m-bkt-left{flex:1;min-width:0;}
  .m-bkt-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .m-bkt-sub{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;}
  .m-bkt-bar{height:2px;background:var(--border2);border-radius:2px;margin-top:5px;overflow:hidden;}
  .m-bkt-bar-fill{height:100%;border-radius:2px;}
  .m-bkt-right{text-align:right;flex-shrink:0;min-width:70px;}
  .m-bkt-alloc{font-family:var(--mono);font-size:14px;font-weight:600;}
  .m-bkt-pill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;margin-top:3px;display:inline-block;letter-spacing:.3px;}
  .m-chevron{color:var(--text3);font-size:16px;flex-shrink:0;}

  /* Log form */
  .m-log-form{display:flex;flex-direction:column;gap:0;flex:1;overflow-y:auto;}
  .m-type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin:14px 16px 0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
  .m-type-btn{padding:11px 0;background:var(--surface2);border:none;font-size:13px;font-family:var(--sans);font-weight:600;color:var(--text3);cursor:pointer;transition:all .12s;text-align:center;}
  .m-type-btn.sel-out{background:var(--rbg);color:var(--red);}
  .m-type-btn.sel-in{background:var(--gbg);color:var(--green);}
  .m-type-btn.sel-xfr{background:var(--pbg);color:var(--purple);}
  .m-field{padding:0 16px;margin-top:14px;}
  .m-field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;}
  .m-input{width:100%;padding:13px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:16px;font-family:var(--sans);color:var(--text);transition:border-color .12s;}
  .m-input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
  .m-input::placeholder{color:var(--text3);}
  .m-input.mono{font-family:var(--mono);}
  .m-select{width:100%;padding:13px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:16px;font-family:var(--sans);color:var(--text);cursor:pointer;appearance:none;-webkit-appearance:none;}
  .m-select:focus{outline:none;border-color:var(--accent);}
  .m-select option{background:var(--surface2);}
  .m-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .m-rec-row{display:flex;align-items:center;gap:10px;padding:14px 16px 0;}
  .m-rec-toggle{width:44px;height:26px;border-radius:13px;background:var(--border2);border:none;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0;}
  .m-rec-toggle.on{background:var(--accent);}
  .m-rec-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .15s;}
  .m-rec-toggle.on::after{transform:translateX(18px);}
  .m-rec-label{font-size:14px;color:var(--text2);}
  .m-submit-wrap{padding:16px 16px calc(16px + env(safe-area-inset-bottom));margin-top:auto;flex-shrink:0;}
  .m-submit{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-family:var(--sans);font-weight:600;cursor:pointer;transition:background .12s;}
  .m-submit:active{background:var(--accent2);}

  /* Toast */
  #mToast{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));left:16px;right:16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:13px 16px;display:flex;align-items:center;gap:10px;z-index:999;transform:translateY(20px);opacity:0;transition:transform .2s,opacity .2s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4);}
  #mToast.show{transform:translateY(0);opacity:1;}
  #mToast-icon{font-size:18px;flex-shrink:0;}
  #mToast-text{flex:1;font-size:13px;line-height:1.4;}
  #mToast-amt{font-family:var(--mono);font-size:14px;font-weight:500;flex-shrink:0;}

  /* Bucket detail */
  .m-det-hero{padding:20px 16px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
  .m-det-name{font-size:22px;font-weight:600;letter-spacing:-.5px;margin-bottom:4px;}
  .m-det-meta{font-size:12px;color:var(--text3);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .m-bkt-notes{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .m-det-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);}
  .m-det-num-cell{background:var(--surface);padding:12px 14px;}
  .m-det-num-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;}
  .m-det-num-val{font-family:var(--mono);font-size:16px;font-weight:500;}
  .m-prog-wrap{padding:16px;}
  .m-prog-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:6px;}
  .m-prog-fill{height:100%;border-radius:4px;transition:width .3s;}
  .m-prog-note{display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono);color:var(--text3);}
  .m-alloc-block{margin:0 16px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;}
  .m-alloc-block-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px;}
  .m-alloc-inp-row{display:flex;align-items:center;gap:10px;}
  .m-alloc-big{flex:1;padding:13px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);text-align:right;}
  .m-alloc-big:focus{outline:none;border-color:var(--accent);}
  .m-alloc-set-btn{padding:13px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-family:var(--sans);font-weight:600;cursor:pointer;white-space:nowrap;}
  .m-alloc-set-btn:active{background:var(--accent2);}

  /* Ledger */
  .m-ledger-head{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
  .m-filter-chips{display:flex;gap:6px;margin-bottom:8px;}
  .m-chip-btn{padding:6px 14px;min-height:44px;background:none;border:1px solid var(--border);border-radius:20px;font-size:12px;font-family:var(--sans);font-weight:500;color:var(--text3);cursor:pointer;transition:all .12s;white-space:nowrap;}
  .m-chip-btn.active{background:var(--surface);color:var(--text);border-color:var(--border2);}
  .m-search{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:16px;font-family:var(--sans);color:var(--text);}
  .m-search:focus{outline:none;border-color:var(--accent);}
  .m-search::placeholder{color:var(--text3);}

  /* Tx rows mobile */
  .m-tx-date-hdr{padding:6px 16px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;}
  .m-tx-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;background:var(--bg2);cursor:pointer;}
  .m-tx-row:active{background:var(--surface);}
  .m-tx-sched{opacity:.75;background:var(--abg);}
  .m-tx-sched:active{background:var(--abg);}
  .m-tx-ind{width:4px;border-radius:2px;align-self:stretch;min-height:36px;flex-shrink:0;}
  .m-tx-l{flex:1;min-width:0;}
  .m-tx-name{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .m-tx-meta{font-size:12px;color:var(--text3);margin-top:2px;}
  .m-tx-r{text-align:right;flex-shrink:0;}
  .m-tx-amt{font-family:var(--mono);font-size:16px;font-weight:500;text-align:right;}
  .m-tx-amt.out{color:var(--red);}
  .m-tx-amt.in{color:var(--green);}
  .m-tx-amt.xfr{color:var(--purple);}
  .m-tx-run-bal{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:2px;text-align:right;}
  .m-tx-run-bal.proj{color:var(--amber);}
  .m-tx-run-bal.neg{color:var(--red);}

  /* Edit bottom sheet */
  .m-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;}
  .m-sheet-overlay.show{opacity:1;pointer-events:all;}
  .m-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;border:1px solid var(--border2);z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:90vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
  .m-sheet.show{transform:translateY(0);}
  .m-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 8px;}
  .m-sheet-title{font-size:16px;font-weight:600;padding:0 16px 14px;border-bottom:1px solid var(--border);}
  .m-sheet-body{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;flex:1;}
  .m-sheet-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}

  /* Sinking stats mobile */
  .m-sink-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 16px;}
  .m-sink-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
  .m-sink-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;}
  .m-sink-val{font-family:var(--mono);font-size:16px;font-weight:500;}

  /* Bulk entry mobile */
  .m-bulk-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin:0 16px 10px;display:flex;flex-direction:column;gap:8px;}
  .m-bulk-row-top{display:flex;gap:8px;align-items:center;}
  .m-bulk-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0;line-height:1;flex-shrink:0;}
  .m-bulk-del:active{color:var(--red);}

  /* ── Unified overview: mobile adaptations ── */
  .ov-desktop-only{display:none!important;}
  .ov-month-hdr{display:none!important;} /* topbar handles month nav on mobile */
  .ov-stat{padding:10px 8px;}
  .ov-widgets{grid-template-columns:1fr;gap:0;}
  .ov-widget{border:none;border-radius:0;border-top:1px solid var(--border);padding:12px 16px;}
  .ov-widget-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px;}
  /* Account strip: inline-block card row (avoids flex+overflow height collapse) */
  .als{display:block;white-space:nowrap;overflow-x:auto;padding:4px 14px 16px;margin-bottom:0;background:none;border:none;border-radius:0;}
  .als::-webkit-scrollbar{display:none;}
  .als-cell{display:inline-block;vertical-align:top;white-space:normal;min-width:130px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-right:8px;}
  .als-cell:last-child{margin-right:0;}
  .als-cell.als-debt{border-color:var(--rb);background:var(--rbg);}
  .als-dot{display:block;margin-bottom:8px;}
  .als-name{display:block;font-size:11px;}
  .als-type{display:block;font-size:9px;margin-top:3px;}
  .als-bal{display:block;font-size:16px;font-weight:500;letter-spacing:-.4px;margin-top:8px;}
  .hint-bar{margin:0;border-radius:0;border-left:none;border-right:none;}
  /* Budget health bar + pool strip: 14px side margin to match card gutters */
  .bh-wrap{margin:0 14px 10px;}
  .pool-strip{grid-template-columns:1fr 1fr;margin-left:14px;margin-right:14px;}
  .ov-stats-row{grid-template-columns:1fr 1fr;margin:12px 14px 16px;}

  /* ── Accounts tab: mobile layout ── */
  .acct-pane-wrap{padding:12px 14px 24px;}
  .acct-tab-grid{grid-template-columns:1fr;}
  .acct-group-hdr{display:flex;align-items:center;}
  .acct-tab-card-bal{font-size:18px;}

  /* ── Ledger: touch-friendly filter bar ── */
  .ledger-list-head{flex-wrap:wrap;height:auto;padding:8px 12px;gap:6px;}
  .ledger-filters{flex:1;gap:4px;}
  .rfbtn{min-height:36px;padding:6px 8px;font-size:12px;}
  .ledger-search{padding:10px 12px;font-size:16px;border-top:1px solid var(--border);}

  /* ── Unified bucket rows: mobile adaptations ── */
  .bkt-col-hdr{display:none;}
  .bkt-alloc-col,.bkt-bar-col,.bkt-spent-col,.bkt-avail-col,.bkt-pill-col{display:none;}
  .bkt-compact{display:flex;}
  .bkt-chevron{display:block;}
  .bkt-row{padding:11px 14px;}
  .bkt-cat-hdr{padding:8px 14px 6px;}

  /* Topbar: hide logo to free space for month nav + auth button */
  .tb-logo{display:none;}
  .tb-right{padding:0 8px;gap:6px;}
  #authBtn{font-size:11px;padding:5px 8px;white-space:nowrap;}
  .tb-new-btn{font-size:11px !important;padding:5px 10px !important;}

  /* Reports tab bar: horizontal scroll so all tabs fit */
  .rtab-bar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:10px;margin-bottom:8px;}
  .rtab-bar::-webkit-scrollbar{display:none;}
  .rtab{white-space:nowrap;flex-shrink:0;}
  .rtab-content{min-height:60px;}

  /* Settings: add horizontal padding on mobile */
  .settings-section{padding:0 16px 16px;}
  .settings-section-title{padding:14px 0 8px;margin:0;}

  /* Ledger payee filter row: stack vertically on very narrow screens */
  .ledger-list-col{display:flex;flex-direction:column;min-height:0;}
  #ledgerPayeeSel{font-size:13px;padding:8px 6px;}
}

/* Tablet: 768–1199px — icon-only sidebar */
@media(min-width:768px) and (max-width:1099px){
  .app{grid-template-columns:56px 1fr;}
  .nav-btn .nav-label,.nav-btn .nav-icon-txt{display:none;}
  .nav-btn{padding:14px 0;justify-content:center;}
}

/* Desktop: keep month nav hidden, hide mobile-only DOM */
@media(min-width:768px){
  .tb-month-nav{display:none !important;}
  #mToast,#mSheetOverlay,#mSheet{display:none!important;}
  .ov-mobile-only{display:none!important;}
}

/* ═══ BUDGET HEALTH BAR ═══ */
.bh-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:13px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.bh-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);white-space:nowrap;}
.bh-income-wrap{display:flex;align-items:center;gap:6px;}
.bh-income-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);cursor:pointer;border-bottom:1px dashed var(--border2);transition:border-color .12s;}
.bh-income-val:hover{border-bottom-color:var(--accent);}
.bh-income-inp{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);background:var(--surface2);border:1px solid var(--accent);border-radius:5px;padding:2px 6px;width:110px;outline:none;}
.bh-set-prompt{font-size:12px;color:var(--text3);cursor:pointer;border-bottom:1px dashed var(--border2);transition:color .12s;}
.bh-set-prompt:hover{color:var(--text2);}
.bh-divider{width:1px;height:30px;background:var(--border);flex-shrink:0;}
.bh-stat{display:flex;flex-direction:column;gap:1px;}
.bh-stat-val{font-family:var(--mono);font-size:15px;font-weight:500;}
.bh-bar-wrap{flex:1;min-width:120px;}
.bh-bar-track{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:3px;}
.bh-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.bh-bar-note{font-size:10px;font-family:var(--mono);color:var(--text3);}

/* ═══ WI 2.0 ═══ */
.wi-panel{display:none!important;}
.wi-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.wi-overlay.hidden{display:none;}
.wi-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:1100px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.6);display:flex;flex-direction:column;}
.wi-modal-inner{padding:24px;display:flex;flex-direction:column;gap:20px;}
.wi-two-col{display:grid;grid-template-columns:1fr;gap:20px;}
@media(min-width:768px){.wi-two-col{grid-template-columns:55fr 45fr;}}
@media(max-width:767px){.wi-overlay{padding:0;}.wi-modal{max-width:100%;max-height:100vh;border-radius:0;}}
.wi-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--abg);}
.wi-name-inp{background:none;border:none;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--amber);flex:1;outline:none;border-bottom:1px dashed var(--ab);padding:1px 2px;}
.wi-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:2px 8px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .12s;}
.wi-chip:hover{border-color:var(--accent);color:var(--accent);}
.wi-chip-x{color:var(--text3);font-size:12px;line-height:1;padding:0 1px;cursor:pointer;}
.wi-chip-x:hover{color:var(--red);}
.wi-body{display:grid;grid-template-columns:auto 1fr;gap:0;}
.wi-left{padding:12px 16px;border-right:1px solid var(--border);min-width:260px;}
.wi-right{overflow-x:auto;}
.wi-income-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.wi-s-inp{padding:4px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:13px;color:var(--text);text-align:right;width:96px;outline:none;}
.wi-s-inp:focus{border-color:var(--amber);}
.wi-cat-hdr{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:6px 0 4px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.wi-cat-arrow{font-size:10px;transition:transform .15s;}
.wi-cat-arrow.open{transform:rotate(90deg);}
.wi-bkt-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
.wi-bkt-label{flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wi-diff{font-size:10px;font-family:var(--mono);padding:1px 4px;border-radius:3px;flex-shrink:0;}
.wi-diff.pos{background:var(--gbg);color:var(--green);}
.wi-diff.neg{background:var(--rbg);color:var(--red);}
.wi-proj-table{width:100%;border-collapse:collapse;font-size:12px;min-width:480px;}
.wi-proj-table th{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.wi-proj-table td{padding:7px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);}
.wi-proj-table tr.surplus td{color:var(--green);}
.wi-proj-table tr.deficit td{color:var(--red);}
.wi-proj-table td:first-child{font-family:var(--sans);color:var(--text2);}
.wi-proj-inp{background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--text);padding:2px 5px;width:82px;outline:none;}
.wi-proj-inp:focus{border-color:var(--amber);}

/* ═══ SETTINGS MODAL ═══ */
.settings-section{margin-bottom:20px;}
.settings-section:last-child{margin-bottom:0;}
.settings-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px;}
.acct-order-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;}
.acct-order-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.acct-order-name{flex:1;font-size:14px;}
.theme-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.theme-card{padding:12px 10px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .12s;}
.theme-card:hover{border-color:var(--border2);}
.theme-card.active{border-color:var(--accent);}
.theme-card-swatch{width:32px;height:32px;border-radius:50%;margin:0 auto 6px;border:2px solid rgba(255,255,255,.15);}
.theme-card-name{font-size:12px;font-weight:600;color:var(--text2);}
.theme-card.active .theme-card-name{color:var(--accent);}

/* ═══ LIGHT THEME ═══ */
[data-theme="light"]{
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#ebebed;
  --surface:#ebebed;--surface2:#e0e0e3;
  --border:#d1d1d6;--border2:#c7c7cc;
  --text:#1c1c1e;--text2:#3a3a3c;--text3:#8e8e93;
  --accent:#147a6e;--accent2:#0f6055;
  --green:#1a9b73;--gbg:#e5f5ef;--gb:#a0d9c2;
  --red:#d4394b;--rbg:#fce8eb;--rb:#f0a0a8;
  --amber:#b87800;--abg:#fdf3e0;--ab:#e8c97a;
  --blue:#0066bb;--bbg:#e0edf8;--bb:#7ab0dd;
}
/* ═══ MIDNIGHT THEME ═══ */
[data-theme="midnight"]{
  --bg:#000000;--bg2:#0a0a0a;--bg3:#111111;
  --surface:#141414;--surface2:#1a1a1a;
  --border:#2a2a2a;--border2:#333333;
  --text:#f0f0f0;--text2:#cccccc;--text3:#666666;
  --accent:#00d4b8;--accent2:#00b89e;
  --green:#00d4b8;--gbg:#001a18;--gb:#004d44;
  --red:#ff4d4d;--rbg:#1a0000;--rb:#4d0000;
  --amber:#ffb347;--abg:#1a1200;--ab:#4d3800;
  --blue:#4a9edd;--bbg:#0a1520;--bb:#1a3a5c;
}

/* ═══ AUTH SCREEN ═══ */
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
#authScreen.hidden{display:none;}
.auth-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:380px;padding:36px 32px;box-shadow:0 32px 80px rgba(0,0,0,.6);}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.auth-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
.auth-logo-text{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:-.3px;}
.auth-title{font-size:22px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.6;}
.auth-input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:15px;font-family:var(--sans);color:var(--text);margin-bottom:12px;transition:border-color .12s;}
.auth-input:focus{outline:none;border-color:var(--accent);}
.auth-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-family:var(--sans);font-weight:600;cursor:pointer;transition:background .12s;margin-bottom:10px;}
