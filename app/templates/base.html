<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cura{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --sans: 'Rajdhani', system-ui, sans-serif;
      --mono: 'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --r: 8px;
      --bg:      #0c0c10;
      --bg2:     #14141c;
      --bg3:     #1c1c25;
      --border:  #252535;
      --border2: #3c3c56;
      --text:    #f0f0fa;
      --text2:   #8282a2;
      --text3:   #4e4e6a;
      --green:   #34d399;
      --red:     #f87171; --rbg: rgba(248,113,113,.07);
      --amber:   #fbbf24;
      --accent:  #818cf8;
      --violet:  #a78bfa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
    }

    {% block extra_style %}{% endblock %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

  {% block content %}{% endblock %}

</body>
</html>
