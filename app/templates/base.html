<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cura{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --sans: 'Rajdhani', system-ui, sans-serif;
      --mono: 'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --r: 2px;
      --bg:      #071120;
      --bg2:     #0a1628;
      --bg3:     #0d1f3c;
      --border:  #1e3a5f;
      --border2: #3a7fc1;
      --text:    #e8f4ff;
      --text2:   #7dd3fc;
      --text3:   #3a7fc1;
      --green:   #2a9f60;
      --red:     #cc3333; --rbg: #2a0a0a;
      --amber:   #f0e040;
      --accent:  #7dd3fc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Dev strip ── */
    .dev-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 12px;
      background: #1a1200;
      border-bottom: 2px solid var(--amber);
      font-family: var(--mono);
      font-size: clamp(9px, 1.5vw, 10px);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--amber);
    }
    .dev-strip-badge {
      background: var(--amber);
      color: #000;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .dev-strip-msg { flex: 1; }
    .dev-strip-btn {
      background: none;
      border: 1px solid var(--amber);
      color: var(--amber);
      padding: 1px 7px;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .12s, color .12s;
      flex-shrink: 0;
    }
    .dev-strip-btn:hover { background: var(--amber); color: #000; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

  <div class="dev-strip">
    <span class="dev-strip-badge">DEV</span>
    <span class="dev-strip-msg">Python + HTMX rebuild — Phase 8 / 12</span>
    <a class="dev-strip-btn" href="https://jdudgeon1993.github.io/Budget-Command/" target="_blank">← Old version</a>
  </div>

  {% block content %}{% endblock %}

</body>
</html>
