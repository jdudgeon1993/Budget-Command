<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cura{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --sans: 'Rajdhani', system-ui, sans-serif;
      --mono: 'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --r: 2px;
      --bg:      #071120;
      --bg2:     #0a1628;
      --bg3:     #0d1f3c;
      --border:  #1e3a5f;
      --border2: #3a7fc1;
      --text:    #e8f4ff;
      --text2:   #7dd3fc;
      --text3:   #3a7fc1;
      --green:   #2a9f60;
      --red:     #cc3333; --rbg: #2a0a0a;
      --amber:   #f0e040;
      --accent:  #7dd3fc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
    }

    {% block extra_style %}{% endblock %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

  {% block content %}{% endblock %}

</body>
</html>
