<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cura{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --sans: 'Rajdhani', system-ui, sans-serif;
      --mono: 'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --r: 8px;
      --bg:      #0f0f11;
      --bg2:     #1a1a1f;
      --bg3:     #222228;
      --border:  #2a2a35;
      --border2: #44445a;
      --text:    #e2e2e8;
      --text2:   #a0a0b0;
      --text3:   #55556a;
      --green:   #22c55e;
      --red:     #ef4444; --rbg: #2d1515;
      --amber:   #f5a623;
      --accent:  #6366f1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
    }

    {% block extra_style %}{% endblock %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

  {% block content %}{% endblock %}

</body>
</html>
